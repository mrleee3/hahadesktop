    if (parts.length) return truncateText(parts.join(' · '), 96);

    const listDetails = String(raw.listDetails || '').replace(/^Obs:\s*/i, '').trim();
    if (listDetails) return truncateText(listDetails, 96);
    return 'No recent obs summary';
  }

  function truncateText(text, maxLen) {
    const value = String(text || '').trim();
    if (!value) return '';
    if (value.length <= maxLen) return value;
    return value.slice(0, Math.max(0, maxLen - 1)).trimEnd() + '…';
  }

  function deriveLatestReviewAt(raw) {
    return firstNonEmpty(raw.updatedAt, raw.importedAt, raw.createdAt, raw.timestamp);
  }

  function deriveReviewDueAt(raw) {
    return firstNonEmpty(raw.reviewDueAt, raw.nextReviewAt, raw.nextReviewDueAt);
  }

  function deriveStatus(raw, oxygenLpm, priority) {
    if (raw.currentStatus) return raw.currentStatus;
    if (priority === 'Critical') return 'Deteriorating';
    if (oxygenLpm >= 2) return 'Needs review';
    if (String(raw.acuityClass || raw.acuity || '').toLowerCase() === 'amber') return 'Needs review';
    if (String(raw.acuityClass || raw.acuity || '').toLowerCase() === 'green') return 'Stable';
    return 'Awaiting result';
  }

  function deriveDischargeReadiness(raw, oxygenLpm, iv, priority) {
    const dischargeText = String(raw.form && raw.form.forDischargeSummary || '').trim();
    if (!dischargeText) return 'Not ready';
    if (priority === 'Low' && oxygenLpm === 0 && !iv) return 'Possible today';
    if (priority === 'Medium' && oxygenLpm === 0) return 'Likely tomorrow';
    return 'Not ready';
  }

  function deriveChangedSinceYesterday(raw, latestReviewAt, bloodSummary, priority) {
    const ts = Date.parse(latestReviewAt || '');
    if (!Number.isNaN(ts) && (Date.now() - ts) < 36 * 60 * 60 * 1000) return true;
    if (/[↑↓]/.test(bloodSummary || '')) return true;
    return priority === 'Critical' || priority === 'High';
  }

  function deriveBlockers(raw, oxygenLpm, iv, dischargeReadiness) {
    if (oxygenLpm > 0) return [`O₂ requirement${oxygenLpm ? ` (${formatNumber(oxygenLpm)}L)` : ''}`];
    if (iv) return ['IV treatment ongoing'];
    if (dischargeReadiness === 'Possible today') return ['Discharge plan in progress'];

    const firstPlanLine = String(raw.form && raw.form.plan || '')
      .split(/\n+/)
      .map((line) => line.replace(/^\s*\d+[.)-]?\s*/, '').trim())
      .filter(Boolean)[0] || '';
    if (firstPlanLine) return [truncateText(firstPlanLine, 52)];
    return [];
  }

  function deriveTreatmentFlags(raw, oxygenLpm, iv, dnar) {
    const flags = [];
    if (oxygenLpm > 0) flags.push(`O2 ${formatNumber(oxygenLpm)}L`);
    if (iv || !!(raw.form && raw.form.ivGiven)) flags.push('IV');
    if (dnar) flags.push('DNAR');
    if (raw.form && raw.form.medsGiven) flags.push('Meds');
    return flags;
  }

  function deriveSummaryLine(raw) {
    return firstNonEmpty(raw.summary, firstIssueLine(raw.form && raw.form.issues), 'No summary');
  }

  function buildPatientSummary(raw) {
    const oxygenLpm = extractOxygenLpm(raw);
    const iv = !!(raw.iv || (raw.form && raw.form.ivGiven) || (raw.form && Array.isArray(raw.form.ivEntries) && raw.form.ivEntries.length));
    const escalationFlags = inferEscalationFlags(raw);
    const priority = derivePriority(raw, oxygenLpm, iv);
    const latestReviewAt = deriveLatestReviewAt(raw);
    const reviewDueAt = deriveReviewDueAt(raw);
    const bloodTrendSummary = buildBloodTrendSummary(raw.form && raw.form.bloods);
    const dischargeReadiness = deriveDischargeReadiness(raw, oxygenLpm, iv, priority);
    const treatmentFlags = deriveTreatmentFlags(raw, oxygenLpm, iv, escalationFlags.dnar);

    const summary = {
      id: String(raw.id),
      name: firstNonEmpty(raw.name, `Patient ${raw.id}`),
      age: raw.age || '',
      sex: raw.sex || '',
      location: deriveLocation(raw),
      pathway: derivePathway(raw),
      clinician: deriveClinician(raw),
      priority,
      currentStatus: deriveStatus(raw, oxygenLpm, priority),
      boardStatus: raw.boardStatus || 'Not discussed',
      dischargeReadiness,
      escalationSummary: escalationFlags.dnar && escalationFlags.acp ? 'DNAR + ACP' : escalationFlags.dnar ? 'DNAR' : escalationFlags.acp ? 'ACP' : 'Full escalation',
      alerts: treatmentFlags.slice(),
      latestReviewAt,
      reviewDueAt,
      changedSinceYesterday: deriveChangedSinceYesterday(raw, latestReviewAt, bloodTrendSummary, priority),
      reviewOverdue: isReviewOverdue(reviewDueAt),
      obsSummary: buildObsSummary(raw),
      bloodTrendSummary,
      treatmentFlags,
      blockers: deriveBlockers(raw, oxygenLpm, iv, dischargeReadiness),
      oxygenLpm,
      iv,
      dnar: escalationFlags.dnar,
      acp: escalationFlags.acp,
      sourcePatient: raw,
      summaryLine: deriveSummaryLine(raw),
      referralSource: String(raw.referralSource || '').trim(),
      boardNote: '',
      admissionDate: String(raw.doa || '').trim(),
      // Free-text "for discharge summary" notes that round-trip with mobile's
      // textarea via operational.forDischargeSummary in JSON. mapJsonPatientToLegacyRaw
      // resolves this from operational (with legacy operational.dischargeNotes
      // fallback), so by the time we see it on raw it's already canonicalised.
      forDischargeSummary: String(raw.forDischargeSummary || '')
    };

    return applyPatientOperationalState(summary);
  }

  function filterPatients(rows, savedView) {
    switch (savedView) {
      case 'high-priority':
        return rows.filter((r) => r.priority === 'High' || r.priority === 'Critical');
      case 'overdue-reviews':
        return rows.filter((r) => r.reviewOverdue);
      case 'likely-discharge':
        return rows.filter((r) => r.dischargeReadiness === 'Possible today' || r.dischargeReadiness === 'Ready');
      case 'oxygen-patients':
        return rows.filter((r) => r.oxygenLpm > 0);
      case 'iv-patients':
        return rows.filter((r) => r.iv);
      case 'changed':
        return rows.filter((r) => r.changedSinceYesterday);
      default:
        return rows;
    }
  }

  function sortPatients(rows, sortKey) {
    const out = rows.slice();
    switch (sortKey) {
      case 'name':
        out.sort((a, b) => a.name.localeCompare(b.name));
        return out;
      case 'review':
        out.sort((a, b) => {
          const aTs = Date.parse(a.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
          const bTs = Date.parse(b.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
          return aTs - bTs;
        });
        return out;
      case 'priority':
      default:
        out.sort((a, b) => {
          const p = (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99);
          if (p !== 0) return p;
          return a.name.localeCompare(b.name);
        });
        return out;
    }
  }

  function buildBoardMetrics(rows) {
    const highPriority = rows.filter((r) => r.priority === 'High' || r.priority === 'Critical').length;
    const overdueReviews = rows.filter((r) => r.reviewOverdue).length;
    const likelyDischarge = rows.filter((r) => r.dischargeReadiness === 'Possible today' || r.dischargeReadiness === 'Ready').length;
    const oxygenPatients = rows.filter((r) => r.oxygenLpm > 0).length;
    const ivPatients = rows.filter((r) => r.iv).length;
    const changed = rows.filter((r) => r.changedSinceYesterday).length;
    return [
      { key: 'all-active', label: 'Caseload', value: rows.length, subtext: 'All active patients' },
      { key: 'high-priority', label: 'High priority', value: highPriority, subtext: 'Needs senior attention', tone: highPriority ? 'warn' : '' },
      { key: 'overdue-reviews', label: 'Overdue reviews', value: overdueReviews, subtext: 'Past due time', tone: overdueReviews ? 'danger' : '' },
      { key: 'likely-discharge', label: 'Likely discharge', value: likelyDischarge, subtext: 'Today or ready', tone: likelyDischarge ? 'good' : '' },
      { key: 'oxygen-patients', label: 'Oxygen', value: oxygenPatients, subtext: 'Currently requiring O2' },
      { key: 'iv-patients', label: 'IV patients', value: ivPatients, subtext: 'Receiving IV treatment' },
      { key: 'changed', label: 'Changed since yesterday', value: changed, subtext: 'Live status shift' }
    ];
  }

  function pickSelectedPatient(rows, state, currentPatientId) {
    const selectedId = String(state.selectedPatientId || state.route.entityId || currentPatientId || '');
    const found = rows.find((r) => String(r.id) === selectedId);
    return found || rows[0] || null;
  }

  function buildBoardViewModel(state) {
    const sourceBundle = getPatientSourceBundle();
    const ops = window.HAHBoard && window.HAHBoard.ops;
    const isDischarged = ops && typeof ops.isPatientDischarged === 'function'
      ? (id) => ops.isPatientDischarged(id)
      : () => false;
    const activeRows = sourceBundle.rows.filter((row) => !isDischarged(row.id));
    const allRows = activeRows.map(buildPatientSummary);
    const filtered = filterPatients(allRows, state.board.savedView);
    const sorted = sortPatients(filtered, state.board.sort);
    const selectedPatient = pickSelectedPatient(sorted, state, sourceBundle.currentPatientId);

    return {
      rows: sorted,
      metrics: buildBoardMetrics(allRows),
      selectedPatient,
      totalPatients: sorted.length,
      source: sourceBundle.source,
      storageKey: sourceBundle.storageKey,
      currentPatientId: sourceBundle.currentPatientId,
      patientSortMode: sourceBundle.patientSortMode || '',
      patientSortDirection: sourceBundle.patientSortDirection || ''
    };
  }

  function getPatientSummaryById(id) {
    if (!id) return null;
    const sourceBundle = getPatientSourceBundle();
    const match = sourceBundle.rows.find((row) => String(row.id) === String(id));
    return match ? buildPatientSummary(match) : null;
  }

  function splitCleanLines(text) {
    return String(text || '')
      .split(/\n+/)
      .map((line) => String(line || '').replace(/^\s*\d+[.)-]?\s*/, '').trim())
      .filter(Boolean);
  }

  function buildLatestReviewText(raw) {
    const form = raw.form || {};
    const blocks = [];
    if (raw.summary) blocks.push(String(raw.summary).trim());
    if (form.examination) blocks.push(String(form.examination).trim());
    if (form.plan) blocks.push('Plan\n' + String(form.plan).trim());
    return blocks.filter(Boolean).join('\n\n');
  }

  function buildObsItems(raw, summary) {
    const form = raw.form || {};
    const temp = getObsValue(form, 'temp');
    const bp = getObsValue(form, 'bp');
    const hr = getObsValue(form, 'hr');
    const spo2 = getObsValue(form, 'spo2');
    const oxygenFlow = getObsValue(form, 'oxygenFlow');
    const rr = getObsValue(form, 'rr');
    const bm = getObsValue(form, 'bm');
    const weight = getObsValue(form, 'weight');
    const scoreMode = getObsValue(form, 'scoreMode');
    const hasVitals = !!(temp || bp || hr || spo2 || rr || bm || weight);
    const items = [
      { label: 'Temp', value: temp || '—' },
      { label: 'BP', value: bp || '—' },
      { label: 'HR', value: hr || '—' },
      { label: 'SpO₂', value: spo2 ? `${spo2}%${oxygenFlow ? ` on ${oxygenFlow}` : ' RA'}` : '—' },
      { label: 'RR', value: rr || '—' },
      { label: 'BM', value: bm || '—' },
      { label: 'Weight', value: weight ? `${weight}kg` : '—' }
    ];
    if (scoreMode || !hasVitals) items.push({ label: 'Scores', value: scoreMode || summary.currentStatus || '—' });
    return items;
  }

  function parseBloodSamples(text) {
    const lines = String(text || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
    return lines.slice(0, 5).map((line) => {
      const parts = line.split('|').map((part) => part.trim()).filter(Boolean);
      const time = parts[0] || 'Sample';
      const main = parts.slice(1, 3).join(' | ') || line;
      const tail = parts.slice(3).join(' | ');
      return { time, main: truncateText(main, 140), tail: truncateText(tail, 160) };
    });
  }

  function formatMedEntry(entry) {
    if (!entry) return null;
    const name = firstNonEmpty(entry.name, entry.medication);
    if (!name) return null;
    const parts = [name, entry.dose, entry.frequency].map((x) => String(x || '').trim()).filter(Boolean);
    const detail = String(entry.details || entry.serialExpiry || '').trim();
    return {
      title: parts.join(' · '),
      detail: detail || ''
    };
  }

  function buildMedicationItems(raw) {
    const form = raw.form || {};
    const meds = Array.isArray(form.medEntries) ? form.medEntries.map(formatMedEntry).filter(Boolean) : [];
    const ivs = Array.isArray(form.ivEntries) ? form.ivEntries.map(formatMedEntry).filter(Boolean) : [];
    return { meds, ivs };
  }

  function buildPatientWorkspaceModel(state) {
    const boardVm = buildBoardViewModel(state);
    const selectedId = String(state.route.entityId || state.selectedPatientId || (boardVm.selectedPatient && boardVm.selectedPatient.id) || '');
    const summary = getPatientSummaryById(selectedId) || boardVm.selectedPatient;
    if (!summary) return null;

    const raw = summary.sourcePatient || {};
    const form = raw.form || {};
    const issues = splitCleanLines(form.issues || raw.summary).slice(0, 6);
    const planLines = splitCleanLines(form.plan).slice(0, 6);
    const dischargeLines = splitCleanLines(form.forDischargeSummary).slice(0, 4);
    const bloodSamples = parseBloodSamples(form.bloods);
    const meds = buildMedicationItems(raw);
    const obsItems = buildObsItems(raw, summary);
    const contextRows = boardVm.rows;
    const selectedIndex = contextRows.findIndex((row) => String(row.id) === String(summary.id));

    return {
      patient: summary,
      summaryText: summary.summaryLine || raw.summary || 'No summary available',
      reviewText: buildLatestReviewText(raw),
      issues,
      planLines,
      dischargeLines,
      bloodSamples,
      obsItems,
      medications: meds.meds,
      ivs: meds.ivs,
      listDetails: String(raw.listDetails || '').replace(/^Obs:\s*/i, '').trim(),
      admissionDate: String(raw.doa || '').trim(),
      referralSource: String(raw.referralSource || '').trim(),
      contextRows,
      selectedIndex
    };
  }

  function inferTaskCategory(title) {
    const text = String(title || '').toLowerCase();
    if (/blood|crp|u&e|u&e|urea|electrolyte|result|sample|culture|micro/.test(text)) return 'Bloods/results';
    if (/discharge|tto|transport|home|equipment/.test(text)) return 'Discharge';
    if (/family|relative|carer/.test(text)) return 'Family update';
    if (/iv|antibiotic|line|vip/.test(text)) return 'IV / treatment';
    if (/oxygen|o2|sats|review/.test(text)) return 'Clinical review';
    return 'Clinical review';
  }

  function inferTaskStatus(title) {
    const text = String(title || '').toLowerCase();
    if (/awaiting|pending|chase|follow up/.test(text)) return 'Waiting external';
    return 'Open';
  }

  function normaliseTaskPriority(patient, category, title) {
    if (patient.priority === 'Critical') return 'Critical';
    if (category === 'Discharge' && (patient.dischargeReadiness === 'Possible today' || patient.dischargeReadiness === 'Ready')) return 'High';
    if (category === 'Bloods/results' && /pending|awaiting/.test(String(title || '').toLowerCase())) return patient.priority === 'Low' ? 'Medium' : patient.priority;
    return patient.priority === 'Low' ? 'Low' : patient.priority === 'Medium' ? 'Medium' : 'High';
  }

  function buildTaskId(patientId, slug, index) {
    return `task:${patientId}:${slug}:${index}`;
  }

  function toSlug(text) {
    return String(text || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'task';
  }

  function deriveDueState(dueAt) {
    if (!dueAt) return 'No due date';
    const ts = Date.parse(dueAt);
    if (Number.isNaN(ts)) return 'No due date';
    const now = new Date();
    const due = new Date(ts);
    const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const startTomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
    const startDayAfter = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2).getTime();
    if (ts < Date.now()) return 'Overdue';
    if (ts >= startToday && ts < startTomorrow) return 'Due today';
    if (ts >= startTomorrow && ts < startDayAfter) return 'Due tomorrow';
    return 'Future';
  }

  function makeTask(patient, options, index) {
    const title = String(options.title || '').trim();
    if (!title) return null;
    const category = options.category || inferTaskCategory(title);
    const dueAt = options.dueAt || patient.reviewDueAt || patient.latestReviewAt || '';
    const blocker = options.blocker || '';
    const status = options.status || inferTaskStatus(title);
    return {
      id: buildTaskId(patient.id, toSlug(title), index),
      patientId: patient.id,
      title,
      note: options.note || patient.summaryLine || '',
      category,
      owner: options.owner || patient.clinician || 'Unassigned',
      dueAt,
      dueState: deriveDueState(dueAt),
      priority: options.priority || normaliseTaskPriority(patient, category, title),
      status,
      blocker,
      createdFrom: options.createdFrom || 'Patient view',
      createdBy: options.createdBy || patient.clinician || 'H@H Board',
      updatedAt: options.updatedAt || patient.latestReviewAt || dueAt || '',
      boardLink: options.boardLink || patient.boardStatus || 'Not discussed',
      patient,
      sourceLine: options.sourceLine || ''
    };
  }

  function buildTasksForPatient(patient) {
    const raw = patient.sourcePatient || {};
    const form = raw.form || {};
    const tasks = [];
    let idx = 1;

    const addTask = (options) => {
      const task = makeTask(patient, options, idx++);
      if (!task) return;
      if (tasks.some((existing) => existing.title === task.title && existing.category === task.category)) return;
      tasks.push(task);
    };

    if (patient.reviewDueAt) {
      addTask({
        title: patient.reviewOverdue ? 'Complete overdue clinical review' : 'Clinical review due',
        category: 'Clinical review',
        dueAt: patient.reviewDueAt,
        status: 'Open',
        createdFrom: 'Board cadence'
      });
    }

    patient.blockers.forEach((blocker) => {
      addTask({
        title: blocker,
        category: inferTaskCategory(blocker),
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        blocker,
        status: inferTaskStatus(blocker),
        createdFrom: 'Derived blocker'
      });
    });

    if (patient.iv) {
      addTask({
        title: 'Review IV therapy plan',
        category: 'IV / treatment',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Treatment state'
      });
    }

    if (patient.oxygenLpm > 0) {
      addTask({
        title: `Review oxygen requirement (${patient.oxygenLpm}L)`,
        category: 'Clinical review',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Treatment state'
      });
    }

    if ((patient.dischargeReadiness === 'Possible today' || patient.dischargeReadiness === 'Ready') && !patient.blockers.some((x) => /tto|discharge/i.test(x))) {
      addTask({
        title: 'Progress discharge plan',
        category: 'Discharge',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Discharge readiness'
      });
    }

    splitCleanLines(form.plan).slice(0, 3).forEach((line) => {
      addTask({
        title: truncateText(line, 84),
        category: inferTaskCategory(line),
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        sourceLine: line,
        status: inferTaskStatus(line),
        createdFrom: 'Plan'
      });
    });

    if (/pending|awaiting|repeat blood|u&e|crp|wcc/i.test(patient.bloodTrendSummary) && !tasks.some((task) => task.category === 'Bloods/results')) {
      addTask({
        title: 'Review blood results / trend',
        category: 'Bloods/results',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Blood trend'
      });
    }

    return tasks.slice(0, 6);
  }

  function filterTasks(rows, state) {
    let out = rows.slice();
    const savedView = state.tasks.savedView;
    const patientId = state.tasks.filters && state.tasks.filters.patientId;
    if (patientId) {
      out = out.filter((task) => String(task.patientId) === String(patientId));
    }
    switch (savedView) {
      case 'due-today':
        out = out.filter((task) => task.dueState === 'Due today');
        break;
      case 'overdue':
        out = out.filter((task) => task.dueState === 'Overdue');
        break;
      case 'waiting-external':
        out = out.filter((task) => task.status === 'Waiting external');
        break;
      case 'discharge-blockers':
        out = out.filter((task) => task.category === 'Discharge' || /tto|transport|home|equipment|discharge/i.test(task.title + ' ' + task.blocker));
        break;
      case 'review-due':
        out = out.filter((task) => task.category === 'Clinical review');
        break;
      case 'high-priority':
        out = out.filter((task) => task.priority === 'High' || task.priority === 'Critical');
        break;
      case 'unassigned':
        out = out.filter((task) => !task.owner || task.owner === 'Unassigned' || task.owner === '—');
        break;
      case 'patient-focus':
        break;
      case 'completed':
        break;
      case 'boardround-actions':
        out = out.filter((task) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(task.boardLink || '')) || /boardround/i.test(String(task.createdFrom || '')));
        break;
      default:
        break;
    }
    return out;
  }

  function sortTasks(rows, sortKey) {
    const out = rows.slice();
    const dueRank = { 'Overdue': 0, 'Due today': 1, 'Due tomorrow': 2, 'Future': 3, 'No due date': 4 };
    const priRank = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    switch (sortKey) {
      case 'priority':
        out.sort((a, b) => (priRank[a.priority] ?? 99) - (priRank[b.priority] ?? 99) || a.title.localeCompare(b.title));
        return out;
      case 'patient':
        out.sort((a, b) => a.patient.name.localeCompare(b.patient.name) || a.title.localeCompare(b.title));
        return out;
      case 'due':
      default:
        out.sort((a, b) => {
          const dueCmp = (dueRank[a.dueState] ?? 99) - (dueRank[b.dueState] ?? 99);
          if (dueCmp !== 0) return dueCmp;
          const aTs = Date.parse(a.dueAt || '') || Number.MAX_SAFE_INTEGER;
          const bTs = Date.parse(b.dueAt || '') || Number.MAX_SAFE_INTEGER;
          if (aTs !== bTs) return aTs - bTs;
          return a.title.localeCompare(b.title);
        });
        return out;
    }
  }

  function buildTaskMetrics(rows) {
    return [
      { key: 'all-open', label: 'Open tasks', value: rows.length, subtext: 'Visible operational actions', tone: rows.length ? '' : 'good' },
      { key: 'due-today', label: 'Due today', value: rows.filter((r) => r.dueState === 'Due today').length, subtext: 'Needs action today' },
      { key: 'overdue', label: 'Overdue', value: rows.filter((r) => r.dueState === 'Overdue').length, subtext: 'Past due', tone: rows.some((r) => r.dueState === 'Overdue') ? 'danger' : '' },
      { key: 'waiting-external', label: 'Waiting external', value: rows.filter((r) => r.status === 'Waiting external').length, subtext: 'Pending other input' },
      { key: 'discharge-blockers', label: 'Discharge blockers', value: rows.filter((r) => r.category === 'Discharge' || /discharge|tto|transport|home/i.test(r.title + ' ' + r.blocker)).length, subtext: 'Flow-limiting work', tone: 'warn' },
      { key: 'review-due', label: 'Review tasks', value: rows.filter((r) => r.category === 'Clinical review').length, subtext: 'Clinical review cadence' },
      { key: 'boardround-actions', label: 'Boardround actions', value: rows.filter((r) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(r.boardLink || '')) || /boardround/i.test(String(r.createdFrom || ''))).length, subtext: 'Live actions from the round', tone: 'warn' }
    ];
  }

  function buildTaskViewCounts(rows) {
    return {
      'all-open': rows.length,
      'due-today': rows.filter((r) => r.dueState === 'Due today').length,
      overdue: rows.filter((r) => r.dueState === 'Overdue').length,
      'waiting-external': rows.filter((r) => r.status === 'Waiting external').length,
      'discharge-blockers': rows.filter((r) => r.category === 'Discharge' || /discharge|tto|transport|home/i.test(r.title + ' ' + r.blocker)).length,
      'review-due': rows.filter((r) => r.category === 'Clinical review').length,
      'boardround-actions': rows.filter((r) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(r.boardLink || '')) || /boardround/i.test(String(r.createdFrom || ''))).length,
      'high-priority': rows.filter((r) => r.priority === 'High' || r.priority === 'Critical').length,
      unassigned: rows.filter((r) => !r.owner || r.owner === 'Unassigned' || r.owner === '—').length
    };
  }


  function buildCustomTask(customTask, patientMap) {
    const patient = patientMap.get(String(customTask.patientId));
    if (!patient) return null;
    const task = {
      id: String(customTask.id),
      patientId: String(customTask.patientId),
      title: String(customTask.title || '').trim(),
      note: String(customTask.note || patient.summaryLine || '').trim(),
      category: String(customTask.category || 'Clinical review').trim(),
      owner: String(customTask.owner || patient.clinician || 'Unassigned').trim(),
      dueAt: String(customTask.dueAt || '').trim(),
      dueState: deriveDueState(customTask.dueAt),
      priority: String(customTask.priority || patient.priority || 'Medium').trim(),
      status: String(customTask.status || 'Open').trim(),
      blocker: String(customTask.blocker || '').trim(),
      createdFrom: String(customTask.createdFrom || 'Manual').trim(),
      createdBy: String(customTask.createdBy || 'H@H Board').trim(),
      updatedAt: String(customTask.updatedAt || '').trim(),
      boardLink: String(customTask.boardLink || patient.boardStatus || '').trim(),
      patient,
      sourceLine: ''
    };
    return applyTaskPatch(task);
  }

  function buildAllTasks(boardRows) {
    const patientMap = new Map(boardRows.map((row) => [String(row.id), row]));
    const opsState = getOpsState();
    const derivedTasks = boardRows.flatMap(buildTasksForPatient).map(applyTaskPatch);
    const localCustomTasks = Array.isArray(opsState.customTasks)
      ? opsState.customTasks.map((task) => buildCustomTask(task, patientMap)).filter(Boolean)
      : [];
    const jsonTasksRaw = window.HAHBoard.sharedJsonStore && typeof window.HAHBoard.sharedJsonStore.getCachedTasks === 'function'
      ? window.HAHBoard.sharedJsonStore.getCachedTasks()
      : [];
    const jsonCustomTasks = Array.isArray(jsonTasksRaw)
      ? jsonTasksRaw.map((task) => buildCustomTask(Object.assign({ createdFrom: 'JSON tasks' }, task), patientMap)).filter(Boolean)
      : [];

    const customMap = new Map();
    jsonCustomTasks.concat(localCustomTasks).forEach((task) => {
      if (!task || !task.id) return;
      customMap.set(String(task.id), Object.assign({}, customMap.get(String(task.id)) || {}, task));
    });
    return derivedTasks.concat(Array.from(customMap.values()));
  }


  function getSourceLabel(source) {
    if (source === 'json') return 'OneDrive JSON';
    if (source === 'live') return 'Live app storage';
    if (source === 'adapter') return 'Adapter';
    return 'Demo data';
  }

  function buildTasksViewModel(state) {
    const boardVm = buildBoardViewModel(state);
    const allTaskRows = buildAllTasks(boardVm.rows);
    const activeTasks = allTaskRows.filter((task) => !['Done', 'Cancelled'].includes(task.status));
    const completedTasks = allTaskRows.filter((task) => task.status === 'Done');

    const savedView = state.tasks && state.tasks.savedView;
    const sourceRows = savedView === 'completed' ? completedTasks : activeTasks;
    const filtered = filterTasks(sourceRows, state);
    const sorted = sortTasks(filtered, state.tasks.sort || 'due');

    const patientId = state.tasks && state.tasks.filters && state.tasks.filters.patientId;
    const completedRows = sortTasks(
      patientId ? completedTasks.filter((task) => String(task.patientId) === String(patientId)) : completedTasks,
      state.tasks.sort || 'due'
    );

    const selectedTaskId = String(state.selectedTaskId || state.route.entityId || (sorted[0] && sorted[0].id) || '');
    const selectedTask = sorted.find((task) => String(task.id) === selectedTaskId) || sorted[0] || null;
    const selectedPatient = selectedTask ? selectedTask.patient : null;
    const relatedTasks = selectedTask ? sorted.filter((task) => task.patientId === selectedTask.patientId && task.id !== selectedTask.id).slice(0, 4) : [];
    const sourceLabel = getSourceLabel(boardVm.source);
    const counts = buildTaskViewCounts(activeTasks);
    counts.completed = completedRows.length;
    return {
      rows: sorted,
      completedRows,
      metrics: buildTaskMetrics(activeTasks),
      viewCounts: counts,
      selectedTask,
      selectedPatient,
      relatedTasks,
      totalTasks: sorted.length,
      source: boardVm.source,
      sourceLabel,
      storageKey: boardVm.storageKey,
      boardRows: boardVm.rows
    };
  }

  function uniquePatients(rows) {
    const seen = new Set();
    const out = [];
    rows.forEach((row) => {
      if (!row || seen.has(String(row.id))) return;
      seen.add(String(row.id));
      out.push(row);
    });
    return out;
  }

  function limitPatients(rows, max) {
    return uniquePatients(rows).slice(0, max || 6);
  }

  function aggregateBy(rows, accessor) {
    const map = new Map();
    rows.forEach((row) => {
      const key = accessor(row) || '—';
      map.set(key, (map.get(key) || 0) + 1);
    });
    return Array.from(map.entries()).map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value);
  }

  function getInsightsPreset(state) {
    return state.route.preset || state.insights.preset || 'service-overview';

  function buildBoardroundViewModel(state) {
    const boardVm = buildBoardViewModel(state);
    const tasksVm = buildTasksViewModel({ ...state, tasks: { ...(state.tasks || {}), savedView: 'all-open', filters: { patientId: null } } });
    const statusRank = { 'In discussion': 0, 'Not discussed': 1, 'Discussed': 2, 'Actioned': 3, 'Deferred': 4 };
    const queueRows = boardVm.rows.slice().sort((a, b) => {
      const s = (statusRank[a.boardStatus] ?? 99) - (statusRank[b.boardStatus] ?? 99);
      if (s !== 0) return s;
      const p = (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99);
      if (p !== 0) return p;
      const aTs = Date.parse(a.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
      const bTs = Date.parse(b.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
      return aTs - bTs;
    });
    const selectedId = String(state.selectedPatientId || state.route.entityId || (boardVm.selectedPatient && boardVm.selectedPatient.id) || '');
    const currentIndex = Math.max(0, queueRows.findIndex((row) => String(row.id) === selectedId));
    const activePatient = queueRows[currentIndex] || queueRows[0] || null;
    const queueTasks = activePatient ? tasksVm.rows.filter((task) => String(task.patientId) === String(activePatient.id)) : [];
    const counts = {
      total: queueRows.length,
      notDiscussed: queueRows.filter((p) => p.boardStatus === 'Not discussed').length,
      inDiscussion: queueRows.filter((p) => p.boardStatus === 'In discussion').length,
      discussed: queueRows.filter((p) => p.boardStatus === 'Discussed').length,
      actioned: queueRows.filter((p) => p.boardStatus === 'Actioned').length,
      deferred: queueRows.filter((p) => p.boardStatus === 'Deferred').length
    };
    return {
      queueRows,
      activePatient,
      activeTasks: queueTasks.slice(0, 6),
      currentIndex,
      counts,
      allTasks: tasksVm.rows
    };
  }

      };
    }
    if (!selectedDetail && selectedKey === 'pathway-distribution') {

  };

    { key: 'resp',    label: 'Resp',     colour: '#2f6fed', match: /\bresp|lrti|pneumonia|cap|copd|asthma|bronch|covid|pleural/i },

  function classifyPathway(row) {
    const pathway = String(row.pathway || '').trim();
    const summary = String(row.summaryLine || row.summary || '').trim();
    const joined  = pathway + ' ' + summary;
    if (row.iv || row.ivActive) return 'iv';
    for (const g of PATHWAYS) {
      if (!g.match) continue;
      if (g.match.test(joined)) return g.key;
    }
    return 'other';
  }

  function parseAdmDate(str) {
    if (!str) return null;
    const m = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) {
      const dt = new Date(+m[1], +m[2] - 1, +m[3]);
      return isNaN(dt.getTime()) ? null : dt.getTime();
    }
    const t = new Date(str).getTime();
    return isNaN(t) ? null : t;
  }

  function losDays(admissionDate) {
    const t = parseAdmDate(admissionDate);
    if (!t) return null;
    return Math.max(0, Math.floor((Date.now() - t) / 86400000));
  }

  function formatAdmShort(admissionDate) {
    const t = parseAdmDate(admissionDate);
    if (!t) return null;
    return new Date(t).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function fmtDateShort(iso) {
    const t = new Date(iso || '').getTime();
    if (!t || isNaN(t)) return '';
    return new Date(t).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  function todayIso() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function getPatientExt(patientId) {

  }

      return c.card('Caseload', '<div class="hah-board-sub">Caseload data unavailable.</div>');
    }

    const rows = vm.rows || [];
    const metrics = patientScreen.computeCaseloadMetrics(rows);
    const caseloadHtml = patientScreen.renderCaseloadCard(metrics, new Set());
    return caseloadHtml;
  }

  // ── Main pane ────────────────────────────────────────────────────────

  function renderMainPane(state) {
    const vm = d.buildBoardViewModel(state);
    const rows = vm.rows || [];
    const filter = (state.board && state.board.pathwayFilter) || 'all';
    const flaggedOnly = !!(state.board && state.board.flaggedOnly);
    const bloodsOnly = !!(state.board && state.board.bloodsOnly);

    // Apply filters
    let filteredRows = rows.slice();
    if (filter !== 'all') filteredRows = filteredRows.filter((r) => classifyPathway(r) === filter);
    if (flaggedOnly) filteredRows = filteredRows.filter((r) => getPatientExt(r.id).catchUpFlag);
    if (bloodsOnly)  filteredRows = filteredRows.filter((r) => getPatientExt(r.id).bloodsStatus);

    // Sort
    const sortMode = (state.board && state.board.sort) || 'los';
    filteredRows = sortRows(filteredRows, sortMode);

    const modal = state.board && state.board.addPatientModal ? renderAddPatientModal() : '';

    return `<div class="hah-board-surface">
      ${renderServiceMetrics(rows)}
      ${renderPatientListCard(filteredRows, filter, flaggedOnly, sortMode, state)}
      ${modal}
    </div>`;
  }

  function sortRows(rows, mode) {
    const sorted = rows.slice();
    if (mode === 'name') {
      sorted.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
    } else if (mode === 'pathway') {
      sorted.sort((a, b) => String(classifyPathway(a)).localeCompare(String(classifyPathway(b))) || String(a.name).localeCompare(String(b.name)));
    } else if (mode === 'discharge') {
      // Ready / Possible today / Likely tomorrow / Not ready — priority by readiness
      const order = { 'Ready': 0, 'Possible today': 1, 'Likely tomorrow': 2 };
      sorted.sort((a, b) => {
        const oa = order[a.dischargeReadiness] !== undefined ? order[a.dischargeReadiness] : 9;
        const ob = order[b.dischargeReadiness] !== undefined ? order[b.dischargeReadiness] : 9;
        return oa - ob || String(a.name).localeCompare(String(b.name));
      });
    } else {
      // los — oldest first
      sorted.sort((a, b) => (parseAdmDate(a.admissionDate) || Infinity) - (parseAdmDate(b.admissionDate) || Infinity));
    }
    return sorted;
  }

  // ── Service metrics strip ────────────────────────────────────────────

  function renderServiceMetrics(allRows) {
    const totalCount = allRows.length;
    const capacityCeiling = ops && ops.getCapacityCeiling ? ops.getCapacityCeiling() : null;

    const losList = allRows.map((r) => losDays(r.admissionDate)).filter((v) => v !== null);
    const avgLOS = losList.length ? (losList.reduce((a, b) => a + b, 0) / losList.length) : 0;
    const over7 = losList.filter((v) => v > 7).length;
    const dischargeToday = allRows.filter((r) => r.dischargeReadiness === 'Ready' || r.dischargeReadiness === 'Possible today').length;
    const onIvAbx = allRows.filter((r) => {
      const ext = getPatientExt(r.id);
      return !!ext.abxName;
    }).length;
    const flagged = allRows.filter((r) => getPatientExt(r.id).catchUpFlag).length;
    const todayDay = new Date().toDateString();
    const newToday = allRows.filter((r) => {
      const t = parseAdmDate(r.admissionDate);
      return t && new Date(t).toDateString() === todayDay;
    }).length;

    const capacityValue = capacityCeiling
      ? `${totalCount}<span class="hah-sm-tile-unit">/${capacityCeiling}</span>`
      : '<button type="button" class="hah-sm-capacity-set" data-board-action="set-capacity">Set</button>';
    const capacityAlert = capacityCeiling && totalCount >= capacityCeiling;

    function tile(label, value, opts) {
      opts = opts || {};
      const alert = opts.alert ? ' is-alert' : '';
      const clickable = opts.action ? ' is-clickable' : '';
      const attr = opts.action ? `data-board-action="${opts.action}"` : '';
      return `<div class="hah-sm-tile${alert}${clickable}" ${attr}>
        <div class="hah-sm-tile-value">${value}</div>
        <div class="hah-sm-tile-label">${c.escapeHtml(label)}</div>
      </div>`;
    }

    const avgAlert = totalCount > 0 && avgLOS > 7;

    return `<section class="hah-sm-strip">
      ${tile('Total', totalCount)}
      ${tile('Avg LOS', totalCount ? avgLOS.toFixed(1) + 'd' : '—', { alert: avgAlert })}
      ${tile('Over 7d', over7, { alert: over7 > 0 })}
      ${tile('Discharge today', dischargeToday)}
      ${tile('New today', newToday)}
      ${tile('On abx', onIvAbx)}
      ${tile('Flagged', flagged, { action: flagged > 0 ? 'toggle-flagged-filter' : null })}
      ${tile('Capacity', capacityValue, { alert: capacityAlert, action: 'set-capacity' })}
    </section>`;
  }

  // ── Patient list card with integrated pathway filter ─────────────────

  function renderPatientListCard(rows, filter, flaggedOnly, sortMode, state) {
    const allRows = d.buildBoardViewModel(state).rows || [];
    const pathwayCounts = { all: allRows.length };
    PATHWAYS.forEach((p) => { pathwayCounts[p.key] = 0; });
    allRows.forEach((row) => { pathwayCounts[classifyPathway(row)] = (pathwayCounts[classifyPathway(row)] || 0) + 1; });

    function filterPill(key, label, count, colour) {
      const active = filter === key ? ' is-active' : '';
      const dot = colour ? `<span class="hah-board-filter-dot" style="background:${colour}"></span>` : '';
      return `<button type="button" class="hah-board-filter-pill${active}"
        data-board-action="set-pathway-filter" data-pathway="${c.escapeHtml(key)}">
        ${dot}<span>${c.escapeHtml(label)}</span><span class="hah-board-filter-count">${count}</span>
      </button>`;
    }

    const flaggedPill = `<button type="button"
      class="hah-board-filter-pill hah-board-filter-pill--flagged${flaggedOnly ? ' is-active' : ''}"
      data-board-action="toggle-flagged-filter" title="Show only flagged for catch-up">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="${flaggedOnly ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
      <span>Flagged</span>
    </button>`;

    const bloodsOnly = !!(state.board && state.board.bloodsOnly);
    const bloodsPill = `<button type="button"
      class="hah-board-filter-pill hah-board-filter-pill--bloods${bloodsOnly ? ' is-active' : ''}"
      data-board-action="toggle-bloods-filter" title="Show only patients with bloods taken">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="${bloodsOnly ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        ${bloodsOnly ? '<path d="M8 12.5l2.5 2.5L16 9.5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>' : ''}
      </svg>
      <span>Bloods</span>
    </button>`;

    const filterBar = `<div class="hah-board-filter-bar">
      ${filterPill('all', 'All', pathwayCounts.all || 0)}
      ${PATHWAYS.map((p) => filterPill(p.key, p.label, pathwayCounts[p.key] || 0, p.colour)).join('')}
      ${flaggedPill}
      ${bloodsPill}
    </div>`;

    const sortLabels = { los: 'LOS', name: 'Name', discharge: 'Discharge' };
    const sortMenuOpen = !!(state.board && state.board.sortMenuOpen);
    const sortMenu = sortMenuOpen ? `
      <div class="hah-board-sort-menu">
        ${['los', 'name', 'discharge'].map((key) => `
        <button type="button" class="${sortMode === key ? 'is-selected' : ''}"
          data-board-action="set-sort" data-sort="${key}">
          <span>${sortLabels[key]}</span><span class="hah-board-sort-check">✓</span>
        </button>`).join('')}
      </div>` : '';

    const head = `<div class="hah-board-listcard-head">
      <div class="hah-board-listcard-title-row">
        <span class="hah-board-listcard-title">Patient list</span>
        <div class="hah-board-listcard-actions">
          <div class="hah-board-sort-wrap">
            <button type="button" class="hah-board-sort-iconbtn${sortMenuOpen ? ' is-open' : ''}"
              data-board-action="toggle-sort-menu" title="Sort: ${c.escapeHtml(sortLabels[sortMode] || 'LOS')}">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/>
              </svg>
            </button>
            ${sortMenu}
          </div>
          <button type="button" class="hah-board-sync-btn${state.ui && state.ui.syncState === 'update-available' ? ' has-update' : ''}" data-action="sync-json" title="${state.ui && state.ui.syncState === 'update-available' ? 'JSON update available — press to reload' : 'Sync with shared JSON'}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"></path><path d="M20.49 15a9 9 0 0 1-14.13 3.36L1 14"></path></svg>
            ${state.ui && state.ui.syncState === 'update-available' ? 'Reload JSON' : 'Sync JSON'}
          </button>
          <button type="button" class="hah-board-add-btn" data-board-action="open-add-patient">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Add patient
          </button>
        </div>
      </div>
      ${filterBar}
    </div>`;

    const tableHead = `<div class="hah-board-table-head">
      <div class="hah-board-col-patient">Patient</div>
      <div class="hah-board-col-source">Source</div>
      <div class="hah-board-col-los">LOS</div>
      <div class="hah-board-col-issue">Issue</div>
      <div class="hah-board-col-pathway">Pathway</div>
      <div class="hah-board-col-visits">Visits</div>
      <div class="hah-board-col-abx">Antibiotics</div>
      <div class="hah-board-col-flags">Flags</div>
      <div class="hah-board-col-bloods">Bloods</div>
      <div class="hah-board-col-discharge">Discharge</div>
    </div>`;

    const body = rows.length
      ? rows.map((row) => renderPatientRow(row, state)).join('')
      : `<div class="hah-board-empty-surface">${c.emptyState('No patients match these filters', 'Adjust the pathway or flagged filter to see more patients.')}</div>`;

    return `<section class="hah-card hah-board-listcard">
      ${head}
      <div class="hah-board-table">
        ${tableHead}
        <div class="hah-board-table-body">${body}</div>
      </div>
    </section>`;
  }

  // ── Patient row ──────────────────────────────────────────────────────

  function renderPatientRow(row, state) {
    const ext = getPatientExt(row.id);
    const selectedId = state.selectedPatientId ? String(state.selectedPatientId) : null;
    const active = selectedId === String(row.id) ? ' is-active' : '';

    const pathway = classifyPathway(row);
    const pathwayDef = PATHWAYS.find((p) => p.key === pathway);
    const ageSex = [row.age || '', row.sex || ''].filter(Boolean).join('');

    const losDaysN = losDays(row.admissionDate);
    const admShort = formatAdmShort(row.admissionDate);
    const losText = losDaysN === null ? '—' : (losDaysN === 0 ? 'Today' : losDaysN + 'd');
    const losLong = losDaysN !== null && losDaysN > 7;

    // Split issue into primary / sub on first separator
    const rawIssue = row.summaryLine || row.pathway || '';
    const issueSplit = (function () {
      const s = String(rawIssue).trim();
      if (!s) return { primary: '', sub: '' };
      // Try explicit separators first: "·", "/", "—", " - ", newline
      const m = s.match(/^([^·\/\n—]+?)(?:\s*[·\/\n—]\s*| - )(.+)$/);
      if (m) return { primary: m[1].trim(), sub: m[2].trim() };
      return { primary: s, sub: '' };
    })();

    const abx = ext.abxName || '';
    const abxEnd = ext.abxEndDate ? fmtDateShort(ext.abxEndDate) : '';
    const abxDisplay = abx
      ? `<div class="hah-board-abx-name">${c.escapeHtml(abx)}</div>${abxEnd ? `<div class="hah-board-abx-end">→ ${c.escapeHtml(abxEnd)}</div>` : ''}`
      : '<span class="hah-board-cell-empty">—</span>';

    const flagsHtml = [];
    if (row.dnar) flagsHtml.push('<span class="hah-pt-flag is-dnar">DNAR</span>');
    if (row.acp)  flagsHtml.push('<span class="hah-pt-flag is-acp">ACP</span>');
    const catchUpBtn = `<button type="button"
      class="hah-board-catchup${ext.catchUpFlag ? ' is-flagged' : ''}"
      data-board-action="toggle-catchup" data-patient-id="${c.escapeHtml(row.id)}"
      title="${ext.catchUpFlag ? 'Flagged for catch-up' : 'Flag for catch-up'}">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="${ext.catchUpFlag ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
    </button>`;

    const dischargeChip = row.dischargeReadiness && row.dischargeReadiness !== 'Not ready'
      ? `<span class="hah-board-discharge-chip is-${row.dischargeReadiness.toLowerCase().replace(/\s+/g, '-')}">${c.escapeHtml(row.dischargeReadiness)}</span>`
      : '<span class="hah-board-cell-empty">—</span>';

    const pathwayChip = `<span class="hah-board-pathway-chip is-${pathway}">${c.escapeHtml(pathwayDef ? pathwayDef.label : 'Other')}</span>`;

    function inlineSelect(value, options, action, patientId) {
      const label = value || '—';
      const cls = value ? 'hah-board-inline-select has-value' : 'hah-board-inline-select';
      return `<button type="button" class="${cls}"
        data-board-action="${action}" data-patient-id="${c.escapeHtml(patientId)}"
        data-options="${c.escapeHtml(JSON.stringify(options))}"
        data-current="${c.escapeHtml(value || '')}"
        title="Set ${action}">${c.escapeHtml(label)}</button>`;
    }

    return `<div class="hah-board-row${active}${ext.catchUpFlag ? ' is-flagged' : ''}"
      data-board-action="select-patient" data-patient-id="${c.escapeHtml(row.id)}"
      ondblclick="window.HAHBoard && window.HAHBoard.router && window.HAHBoard.router.goToPatient('${c.escapeHtml(row.id)}')">
      <div class="hah-board-col-patient">
        <div class="hah-board-row-name">${c.escapeHtml(row.name)}</div>
        <div class="hah-board-row-agesub">${ageSex ? c.escapeHtml(ageSex) : ''}${ageSex && admShort ? ' · ' : ''}${admShort ? 'Adm ' + c.escapeHtml(admShort) : ''}</div>
      </div>
      <div class="hah-board-col-source">${c.escapeHtml(row.referralSource || '—')}</div>
      <div class="hah-board-col-los">
        <span class="hah-board-los-days${losLong ? ' is-long' : ''}">${losText}</span>
      </div>
      <div class="hah-board-col-issue">
        <div class="hah-board-issue-primary">${c.escapeHtml(issueSplit.primary || '—')}</div>
        ${issueSplit.sub ? `<div class="hah-board-issue-sub">${c.escapeHtml(issueSplit.sub)}</div>` : ''}
      </div>
      <div class="hah-board-col-pathway">${pathwayChip}</div>
      <div class="hah-board-col-visits">
        ${inlineSelect(ext.visits, VISIT_OPTIONS, 'edit-visits', row.id)}
      </div>
      <div class="hah-board-col-abx" data-board-action="edit-abx" data-patient-id="${c.escapeHtml(row.id)}">
        ${abxDisplay}
      </div>
      <div class="hah-board-col-flags">
        ${flagsHtml.join('')}
        ${catchUpBtn}
      </div>
      <div class="hah-board-col-bloods${ext.bloodsStatus ? ' is-taken' : ''}">
        ${renderBloodsCell(ext, row.id)}
      </div>
      <div class="hah-board-col-discharge">
        ${dischargeChip}
      </div>
    </div>`;
  }

  function renderBloodsCell(ext, patientId) {
    const status = ext.bloodsStatus || '';
    if (!status) {
      return `<button type="button" class="hah-board-bloods-icon"
        data-board-action="toggle-bloods" data-patient-id="${c.escapeHtml(patientId)}"
        title="Mark bloods taken">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"></circle>
        </svg>
      </button>`;
    }
    return `<button type="button" class="hah-board-bloods-icon is-taken"
      data-board-action="toggle-bloods" data-patient-id="${c.escapeHtml(patientId)}"
      title="Bloods taken — click to clear">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M8 12.5l2.5 2.5L16 9.5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
      </svg>
    </button>`;
  }

  // ── Right pane (briefing — kept simple for now) ──────────────────────

  function renderRightPane(state) {
    const vm = d.buildBoardViewModel(state);
    const rows = vm.rows || [];
    const selectedId = state.selectedPatientId ? String(state.selectedPatientId) : null;
    const row = selectedId ? rows.find((r) => String(r.id) === selectedId) : null;

    if (!row) {
      return `<div class="hah-board-briefing-empty">
        <div class="hah-board-briefing-empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
        </div>
        <div class="hah-board-briefing-empty-title">No patient selected</div>
        <div class="hah-board-briefing-empty-sub">Choose a patient from the list to see their briefing.</div>
      </div>`;
    }

    return renderBriefing(row, state);
  }

  function renderBriefing(row, state) {
    const patientWsVm = (function () {
      const saved = { ...store.getState(), selectedPatientId: row.id, route: { ...store.getState().route, entityId: row.id } };
      try { return d.buildPatientWorkspaceModel(saved); } catch (_) { return null; }
    })();

    const ageSex = [row.age || '', row.sex || ''].filter(Boolean).join('');
    const los = losDays(row.admissionDate);
    const losTone = los !== null && los > 7 ? 'is-danger' : los === 7 ? 'is-warn' : los !== null && los > 0 ? 'is-good' : '';
    const admShort = formatAdmShort(row.admissionDate);
    const losLabel = los === null ? null : (los === 0 ? 'Today' : los + 'd');

    const metaParts = [
      row.referralSource ? row.referralSource + ' referral' : null,
      admShort ? 'Adm ' + admShort : null,
      losLabel ? 'LOS ' + losLabel : null,
      row.pathway || null
    ].filter(Boolean);

    const ps = ops ? ops.getPatientState(row.id) : {};
    const acpData = (ps && ps.acp) || {};
    const showDnar = row.dnar || acpData.dnacprStatus === 'yes';
    const showAcp  = row.acp  || !!(acpData.dnacprStatus || acpData.tepStatus || acpData.jicMeds || acpData.tep || (acpData.notes && String(acpData.notes).trim()));

    const flags = [
      showAcp  ? '<span class="hah-pt-flag is-acp">ACP</span>' : '',
      showDnar ? '<span class="hah-pt-flag is-dnar">DNAR</span>' : ''
    ].filter(Boolean).join('');

    const header = `<div class="hah-board-briefing-header">
      <div class="hah-board-briefing-name-row">
        <span class="hah-board-briefing-name">${c.escapeHtml(row.name)}</span>
        ${ageSex ? `<span class="hah-board-briefing-agesex">${c.escapeHtml(ageSex)}</span>` : ''}
      </div>
      ${metaParts.length ? `<div class="hah-board-briefing-sub">
        ${metaParts.map((p, i) => {
          const isLos = i === 2 && losTone;
          return `<span${isLos ? ' class="' + losTone + '"' : ''}>${c.escapeHtml(p)}</span>${i < metaParts.length - 1 ? '<span class="hah-board-briefing-sep">·</span>' : ''}`;
        }).join('')}
      </div>` : ''}
      ${flags ? `<div class="hah-board-briefing-flags">${flags}</div>` : ''}
    </div>`;

    const obsItems = patientWsVm && patientWsVm.obsItems ? patientWsVm.obsItems.filter((i) => i.value && i.value !== '—').slice(0, 7) : [];
    const obsStripHtml = obsItems.length
      ? `<div class="hah-board-briefing-obs">${obsItems.map((item) => {
          return `<div class="hah-board-briefing-obs-cell"><div class="hah-board-briefing-obs-label">${c.escapeHtml(item.label)}</div><div class="hah-board-briefing-obs-val">${c.escapeHtml(item.value)}</div></div>`;
        }).join('')}</div>`
      : '';

    const encounters = ops ? ops.getEncountersForPatient(row.id) : [];
    const lastRound = encounters.find((e) => e.type === 'board_round' && hasBoardRoundContent(e.fields));
    const roundHtml = lastRound ? renderLastRoundBlock(lastRound) : `<div class="hah-board-briefing-round">
      <div class="hah-board-briefing-section-head">
        <span class="hah-board-briefing-section-title">Last board round</span>
      </div>
      <div class="hah-board-briefing-empty-inline">No board round recorded yet.</div>
    </div>`;

    const acpHtml = renderAcpSummary(acpData);

    const openBtn = `<button type="button" class="hah-board-briefing-open" data-board-action="open-patient" data-patient-id="${c.escapeHtml(row.id)}">
      Open patient page
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:6px"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>`;

    return `<div class="hah-board-briefing">
      ${header}
      ${obsStripHtml}
      ${roundHtml}
      ${acpHtml}
      ${openBtn}
    </div>`;
  }

  function hasBoardRoundContent(fields) {
    if (!fields) return false;
    return !!(String(fields.issueRaw || fields.issues || '').trim()
          || String(fields.progress || '').trim()
          || String(fields.plan || '').trim());
  }

  function renderLastRoundBlock(enc) {
    const f = enc.fields || {};
    const rawIssues = String(f.issueRaw || f.issues || '').trim();
    const issuesHtml = rawIssues
      ? `<div class="hah-board-briefing-text">${rawIssues.split('\n').map((l) => `<div>${c.escapeHtml(l) || '&nbsp;'}</div>`).join('')}</div>`
      : '<div class="hah-board-briefing-empty-inline">—</div>';
    const progress = String(f.progress || '').trim();
    const plan     = String(f.plan || '').trim();
    const edd = f.dischargeDate ? fmtEDD(f.dischargeDate, f.dischargeReady) : '';
    const dateLabel = fmtEntryDate(enc.timestamp);

    function section(label, bodyHtml) {
      return `<div class="hah-board-briefing-field">
        <div class="hah-board-briefing-field-label">${c.escapeHtml(label)}</div>
        ${bodyHtml}
      </div>`;
    }

    return `<div class="hah-board-briefing-round">
      <div class="hah-board-briefing-section-head">
        <span class="hah-board-briefing-section-title">Last board round</span>
        <span class="hah-board-briefing-section-meta">${c.escapeHtml(dateLabel)}</span>
      </div>
      <div class="hah-board-briefing-round-body">
        ${section('Issues', issuesHtml)}
        ${progress ? section('Progress', `<div class="hah-board-briefing-text">${c.escapeHtml(progress)}</div>`) : ''}
        ${plan ? section('Plan', `<div class="hah-board-briefing-text">${c.escapeHtml(plan)}</div>`) : ''}
        ${edd ? section('EDD', `<div class="hah-board-briefing-text">${c.escapeHtml(edd)}</div>`) : ''}
      </div>
    </div>`;
  }

  function renderAcpSummary(acp) {
    const dnacpr = acp.dnacprStatus || '';
    const ucp    = acp.tepStatus    || '';
    const tep    = acp.tep          || '';
    const jic    = acp.jicMeds      || '';
    const dnacprText = dnacpr === 'yes' ? 'Yes' + (acp.dnacprFormSeen ? ' · Form seen' : '')
                      : dnacpr === 'no' ? 'No'
                      : dnacpr === 'unknown' ? 'Unknown' : '';
    const ucpText    = ucp === 'present' ? 'Present' : ucp === 'absent' ? 'Absent' : ucp === 'unknown' ? 'Unknown' : '';
    const jicText    = jic === 'in_property'  ? 'In property'
                     : jic === 'in_process'   ? 'In process'
                     : jic === 'not_prescribed' ? 'Not prescribed' : '';
    const hasData    = dnacpr || ucp || tep || jic;
    if (!hasData) return '';

    function row(label, value, extraClass) {
      if (!value) return '';
      return `<div class="hah-acp-row${extraClass ? ' ' + extraClass : ''}">
        <span class="hah-acp-field-label">${c.escapeHtml(label)}</span>
        <span class="hah-acp-field-value">${c.escapeHtml(value)}</span>
      </div>`;
    }

    return `<div class="hah-board-briefing-round">
      <div class="hah-board-briefing-section-head">
        <span class="hah-board-briefing-section-title">Advanced Care Plan</span>
      </div>
      <div class="hah-acp-body" style="padding:0">
        ${row('DNACPR', dnacprText, dnacpr === 'yes' ? 'is-dnacpr' : '')}
        ${row('UCP', ucpText)}
        ${row('TEP', tep)}
        ${row('JIC meds', jicText)}
      </div>
    </div>`;
  }

  function fmtEDD(iso, ready) {
    if (ready) return 'Ready';
    if (!iso) return '';
    const t = new Date(iso).getTime();
    if (isNaN(t)) return iso;
    return new Date(t).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function fmtEntryDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    const today = new Date();
    const y = new Date(today.getTime() - 86400000);
    const sameDay = d.toDateString() === today.toDateString();
    const yesterday = d.toDateString() === y.toDateString();
    const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (sameDay) return 'Today ' + time;
    if (yesterday) return 'Yesterday ' + time;
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) + ' ' + time;
  }

  // ── Add patient modal ────────────────────────────────────────────────

  function renderAddPatientModal() {
    return `<div class="hah-board-modal-overlay" data-board-action="add-patient-backdrop">
      <div class="hah-board-modal" role="dialog" aria-modal="true" aria-label="Add patient">
        <div class="hah-board-modal-head">
          <span class="hah-board-modal-title">Add patient</span>
          <button type="button" class="hah-board-modal-close" data-board-action="close-add-patient">×</button>

                <option value="">—</option>
                <option value="M">M</option>
                <option value="F">F</option>
              </select>

          </div>
          <div class="hah-board-modal-field">
            <label for="hahAddPtReferral">Referral source</label>

          </div>
          <div class="hah-board-modal-field">
            <label for="hahAddPtPathway">Problem / referred for</label>
            <input type="text" id="hahAddPtPathway" class="hah-board-modal-input" placeholder="e.g. L leg cellulitis, Frailty review" autocomplete="off">
          </div>
          <div class="hah-board-modal-field">
            <label for="hahAddPtDoa">Date of admission</label>

          <button type="button" class="hah-inline-pill is-primary" data-board-action="commit-add-patient">Add patient</button>
        </div>
      </div>
    </div>`;
  }

  // ── Event handlers ───────────────────────────────────────────────────

  function handleClick(event, state) {
    const target = event.target.closest('[data-board-action]');
    if (!target) return false;
    const action = target.getAttribute('data-board-action');

    if (action === 'set-pathway-filter') {
      store.setState({ board: { pathwayFilter: target.getAttribute('data-pathway') || 'all' } });
      return true;
    }
    if (action === 'toggle-flagged-filter') {
      const cur = !!(state.board && state.board.flaggedOnly);
      store.setState({ board: { flaggedOnly: !cur } });
      return true;
    }
    if (action === 'toggle-bloods-filter') {
      const cur = !!(state.board && state.board.bloodsOnly);
      store.setState({ board: { bloodsOnly: !cur } });
      return true;
    }
    if (action === 'set-sort') {
      store.setState({ board: { sort: target.getAttribute('data-sort') || 'los', sortMenuOpen: false } });
      return true;
    }
    if (action === 'toggle-sort-menu') {
      const now = !!(state.board && state.board.sortMenuOpen);
      store.setState({ board: { sortMenuOpen: !now } });
      return true;
    }
    if (action === 'select-patient') {
      // Only select if click wasn't on an interactive cell
      if (event.target.closest('button, [data-board-action="edit-abx"]')) return false;
      const pid = target.getAttribute('data-patient-id');
      if (pid) store.setState({ selectedPatientId: pid });
      return true;
    }
    if (action === 'open-patient') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      if (pid && router) router.goToPatient(pid);
      return true;
    }
    if (action === 'toggle-catchup') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      if (!pid || !ops) return false;
      const ext = ops.getPatientState(pid);
      ops.patchPatientState(pid, { catchUpFlag: !ext.catchUpFlag });
      return true;
    }
    if (action === 'toggle-bloods') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      if (!pid || !ops) return false;
      const ext = ops.getPatientState(pid);
      const newStatus = ext.bloodsStatus ? '' : 'taken';
      ops.patchPatientState(pid, { bloodsStatus: newStatus, bloodsStatusAt: newStatus ? new Date().toISOString() : null });
      return true;
    }
    if (action === 'edit-visits') {
      event.stopPropagation();
      openInlineSelect(target, 'visits');
      return true;
    }
    if (action === 'edit-alloc') {
      event.stopPropagation();
      openInlineSelect(target, 'nextAllocation');
      return true;
    }
    if (action === 'edit-abx') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      if (pid) openAbxEditor(target, pid);
      return true;
    }
    if (action === 'open-add-patient') { store.setState({ board: { addPatientModal: true } }); return true; }
    if (action === 'close-add-patient') { store.setState({ board: { addPatientModal: false } }); return true; }
    if (action === 'add-patient-backdrop') {
      if (event.target.classList && event.target.classList.contains('hah-board-modal-overlay')) {
        store.setState({ board: { addPatientModal: false } });
      }
      return true;
    }
    if (action === 'commit-add-patient') {
      const name = (document.getElementById('hahAddPtName') || {}).value || '';
      if (!name.trim()) { window.alert('Please enter a patient name.'); return true; }
      const age = (document.getElementById('hahAddPtAge') || {}).value || '';
      const sex = (document.getElementById('hahAddPtSex') || {}).value || '';
      const referralSource = (document.getElementById('hahAddPtReferral') || {}).value || '';
      const pathway = (document.getElementById('hahAddPtPathway') || {}).value || '';
      const doa = (document.getElementById('hahAddPtDoa') || {}).value || '';
      const fields = { name: name.trim(), age: age ? parseInt(age, 10) : null, sex, referralSource: referralSource.trim(), pathway: pathway.trim(), doa };
      if (shouldUseJsonStoreForNewPatient()) {
        addPatientToJsonStore(fields).catch(function (err) {
          console.error('[H@H JSON store] Could not create patient', err);
          window.alert(err && err.message ? err.message : 'Could not create the JSON patient record.');
        });
      } else {
        const ok = addPatientToStorage(fields);
        if (ok) store.setState({ board: { addPatientModal: false } });
      }
      return true;
    }
    if (action === 'set-capacity') {
      const current = ops && ops.getCapacityCeiling ? ops.getCapacityCeiling() : null;
      const input = window.prompt('Service capacity (maximum patients at once):', current || '');
      if (input === null) return true;
      if (input === '') { ops.setCapacityCeiling(null); return true; }
      const parsed = parseInt(input, 10);
      if (!Number.isFinite(parsed) || parsed <= 0) { window.alert('Enter a positive number.'); return true; }
      ops.setCapacityCeiling(parsed);
      return true;
    }
    return false;
  }

  function handleChange() { return false; }

  // ── Inline select popover ───────────────────────────────────────────

  function openInlineSelect(trigger, field) {
    if (!trigger || !ops) return;
    const patientId = trigger.getAttribute('data-patient-id');
    const options = JSON.parse(trigger.getAttribute('data-options') || '[]');
    const current = trigger.getAttribute('data-current') || '';

    closeAnyInlinePopovers();

    const rect = trigger.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'hah-board-inline-popover';
    pop.innerHTML = options.map((opt) => {
      const label = opt || '— clear —';
      return `<button type="button" class="hah-board-inline-option${opt === current ? ' is-active' : ''}" data-value="${opt.replace(/"/g, '&quot;')}">${label}</button>`;
    }).join('');
    document.body.appendChild(pop);
    pop.style.position = 'fixed';
    pop.style.top = (rect.bottom + 4) + 'px';
    pop.style.left = Math.max(8, rect.left) + 'px';
    pop.style.zIndex = 300;

    pop.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-value]');
      if (!btn) return;
      const val = btn.getAttribute('data-value');
      const patch = {};
      patch[field] = val;
      if (field === 'nextAllocation') patch.nextAllocationAt = val ? new Date().toISOString() : null;
      ops.patchPatientState(patientId, patch);
      closeAnyInlinePopovers();
    });

    setTimeout(() => {
      document.addEventListener('click', outsideHandler, { capture: true });
    }, 0);
    function outsideHandler(e) {
      if (!pop.contains(e.target)) {
        closeAnyInlinePopovers();
        document.removeEventListener('click', outsideHandler, { capture: true });
      }
    }
  }

  function openAbxEditor(trigger, patientId) {
    if (!trigger || !ops) return;
    closeAnyInlinePopovers();

    const ext = ops.getPatientState(patientId);
    const rect = trigger.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.className = 'hah-board-inline-popover hah-board-abx-popover';
    pop.innerHTML = `
      <div class="hah-board-abx-field">
        <label>Antibiotic</label>
        <input type="text" id="hah-abx-name" class="hah-board-abx-input" placeholder="e.g. Flucloxacillin" value="${c.escapeHtml(ext.abxName || '')}" autocomplete="off">
      </div>
      <div class="hah-board-abx-field">
        <label>End date</label>
        <input type="date" id="hah-abx-end" class="hah-board-abx-input" value="${c.escapeHtml(ext.abxEndDate || '')}">
      </div>
      <div class="hah-board-abx-actions">
        <button type="button" class="hah-board-abx-clear">Clear</button>
        <button type="button" class="hah-board-abx-save">Save</button>
      </div>
    `;
    document.body.appendChild(pop);
    pop.style.position = 'fixed';
    pop.style.top = (rect.bottom + 4) + 'px';
    pop.style.left = Math.max(8, rect.left) + 'px';
    pop.style.zIndex = 300;

    const nameInput = pop.querySelector('#hah-abx-name');
    const endInput  = pop.querySelector('#hah-abx-end');
    pop.querySelector('.hah-board-abx-save').addEventListener('click', () => {
      ops.patchPatientState(patientId, { abxName: (nameInput.value || '').trim(), abxEndDate: (endInput.value || '').trim() });
      closeAnyInlinePopovers();
    });
    pop.querySelector('.hah-board-abx-clear').addEventListener('click', () => {
      ops.patchPatientState(patientId, { abxName: '', abxEndDate: '' });
      closeAnyInlinePopovers();
    });
    if (nameInput && !nameInput.value) setTimeout(() => nameInput.focus(), 0);

    setTimeout(() => document.addEventListener('click', outsideHandler, { capture: true }), 0);
    function outsideHandler(e) {
      if (!pop.contains(e.target)) {
        closeAnyInlinePopovers();
        document.removeEventListener('click', outsideHandler, { capture: true });
      }
    }
  }

  function closeAnyInlinePopovers() {
    document.querySelectorAll('.hah-board-inline-popover').forEach((p) => p.remove());
  }

  // ── Add patient ──────────────────────────────────────────────────────

  function shouldUseJsonStoreForNewPatient() {
    try {
      const shared = window.HAHBoard && window.HAHBoard.sharedJsonStore;
      if (!shared || typeof shared.getInfo !== 'function') return false;
      const info = shared.getInfo();
      return !!(info && info.configured && info.state && info.state.remoteReady);
    } catch (_) {
      return false;
    }
  }

  async function addPatientToJsonStore(fields) {
    const shared = window.HAHBoard && window.HAHBoard.sharedJsonStore;
    if (!shared || typeof shared.createPatientRecord !== 'function') throw new Error('Shared JSON store is not available.');
    const patient = await shared.createPatientRecord({
      name: fields.name,
      age: fields.age || '',
      sex: fields.sex || '',
      referredFrom: fields.referralSource || '',
      admittedDate: fields.doa || '',
      pathway: fields.pathway || '',
      location: fields.location || 'Home',
      summary: fields.pathway || ''
    });
    if (patient && patient.id) {
      store.setState({ selectedPatientId: patient.id, board: { addPatientModal: false } });
      if (router && typeof router.goToPatient === 'function') router.goToPatient(patient.id);
    } else {
      store.setState({ board: { addPatientModal: false } });
    }
    return true;
  }

  function addPatientToStorage(fields) {
    const PRIMARY_KEY = 'hah_prototype_v12_36_162_pin_rebuild_data';
    try {
      const raw = localStorage.getItem(PRIMARY_KEY);
      let data = raw ? JSON.parse(raw) : null;
      if (!data || typeof data !== 'object' || !data.patients) {
        data = { patients: {}, currentPatient: '', deletedPatients: [], eventLogEntries: [], tasks: [] };
      }
      const id = 'p-' + Date.now() + '-' + Math.floor(Math.random() * 9999);
      const now = new Date().toISOString();
      data.patients[id] = {
        id, name: fields.name,
        age: fields.age || null, sex: fields.sex || '',
        referralSource: fields.referralSource || '',
        pathway: fields.pathway || '', summaryLine: fields.pathway || '',
        doa: fields.doa || '', addedAt: now, form: {}
      };
      localStorage.setItem(PRIMARY_KEY, JSON.stringify(data));
      store.setState({ _patientAdded: Date.now() });
      return true;
    } catch (err) {
      console.error('Failed to add patient', err);
      window.alert('Could not save the new patient.');
      return false;
    }
  }

  if (typeof document !== 'undefined') {
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.board && s.board.sortMenuOpen)) return;
      if (event.target.closest('[data-board-action="toggle-sort-menu"]')) return;
      if (event.target.closest('.hah-board-sort-menu')) return;
      store.setState({ board: { sortMenuOpen: false } });
    }, true);
  }

  window.HAHBoard.boardScreen = {
    renderLeftPane, renderMainPane, renderRightPane,
    handleClick, handleChange, afterRender: function () {}
  };
})();

  // ("Failed to fetch") with no status. The browser's online state is a
  // useful tiebreaker when there's no other signal.
  // Returns a short reason fragment intended to be slotted into a toast.
  function describeJsonStoreError(err) {
    if (!err) return 'unknown error';
    if (typeof navigator !== 'undefined' && navigator.onLine === false) {
      return 'you appear offline';
    }
    const status = err && err.status;
    if (status === 401 || status === 403) return 'session expired, refresh to sign in';
    if (status === 404) return 'item not found on OneDrive';
    if (status === 409 || status === 412) return 'conflicting change from another device';
    if (status === 429) return 'OneDrive rate-limited, try again shortly';
    if (typeof status === 'number' && status >= 500 && status < 600) return 'OneDrive server error';
    const msg = String((err && err.message) || '');

  function encounterFromJsonTimelineEntry(patientId, entry) {
