  function getPlanPresetByKey(key) {
    return PLAN_PRESETS.find((preset) => preset.key === key) || null;
  }

  function splitPlanParagraphs(text) {
    return String(text || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
  }

  function normalisePlanLine(text) {
    return String(text || '')
      .replace(/^\s*\d+[\.)]\s*/, '')
      .replace(/[.]\s*$/, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function nextPlanNumber(existingText) {
    const nums = String(existingText || '')
      .split('\n')
      .map((line) => {
        const m = line.match(/^\s*(\d+)[\.)]\s/);
        return m ? Number(m[1]) : null;
      })
      .filter((n) => Number.isFinite(n));
    return nums.length ? Math.max(...nums) + 1 : 1;
  }

  function insertPlanPresetIntoComposer(presetKey, patientId, composerType) {
    if (composerType !== 'board_round') return false;
    const preset = getPlanPresetByKey(presetKey);
    const planEl = document.getElementById('cform-plan');
    if (!preset || !planEl) return false;

    const existingText = planEl.value || '';
    const existingParagraphs = splitPlanParagraphs(existingText);
    const existingNormalised = existingParagraphs.map(normalisePlanLine);
    const presetNorm = normalisePlanLine(preset.text);
    const alreadyExists = existingNormalised.includes(presetNorm);

    if (alreadyExists) {
      planEl.focus();
      planEl.classList.remove('hah-preset-flash');
      void planEl.offsetWidth;
      planEl.classList.add('hah-preset-flash');
      return true;
    }

    const number = nextPlanNumber(existingText);
    const newLine = `${number}. ${preset.text}`;
    const spacer = existingText.trim() ? '\n' : '';
    planEl.value = `${existingText.trimEnd()}${spacer}${newLine}`.trim();
    planEl.classList.remove('is-pulled');
    autoExpand(planEl);
    planEl.focus();
    const pane = document.querySelector('#hahRightPane');
    if (pane) showAutosaveIndicator(pane);
    saveDraft(patientId, composerType, collectComposerFields(composerType));
    return true;
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const action = target.getAttribute('data-patient-action');
    const vm = d.buildPatientWorkspaceModel(state);

    if (action === 'jump')       { const pid = target.getAttribute('data-patient-id'); if (!pid) return false; store.setState({ selectedPatientId: pid, patient: { sortMenuOpen: false } }); router.goToPatient(pid); return true; }
    if (action === 'open-acp-modal') {
      store.setState({ patient: { acpModalOpen: true } }); return true;
    }
    if (action === 'close-acp-modal') {
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-modal-backdrop') {
      if (event.target.id === 'hahAcpModal') store.setState({ patient: { acpModalOpen: false } });
      return true;
    }
    if (action === 'acp-choice' && vm && ops) {
      const field = target.getAttribute('data-acp-field');
      const val   = target.getAttribute('data-acp-value');
      if (!field) return false;
      const ps  = ops.getPatientState(vm.patient.id);
      const acp = Object.assign({}, ps.acp || {});
      // Toggle: if already set to this value, clear it; otherwise set
      if (field === 'dnacprFormSeen') {
        acp.dnacprFormSeen = val === '1' && !acp.dnacprFormSeen ? true : false;
      } else {
        acp[field] = (acp[field] === val) ? '' : val;
      }
      ops.patchPatientState(vm.patient.id, { acp });
      return true;
    }
    if (action === 'acp-done' && vm && ops) {
      const tep   = (document.getElementById('hahAcpTep')   || {}).value || '';
      const notes = (document.getElementById('hahAcpNotes') || {}).value || '';
      const ps    = ops.getPatientState(vm.patient.id);
      const acp   = Object.assign({}, ps.acp || {}, { tep: tep.trim(), notes: notes.trim() });
      ops.patchPatientState(vm.patient.id, { acp });
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-clear' && vm && ops) {
      ops.patchPatientState(vm.patient.id, { acp: {} });
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'toggle-blood-options') {
      const now = !!(state.patient && state.patient.bloodOptionsOpen);
      store.setState({ patient: { bloodOptionsOpen: !now } }); return true;
    }
    if (action === 'blood-options-close') {
      store.setState({ patient: { bloodOptionsOpen: false } }); return true;
    }
    if (action === 'blood-order-up' || action === 'blood-order-down') {
      const key = target.getAttribute('data-analyte');
      if (!key) return false;
      const order = (function(){ try { const s = JSON.parse(localStorage.getItem('hah_blood_analyte_order') || 'null'); return Array.isArray(s) && s.length ? s : ['CRP','WCC','Hb','Na','K','Cr']; } catch(_) { return ['CRP','WCC','Hb','Na','K','Cr']; } })();
      const idx = order.indexOf(key);
      if (idx < 0) return false;
      if (action === 'blood-order-up' && idx > 0) { const t = order[idx - 1]; order[idx - 1] = order[idx]; order[idx] = t; }
      if (action === 'blood-order-down' && idx < order.length - 1) { const t = order[idx + 1]; order[idx + 1] = order[idx]; order[idx] = t; }
      try { localStorage.setItem('hah_blood_analyte_order', JSON.stringify(order)); } catch (_) {}
      store.setState({ patient: { bloodOptionsOpen: true } }); return true;
    }
    if (action === 'toggle-sort-menu') {
      const now = !!(state.patient && state.patient.sortMenuOpen);
      store.setState({ patient: { sortMenuOpen: !now } });
      return true;
    }
    if (action === 'toggle-list-filter') {
      const filter = target.getAttribute('data-filter');
      if (!filter) return false;
      const raw = (state.patient && state.patient.listFilter) || null;
      const current = Array.isArray(raw) ? raw.slice() : raw ? [raw] : [];
      const idx = current.indexOf(filter);
      if (idx >= 0) current.splice(idx, 1); else current.push(filter);
      store.setState({ patient: { listFilter: current.length ? current : null } });
      return true;
    }
    if (action === 'clear-list-filter') {
      store.setState({ patient: { listFilter: null } });
      return true;
    }
    if (action === 'set-list-sort') {
      const mode = target.getAttribute('data-sort');
      if (!mode) return false;
      store.setState({ patient: { listSort: mode, sortMenuOpen: false } });
      try { localStorage.setItem('hah_list_sort', mode); } catch (_) {}
      return true;
    }
    if (action === 'back-board') { router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView); return true; }
    if (action === 'next' && vm) { const n = vm.contextRows[vm.selectedIndex + 1]; if (n) { store.setState({ selectedPatientId: n.id }); router.goToPatient(n.id); } return true; }
    if (action === 'prev' && vm) { const p = vm.contextRows[vm.selectedIndex - 1]; if (p) { store.setState({ selectedPatientId: p.id }); router.goToPatient(p.id); } return true; }
    if (action === 'set-discussed' && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Discussed'); return true; }
    if (action === 'set-actioned'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Actioned');  return true; }
    if (action === 'set-deferred'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Deferred');  return true; }

    if (action === 'add-task' && vm && ops) {
      const created = ops.promptCreateTask(vm.patient, { createdFrom: 'Patient workspace', boardLink: vm.patient.boardStatus, dueAt: vm.patient.reviewDueAt || '' });
      if (created) store.setState({ selectedTaskId: created.id });
      return true;
    }
    if (action === 'open-tasks' && vm) {
      store.setState({ selectedPatientId: vm.patient.id, selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId: vm.patient.id } } });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'set-composer-type') {
      const ct = target.getAttribute('data-composer-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }
    if (action === 'open-composer') {
      const ct = target.getAttribute('data-encounter-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }

    if (action === 'composer-done' && vm && ops) {
      const composerType  = (state.patient && state.patient.composerType) || 'board_round';
      const scopedComposer = getScopedComposerState(state, vm.patient.id);
      const isLocked      = !!scopedComposer.locked;
      const composerEditId = scopedComposer.editId || null;

      if (isLocked) {
        patchScopedComposerState(vm.patient.id, { locked: false });
        return true;
      }

      const fields = collectComposerFields(composerType);
      const hasContent = Object.values(fields).some((v) => v !== null && v !== false && String(v || '').trim().length > 0);
      if (hasContent) {
        let savedId = null;
        let verb = 'saved';
        if (composerEditId) {
          const updated = ops.updateEncounter(composerEditId, fields);
          savedId = updated ? composerEditId : null;
          verb = 'updated';
        }
        if (!savedId) {
          const created = ops.createEncounter({ patientId: vm.patient.id, type: composerType, fields });
          savedId = created ? created.id : null;
        }
        if (composerType === 'board_round') {
          const dr = deriveDischargeReadiness(fields.dischargeDate, fields.dischargeReady);
          if (dr) ops.setDischargeReadiness(vm.patient.id, dr);
        }
        saveDraft(vm.patient.id, composerType, fields);
        const typeLabel = ENCOUNTER_TYPES.find((t) => t.key === composerType);
        const pane = document.querySelector('#hahRightPane');
        if (pane) {
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          showToast(pane, (typeLabel ? typeLabel.label : 'Entry') + ' ' + verb + ' — ' + time);
        }
        patchScopedComposerState(vm.patient.id, { locked: true, editId: savedId });
        store.setState({ patient: { composerType } });
      } else {
        patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
        store.setState({ patient: { composerType } });
      }
      return true;
    }

    if (action === 'composer-new' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      clearDraft(vm.patient.id, composerType);
      resetComposerDOM();
      refreshPreview(vm, composerType);
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
      return true;
    }

    if (action === 'composer-clear' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      clearDraft(vm.patient.id, composerType);
      resetComposerDOM();
      refreshPreview(vm, composerType);
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
      return true;
    }

    if (action === 'insert-plan-preset' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      const presetKey = target.getAttribute('data-plan-preset-key');
      const inserted = insertPlanPresetIntoComposer(presetKey, vm.patient.id, composerType);
      if (inserted) refreshPreview(vm, composerType);
      return inserted;
    }

    if (action === 'toggle-mdm-earlier') {
      const mdmType = target.getAttribute('data-mdm-type');
      if (!mdmType) return false;
      const current = (state.patient && state.patient.mdmEarlier) || {};
      store.setState({ patient: { mdmEarlier: { ...current, [mdmType]: !current[mdmType] } } });
      return true;
    }

    if (action === 'toggle-log-older') {
      const current = !!(state.patient && state.patient.logShowOlder);
      store.setState({ patient: { logShowOlder: !current } });
      return true;
    }

    if (action === 'delete-encounter' && ops) {
      const encId = target.getAttribute('data-encounter-id');
      if (!encId) return false;
      if (window.confirm('Delete this entry?')) ops.deleteEncounter(encId);
      return true;
    }

    if (action === 'discharge-patient' && vm && ops) {
      const patient = vm.patient;
      const msg = 'Discharge ' + patient.name + ' from the service?\n\nThe patient will be removed from the active board. You can restore them from Settings.';
      if (!window.confirm(msg)) return true;
      ops.dischargePatient(patient.id, {
        name: patient.name,
        pathway: patient.pathway,
        age: patient.age,
        location: patient.location
      });
      router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView);
      return true;
    }

    return false;
  }

  function handleChange(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const vm = d.buildPatientWorkspaceModel(state);
    const action = target.getAttribute('data-patient-action');
    if (action === 'set-board-status' && vm && ops) { ops.setBoardStatus(vm.patient.id, target.value); return true; }
    if (action === 'set-discharge'    && vm && ops) { ops.setDischargeReadiness(vm.patient.id, target.value); return true; }
    return false;
  }

  function renderEmpty() {
    return `<div class="hah-surface-placeholder"><section class="hah-card hah-surface-hero">
      <h1 class="hah-surface-title">Patient workspace</h1>
      <p class="hah-surface-subtitle">No patient selected from the current board context.</p>
    </section></div>`;
  }

  function priorityBadge(p) {
    return c.badge(p, p === 'Critical' ? 'danger' : p === 'High' ? 'warn' : p === 'Low' ? 'good' : 'neutral');
  }
  function splitLines(text) {
    return String(text || '').split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean);
  }
  function formatEntryDate(iso) {
    if (!iso) return '—';
    const dt = new Date(iso); if (isNaN(dt.getTime())) return String(iso);
    const now = new Date(); const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    const time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (dt.toDateString() === now.toDateString()) return 'Today ' + time;
    if (dt.toDateString() === yesterday.toDateString()) return 'Yesterday ' + time;
    return dt.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' + time;
  }
  function isObsWarn(label, value)   { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 96) || (label === 'NEWS2' && v >= 3); }
  function isObsDanger(label, value) { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 92) || (label === 'NEWS2' && v >= 7); }

  // Close sort menu on any click outside the menu or trigger button
  if (typeof document !== 'undefined') {
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.patient && s.patient.sortMenuOpen)) return;
      if (event.target.closest('[data-patient-action="toggle-sort-menu"]')) return;
      if (event.target.closest('.hah-sort-menu')) return;
      store.setState({ patient: { sortMenuOpen: false } });
    }, true);
  }

  function initBloodTooltip() {
    if (window.HAHBoard.__bloodTooltipBound) return;
    window.HAHBoard.__bloodTooltipBound = true;

    const tip = document.createElement('div');
    tip.className = 'dbl-analyte-tip';
    tip.style.display = 'none';
    document.body.appendChild(tip);

    const dbMap = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a]));

    document.addEventListener('mouseover', (e) => {
      const th = e.target.closest('.dbl-analyte[data-key]');
      if (!th) { tip.style.display = 'none'; return; }
      const key = th.getAttribute('data-key');
      const info = dbMap[key];
      if (!info) {
        // Unknown analyte — show basic tooltip
        tip.innerHTML = `<div class="dbl-tip-name">${key}</div><div class="dbl-tip-notes">No reference data available for this analyte.</div>`;
      } else {
        tip.innerHTML = `
          <div class="dbl-tip-name">${info.fullName || info.label}</div>
          <div class="dbl-tip-range"><span class="dbl-tip-label">Range</span> ${info.range} ${info.unit}</div>
          <div class="dbl-tip-notes">${info.notes}</div>
          <div class="dbl-tip-source">GSTT / Viapath</div>`;
      }
      tip.style.display = 'block';
      const rect = th.getBoundingClientRect();
      const tipW = 240;
      let left = rect.left - tipW - 10;
      if (left < 6) left = rect.right + 10; // flip right if no space
      const top = Math.max(6, Math.min(rect.top - 4, window.innerHeight - tip.offsetHeight - 6));
      tip.style.left  = left + 'px';
      tip.style.top   = top  + 'px';
    });

    document.addEventListener('mouseout', (e) => {
      if (!e.relatedTarget || !e.relatedTarget.closest('.dbl-analyte[data-key]')) {
        tip.style.display = 'none';
      }
    });
  }

  function initWsDragDrop() {
    const mainPane = document.getElementById('hahMainPane');
    if (!mainPane) return;

    let draggingKey = null;

    mainPane.querySelectorAll('.hah-ws-section').forEach((section) => {
      section.addEventListener('dragstart', (e) => {
        draggingKey = section.getAttribute('data-section');
        e.dataTransfer.effectAllowed = 'move';
        // Only allow drag from header bar (first child)
        requestAnimationFrame(() => section.classList.add('is-dragging'));
      });

      section.addEventListener('dragend', () => {
        section.classList.remove('is-dragging');
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        draggingKey = null;
      });

      section.addEventListener('dragover', (e) => {
        if (!draggingKey || draggingKey === section.getAttribute('data-section')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = section.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        section.classList.add(e.clientY < mid ? 'hah-ws-drop-above' : 'hah-ws-drop-below');
      });

      section.addEventListener('dragleave', (e) => {
        if (!section.contains(e.relatedTarget)) {
          section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        }
      });

      section.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!draggingKey) return;
        const targetKey  = section.getAttribute('data-section');
        if (draggingKey === targetKey) return;
        const rect = section.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;

        const layout = getWsLayout();
        const flatLeft  = layout.left.slice();
        const flatRight = layout.right.slice();

        // Remove dragged key from wherever it is
        const fromLeft  = flatLeft.indexOf(draggingKey);
        const fromRight = flatRight.indexOf(draggingKey);
        if (fromLeft >= 0)  flatLeft.splice(fromLeft, 1);
        if (fromRight >= 0) flatRight.splice(fromRight, 1);

        // Find target position
        const inLeft  = flatLeft.indexOf(targetKey);
        const inRight = flatRight.indexOf(targetKey);

        if (inLeft >= 0) {
          flatLeft.splice(before ? inLeft : inLeft + 1, 0, draggingKey);
        } else {
          flatRight.splice(before ? inRight : inRight + 1, 0, draggingKey);
        }

        const newLayout = { left: flatLeft, right: flatRight };
        saveWsLayout(newLayout);
        section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        // Trigger re-render by nudging state
        store.setState({ patient: { _wsLayoutBump: Date.now() } });
      });
    });

    // Allow dropping into empty column
    mainPane.querySelectorAll('.hah-ws-col').forEach((col) => {
      col.addEventListener('dragover', (e) => { e.preventDefault(); });
      col.addEventListener('drop', (e) => {
        if (e.target === col && draggingKey) {
          e.preventDefault();
          const colName = col.getAttribute('data-col');
          const layout  = getWsLayout();
          const flatLeft  = layout.left.slice();
          const flatRight = layout.right.slice();
          const fi = flatLeft.indexOf(draggingKey);
          const fr = flatRight.indexOf(draggingKey);
          if (fi >= 0) flatLeft.splice(fi, 1);
          if (fr >= 0) flatRight.splice(fr, 1);
          if (colName === 'left')  flatLeft.push(draggingKey);
          else                     flatRight.push(draggingKey);
          saveWsLayout({ left: flatLeft, right: flatRight });
          store.setState({ patient: { _wsLayoutBump: Date.now() } });
        }
      });
    });
  }

  window.HAHBoard.patientScreen = { renderLeftPane, renderMainPane, renderRightPane, handleClick, handleChange, afterRender };
})();

          <div class="hah-task-context-flags">${renderPatientFlags(task.patient)}</div>
        </div>
        <div class="hah-task-context-block">
          <div class="hah-task-context-label">Boardround link</div>
          <div class="hah-task-context-flags">${c.badge(task.boardLink || 'No board link', 'neutral')}</div>
        </div>
      `),
      c.card('Related tasks', renderRelatedTasks(vm.relatedTasks), {
        subtitle: vm.relatedTasks.length ? `${vm.relatedTasks.length} other task${vm.relatedTasks.length === 1 ? '' : 's'} for this patient` : 'No additional task in current view'
      }),
      c.card('Actions', `
        <div class="hah-task-actions">
          ${taskPill('Open patient', 'open-patient')}
          ${taskPill('Patient-only tasks', 'focus-patient')}
          ${taskPill('Mark done', 'mark-done')}
          ${taskPill('Reopen', 'mark-open')}
          ${taskPill('Waiting external', 'mark-waiting')}
          ${taskPill('Reassign', 'reassign-task')}
          ${taskPill('Due tomorrow', 'due-tomorrow')}
          ${taskPill('Add follow-on', 'add-task')}
          ${taskPill('Boardround view', 'set-view', 'data-view-key="boardround-actions"')}
          ${taskPill('Show all tasks', 'set-view', 'data-view-key="all-open"')}
        </div>
      `)
    ]);
  }

  function renderMetricCard(state, metric) {
    const active = metric.key === state.tasks.savedView ? ' is-active' : '';
    const tone = metric.tone ? ` is-${metric.tone}` : '';
    return `
      <button type="button" class="hah-task-metric-card${active}${tone}" data-task-action="set-view" data-view-key="${c.escapeHtml(metric.key)}">
        <div class="hah-metric-label">${c.escapeHtml(metric.label)}</div>
        <div class="hah-metric-value">${c.escapeHtml(metric.value)}</div>
        <div class="hah-metric-sub">${c.escapeHtml(metric.subtext || '')}</div>
      </button>
    `;
  }

  function renderViewCard(label, key, subtext, count, active) {
    return `
      <button type="button" class="hah-task-view-card${active ? ' is-active' : ''}" data-task-action="set-view" data-view-key="${c.escapeHtml(key)}">
        <div class="hah-task-view-top">
          <div class="hah-task-view-title">${c.escapeHtml(label)}</div>
          <div class="hah-task-view-count">${c.escapeHtml(count)}</div>
        </div>
        <div class="hah-task-view-sub">${c.escapeHtml(subtext)}</div>
      </button>
    `;
  }

  function renderTaskRow(task, selectedTask) {
    const selected = selectedTask && selectedTask.id === task.id ? 'is-selected' : '';
    return `
      <tr class="${selected}" data-task-action="select-task" data-task-id="${c.escapeHtml(task.id)}">
        <td>
          <div class="hah-task-row-main">${c.escapeHtml(task.title)}</div>
          <div class="hah-task-row-sub">${c.escapeHtml(task.note || '')}</div>
        </td>
        <td>
          <div class="hah-task-row-main">${c.escapeHtml(task.patient.name)}</div>
          <div class="hah-task-row-sub">${c.escapeHtml([task.patient.location, task.patient.pathway].filter(Boolean).join(' · '))}</div>
        </td>
        <td><div class="hah-task-category-wrap">${c.badge(task.category, 'neutral')}</div></td>
        <td><div class="hah-task-owner">${c.escapeHtml(task.owner || 'Unassigned')}</div></td>
        <td>
          <div class="hah-task-row-main">${c.escapeHtml(formatDue(task.dueAt, task.dueState))}</div>
          <div class="hah-task-row-sub">${c.escapeHtml(task.dueState)}</div>
        </td>
        <td>${priorityBadge(task.priority)}</td>
        <td><div class="hah-task-status-wrap">${statusBadge(task.status)}</div></td>
        <td>
          <div class="hah-task-row-main">${c.escapeHtml(task.blocker || 'No blocker')}</div>
          <div class="hah-task-row-sub">${c.escapeHtml(task.boardLink || 'No board link')}</div>
        </td>
      </tr>
    `;
  }

  function renderRelatedTasks(tasks) {
    if (!tasks.length) return '<div class="hah-task-note">No related task in the current filtered view.</div>';
    return `<div class="hah-task-mini-list">${tasks.map((task) => `
      <div class="hah-task-mini-item">
        <div class="hah-task-mini-title">${c.escapeHtml(task.title)}</div>
        <div class="hah-task-mini-sub">${c.escapeHtml([task.category, task.dueState, task.owner].filter(Boolean).join(' · '))}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderPatientFlags(patient) {
    const bits = [];
    if (patient.priority) bits.push(priorityBadge(patient.priority));
    if (patient.currentStatus) bits.push(c.badge(patient.currentStatus, 'neutral'));
    if (Array.isArray(patient.treatmentFlags)) {
      patient.treatmentFlags.slice(0, 3).forEach((flag) => bits.push(c.badge(flag, 'neutral')));
    }
    return bits.join('');
  }

  function buildWhyItMatters(task) {
    const parts = [];
    if (task.dueState === 'Overdue') parts.push('This action is overdue and likely needs chasing now.');
    else if (task.dueState === 'Due today') parts.push('This action is due today and should be resolved within the current service day.');
    if (task.blocker) parts.push(`Current blocker: ${task.blocker}.`);
    if (task.patient.dischargeReadiness === 'Possible today' || task.patient.dischargeReadiness === 'Ready') {
      parts.push('This may influence discharge flow for the patient.');
    }
    if (task.patient.currentStatus === 'Needs review' || task.patient.currentStatus === 'Awaiting result') {
      parts.push(`Patient status is currently ${task.patient.currentStatus.toLowerCase()}.`);
    }
    return parts.join(' ') || 'Operational task linked to the selected patient and current board state.';
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-task-action]');
    if (!target) return false;
    const action = target.getAttribute('data-task-action');
    const vm = d.buildTasksViewModel(state);

    if (action === 'set-view') {
      const viewKey = target.getAttribute('data-view-key') || 'all-open';
      store.setState({
        selectedTaskId: null,
        tasks: {
          savedView: viewKey,
          filters: viewKey === 'patient-focus' ? state.tasks.filters || {} : { patientId: null }
        }
      });
      return true;
    }

    if (action === 'set-sort') {
      const sortKey = target.getAttribute('data-sort-key') || 'due';
      store.setState({ tasks: { sort: sortKey } });
      return true;
    }

    if (action === 'select-task') {
      const taskId = target.getAttribute('data-task-id');
      if (!taskId) return false;
      store.setState({ selectedTaskId: taskId });
      return true;
    }

    if (action === 'clear-patient-filter') {
      store.setState({ selectedTaskId: null, tasks: { savedView: 'all-open', filters: { patientId: null } } });
      return true;
    }

    if ((action === 'open-patient' || action === 'focus-patient') && vm.selectedTask) {
      const patientId = vm.selectedTask.patientId;
      if (action === 'focus-patient') {
        store.setState({ selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId } } });
        return true;
      }
      store.setState({ selectedPatientId: patientId });
      router.goToPatient(patientId);
      return true;
    }

    if (action === 'add-task' && ops) {
      const patient = (vm.selectedTask && vm.selectedTask.patient) || vm.selectedPatient || null;
      if (!patient) return true;
      const created = ops.promptCreateTask(patient, { createdFrom: 'Tasks', boardLink: patient.boardStatus, dueAt: patient.reviewDueAt || '' });
      if (created) {
        store.setState({ selectedTaskId: created.id, tasks: { savedView: 'patient-focus', filters: { patientId: patient.id } } });
      }
      return true;
    }

    if (action === 'mark-done' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Done' });
      store.setState({ selectedTaskId: null });
      return true;
    }

    if (action === 'mark-open' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Open' });
      return true;
    }

    if (action === 'mark-waiting' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Waiting external' });
      return true;
    }

    if (action === 'reassign-task' && vm.selectedTask && ops) {
      ops.promptReassignTask(vm.selectedTask);
      return true;
    }

    if (action === 'due-tomorrow' && vm.selectedTask && ops) {
      const next = new Date(Date.now() + 24 * 60 * 60 * 1000);
      next.setHours(10, 0, 0, 0);
      ops.updateTask(vm.selectedTask.id, { dueAt: next.toISOString(), status: 'Open' });
      return true;
    }

    return false;
  }

  function taskPill(label, action, attrs, active) {
    return `<button type="button" class="hah-inline-pill${active ? ' is-active' : ''}" data-task-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority, tone);
  }

  function statusBadge(status) {
    const lower = String(status || '').toLowerCase();
    let tone = 'neutral';
    if (lower.includes('waiting')) tone = 'warn';
    else if (lower.includes('done')) tone = 'good';
    return c.badge(status || 'Open', tone);
  }

  function dueBadge(dueState) {
    let tone = 'neutral';
    if (dueState === 'Overdue') tone = 'danger';
    else if (dueState === 'Due today') tone = 'warn';
    else if (dueState === 'Future' || dueState === 'No due date') tone = 'good';
    return c.badge(dueState || 'No due date', tone);
  }

  function formatDue(value, dueState) {
    if (!value) return dueState || 'No due date';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value);
    return dt.toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function viewLabel(key) {
    switch (key) {
      case 'due-today': return 'Due today';
      case 'overdue': return 'Overdue';
      case 'waiting-external': return 'Waiting external';
      case 'discharge-blockers': return 'Discharge blockers';
      case 'review-due': return 'Review tasks';
      case 'boardround-actions': return 'Boardround actions';
      case 'high-priority': return 'High priority';
      case 'unassigned': return 'Unassigned';
      case 'patient-focus': return 'Patient focus';
      default: return 'All open';
    }
  }

  window.HAHBoard.tasksScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>

  <script>
/* inlined: js/22-desktop-shell.js */
(function () {

  function bindShellEvents() {
    rootEl.addEventListener('click', function (event) {
      const state = store.getState();
      const screenHandled = delegateScreenClick(event, state);
      if (screenHandled) return;

      const navTarget = event.target.closest('[data-nav]');
      if (navTarget) {
        const view = navTarget.getAttribute('data-nav');
        router.navigate({ view });
        return;
      }

      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) return;
      const action = actionTarget.getAttribute('data-action');
      if (action === 'open-board') {
        router.goToBoard();
        return;
      }
      if (action === 'open-settings') {
        router.navigate({ view: 'settings' });
        return;
      }
      if (action === 'toggle-boardround') {
        const current = store.getState().boardroundMode;
        store.setState({ boardroundMode: !current });
        return;
      }
      if (action === 'settings-actor' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptActorName();
        return;
      }
      if (action === 'settings-export' && window.HAHBoard.ops) {
        window.HAHBoard.ops.downloadOpsBundle();
        return;
      }
      if (action === 'settings-import' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptImportOpsBundle();
        return;
      }
      if (action === 'settings-check-update') {
        if (window.HAHBoard.update && typeof window.HAHBoard.update.checkForUpdate === 'function') {
          window.HAHBoard.update.checkForUpdate(true);
        }
      }
      if (action === 'settings-clear' && window.HAHBoard.ops) {
        window.HAHBoard.ops.clearAllOpsState();
      }
      if (action === 'settings-clear-discharged' && window.HAHBoard.ops) {
        const list = window.HAHBoard.ops.getDischargedPatients() || [];
        if (!list.length) return;
        if (window.confirm('Clear all ' + list.length + ' discharged patient record(s)? This cannot be undone.')) {
          window.HAHBoard.ops.clearDischargedPatients();
        }
      }
      if (action === 'settings-restore-patient' && window.HAHBoard.ops) {
        const id = actionTarget.getAttribute('data-discharge-id');
        if (id) window.HAHBoard.ops.restorePatient(id);
      }
    });

    rootEl.addEventListener('change', function (event) {
      const state = store.getState();
      const screen = getActiveScreenModule(state);
      if (screen && typeof screen.handleChange === 'function') {
        screen.handleChange(event, state);
      }
    });

    const search = rootEl.querySelector('#hahGlobalSearch');
    if (search) {
      search.addEventListener('keydown', function (event) {

    document.addEventListener('keydown', function (event) {

  function delegateScreenClick(event, state) {
    const screen = getActiveScreenModule(state);
    if (!screen || typeof screen.handleClick !== 'function') return false;
    return !!screen.handleClick(event, state);

  function getActiveScreenModule(state) {
    switch (state.route.view) {
      case 'board': return window.HAHBoard.boardScreen || null;
      case 'patient': return window.HAHBoard.patientScreen || null;
      case 'tasks': return window.HAHBoard.tasksScreen || null;

  function renderFromState(state) {

  function updateHeader(state) {

  function updatePanes(state) {

    if (!leftPane || !mainPane || !rightPane) return;

    // If the nav was previously re-parented into the left pane (compact
    // mode), move it back onto the app before we wipe innerHTML so it
    // survives the render. The layout code will re-parent it if needed.
    const nav = rootEl.querySelector('#hahNav');
    const app = rootEl.querySelector('#hahDesktopApp');
    if (nav && leftPane.contains(nav) && app) {
      app.insertBefore(nav, leftPane);

    leftPane.innerHTML  = renderLeftPane(state);
    mainPane.innerHTML  = renderMainPane(state);
    rightPane.innerHTML = renderRightPane(state);

    if (typeof window.HAHBoard.applyPatientLayout === 'function') {
      window.HAHBoard.applyPatientLayout();

      window.dispatchEvent(new CustomEvent('hah:panes-resized'));
    }
  }

  function bindResizeHandles() {
    const PANE_L_KEY = 'hah_pane_left_w';
    const PANE_R_KEY = 'hah_pane_right_w';

    const savedLeft  = parseInt(localStorage.getItem(PANE_L_KEY)  || '292', 10);
    const savedRight = parseInt(localStorage.getItem(PANE_R_KEY) || '680', 10);
    document.documentElement.style.setProperty('--desk-left-w',  savedLeft  + 'px');
    document.documentElement.style.setProperty('--desk-right-w', savedRight + 'px');

    function startDrag(e, side) {
      e.preventDefault();
      const handle   = e.currentTarget;
      const startX   = e.clientX;
      const startVal = parseInt(
        getComputedStyle(document.documentElement)
          .getPropertyValue(side === 'left' ? '--desk-left-w' : '--desk-right-w'), 10
      );
      handle.classList.add('is-dragging');
      window.HAHBoard.__resizingPanes = true;
      rootEl.classList.add('is-resizing-panes');

      function onMove(e) {
        const dx = e.clientX - startX;
        const min = side === 'left' ? 180 : 280;
        const max = side === 'left' ? 520 : 900;
        const next = Math.max(min, Math.min(max, side === 'left' ? startVal + dx : startVal - dx));
        document.documentElement.style.setProperty(
          side === 'left' ? '--desk-left-w' : '--desk-right-w',
          next + 'px'
        );
      }

      function onUp() {
        handle.classList.remove('is-dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        const lw = getComputedStyle(document.documentElement).getPropertyValue('--desk-left-w').trim();
        const rw = getComputedStyle(document.documentElement).getPropertyValue('--desk-right-w').trim();
        try {
          localStorage.setItem(PANE_L_KEY, parseInt(lw, 10));
          localStorage.setItem(PANE_R_KEY, parseInt(rw, 10));
        } catch (_) {}
        window.HAHBoard.__resizingPanes = false;
        rootEl.classList.remove('is-resizing-panes');
        window.dispatchEvent(new CustomEvent('hah:panes-resized'));
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    }

    const lh = rootEl.querySelector('#hahResizeLeft');
    const rh = rootEl.querySelector('#hahResizeRight');
    if (lh) lh.addEventListener('mousedown', (e) => startDrag(e, 'left'));
    if (rh) rh.addEventListener('mousedown', (e) => startDrag(e, 'right'));
  }

  function renderRightPane(state) {

  function renderPatientLeftPane(state) {

            <div class="hah-muted" style="margin-top:6px;font-size:13px;">Recycle bin — discharged patients can be restored to the active board or cleared permanently.</div>
            <div class="hah-settings-actions" style="margin-top:12px;">
              <button type="button" class="hah-inline-pill" data-action="settings-clear-discharged">Clear all discharged</button>
            </div>
            <div class="hah-settings-list" style="margin-top:16px;">
              ${(ops && typeof ops.getDischargedPatients === 'function' ? ops.getDischargedPatients() : []).length
                ? ops.getDischargedPatients().map((row) => {
                    const when = row.dischargedAt ? new Date(row.dischargedAt).toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—';
                    const name = (row.snapshot && row.snapshot.name) || row.patientId;
                    const meta = [(row.snapshot && row.snapshot.pathway) || '', (row.snapshot && row.snapshot.location) || ''].filter(Boolean).join(' · ');
                    return `<div class="hah-settings-list-item hah-discharged-row">
                      <div style="flex:1;min-width:0;">
                        <div class="hah-settings-list-title">${escapeHtml(name)}</div>
                        <div class="hah-settings-list-sub">${escapeHtml(meta ? meta + ' · ' : '')}Discharged ${escapeHtml(when)} · ${escapeHtml(row.dischargedBy || 'Board user')}</div>
                      </div>
                      <button type="button" class="hah-inline-pill" data-action="settings-restore-patient" data-discharge-id="${escapeHtml(row.id)}">Restore</button>
                    </div>`;
                  }).join('')
                : `<div class="hah-muted">No discharged patients.</div>`}
            </div>
          </div>
        </section>

        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Recent round summaries</div>
            <div class="hah-settings-list" style="margin-top:16px;">
              ${summaries.length ? summaries.map((row) => `
                <div class="hah-settings-list-item">
                  <div class="hah-settings-list-title">${escapeHtml(row.title || 'Boardround summary')}</div>
                  <div class="hah-settings-list-sub">${escapeHtml(row.createdBy || 'Board user')} · ${escapeHtml(row.createdAt ? new Date(row.createdAt).toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '—')}</div>
                </div>
              `).join('') : `<div class="hah-muted">No persisted round summaries yet.</div>`}
            </div>
          </div>
        </section>
      </div>
    `;
  }

  function renderSettingsRightPane(state) {
    const ops = window.HAHBoard.ops;
    const info = ops && typeof ops.getSyncInfo === 'function' ? ops.getSyncInfo() : null;
    return `
      <div class="hah-stack">
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">At a glance</div>
            <div class="hah-settings-list" style="margin-top:16px;">
              <div class="hah-settings-list-item">
                <div class="hah-settings-list-title">Shared sync</div>
                <div class="hah-settings-list-sub">${escapeHtml(info ? info.label : 'Ready')} · ${escapeHtml(info ? info.mode : 'storage')}</div>
              </div>
              <div class="hah-settings-list-item">
                <div class="hah-settings-list-title">Operational records</div>
                <div class="hah-settings-list-sub">${escapeHtml(info ? String(info.auditCount || 0) : '0')} audit events · ${escapeHtml(info ? String(info.summaryCount || 0) : '0')} summaries</div>
              </div>
              <div class="hah-settings-list-item">
                <div class="hah-settings-list-title">Custom tasks</div>
                <div class="hah-settings-list-sub">${escapeHtml(info ? String(info.taskCount || 0) : '0')} persisted custom tasks</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    `;
  }

  function renderPatientPlaceholder(state) {
    const patientId = state.route.entityId || state.selectedPatientId || '';
    const patient = window.HAHBoard.derived && typeof window.HAHBoard.derived.getPatientSummaryById === 'function'
      ? window.HAHBoard.derived.getPatientSummaryById(patientId)
      : null;
    return `
      <div class="hah-surface-placeholder">
        <section class="hah-card hah-surface-hero">
          <h1 class="hah-surface-title">Patient workspace</h1>
          <p class="hah-surface-subtitle">Single-patient command view placeholder for prototype 0.2</p>
        </section>
        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-card-title">Current patient</div>
            <p class="hah-muted">Patient id: ${escapeHtml(patientId || 'none selected')}</p>
            <p class="hah-muted">Name: ${escapeHtml(patient ? patient.name : 'No patient selected')}</p>
            <p class="hah-muted">Summary: ${escapeHtml(patient ? patient.summaryLine || patient.currentStatus || '—' : 'This route is live so the Board → Patient navigation can be tested now, before the full patient workspace is built.')}</p>
          </div>
        </section>
      </div>
    `;
  }

  function normaliseSyncLabel(value) {
    switch (value) {
      case 'syncing': return 'Syncing';
      case 'update-available': return 'Update available';
      case 'error': return 'Sync error';
      case 'Shared sync': return 'Shared sync';
      case 'Imported sync': return 'Imported sync';
      case 'Local sync': return 'Local sync';
      default: return value || 'Ready';
    }
  }

  function isTextInput(el) {
    if (!el) return false;
    const tag = (el.tagName || '').toLowerCase();
    return tag === 'input' || tag === 'textarea' || el.isContentEditable;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initDesktopShell);
  else initDesktopShell();

  window.HAHBoard.desktopShell = { init: initDesktopShell };
})();

</script>
