  function getPlanPresetByKey(key) {
    return PLAN_PRESETS.find((preset) => preset.key === key) || null;
  }

  function splitPlanParagraphs(text) {
    return String(text || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
  }

  function normalisePlanLine(text) {
    return String(text || '')
      .replace(/^\s*\d+[\.)]\s*/, '')
      .replace(/[.]\s*$/, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function nextPlanNumber(existingText) {
    const nums = String(existingText || '')
      .split('\n')
      .map((line) => {
        const m = line.match(/^\s*(\d+)[\.)]\s/);
        return m ? Number(m[1]) : null;
      })
      .filter((n) => Number.isFinite(n));
    return nums.length ? Math.max(...nums) + 1 : 1;
  }

  function insertPlanPresetIntoComposer(presetKey, patientId, composerType) {
    if (composerType !== 'board_round') return false;
    const preset = getPlanPresetByKey(presetKey);
    const planEl = document.getElementById('cform-plan');
    if (!preset || !planEl) return false;

    const existingText = planEl.value || '';
    const existingParagraphs = splitPlanParagraphs(existingText);
    const existingNormalised = existingParagraphs.map(normalisePlanLine);
    const presetNorm = normalisePlanLine(preset.text);
    const alreadyExists = existingNormalised.includes(presetNorm);

    if (alreadyExists) {
      planEl.focus();
      planEl.classList.remove('hah-preset-flash');
      void planEl.offsetWidth;
      planEl.classList.add('hah-preset-flash');
      return true;
    }

    const number = nextPlanNumber(existingText);
    const newLine = `${number}. ${preset.text}`;
    const spacer = existingText.trim() ? '\n' : '';
    planEl.value = `${existingText.trimEnd()}${spacer}${newLine}`.trim();
    planEl.classList.remove('is-pulled');
    autoExpand(planEl);
    planEl.focus();
    const pane = document.querySelector('#hahRightPane');
    if (pane) showAutosaveIndicator(pane);
    saveDraft(patientId, composerType, collectComposerFields(composerType));
    return true;
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const action = target.getAttribute('data-patient-action');
    const vm = d.buildPatientWorkspaceModel(state);

    // v0.8.149: discharge letter actions delegated to the module.
    // Keeps the dispatch in handleClick clean and the letter logic
    // self-contained. The module receives an api bag with the things
    // it needs from this module to avoid circular deps.
    if (action && action.indexOf('dl-') === 0 && window.HAHBoard && window.HAHBoard.dischargeLetter) {
      const dl = window.HAHBoard.dischargeLetter;
      const handled = dl.handleDlAction(action, target, state, {
        store: store,
        ops: ops,
        buildVm: d.buildPatientWorkspaceModel,
        persistPatientPatchToJson: persistPatientPatchToJson,
        getPatientEncounterRows: getPatientEncounterRows,
        showToast: function (text) { showToast(document.querySelector('.hah-pt-rightpane') || document.body, text); }
      });
      if (handled) return true;
    }

    if (action === 'jump') {
      const pid = target.getAttribute('data-patient-id');
      if (!pid) return false;
      // If a round is active, mark this patient as "In discussion"
      if (ops && typeof ops.getActiveRound === 'function' && ops.getActiveRound()) {
        ops.enterPatient(pid);
      }
      store.setState({ selectedPatientId: pid, patient: { sortMenuOpen: false } });
      router.goToPatient(pid);
      return true;
    }
    if (action === 'start-round' && ops) {
      // Clear all scoped composer states so each patient gets a fresh draft
      // Trigger the round-start animation by stamping a timestamp on the
      // patient state. Render-time logic compares against Date.now() and
      // applies the cascade class only while within the animation window.
      // After that the timestamp ages out naturally and renders are clean.
      store.setState({
        patient: {
          composerByPatient: {},
          roundStartAnimAt: Date.now()
        }
      });
      ops.startRound();
      // If there's a selected patient, mark them in discussion
      if (vm && vm.patient && vm.patient.id) ops.enterPatient(vm.patient.id);
      return true;
    }
    if (action === 'toggle-status-menu') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      const current = (state.patient && state.patient.statusMenuFor) || null;
      store.setState({ patient: { statusMenuFor: current === pid ? null : pid } });
      return true;
    }
    if (action === 'status-menu-swallow') {
      event.stopPropagation();
      return true;
    }
    if (action === 'status-set' && ops) {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      const newStatus = target.getAttribute('data-status');
      if (!pid || !newStatus) return false;
      if (newStatus === 'Discussed') {
        ops.markPatientDiscussed(pid);
      } else {
        ops.setBoardStatus(pid, newStatus);
      }
      persistPatientPatchToJson(pid, { operational: { boardStatus: newStatus } });
      store.setState({ patient: { statusMenuFor: null } });
      return true;
    }
    if (action === 'end-round' && ops) {
      const summary = ops.endRound({});
      store.setState({ patient: { _roundEnded: Date.now() } });
      return true;
    }
    if (action === 'dismiss-round-summary' && ops) {
      ops.clearLastRoundSummaryFlag();
      return true;
    }
    if (action === 'reset-round' && ops) {
      store.setState({ patient: { composerByPatient: {} } });
      ops.clearLastRoundSummaryFlag();
      ops.resetAllBoardStatuses();
      return true;
    }
    if (action === 'open-acp-modal') {
      store.setState({ patient: { acpModalOpen: true } }); return true;
    }
    if (action === 'close-acp-modal') {
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-modal-backdrop') {
      if (event.target.id === 'hahAcpModal') store.setState({ patient: { acpModalOpen: false } });
      return true;
    }
    if (action === 'acp-choice' && vm && ops) {
      const field = target.getAttribute('data-acp-field');
      const val   = target.getAttribute('data-acp-value');
      if (!field) return false;
      const ps  = ops.getPatientState(vm.patient.id);
      const acp = Object.assign({}, ps.acp || {});
      // Toggle: if already set to this value, clear it; otherwise set
      if (field === 'dnacprFormSeen') {
        acp.dnacprFormSeen = val === '1' && !acp.dnacprFormSeen ? true : false;
      } else {
        acp[field] = (acp[field] === val) ? '' : val;
      }
      ops.patchPatientState(vm.patient.id, { acp });
      persistPatientPatchToJson(vm.patient.id, acpPatchForJson(acp));
      return true;
    }
    if (action === 'acp-done' && vm && ops) {
      const tep   = (document.getElementById('hahAcpTep')   || {}).value || '';
      const notes = (document.getElementById('hahAcpNotes') || {}).value || '';
      const ps    = ops.getPatientState(vm.patient.id);
      const acp   = Object.assign({}, ps.acp || {}, { tep: tep.trim(), notes: notes.trim() });
      ops.patchPatientState(vm.patient.id, { acp });
      persistPatientPatchToJson(vm.patient.id, acpPatchForJson(acp));
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-clear' && vm && ops) {
      ops.patchPatientState(vm.patient.id, { acp: {} });
      persistPatientPatchToJson(vm.patient.id, { alerts: { dnar: false, acp: false, escalation: '' }, clinical: { acp: {} } });
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'toggle-blood-options') {
      const now = !!(state.patient && state.patient.bloodOptionsOpen);
      store.setState({ patient: { bloodOptionsOpen: !now } }); return true;
    }
    if (action === 'blood-options-close') {
      store.setState({ patient: { bloodOptionsOpen: false } }); return true;
    }
    if (action === 'blood-order-up' || action === 'blood-order-down') {
      const key = target.getAttribute('data-analyte');
      if (!key) return false;
      const order = (function(){ try { const s = JSON.parse(localStorage.getItem('hah_blood_analyte_order') || 'null'); return Array.isArray(s) && s.length ? s : ['CRP','WCC','Hb','Na','K','Cr']; } catch(_) { return ['CRP','WCC','Hb','Na','K','Cr']; } })();
      const idx = order.indexOf(key);
      if (idx < 0) return false;
      if (action === 'blood-order-up' && idx > 0) { const t = order[idx - 1]; order[idx - 1] = order[idx]; order[idx] = t; }
      if (action === 'blood-order-down' && idx < order.length - 1) { const t = order[idx + 1]; order[idx + 1] = order[idx]; order[idx] = t; }
      try { localStorage.setItem('hah_blood_analyte_order', JSON.stringify(order)); } catch (_) {}
      store.setState({ patient: { bloodOptionsOpen: true } }); return true;
    }
    if (action === 'toggle-sort-menu') {
      const now = !!(state.patient && state.patient.sortMenuOpen);
      store.setState({ patient: { sortMenuOpen: !now } });
      return true;
    }
    if (action === 'toggle-list-filter') {
      const filter = target.getAttribute('data-filter');
      if (!filter) return false;
      const raw = (state.patient && state.patient.listFilter) || null;
      const current = Array.isArray(raw) ? raw.slice() : raw ? [raw] : [];
      const idx = current.indexOf(filter);
      if (idx >= 0) current.splice(idx, 1); else current.push(filter);
      store.setState({ patient: { listFilter: current.length ? current : null } });
      return true;
    }
    if (action === 'clear-list-filter') {
      store.setState({ patient: { listFilter: null } });
      return true;
    }
    if (action === 'set-list-sort') {
      const mode = target.getAttribute('data-sort');
      if (!mode) return false;
      store.setState({ patient: { listSort: mode, sortMenuOpen: false } });
      try { localStorage.setItem('hah_list_sort', mode); } catch (_) {}
      return true;
    }
    if (action === 'back-board') { router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView); return true; }
    if (action === 'next' && vm) { const n = vm.contextRows[vm.selectedIndex + 1]; if (n) { store.setState({ selectedPatientId: n.id }); router.goToPatient(n.id); } return true; }
    if (action === 'prev' && vm) { const p = vm.contextRows[vm.selectedIndex - 1]; if (p) { store.setState({ selectedPatientId: p.id }); router.goToPatient(p.id); } return true; }
    if (action === 'set-discussed' && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Discussed'); persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Discussed' } }); return true; }
    if (action === 'set-actioned'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Actioned');  persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Actioned' } }); return true; }
    if (action === 'set-deferred'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Deferred');  persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Deferred' } }); return true; }

    if (action === 'add-task' && vm) {
      store.setState({
        selectedPatientId: vm.patient.id,
        selectedTaskId: null,
        tasks: {
          savedView: 'patient-focus',
          filters: { patientId: vm.patient.id },
          taskComposer: {
            open: true,
            mode: 'create',
            patientId: vm.patient.id,
            seedTitle: '',
            seedNote: '',
            seedCategory: 'Clinical review',
            seedDueAt: vm.patient.reviewDueAt || ''
          }
        }
      });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'open-tasks' && vm) {
      store.setState({ selectedPatientId: vm.patient.id, selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId: vm.patient.id } } });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'set-composer-type') {
      const ct = target.getAttribute('data-composer-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }
    if (action === 'open-composer') {
      const ct = target.getAttribute('data-encounter-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }

    if (action === 'composer-done' && vm && ops) {
      const composerType  = (state.patient && state.patient.composerType) || 'board_round';
      const scopedComposer = getScopedComposerState(state, vm.patient.id);
      const isLocked      = !!scopedComposer.locked;
      const composerEditId = scopedComposer.editId || null;

      if (isLocked) {
        patchScopedComposerState(vm.patient.id, { locked: false });
        return true;
      }

      const fields = collectComposerFields(composerType);
      const hasContent = Object.values(fields).some((v) => v !== null && v !== false && String(v || '').trim().length > 0);
      if (hasContent) {
        let savedId = null;
        let savedEncounter = null;
        let verb = 'saved';
        if (composerEditId) {
          const updated = ops.updateEncounter(composerEditId, fields);
          savedEncounter = updated || null;
          savedId = updated ? composerEditId : null;
          verb = 'updated';
        }
        if (!savedId) {
          const created = ops.createEncounter({ patientId: vm.patient.id, type: composerType, fields });
          savedEncounter = created || null;
          savedId = created ? created.id : null;
        }
        // Serialize JSON writes so the discharge-readiness patch loads
        // patient data AFTER the timeline upsert has saved. Previously both
        // writes ran concurrently and used last-write-wins on the same
        // patient JSON file, so a discharge patch loaded before the timeline
        // upsert finished would clobber the new timeline entry on save.
        // Resulting symptom: board round entry created on desktop, JSON
        // version bumps twice, but timeline ends up empty — entry never
        // visible to the mobile companion or other clients.
        const timelinePromise = savedEncounter
          ? persistEncounterToJson(vm.patient, savedEncounter)
          : Promise.resolve();
        if (composerType === 'board_round') {
          const dr = deriveDischargeReadiness(fields.dischargeDate, fields.dischargeReady);
          // Compare the composer's discharge summary against the patient's
          // currently-persisted value. Only include in the patch if the
          // user actually changed it. fields.forDischargeSummary now comes
          // from collectComposerFields (same path as every other field —
          // the special-case direct-to-JSON autosave is gone).
          const dcCurrent = String((fields.forDischargeSummary != null ? fields.forDischargeSummary : '')).trim();
          const dcPersisted = String(vm.patient.forDischargeSummary || '').trim();
          const dcChanged = dcCurrent !== dcPersisted;
          const roundActive = (typeof ops.getActiveRound === 'function' && ops.getActiveRound());
          const operationalPatch = {};
          // Note: we no longer write dischargeReadiness here. As of v0.8.130
          // readiness is derived at read-time from the timeline; the entry we
          // just committed via persistEncounterToJson contains the discharge
          // fields, so the next read will compute the right value. Writing
          // operational.dischargeReadiness independently would re-introduce
          // the staleness class of bug.
          if (dcChanged) operationalPatch.forDischargeSummary = dcCurrent;
          // boardStatus belongs in this patch only when a round is active.
          // The JSON store used to set this autonomously on every board_round
          // entry, but that incorrectly marked patients Discussed even when
          // no round had started — confusing in the patient list. Now the
          // caller decides based on round state.
          if (roundActive) operationalPatch.boardStatus = 'Discussed';
          // Update local ops state with the readiness for any local-state
          // consumers (sortPatientRows, etc.). dr is null when no discharge
          // fields are set in this entry.
          if (dr) ops.setDischargeReadiness(vm.patient.id, dr);
          if (Object.keys(operationalPatch).length) {
            // Wait for timeline write to land before patching operational,
            // so the patch sees the timeline entry in its loaded snapshot.
            timelinePromise
              .catch(function () {})
              .then(function () {
                persistPatientPatchToJson(vm.patient.id, { operational: operationalPatch });
              });
          }
          // If round active, mark this patient as Discussed in local state
          // (the JSON patch above handles the persistent record) and try to
          // auto-advance to the next undiscussed patient.
          if (roundActive) {
            ops.markPatientDiscussed(vm.patient.id);
            // Auto-advance: find the next "Not discussed" patient in the current sort order
            try {
              const nextVm = d.buildPatientWorkspaceModel(store.getState());
              const sortMode = (store.getState().patient && store.getState().patient.listSort) || 'name';
              const sortedRows = sortPatientRows((nextVm && nextVm.contextRows) || [], sortMode);
              const nextPatient = sortedRows.find((row) => {
                if (String(row.id) === String(vm.patient.id)) return false;
                const s = row.boardStatus || 'Not discussed';
                return s !== 'Discussed' && s !== 'Actioned' && s !== 'Deferred';
              });
              if (nextPatient) {
                setTimeout(() => {
                  ops.enterPatient(nextPatient.id);
                  store.setState({ selectedPatientId: nextPatient.id });
                  router.goToPatient(nextPatient.id);
                }, 600);
              }
            } catch (_) {}
          }
        }
        saveDraft(vm.patient.id, composerType, fields);
        const typeLabel = ENCOUNTER_TYPES.find((t) => t.key === composerType);
        const pane = document.querySelector('#hahRightPane');
        if (pane) {
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          showToast(pane, (typeLabel ? typeLabel.label : 'Entry') + ' ' + verb + ' — ' + time);
        }
        patchScopedComposerState(vm.patient.id, { locked: true, editId: savedId });
        store.setState({ patient: { composerType } });
      } else {
        patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
        store.setState({ patient: { composerType } });
      }
      return true;
    }

    if (action === 'composer-new' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      clearDraft(vm.patient.id, composerType);
      resetComposerDOM();
      refreshPreview(vm, composerType);
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
      return true;
    }

    if (action === 'composer-clear' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';

      // Snapshot the current composer state for Undo. Now that discharge
      // summary is part of collectComposerFields, this single snapshot
      // captures everything the composer holds.
      composerClearSnapshot = {
        patientId: vm.patient.id,
        composerType: composerType,
        fields: collectComposerFields(composerType)
      };
      composerClearDeadline = Date.now() + COMPOSER_UNDO_WINDOW_MS;

      // Apply the clear: write an empty draft and reset the DOM. Both
      // synchronous, no JSON writes. The patient JSON only changes when
      // the user presses Done.
      const emptyFields = composerType === 'board_round' ? {
        issues: '', progress: '', bloods: '', plan: '',
        forDischargeSummary: '',
        dischargeDate: '', dischargeReady: false, dnar: false, acp: false
      } : composerType === 'micro_mdm' ? {
        question: '', recommendation: '', followUp: ''
      } : composerType === 'resp_mdm' ? {
        summary: '', recommendation: '', action: ''
      } : { source: '', note: '' };
      saveDraft(vm.patient.id, composerType, emptyFields);
      resetComposerDOM();
      refreshPreview(vm, composerType);

      // Force a re-render so the button shows Undo state. The render-time
      // logic reads composerClearSnapshot + composerClearDeadline.
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });

      // Schedule the snapshot to expire at the deadline.
      if (composerClearTimer) clearTimeout(composerClearTimer);
      composerClearTimer = setTimeout(function () {
        composerClearSnapshot = null;
        composerClearDeadline = 0;
        composerClearTimer = null;
        store.setState({ ui: { revision: Date.now() } });
      }, COMPOSER_UNDO_WINDOW_MS);

      return true;
    }

    if (action === 'composer-undo' && vm) {
      // Restore the snapshot. Synchronous, no JSON writes — the cleared
      // state had never reached JSON in the first place.
      if (!composerClearSnapshot) return true;
      const snap = composerClearSnapshot;
      const composerType = snap.composerType;
      saveDraft(snap.patientId, composerType, snap.fields);
      try { restoreFields(snap.fields, composerType); } catch (_) {}
      refreshPreview(vm, composerType);
      if (composerClearTimer) {
        clearTimeout(composerClearTimer);
        composerClearTimer = null;
      }
      composerClearSnapshot = null;
      composerClearDeadline = 0;
      store.setState({ ui: { revision: Date.now() } });
      return true;
    }

    if (action === 'insert-plan-preset' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      const presetKey = target.getAttribute('data-plan-preset-key');
      const inserted = insertPlanPresetIntoComposer(presetKey, vm.patient.id, composerType);
      if (inserted) refreshPreview(vm, composerType);
      return inserted;
    }

    if (action === 'toggle-mdm-earlier') {
      const mdmType = target.getAttribute('data-mdm-type');
      if (!mdmType) return false;
      const current = (state.patient && state.patient.mdmEarlier) || {};
      store.setState({ patient: { mdmEarlier: { ...current, [mdmType]: !current[mdmType] } } });
      return true;
    }

    if (action === 'toggle-log-older') {
      const current = !!(state.patient && state.patient.logShowOlder);
      store.setState({ patient: { logShowOlder: !current } });
      return true;
    }

    if (action === 'delete-encounter' && ops) {
      const encId = target.getAttribute('data-encounter-id');
      if (!encId) return false;
      if (window.confirm('Delete this entry?')) {
        // If the composer was locked on (or editing) the entry being
        // deleted, unlock it — otherwise the composer keeps showing
        // "New note" / "Edit" buttons referencing an entry that no
        // longer exists, and editId becomes a dangling reference.
        // Render-time fallback below also handles the cross-device case
        // (entry deleted on another desktop session or via mobile).
        if (vm && vm.patient) {
          const scopedComposer = getScopedComposerState(state, vm.patient.id);
          if (scopedComposer && String(scopedComposer.editId || '') === String(encId)) {
            patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
          }
        }
        // Encounters can live in two places: local ops state (state.encounters
        // — desktop-created) and the patient's JSON timeline (mobile clinical
        // reviews, persisted board rounds). Try both — local first because
        // it's synchronous, then JSON for entries that live there. Without
        // the JSON delete, mobile entries would re-appear on next dataset
        // reload because they're never removed from the source of truth.
        ops.deleteEncounter(encId);
        // Mark JSON deletion as pending so the entry disappears from the
        // merged encounter list immediately, before the network round trip.
        // Without this, mobile-sourced entries linger visually for ~600ms
        // until removePatientTimelineEntry's loadPatient + savePatient +
        // cache patch completes. The optimistic hide makes delete feel
        // as instant as create.
        pendingDeleteIds.add(String(encId));
        // Force a re-render right now so the suppression takes effect
        // before the user gets bored.
        store.setState({ ui: { revision: Date.now() } });
        if (vm && vm.patient) {
          const api = window.HAHBoard.sharedJsonStore;
          if (api && typeof api.removePatientTimelineEntry === 'function') {
            api.removePatientTimelineEntry(vm.patient.id, encId)
              .then(function () {
                // JSON delete succeeded — the cache has been patched, the
                // entry is genuinely gone. Drop it from pending and let the
                // normal merge logic do its thing on the next render.
                pendingDeleteIds.delete(String(encId));
              })
              .catch(function (err) {
                // Network or store failure — revert the optimistic hide
                // so the user sees the entry come back. They'll know the
                // delete didn't take.
                pendingDeleteIds.delete(String(encId));
                store.setState({ ui: { revision: Date.now() } });
                console.warn('[H@H JSON store] Could not remove timeline entry', err);
                const pane = document.querySelector('#hahRightPane');
                if (pane && typeof showToast === 'function') {
                  const reason = describeJsonStoreError(err);
                  showToast(pane, 'Could not delete · ' + reason + ' · entry restored');
                }
              });
          } else {
            // No JSON store available (local-only patient). Nothing to
            // suppress beyond the local delete that already happened.
            pendingDeleteIds.delete(String(encId));
          }
        }
      }
      return true;
    }

    // ─── Medication changes card actions (v0.8.145) ───────────────────
    if (action === 'medchg-open-add' && vm) {
      // Open the composer in "new entry" mode with default values.
      store.setState({ patient: { medChangeComposer: Object.assign(defaultMedChangeComposer(), { open: true, editingId: null }) } });
      // Focus the drug input on next paint
      setTimeout(() => { const el = document.getElementById('medChangeDrug'); if (el) el.focus(); }, 0);
      return true;
    }
    if (action === 'medchg-edit' && vm) {
      const encId = target.getAttribute('data-entry-id');
      if (!encId) return false;
      const encounters = getPatientEncounterRows(vm.patient) || [];
      const enc = encounters.find((e) => e.id === encId);
      if (!enc) return false;
      const f = enc.fields || {};
      store.setState({
        patient: {
          medChangeComposer: {
            open: true,
            editingId: encId,
            drug: String(f.drug || ''),
            changeType: String(f.changeType || 'start'),
            fromValue: String(f.fromValue || ''),
            toValue: String(f.toValue || ''),
            reason: String(f.reason || '')
          }
        }
      });
      setTimeout(() => { const el = document.getElementById('medChangeDrug'); if (el) el.focus(); }, 0);
      return true;
    }
    if (action === 'medchg-set-type' && vm) {
      const t = target.getAttribute('data-type');
      if (!t) return false;
      const cur = getMedChangeComposer(state);
      // Preserve typed-but-not-yet-saved values from the DOM when switching
      // types. We don't track input changes in the store (would steal focus
      // on re-render), so we read live values here before the re-render.
      const drugEl   = document.getElementById('medChangeDrug');
      const fromEl   = document.getElementById('medChangeFromValue');
      const toEl     = document.getElementById('medChangeToValue');
      const reasonEl = document.getElementById('medChangeReason');
      const liveDrug   = drugEl   ? String(drugEl.value   || '') : cur.drug;
      const liveFrom   = fromEl   ? String(fromEl.value   || '') : cur.fromValue;
      const liveTo     = toEl     ? String(toEl.value     || '') : cur.toValue;
      const liveReason = reasonEl ? String(reasonEl.value || '') : cur.reason;
      const meta = getMedChangeTypeMeta(t);
      const next = {
        open: cur.open,
        editingId: cur.editingId,
        drug: liveDrug,
        changeType: t,
        fromValue: meta.needsFrom ? liveFrom : '',
        toValue:   meta.needsTo   ? liveTo   : '',
        reason: liveReason
      };
      store.setState({ patient: { medChangeComposer: next } });
      return true;
    }
    if (action === 'medchg-cancel' && vm) {
      store.setState({ patient: { medChangeComposer: defaultMedChangeComposer() } });
      return true;
    }
    if (action === 'medchg-save' && vm && ops) {
      // Collect from DOM directly — input events don't update store, so
      // the store's composer state may be stale for fields the user typed
      // into. The DOM is the source of truth at save time.
      const drugEl       = document.getElementById('medChangeDrug');
      const fromEl       = document.getElementById('medChangeFromValue');
      const toEl         = document.getElementById('medChangeToValue');
      const reasonEl     = document.getElementById('medChangeReason');
      const composerCur  = getMedChangeComposer(state);
      const drug         = drugEl   ? String(drugEl.value   || '').trim() : '';
      const fromValue    = fromEl   ? String(fromEl.value   || '').trim() : '';
      const toValue      = toEl     ? String(toEl.value     || '').trim() : '';
      const reason       = reasonEl ? String(reasonEl.value || '').trim() : '';
      const changeType   = composerCur.changeType || 'start';
      // Validation: drug is required. Other fields are optional —
      // typeMeta.needsTo is enforced via UI (the field shows/hides) but
      // we don't reject if missing; clinician may want to log "started X"
      // without yet knowing the dose.
      if (!drug) {
        window.alert('Please enter a drug name.');
        if (drugEl) drugEl.focus();
        return true;
      }
      const fields = { drug, changeType, fromValue, toValue, reason };
      const editingId = composerCur.editingId || null;
      let savedEncounter = null;
      if (editingId) {
        savedEncounter = ops.updateEncounter(editingId, fields) || null;
        // If updateEncounter doesn't carry through the type, ensure it stays medication_change.
        if (savedEncounter && savedEncounter.type !== 'medication_change') {
          savedEncounter.type = 'medication_change';
        }
      } else {
        savedEncounter = ops.createEncounter({ patientId: vm.patient.id, type: 'medication_change', fields }) || null;
      }
      if (savedEncounter) {
        persistEncounterToJson(vm.patient, savedEncounter)
          .catch((err) => {
            console.error('[H@H medication change] Could not persist to JSON', err);
            window.alert('Could not save medication change. Please try again.');
          });
      }
      // Close composer regardless of save success — failure is logged
      // and surfaced via alert; user can re-add if needed.
      store.setState({ patient: { medChangeComposer: defaultMedChangeComposer() } });
      return true;
    }
    // ─── End of medication changes card actions ───────────────────────

    if (action === 'edit-encounter' && vm && ops) {
      const encId = target.getAttribute('data-encounter-id');
      if (!encId) return false;
      const encounters = getPatientEncounterRows(vm.patient) || [];
      const enc = encounters.find((e) => e.id === encId);
      if (!enc) return false;
      // Switch composer to this encounter's type and load it into the composer
      saveDraft(vm.patient.id, enc.type, enc.fields || {});
      // locked: false means the composer is immediately editable
      patchScopedComposerState(vm.patient.id, { locked: false, editId: encId });
      store.setState({ patient: { composerType: enc.type } });
      // Scroll right pane to composer
      const rightPane = document.getElementById('hahRightPane');
      if (rightPane) rightPane.scrollTo({ top: 0, behavior: 'smooth' });
      return true;
    }

    if (action === 'open-edit-patient-record' && vm) {
      if (!isJsonPatient(vm.patient)) return true;
      store.setState({ patient: { editPatientModalOpen: true } });
      return true;
    }
    if (action === 'close-edit-patient-record') {
      store.setState({ patient: { editPatientModalOpen: false } });
      return true;
    }
    if (action === 'patient-record-backdrop') {
      if (event.target.classList && event.target.classList.contains('hah-board-modal-overlay')) {
        store.setState({ patient: { editPatientModalOpen: false } });
      }
      return true;
    }
    if (action === 'commit-edit-patient-record' && vm) {
      if (!isJsonPatient(vm.patient)) return true;
      const fields = collectPatientRecordFields();
      if (!fields.name) { window.alert('Please enter a patient name.'); return true; }
      updatePatientCoreJson(vm.patient.id, fields)
        .then(function () {
          store.setState({ patient: { editPatientModalOpen: false } });
        })
        .catch(function (err) {
          console.error('[H@H JSON store] Could not update patient details', err);
          window.alert(err && err.message ? err.message : 'Could not update patient details.');
        });
      return true;
    }

    if (action === 'discharge-patient' && vm && ops) {
      const patient = vm.patient;
      const msg = (isJsonPatient(patient) ? 'Archive / discharge ' : 'Discharge ') + patient.name + ' from the service?\n\nThe patient will be removed from the active board. The patient record and timeline will be kept.';
      if (!window.confirm(msg)) return true;
      if (isJsonPatient(patient)) {
        archivePatientJson(patient.id)
          .then(function () {
            store.setState({ selectedPatientId: null, patient: { editPatientModalOpen: false } });
            router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView);
          })
          .catch(function (err) {
            console.error('[H@H JSON store] Could not archive patient', err);
            window.alert(err && err.message ? err.message : 'Could not archive patient.');
          });
        return true;
      }
      ops.dischargePatient(patient.id, {
        name: patient.name,
        pathway: patient.pathway,
        age: patient.age,
        location: patient.location
      });
      router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView);
      return true;
    }

    return false;
  }

  function handleChange(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const vm = d.buildPatientWorkspaceModel(state);
    const action = target.getAttribute('data-patient-action');
    if (action === 'set-board-status' && vm && ops) { ops.setBoardStatus(vm.patient.id, target.value); persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: target.value } }); return true; }
    if (action === 'set-discharge'    && vm && ops) { ops.setDischargeReadiness(vm.patient.id, target.value); persistPatientPatchToJson(vm.patient.id, { operational: { dischargeReadiness: target.value } }); return true; }
    return false;
  }

  function renderEmpty() {
    return `<div class="hah-surface-placeholder"><section class="hah-card hah-surface-hero">
      <h1 class="hah-surface-title">Patient workspace</h1>
      <p class="hah-surface-subtitle">No patient selected from the current board context.</p>
    </section></div>`;
  }

  function priorityBadge(p) {
    return c.badge(p, p === 'Critical' ? 'danger' : p === 'High' ? 'warn' : p === 'Low' ? 'good' : 'neutral');
  }
  function splitLines(text) {
    return String(text || '').split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean);
  }
  function formatEntryDate(iso) {
    if (!iso) return '—';
    const dt = new Date(iso); if (isNaN(dt.getTime())) return String(iso);
    const now = new Date(); const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    const time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (dt.toDateString() === now.toDateString()) return 'Today ' + time;
    if (dt.toDateString() === yesterday.toDateString()) return 'Yesterday ' + time;
    return dt.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' + time;
  }
  function isObsWarn(label, value)   { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 96) || (label === 'NEWS2' && v >= 3); }
  function isObsDanger(label, value) { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 92) || (label === 'NEWS2' && v >= 7); }

  // Close sort menu on any click outside the menu or trigger button
  if (typeof document !== 'undefined') {
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.patient && s.patient.sortMenuOpen)) return;
      if (event.target.closest('[data-patient-action="toggle-sort-menu"]')) return;
      if (event.target.closest('.hah-sort-menu')) return;
      store.setState({ patient: { sortMenuOpen: false } });
    }, true);
    // Close status menu on any click outside it
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.patient && s.patient.statusMenuFor)) return;
      if (event.target.closest('[data-patient-action="toggle-status-menu"]')) return;
      if (event.target.closest('.hah-status-menu')) return;
      store.setState({ patient: { statusMenuFor: null } });
    }, true);

  function initBloodTooltip() {
    if (window.HAHBoard.__bloodTooltipBound) return;
    window.HAHBoard.__bloodTooltipBound = true;

    const tip = document.createElement('div');
    tip.className = 'dbl-analyte-tip';
    tip.style.display = 'none';
    document.body.appendChild(tip);

    const dbMap = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a]));

    document.addEventListener('mouseover', (e) => {
      const th = e.target.closest('.dbl-analyte[data-key]');
      if (!th) { tip.style.display = 'none'; return; }
      const key = th.getAttribute('data-key');
      const info = dbMap[key];
      if (!info) {
        // Unknown analyte — show basic tooltip
        tip.innerHTML = `<div class="dbl-tip-name">${key}</div><div class="dbl-tip-notes">No reference data available for this analyte.</div>`;
      } else {
        tip.innerHTML = `
          <div class="dbl-tip-name">${info.fullName || info.label}</div>
          <div class="dbl-tip-range"><span class="dbl-tip-label">Range</span> ${info.range} ${info.unit}</div>
          <div class="dbl-tip-notes">${info.notes}</div>
          <div class="dbl-tip-source">GSTT / Viapath</div>`;
      }
      tip.style.display = 'block';
      const rect = th.getBoundingClientRect();
      const tipW = 240;
      let left = rect.left - tipW - 10;
      if (left < 6) left = rect.right + 10; // flip right if no space
      const top = Math.max(6, Math.min(rect.top - 4, window.innerHeight - tip.offsetHeight - 6));
      tip.style.left  = left + 'px';
      tip.style.top   = top  + 'px';
    });

    document.addEventListener('mouseout', (e) => {
      if (!e.relatedTarget || !e.relatedTarget.closest('.dbl-analyte[data-key]')) {
        tip.style.display = 'none';
      }
    });
  }

  function initWsDragDrop() {
    const mainPane = document.getElementById('hahMainPane');
    if (!mainPane) return;

    let draggingKey = null;

    mainPane.querySelectorAll('.hah-ws-section').forEach((section) => {
      section.addEventListener('dragstart', (e) => {
        draggingKey = section.getAttribute('data-section');
        e.dataTransfer.effectAllowed = 'move';
        // Only allow drag from header bar (first child)
        requestAnimationFrame(() => section.classList.add('is-dragging'));
      });

      section.addEventListener('dragend', () => {
        section.classList.remove('is-dragging');
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        draggingKey = null;
      });

      section.addEventListener('dragover', (e) => {
        if (!draggingKey || draggingKey === section.getAttribute('data-section')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = section.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        section.classList.add(e.clientY < mid ? 'hah-ws-drop-above' : 'hah-ws-drop-below');
      });

      section.addEventListener('dragleave', (e) => {
        if (!section.contains(e.relatedTarget)) {
          section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        }
      });

      section.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!draggingKey) return;
        const targetKey  = section.getAttribute('data-section');
        if (draggingKey === targetKey) return;
        const rect = section.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;

        const layout = getWsLayout();
        const flatLeft  = layout.left.slice();
        const flatRight = layout.right.slice();

        // Remove dragged key from wherever it is
        const fromLeft  = flatLeft.indexOf(draggingKey);
        const fromRight = flatRight.indexOf(draggingKey);
        if (fromLeft >= 0)  flatLeft.splice(fromLeft, 1);
        if (fromRight >= 0) flatRight.splice(fromRight, 1);

        // Find target position
        const inLeft  = flatLeft.indexOf(targetKey);
        const inRight = flatRight.indexOf(targetKey);

        if (inLeft >= 0) {
          flatLeft.splice(before ? inLeft : inLeft + 1, 0, draggingKey);
        } else {
          flatRight.splice(before ? inRight : inRight + 1, 0, draggingKey);
        }

        const newLayout = { left: flatLeft, right: flatRight };
        saveWsLayout(newLayout);
        section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        // Trigger re-render by nudging state
        store.setState({ patient: { _wsLayoutBump: Date.now() } });
      });
    });

    // Allow dropping into empty column
    mainPane.querySelectorAll('.hah-ws-col').forEach((col) => {
      col.addEventListener('dragover', (e) => { e.preventDefault(); });
      col.addEventListener('drop', (e) => {
        if (e.target === col && draggingKey) {
          e.preventDefault();
          const colName = col.getAttribute('data-col');
          const layout  = getWsLayout();
          const flatLeft  = layout.left.slice();
          const flatRight = layout.right.slice();
          const fi = flatLeft.indexOf(draggingKey);
          const fr = flatRight.indexOf(draggingKey);
          if (fi >= 0) flatLeft.splice(fi, 1);
          if (fr >= 0) flatRight.splice(fr, 1);
          if (colName === 'left')  flatLeft.push(draggingKey);
          else                     flatRight.push(draggingKey);
          saveWsLayout({ left: flatLeft, right: flatRight });
          store.setState({ patient: { _wsLayoutBump: Date.now() } });
        }
      });
    });
  }

  window.HAHBoard.patientScreen = { renderLeftPane, renderMainPane, renderRightPane, handleClick, handleChange, afterRender, computeCaseloadMetrics, renderCaseloadCard, sortPatientRows };
})();

</script>

          </div>
          ${options.manual ? primaryAction('Add team task', 'add-task') : ''}
        </div>
        <div class="hah-action-list">
          ${rows.map((task) => renderTaskItem(task, String(task.id) === String(selectedId), options)).join('')}
        </div>
      </section>
    `;
  }

  function renderTaskItem(task, selected, options) {
    const opts = options || {};
    const manual = isManualTask(task);
    const blocker = task.blocker ? `<div class="hah-action-blocker">Blocker: ${c.escapeHtml(task.blocker)}</div>` : '';
    const board = task.boardLink ? `<span class="hah-action-muted">${c.escapeHtml(task.boardLink)}</span>` : '';
    return `
      <button type="button" class="hah-action-item${selected ? ' is-selected' : ''}${manual ? ' is-manual' : ' is-suggested'}${opts.suggested ? ' is-soft' : ''}" data-task-action="select-task" data-task-id="${c.escapeHtml(task.id)}">
        <div class="hah-action-main">
          <div class="hah-action-title-row">
            <span class="hah-action-title">${c.escapeHtml(task.title)}</span>
          </div>
          <div class="hah-action-sub">${c.escapeHtml(task.patient.name)} · ${c.escapeHtml([task.patient.pathway, task.patient.referralSource ? 'from ' + task.patient.referralSource : ''].filter(Boolean).join(' · '))}</div>
          ${task.note || task.sourceLine ? `<div class="hah-action-note">${c.escapeHtml(task.note || task.sourceLine)}</div>` : ''}
          ${blocker}
        </div>
        <div class="hah-action-meta">
          ${manual ? sourceBadge(task) : ''}
          ${statusBadge(task.status)}
          ${dueBadge(task.dueState)}
          ${priorityBadge(task.priority)}
          ${c.badge(task.owner || 'Unassigned', 'neutral')}
          ${board}
        </div>
      </button>
    `;
  }

  function renderRelatedTasks(tasks) {
    if (!tasks.length) return '<div class="hah-task-note">No related action in the current filtered view.</div>';
    return `<div class="hah-task-mini-list">${tasks.map((task) => `
      <div class="hah-task-mini-item">
        <div class="hah-task-mini-title">${c.escapeHtml(task.title)}</div>
        <div class="hah-task-mini-sub">${c.escapeHtml([isManualTask(task) ? 'Team task' : 'Suggested', task.category, task.dueState, task.owner].filter(Boolean).join(' · '))}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderPatientFlags(patient) {
    const labels = [];
    const add = (label, tone) => {
      if (!label || labels.some((row) => row.label === label)) return;
      labels.push({ label, tone });
    };
    if (patient.dnar) add('DNAR', 'danger');
    if (patient.acp) add('ACP', 'neutral');
    if (Array.isArray(patient.treatmentFlags)) {
      patient.treatmentFlags.slice(0, 3).forEach((flag) => add(flag, 'neutral'));
    }
    return labels.map((row) => c.badge(row.label, row.tone)).join('');
  }

  function buildWhyItMatters(task) {
    const parts = [];
    if (isManualTask(task)) parts.push('This is a team-owned task and should be managed through the task controls.');
    else parts.push('This is a suggested action derived from patient state, plan text or boardround context.');
    if (task.dueState === 'Overdue') parts.push('It is overdue and likely needs chasing now.');
    else if (task.dueState === 'Due today') parts.push('It is due today and should be resolved within the current service day.');
    if (task.blocker) parts.push(`Current blocker: ${task.blocker}.`);
    if (task.patient.dischargeReadiness === 'Possible today' || task.patient.dischargeReadiness === 'Ready') {
      parts.push('It may influence discharge flow for the patient.');
    }
    return parts.join(' ') || 'Operational action linked to the selected patient and current board state.';
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-task-action]');
    if (!target) return false;
    const action = target.getAttribute('data-task-action');
    const vm = d.buildTasksViewModel(state);

    if (action === 'set-view') {
      const viewKey = target.getAttribute('data-view-key') || 'all-open';
      store.setState({
        selectedTaskId: null,
        tasks: {
          savedView: viewKey,
          taskComposer: { open: false },
          filters: viewKey === 'patient-focus' ? state.tasks.filters || {} : { patientId: null }
        }
      });
      if (router && typeof router.goToTasks === 'function') router.goToTasks(viewKey);
      return true;
    }

    if (action === 'set-sort') {
      const sortKey = target.getAttribute('data-sort-key') || 'due';
      store.setState({ tasks: { sort: sortKey } });
      return true;
    }

    if (action === 'select-task') {
      const taskId = target.getAttribute('data-task-id');
      if (!taskId) return false;
      store.setState({ selectedTaskId: taskId, tasks: { taskComposer: { open: false } } });
      return true;
    }

    if (action === 'clear-patient-filter') {
      store.setState({ selectedTaskId: null, tasks: { savedView: 'all-open', filters: { patientId: null } } });
      return true;
    }

    if ((action === 'open-patient' || action === 'focus-patient') && vm.selectedTask) {
      const patientId = vm.selectedTask.patientId;
      if (action === 'focus-patient') {
        store.setState({ selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId } } });
        return true;
      }
      store.setState({ selectedPatientId: patientId });
      router.goToPatient(patientId);
      return true;
    }

    if (action === 'add-task') {
      const patient = (vm.selectedTask && vm.selectedTask.patient) || vm.selectedPatient || getDefaultPatient(vm, state, null);
      store.setState({ tasks: { taskComposer: { open: true, mode: 'create', patientId: patient ? patient.id : '', seedTitle: '', seedNote: '', seedCategory: 'Clinical review', seedDueAt: patient ? patient.reviewDueAt || '' : '' } } });
      return true;
    }

    if (action === 'accept-suggestion' && vm.selectedTask && ops) {
      const task = vm.selectedTask;
      const created = ops.createTask({
        patientId: task.patientId,
        title: task.title,
        note: task.note || task.sourceLine || '',
        category: task.category,
        owner: task.owner || 'Unassigned',
        dueAt: task.dueAt || '',
        priority: task.priority || 'Medium',
        status: 'Open',
        blocker: task.blocker || '',
        createdFrom: 'Accepted suggestion',
        boardLink: task.boardLink || ''
      });
      ops.updateTask(task.id, { status: 'Cancelled' });
      if (created) store.setState({ selectedTaskId: created.id, tasks: { savedView: 'patient-focus', filters: { patientId: task.patientId } } });
      return true;
    }

    if (action === 'dismiss-suggestion' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Cancelled' });
      store.setState({ selectedTaskId: null });
      return true;
    }

    if (action === 'add-follow-on' && vm.selectedTask) {
      const task = vm.selectedTask;
      store.setState({ tasks: { taskComposer: { open: true, mode: 'create', patientId: task.patientId, seedTitle: '', seedNote: `Follow-on from: ${task.title}`, seedCategory: task.category, seedDueAt: '' } } });
      return true;
    }

    if (action === 'edit-task' && vm.selectedTask) {
      store.setState({ tasks: { taskComposer: { open: true, mode: 'edit', taskId: vm.selectedTask.id, patientId: vm.selectedTask.patientId } } });
      return true;
    }

    if (action === 'close-task-composer') {
      store.setState({ tasks: { taskComposer: { open: false } } });
      return true;
    }

    if (action === 'composer-due-preset') {
      const preset = target.getAttribute('data-due-preset') || '';
      const el = document.getElementById('hahTaskDue');
      if (el) el.value = preset === 'none' ? '' : toDateTimeLocal(duePresetToIso(preset));
      return true;
    }

    if (action === 'save-task-composer' && ops) {
      const composer = getComposerState(state);
      const input = collectTaskComposerInput();
      if (!input.patientId || !input.title) {
        window.alert('Add a patient and task title first.');
        return true;
      }

      if (composer.mode === 'edit' && composer.taskId) {
        ops.updateTask(composer.taskId, input);
        store.setState({ selectedTaskId: composer.taskId, tasks: { taskComposer: { open: false } } });
        return true;
      }

      const created = ops.createTask(Object.assign({}, input, { createdFrom: 'Tasks' }));
      if (created) {
        store.setState({ selectedTaskId: created.id, tasks: { savedView: 'patient-focus', filters: { patientId: created.patientId }, taskComposer: { open: false } } });
      }
      return true;
    }

    if (action === 'task-status-set' && vm.selectedTask && ops) {
      const status = target.getAttribute('data-status') || 'Open';
      ops.updateTask(vm.selectedTask.id, { status });
      if (status === 'Done' || status === 'Cancelled') store.setState({ selectedTaskId: null });
      return true;
    }

    if (action === 'task-owner-set' && vm.selectedTask && ops) {
      const owner = target.getAttribute('data-owner') || 'Unassigned';
      ops.updateTask(vm.selectedTask.id, { owner });
      return true;
    }

    if (action === 'task-due-preset' && vm.selectedTask && ops) {
      const preset = target.getAttribute('data-due-preset') || '';
      ops.updateTask(vm.selectedTask.id, { dueAt: duePresetToIso(preset), status: preset === 'none' ? vm.selectedTask.status : 'Open' });
      return true;
    }

    if (action === 'cancel-task' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Cancelled' });
      store.setState({ selectedTaskId: null });
      return true;
    }

    return false;
  }

  function getComposerState(state) {
    return (state.tasks && state.tasks.taskComposer) || {};
  }

  function collectTaskComposerInput() {
    return {
      patientId: getElValue('hahTaskPatient'),
      title: getElValue('hahTaskTitle'),
      note: getElValue('hahTaskNote'),
      category: getElValue('hahTaskCategory') || 'Clinical review',
      owner: getElValue('hahTaskOwner') || 'Unassigned',
      priority: getElValue('hahTaskPriority') || 'Medium',
      status: getElValue('hahTaskStatus') || 'Open',
      dueAt: fromDateTimeLocal(getElValue('hahTaskDue')),
      blocker: getElValue('hahTaskBlocker'),
      boardLink: ''
    };
  }

  function getElValue(id) {
    const el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }

  function taskPill(label, action, attrs, active) {
    return `<button type="button" class="hah-inline-pill${active ? ' is-active' : ''}" data-task-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  function primaryAction(label, action, attrs) {
    return `<button type="button" class="hah-task-primary-btn" data-task-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  function statusControl(task, status) {
    return taskPill(status, 'task-status-set', `data-status="${c.escapeHtml(status)}"`, String(task.status || 'Open') === status);
  }

  function ownerControls(task) {
    const owners = unique([task.owner || 'Unassigned'].concat(TASK_OWNERS)).slice(0, 10);
    return owners.map((owner) => taskPill(owner, 'task-owner-set', `data-owner="${c.escapeHtml(owner)}"`, String(task.owner || 'Unassigned') === owner));
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority || 'Medium', tone);
  }

  function statusBadge(status) {
    const lower = String(status || '').toLowerCase();
    let tone = 'neutral';
    if (lower.includes('waiting') || lower.includes('deferred')) tone = 'warn';
    else if (lower.includes('done')) tone = 'good';
    else if (lower.includes('cancel')) tone = 'muted';
    return c.badge(status || 'Open', tone);
  }

  function dueBadge(dueState) {
    let tone = 'neutral';
    if (dueState === 'Overdue') tone = 'danger';
    else if (dueState === 'Due today') tone = 'warn';
    else if (dueState === 'Future' || dueState === 'No due date') tone = 'good';
    return c.badge(dueState || 'No due date', tone);
  }

  function sourceBadge(task) {
    return c.badge(isManualTask(task) ? 'Team task' : 'Suggested', isManualTask(task) ? 'neutral' : 'good');
  }

  function isManualTask(task) {
    const id = String(task && task.id || '');
    const from = String(task && task.createdFrom || '').toLowerCase();
    return id.startsWith('manual:') || /manual|tasks|patient|accepted|board/.test(from);
  }

  function manualCount(rows) {
    return (rows || []).filter(isManualTask).length;
  }

  function derivedCount(rows) {
    return (rows || []).length - manualCount(rows);
  }

  function formatDue(value, dueState) {
    if (!value) return dueState || 'No due date';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value);
    return dt.toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function optionList(options, selected) {
    return options.map((opt) => `<option value="${c.escapeHtml(opt)}" ${String(opt) === String(selected) ? 'selected' : ''}>${c.escapeHtml(opt)}</option>`).join('');
  }

  function toDateTimeLocal(value) {
    if (!value) return '';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return '';
    const pad = (v) => String(v).padStart(2, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  }

  function fromDateTimeLocal(value) {
    if (!value) return '';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value || '');
    return dt.toISOString();
  }

  function duePresetToIso(preset) {
    if (preset === 'none') return '';
    const dt = new Date();
    if (preset === 'tomorrow-am') dt.setDate(dt.getDate() + 1);
    if (preset === 'today-pm') dt.setHours(14, 0, 0, 0);
    else dt.setHours(10, 0, 0, 0);
    return dt.toISOString();
  }

  function unique(values) {
    return Array.from(new Set((values || []).map((x) => String(x || '').trim()).filter(Boolean)));
  }

  function findTaskById(vm, id) {
    return (vm.rows || []).find((task) => String(task.id) === String(id)) || null;
  }

  function getDefaultPatient(vm, state, baseTask) {
    if (baseTask && baseTask.patient) return baseTask.patient;
    if (baseTask && baseTask.patientId) return vm.boardRows.find((row) => String(row.id) === String(baseTask.patientId));
    const focusId = state.tasks && state.tasks.filters && state.tasks.filters.patientId;
    if (focusId) return vm.boardRows.find((row) => String(row.id) === String(focusId));
    if (vm.selectedTask && vm.selectedTask.patient) return vm.selectedTask.patient;
    return vm.boardRows[0] || null;
  }

  function getFollowOnSeed(vm, composer) {
    if (composer && (composer.seedTitle || composer.seedNote)) return {
      title: composer.seedTitle || '',
      note: composer.seedNote || '',
      category: composer.seedCategory || 'Clinical review',
      patientId: composer.patientId || '',
      patient: vm.boardRows.find((row) => String(row.id) === String(composer.patientId))
    };
    return null;
  }

  function viewLabel(key) {
    switch (key) {
      case 'due-today': return 'Due today';
      case 'overdue': return 'Overdue';
      case 'waiting-external': return 'Waiting external';
      case 'discharge-blockers': return 'Discharge blockers';
      case 'review-due': return 'Review tasks';
      case 'boardround-actions': return 'Boardround actions';
      case 'high-priority': return 'High priority';
      case 'unassigned': return 'Unassigned';
      case 'patient-focus': return 'Patient focus';
      case 'completed': return 'Completed';
      default: return 'All open';
    }
  }

  window.HAHBoard.tasksScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>
  <script>
/* inlined: js/28-desktop-insights.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};

  const store = window.HAHBoard.store;
  const router = window.HAHBoard.router;
  const c = window.HAHBoard.components;
  const d = window.HAHBoard.derived;

  function renderLeftPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const presets = [
      ['service-overview', 'Service overview', 'Whole-service pressure, flow, and workload'],
      ['board-prep', 'Board prep', 'High-priority, overdue, and discharge focus'],
      ['clinical-risk', 'Clinical risk', 'Trajectory, oxygen, and unresolved review burden'],
      ['capacity-flow', 'Capacity and flow', 'Admissions, discharges, and blockers']
    ].map(([key, title, sub]) => renderPresetCard(key, title, sub, vm.preset === key));

    const ranges = [
      ['today', 'Today'], ['48h', '48h'], ['7d', 'Last 7 days'], ['30d', 'Last 30 days']
    ].map(([key, label]) => insightPill(label, 'set-range', `data-range-key="${c.escapeHtml(key)}"`, vm.range === key)).join('');

    return c.stack([
      c.card('Insight presets', `
        <div class="hah-pane-section-label">Choose a lens</div>
        <div class="hah-task-pane-intro">Pick the service lens you want, then drill into the specific cohort or pressure point on the right.</div>
        <div class="hah-insight-preset-list">${presets.join('')}</div>
      `),
      c.card('Time range', `
        <div class="hah-pane-section-label">Set the frame</div>
        <div class="hah-insight-chip-wrap">${ranges}</div>
        <div class="hah-task-note" style="margin-top:12px;">Current build uses live service state intelligently, with lighter historical inference where a true trend store is not yet present.</div>
      `),
      c.card('Current lens', `
        <div class="hah-pane-section-label">At a glance</div>
        ${c.keyValueGrid([
          { label: 'Preset', value: vm.presetLabel },
          { label: 'Range', value: vm.rangeLabel },
          { label: 'Source', value: vm.sourceLabel },
          { label: 'Caseload', value: String(vm.boardRows.length) }
        ])}
      `)
    ]);
  }

  function renderMainPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const metrics = vm.metrics.map((metric) => renderMetricCard(vm, metric)).join('');
    const mainPanels = vm.mainPanels.map(renderInsightPanel).join('');
    const cohortPanels = vm.cohortPanels.map(renderInsightPanel).join('');
    const opsPanels = vm.operationalPanels.map(renderInsightPanel).join('');

    return `
      <div class="hah-insights-surface">
        <section class="hah-insight-metrics">${metrics}</section>

        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-insight-toolbar">
              <div>
                <div class="hah-insight-title">Insights</div>
                <div class="hah-task-sub">${c.escapeHtml(vm.headerSubtitle)}</div>
              </div>
              <div class="hah-insight-toolbar-group">
                ${insightPill('Overview', 'set-preset', 'data-preset-key="service-overview"', vm.preset === 'service-overview')}
                ${insightPill('Board prep', 'set-preset', 'data-preset-key="board-prep"', vm.preset === 'board-prep')}
                ${insightPill('Clinical risk', 'set-preset', 'data-preset-key="clinical-risk"', vm.preset === 'clinical-risk')}
                ${insightPill('Capacity', 'set-preset', 'data-preset-key="capacity-flow"', vm.preset === 'capacity-flow')}
              </div>
            </div>
          </div>
        </section>

        ${renderSectionHead('Service overview', 'Top-line pressure, flow, acuity, and review burden for the current service state.', vm.sourceLabel)}
        <div class="hah-soft-divider"></div>
        <section class="hah-insight-grid">${mainPanels}</section>

        ${renderSectionHead('Cohort watch', 'Focused groups worth reviewing next, especially before or during boardround.', `${vm.selectedDetail ? vm.selectedDetail.label : vm.presetLabel}`)}
        <div class="hah-soft-divider"></div>
        <section class="hah-insight-row-3">${cohortPanels}</section>

        ${renderSectionHead('Operational balance', 'Who carries the work and which pathway mix is shaping today’s service.', vm.rangeLabel)}
        <section class="hah-insight-row-2">${opsPanels}</section>

        ${renderSectionHead('Board rounds', 'Timing and completion metrics from recent rounds.', '')}
        <div class="hah-soft-divider"></div>
        <section class="hah-card">
          <div class="hah-card-inner">
            ${renderRoundHistoryTable()}
          </div>
        </section>
      </div>
    `;
  }

  function renderRoundHistoryTable() {
    const ops = window.HAHBoard.ops;
    const history = ops && typeof ops.getState === 'function' && ops.getState().roundHistory
      ? ops.getState().roundHistory
      : [];
    if (!history.length) {
      return '<div class="hah-round-history-empty">No board rounds recorded yet. Start a round from a patient page to begin tracking.</div>';
    }
    // Aggregate stats
    const totalRounds = history.length;
    const totalMin = Math.round(history.reduce((a, r) => a + (r.durationMs || 0), 0) / 60000);
    const totalDiscussed = history.reduce((a, r) => a + (r.discussedCount || 0), 0);
    const avgRoundMin = totalRounds ? (totalMin / totalRounds).toFixed(1) : '0';
    const avgPerPtMin = totalDiscussed ? (totalMin / totalDiscussed).toFixed(1) : '0';

    const stats = `
      <div class="hah-round-history-stats">
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${totalRounds}</div><div class="hah-round-history-label">Rounds</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${avgRoundMin}<span class="hah-round-history-unit">min</span></div><div class="hah-round-history-label">Avg round</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${avgPerPtMin}<span class="hah-round-history-unit">min</span></div><div class="hah-round-history-label">Avg / patient</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${totalDiscussed}</div><div class="hah-round-history-label">Total discussed</div></div>
      </div>`;

    const rows = history.slice(0, 30).map((r) => {
      const start = new Date(r.startedAt);
      const dateLabel = start.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const timeLabel = start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const durationMin = r.durationMs ? Math.round(r.durationMs / 60000) : 0;
      const avgPt = r.avgMsPerPatient ? (r.avgMsPerPatient / 60000).toFixed(1) : '—';
      const discussedPct = r.patientCount ? Math.round((r.discussedCount / r.patientCount) * 100) : 0;
      return `<tr class="hah-round-history-row">
        <td class="hah-round-history-cell">
          <div class="hah-round-history-date">${c.escapeHtml(dateLabel)}</div>
          <div class="hah-round-history-time">${c.escapeHtml(timeLabel)}</div>
        </td>
        <td class="hah-round-history-cell hah-round-history-duration">${durationMin} min</td>
        <td class="hah-round-history-cell">${r.discussedCount} / ${r.patientCount || 0}</td>
        <td class="hah-round-history-cell hah-round-history-muted">${r.deferredCount || 0}</td>
        <td class="hah-round-history-cell">${avgPt} min</td>
        <td class="hah-round-history-cell">
          <div class="hah-round-history-bar-track">
            <div class="hah-round-history-bar-fill" style="width:${discussedPct}%"></div>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `
      ${stats}
      <div class="hah-round-history-table-wrap">
        <table class="hah-round-history-table">
          <thead>
            <tr>
              <th class="hah-round-history-th">When</th>
              <th class="hah-round-history-th">Duration</th>
              <th class="hah-round-history-th">Discussed</th>
              <th class="hah-round-history-th">Deferred</th>
              <th class="hah-round-history-th">Avg / pt</th>
              <th class="hah-round-history-th">Completion</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderRightPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const detail = vm.selectedDetail;
    if (!detail) {
      return c.stack([
        c.card('Selected cohort drill-in', c.emptyState('No cohort selected', 'Pick a metric or panel to see the linked patients and next actions.'))
      ]);
    }

    return c.stack([
      c.card(detail.label, `
        <div class="hah-task-briefing">${c.escapeHtml(detail.summary)}</div>
        <div class="hah-insight-right-kv">
          ${c.keyValueGrid([
            { label: 'Linked patients', value: String(detail.count) },
            { label: 'Lens', value: detail.subtitle || vm.presetLabel },
            { label: 'Board jump', value: detail.boardPreset || 'all-active' },
            { label: 'Tasks jump', value: detail.tasksPreset || 'all-open' }
          ])}
        </div>
        <div class="hah-insight-detail-block">
          <div class="hah-insight-detail-label">At a glance</div>
          <div class="hah-insight-chip-wrap">
            ${c.badge(`${detail.count} patients`, detail.count ? 'neutral' : 'good')}
            ${detail.tag ? c.badge(detail.tag, 'neutral') : ''}
            ${c.badge(vm.rangeLabel, 'neutral')}
          </div>
        </div>
      `, { subtitle: detail.subtitle || vm.presetLabel }),
      c.card('What it means', `
        <div class="hah-task-note">${c.escapeHtml(detail.explanation)}</div>
      `),
      c.card('Patient preview', renderPatientPreview(detail.patients), {
        subtitle: detail.patients.length ? `${detail.patients.length} linked patient${detail.patients.length === 1 ? '' : 's'}` : 'No linked patients'
      }),
      c.card('Suggested actions', `
        <div class="hah-insight-actions">
          ${insightPill('Open on Board', 'open-board-for-detail')}
          ${insightPill('Open in Tasks', 'open-tasks-for-detail')}
          ${detail.patients[0] ? insightPill('Open first patient', 'open-detail-patient', `data-patient-id="${c.escapeHtml(detail.patients[0].id)}"`) : ''}
        </div>
      `)
    ]);
  }

  function renderMetricCard(vm, metric) {
    return `
      <button type="button" class="hah-insight-metric${vm.selectedKey === metric.key ? ' is-active' : ''}" data-insight-action="select-detail" data-detail-key="${c.escapeHtml(metric.key)}">
        <div class="hah-insight-kicker">${c.escapeHtml(metric.label)}</div>
        <div class="hah-insight-value">${c.escapeHtml(metric.value)}</div>
        <div class="hah-insight-sub">${c.escapeHtml(metric.subtext || '')}</div>
      </button>
    `;
  }

  function renderPresetCard(key, title, subtext, active) {
    return `
      <button type="button" class="hah-insight-preset-card${active ? ' is-active' : ''}" data-insight-action="set-preset" data-preset-key="${c.escapeHtml(key)}">
        <div class="hah-insight-preset-title">${c.escapeHtml(title)}</div>
        <div class="hah-insight-preset-sub">${c.escapeHtml(subtext)}</div>
      </button>
    `;
  }

  function renderInsightPanel(panel) {
    const body = panel.type === 'stats'
      ? renderStatStrip(panel.items)
      : panel.type === 'bars'
        ? renderBars(panel.items)
        : renderMiniList(panel.items);

    return `
      <button type="button" class="hah-insight-card${panel.active ? ' is-active' : ''}" data-insight-action="select-detail" data-detail-key="${c.escapeHtml(panel.key)}">
        <div class="hah-insight-panel-head">
          <div>
            <div class="hah-insight-panel-title">${c.escapeHtml(panel.title)}</div>
            <div class="hah-insight-panel-sub">${c.escapeHtml(panel.subtitle || '')}</div>
          </div>
          ${panel.badge ? c.badge(panel.badge, 'neutral') : ''}
        </div>
        ${body}
        <div class="hah-insight-panel-foot">Click to drill into this cohort</div>
      </button>
    `;
  }

  function renderStatStrip(items) {
    return `<div class="hah-insight-stat-strip">${items.map((item) => `
      <div class="hah-insight-stat">
        <div class="hah-insight-stat-label">${c.escapeHtml(item.label)}</div>
        <div class="hah-insight-stat-value">${c.escapeHtml(item.value)}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderBars(items) {
    const max = Math.max(1, ...items.map((item) => Number(item.value) || 0));
    return `<div class="hah-insight-bars">${items.map((item) => `
      <div class="hah-insight-bar">
        <div class="hah-insight-bar-main">
          <div class="hah-insight-bar-label">${c.escapeHtml(item.label)}</div>
          <div class="hah-insight-bar-track"><div class="hah-insight-bar-fill" style="width:${Math.max(8, Math.round(((Number(item.value) || 0) / max) * 100))}%"></div></div>
          <div class="hah-insight-bar-sub">${c.escapeHtml(item.subtext || '')}</div>
        </div>
        <div class="hah-insight-bar-value">${c.escapeHtml(item.value)}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderMiniList(items) {
    return `<div class="hah-insight-mini-list">${items.map((item) => `
      <div class="hah-insight-mini-item">
        <div class="hah-insight-mini-title">${c.escapeHtml(item.title)}</div>
        <div class="hah-insight-mini-sub">${c.escapeHtml(item.subtext || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderPatientPreview(patients) {
    if (!patients.length) return '<div class="hah-task-note">No patients linked to this insight.</div>';
    return `<div class="hah-insight-preview-list">${patients.map((patient, index) => `
      <button type="button" class="hah-insight-preview-item${index === 0 ? ' is-leading' : ''}" data-insight-action="open-detail-patient" data-patient-id="${c.escapeHtml(patient.id)}">
        <div class="hah-insight-preview-head">
          <div class="hah-insight-preview-meta">
            <div class="hah-insight-preview-title">${c.escapeHtml(patient.name)}</div>
            <div class="hah-insight-preview-sub">${c.escapeHtml([patient.currentStatus, patient.location, patient.bloodTrendSummary].filter(Boolean).join(' · '))}</div>
          </div>
          ${priorityBadge(patient.priority)}
        </div>
        <div class="hah-insight-preview-chips">
          ${c.badge(patient.currentStatus, 'neutral')}
          ${patient.dischargeReadiness ? c.badge(patient.dischargeReadiness, 'neutral') : ''}
          ${patient.oxygenLpm > 0 ? c.badge(`O2 ${patient.oxygenLpm}L`, 'neutral') : ''}
          ${patient.iv ? c.badge('IV', 'neutral') : ''}
          ${patient.dnar ? c.badge('DNAR', 'danger') : ''}
        </div>
      </button>
    `).join('')}</div>`;
  }

  function renderSectionHead(title, subtitle, note) {
    return `
      <div class="hah-insight-section-head">
        <div>
          <div class="hah-insight-section-title">${c.escapeHtml(title)}</div>
          <div class="hah-insight-section-sub">${c.escapeHtml(subtitle)}</div>
        </div>
        <div class="hah-insight-surface-note">${c.escapeHtml(note)}</div>
      </div>
    `;
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority || 'Priority', tone);
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-insight-action]');
    if (!target) return false;
    const action = target.getAttribute('data-insight-action');
    const vm = d.buildInsightsViewModel(state);

    if (action === 'set-preset') {
      const presetKey = target.getAttribute('data-preset-key') || 'service-overview';
      store.setState({ insights: { preset: presetKey }, selectedInsightKey: null });
      return true;
    }

    if (action === 'set-range') {
      const rangeKey = target.getAttribute('data-range-key') || '7d';
      store.setState({ insights: { range: rangeKey }, selectedInsightKey: null });
      return true;
    }

    if (action === 'select-detail') {
      const detailKey = target.getAttribute('data-detail-key');
      if (!detailKey) return false;
      store.setState({ selectedInsightKey: detailKey });
      return true;
    }

    if (action === 'open-board-for-detail' && vm.selectedDetail) {
      router.goToBoard(vm.selectedDetail.boardPreset || 'all-active');
      return true;
    }

    if (action === 'open-tasks-for-detail' && vm.selectedDetail) {
      router.goToTasks(vm.selectedDetail.tasksPreset || 'all-open');
      return true;
    }

    if (action === 'open-detail-patient') {
      const patientId = target.getAttribute('data-patient-id');
      if (!patientId) return false;
      store.setState({ selectedPatientId: patientId });
      router.goToPatient(patientId);
      return true;
    }

    return false;
  }

  function insightPill(label, action, attrs, active) {
    return `<button type="button" class="hah-inline-pill${active ? ' is-active' : ''}" data-insight-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  window.HAHBoard.insightsScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>
  <script>
/* inlined: js/33-desktop-discharge-letter.js */
// 33-desktop-discharge-letter.js
//
// Discharge letter feature, v0.8.149 (Build A — schema + card + editor +
// docx/pdf export, no AI integration). Build B will populate the body
// via Anthropic API; the renderer surfaces here are stable across both.
//
// Architecture:
//   - Schema: new patient field at `operational.dischargeLetter`. See
//     JSON_SCHEMA.md for canonical shape.
//   - State machine: 4 card states derived from patient discharge readiness
//     and letter status. See getCardState().
//   - Letter spec: the single source of truth for layout. Rendered into
//     either DOCX (via docx-js) or PDF (via pdfmake). Build B will populate
//     spec.body via AI; everything else stays hard-coded for the trial.
//   - Right-pane takeover: when state.patient.dischargeLetterMode is true,
//     26-desktop-patient.js delegates renderRightPane to renderLetterPane()
//     here. The composer state for that patient is preserved (not cleared)
//     so closing letter mode restores whatever composer was active.
//
// Module exports via window.HAHBoard.dischargeLetter for cross-module use
// and via module.exports when run under Node.js (for tests).

(function () {
  'use strict';

  // ─── Schema constants ──────────────────────────────────────────────────

  const STATUS_DRAFT = 'draft';
  const STATUS_SENT  = 'sent';
