  <style>
/* inlined: css/desktop-shell.css */
:root {
  --desk-header-h: 72px;
  --desk-nav-w: 56px;
  --desk-left-w: 292px;
  --desk-right-w: 680px;

  --desk-bg: #f4f7fb;
  --desk-panel: rgba(255, 255, 255, 0.88);
  --desk-panel-strong: #ffffff;
  --desk-border: rgba(25, 45, 72, 0.08);
  --desk-shadow: 0 8px 30px rgba(17, 37, 63, 0.06);

  --desk-text: #122033;
  --desk-text-muted: #617188;
  --desk-accent: #2f6fed;

  --desk-radius-xl: 20px;
  --desk-radius-lg: 14px;
  --desk-radius-sm: 12px;

  --desk-gap-1: 8px;
  --desk-gap-2: 12px;
  --desk-gap-3: 16px;
  --desk-gap-4: 20px;
  --desk-gap-5: 24px;
  --desk-gap-6: 32px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--desk-bg);
  color: var(--desk-text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.hah-desktop-body { min-width: 1440px; }

.hah-desktop-app {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: grid;
  grid-template-columns: var(--desk-nav-w) var(--desk-left-w) 6px minmax(0, 1fr) 6px var(--desk-right-w);
  grid-template-rows: var(--desk-header-h) minmax(0, 1fr);
  grid-template-areas:
    "header header header header header header"
    "nav left handle-l main handle-r right";
}

.hah-header {
  grid-area: header;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--desk-gap-4);
  padding: 0 var(--desk-gap-5);
  background: #0a84ff;
  border-bottom: 1px solid rgba(10, 90, 180, 0.3);
  z-index: 20;
  color: #fff;
}

.hah-header .hah-brand {
  color: #fff;
}

.hah-header .hah-brand-kicker {
  color: rgba(255, 255, 255, 0.78);
}

.hah-header .hah-search {
  width: 420px;
  max-width: 100%;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  background: rgba(255, 255, 255, 0.15);
  padding: 0 14px;
  font-size: 14px;
  outline: none;
  color: #fff;
}

.hah-header .hah-search::placeholder {
  color: rgba(255, 255, 255, 0.7);
}

.hah-header .hah-search:focus {
  border-color: rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.22);
  box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.15);
}

.hah-header .hah-pill-btn,
.hah-header .hah-icon-btn {
  border: 1px solid rgba(255, 255, 255, 0.22);
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
}

.hah-header .hah-pill-btn:hover,
.hah-header .hah-icon-btn:hover {
  background: rgba(255, 255, 255, 0.22);
  border-color: rgba(255, 255, 255, 0.35);
}

.hah-header .hah-pill-btn.is-status {
  background: rgba(255, 255, 255, 0.18);
  border-color: rgba(255, 255, 255, 0.28);
}

.hah-header .hah-pill-btn.is-active {
  background: rgba(255, 255, 255, 0.28);
  border-color: rgba(255, 255, 255, 0.4);
}

.hah-nav {
  grid-area: nav;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 0;
  border-right: 1px solid var(--desk-border);
  background: rgba(244, 247, 251, 0.72);
}

.hah-left-pane,
.hah-main-pane,
.hah-right-pane {
  min-width: 0;
  min-height: 0;
  overflow: auto;
  padding: var(--desk-gap-4);
}

.hah-left-pane {
  grid-area: left;
}

.hah-main-pane { grid-area: main; }

.hah-right-pane {
  grid-area: right;
  background: rgba(244, 247, 251, 0.66);
}

.hah-resize-handle {
  min-height: 0;
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background 120ms ease;
  z-index: 20;
}

.hah-resize-handle[data-resize="left"]  { grid-area: handle-l; }
.hah-resize-handle[data-resize="right"] { grid-area: handle-r; }

.hah-resize-handle::after {
  content: '';
  width: 2px;
  height: 40%;
  min-height: 40px;
  border-radius: 2px;
  background: var(--desk-border);
  transition: background 120ms ease, height 120ms ease;
}

.hah-resize-handle:hover::after,
.hah-resize-handle.is-dragging::after {
  background: rgba(47, 111, 237, 0.4);
  height: 60%;
}

.hah-header-group {
  display: flex;
  align-items: center;
  gap: var(--desk-gap-3);
  min-width: 0;
}

.hah-brand-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hah-brand {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.hah-brand-kicker {
  font-size: 12px;
  color: var(--desk-text-muted);
  line-height: 1.2;
}

.hah-search {
  width: 420px;
  max-width: 100%;
  height: 44px;
  border-radius: 14px;
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.8);
  padding: 0 14px;
  font-size: 14px;
  outline: none;
}

.hah-search:focus {
  border-color: rgba(47, 111, 237, 0.35);
  box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.08);
}

.hah-icon-btn,
.hah-pill-btn {
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.82);
  color: var(--desk-text);
  transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
}

.hah-icon-btn:hover,
.hah-pill-btn:hover {
  background: rgba(255,255,255,1);
  border-color: rgba(25,45,72,0.14);
}

.hah-icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 14px;
  cursor: pointer;
}

.hah-pill-btn {
  height: 40px;
  padding: 0 14px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.hah-pill-btn.is-status {
  background: rgba(42, 128, 84, 0.08);
  border-color: rgba(42, 128, 84, 0.16);
}

.hah-pill-btn.is-active {
  background: rgba(47, 111, 237, 0.12);
  border-color: rgba(47, 111, 237, 0.18);
}

.hah-nav-btn {
  position: relative;
  width: 40px;
  height: 40px;
  padding: 0;
  border: none;
  background: transparent;
  color: var(--desk-text-muted);
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 120ms ease, color 120ms ease;
}

.hah-nav-btn:hover {
  background: rgba(25,45,72,0.06);
  color: var(--desk-text);
}

.hah-nav-btn.is-active {
  background: rgba(47, 111, 237, 0.1);
  color: rgba(47, 111, 237, 0.95);
}

.hah-nav-btn.is-active::before {
  content: '';
  position: absolute;
  left: -8px;
  top: 8px;
  bottom: 8px;
  width: 3px;
  border-radius: 0 3px 3px 0;
  background: rgba(47, 111, 237, 0.95);
}

.hah-nav-svg {
  width: 22px;
  height: 22px;
  display: block;
}

.hah-card {
  background: var(--desk-panel);
  border: 1px solid var(--desk-border);
  border-radius: var(--desk-radius-xl);
  box-shadow: var(--desk-shadow);
}

.hah-card-inner { padding: 20px 24px; }

.hah-card-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.hah-muted { color: var(--desk-text-muted); }

.hah-stack {
  display: flex;
  flex-direction: column;
  gap: var(--desk-gap-4);
}

.hah-surface-placeholder {
  min-height: calc(100dvh - var(--desk-header-h) - 40px);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.hah-surface-hero { padding: 24px; }

.hah-surface-title {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.03em;
  margin: 0 0 8px;
}

.hah-surface-subtitle {
  font-size: 14px;
  color: var(--desk-text-muted);
  margin: 0;
}

@media (max-width: 2560px) {
  :root {
    --desk-left-w: 264px;
    --desk-right-w: 600px;
  }
}

@media (max-width: 1920px) {
  :root {
    --desk-left-w: 244px;
    --desk-right-w: 500px;
  }
}


.hah-header {
  box-shadow: 0 10px 24px rgba(17, 37, 63, 0.03);
}

.hah-left-pane,
.hah-right-pane {
  background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0));
}

.hah-left-pane::-webkit-scrollbar,
.hah-main-pane::-webkit-scrollbar,
.hah-right-pane::-webkit-scrollbar {
  width: 10px;
  height: 10px;
}

.hah-left-pane::-webkit-scrollbar-thumb,
.hah-main-pane::-webkit-scrollbar-thumb,
.hah-right-pane::-webkit-scrollbar-thumb {
  background: rgba(25,45,72,0.12);
  border-radius: 999px;
  border: 2px solid transparent;
  background-clip: padding-box;
}

.hah-left-pane::-webkit-scrollbar-track,
.hah-main-pane::-webkit-scrollbar-track,
.hah-right-pane::-webkit-scrollbar-track {
  background: transparent;
}

.hah-card {
  backdrop-filter: blur(10px);
}

.hah-card--quiet {
  background: rgba(255,255,255,0.74);
}

.hah-pane-section-label {
  margin: 0 0 12px;
  font-size: 11.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--desk-text-muted);
}

.hah-section-note {
  display: inline-flex;
  align-items: center;
  min-height: 30px;
  padding: 0 12px;
  border-radius: 999px;
  border: 1px solid rgba(25,45,72,0.08);
  background: rgba(255,255,255,0.72);
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text-muted);
  white-space: nowrap;
}

.hah-soft-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(25,45,72,0), rgba(25,45,72,0.08), rgba(25,45,72,0));
}

.hah-settings-surface {
  gap: 18px;
}

.hah-settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.hah-settings-stat {
  border: 1px solid rgba(25,45,72,0.06);
  border-radius: 14px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.66);
}

.hah-settings-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hah-settings-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.hah-settings-list-item {
  border: 1px solid rgba(25,45,72,0.06);
  border-radius: 14px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.66);
}

.hah-settings-list-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.25;
}

.hah-settings-list-sub {
  margin-top: 4px;
  font-size: 12.5px;
  color: var(--desk-text-muted);
  line-height: 1.35;
}


.hah-desktop-app.is-resizing-panes,
.hah-desktop-app.is-resizing-panes * {
  transition: none !important;
}

</style>
  <style>
/* inlined: css/desktop-board.css */
.hah-board-surface {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: calc(100dvh - var(--desk-header-h) - 40px);
}

.hah-board-metrics {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 16px;
}

.hah-metric-card {
  border: 1px solid var(--desk-border);
  border-radius: 20px;
  background: rgba(255,255,255,0.94);
  box-shadow: var(--desk-shadow);
  padding: 16px 18px 15px;
  text-align: left;
  cursor: pointer;
  transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
}

.hah-metric-card:hover {
  transform: translateY(-1px);
  border-color: rgba(25,45,72,0.14);
  background: rgba(255,255,255,1);
}

.hah-metric-card.is-danger { border-color: rgba(193, 59, 59, 0.18); }
.hah-metric-card.is-warn { border-color: rgba(187, 121, 12, 0.18); }
.hah-metric-card.is-good { border-color: rgba(42, 128, 84, 0.18); }

.hah-metric-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.hah-metric-value {
  margin-top: 8px;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: -0.04em;
}

.hah-metric-sub {
  margin-top: 6px;
  font-size: 12.5px;
  color: var(--desk-text-muted);
  line-height: 1.35;
}

.hah-board-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 14px;
}

.hah-board-toolbar-group {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.hah-board-toolbar-copy {
  min-width: 0;
}

.hah-board-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.025em;
}

.hah-board-sub {
  font-size: 13px;
  color: var(--desk-text-muted);
  line-height: 1.4;
}

.hah-inline-pill {
  height: 34px;
  padding: 0 12px;
  border-radius: 12px;
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.84);
  cursor: pointer;
}

.hah-inline-pill.is-active {
  background: rgba(47, 111, 237, 0.11);
  border-color: rgba(47, 111, 237, 0.18);
}

.hah-section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}

.hah-card-subtitle {
  margin-top: 4px;
  font-size: 13px;
  color: var(--desk-text-muted);
}

.hah-table-wrap { overflow: auto; }

.hah-board-table-wrap {
  max-height: calc(100dvh - 320px);
}

.hah-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  table-layout: fixed;
}

.hah-table thead th {
  position: sticky;
  top: 0;
  z-index: 1;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  padding: 0 14px 12px;
  background: rgba(255,255,255,0.94);
}

.hah-table tbody tr {
  height: 72px;
  cursor: pointer;
  transition: background 160ms ease, box-shadow 160ms ease;
}

.hah-table tbody tr:hover { background: rgba(47, 111, 237, 0.04); }
.hah-table tbody tr.is-selected {
  background: rgba(47, 111, 237, 0.08);
  box-shadow: inset 3px 0 0 rgba(47, 111, 237, 0.55);
}

.hah-table tbody td {
  padding: 12px 14px;
  border-top: 1px solid rgba(25,45,72,0.055);
  vertical-align: middle;
}

.hah-row-main {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.3;
}

.hah-row-sub {
  margin-top: 4px;
  font-size: 12px;
  color: var(--desk-text-muted);
  line-height: 1.35;
}

.hah-clamp-2 {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hah-badge {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 10px;
  border-radius: 12px;
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.86);
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.hah-badge.is-danger {
  background: rgba(193, 59, 59, 0.08);
  border-color: rgba(193, 59, 59, 0.18);
}

.hah-badge.is-warn {
  background: rgba(187, 121, 12, 0.08);
  border-color: rgba(187, 121, 12, 0.18);
}

.hah-badge.is-good {
  background: rgba(42, 128, 84, 0.08);
  border-color: rgba(42, 128, 84, 0.18);
}

.hah-badge.is-neutral {
  background: rgba(47, 111, 237, 0.08);
  border-color: rgba(47, 111, 237, 0.16);
}

.hah-board-flags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.hah-kv-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.hah-kv-item {
  border: 1px solid rgba(25,45,72,0.06);
  border-radius: 14px;
  padding: 12px;
  background: rgba(255,255,255,0.62);
}

.hah-kv-label {
  font-size: 12px;
  color: var(--desk-text-muted);
  margin-bottom: 6px;
}

.hah-kv-value {
  font-size: 13.5px;
  font-weight: 600;
  line-height: 1.35;
}

.hah-board-right-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.hah-empty-state {
  padding: 28px;
  text-align: center;
  color: var(--desk-text-muted);
}

.hah-empty-title {
  font-size: 16px;

  border-radius: 20px;
  border: 1px solid var(--desk-border);
  background: transparent;
  font-size: 12px;
  font-weight: 500;
  color: var(--desk-text-muted);
  cursor: pointer;
  transition: all 140ms ease;
}

.hah-composer-tab:hover {
  border-color: rgba(25,45,72,0.2);
  color: var(--desk-text);
}

.hah-composer-tab.is-active {
  background: rgba(47,111,237,0.09);
  color: rgba(47,111,237,0.9);
  border-color: rgba(47,111,237,0.25);
}

.hah-composer-tab.type-micro-mdm.is-active {
  background: rgba(29,158,117,0.08);
  color: #085041;
  border-color: rgba(29,158,117,0.28);
}

.hah-composer-tab.type-resp-mdm.is-active {
  background: rgba(127,119,221,0.1);
  color: #3C3489;
  border-color: rgba(127,119,221,0.28);
}

.hah-composer-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 12px;
}

.hah-cform-field {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hah-cform-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--desk-text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.hah-pull-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 20px;
  background: rgba(180,83,9,0.1);
  color: #b45309;
  border: 1px solid rgba(180,83,9,0.2);
  font-weight: 500;
}

.hah-cform-textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--desk-border);
  border-radius: 10px;
  font-size: 12.5px;
  font-family: inherit;
  color: var(--desk-text);
  background: rgba(255,255,255,0.9);
  resize: vertical;
  line-height: 1.5;
  transition: border-color 160ms ease, box-shadow 160ms ease;
}

.hah-cform-textarea:focus {
  outline: none;
  border-color: rgba(47,111,237,0.4);
  box-shadow: 0 0 0 3px rgba(47,111,237,0.08);
}

.hah-cform-textarea.is-pulled {
  background: rgba(180,83,9,0.03);
  border-color: rgba(180,83,9,0.18);
}

.hah-plan-presets {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 2px;
}

.hah-plan-presets-label {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--desk-text-muted);
}

.hah-plan-presets-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.hah-plan-preset-chip {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.78);
  font-size: 11px;
  font-weight: 600;
  color: var(--desk-text-muted);
  cursor: pointer;
  transition: all 140ms ease;
}

.hah-plan-preset-chip:hover {
  border-color: rgba(25,45,72,0.2);
  color: var(--desk-text);
}

.hah-plan-preset-chip.is-locked,
.hah-plan-preset-chip:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.hah-cform-textarea.hah-preset-flash {
  border-color: rgba(47,111,237,0.35);
  box-shadow: 0 0 0 4px rgba(47,111,237,0.08);
}

.hah-composer-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 2px;
}

.hah-inline-pill.is-primary {
  background: rgba(47,111,237,0.1);
  color: rgba(47,111,237,0.9);
  border-color: rgba(47,111,237,0.25);
}

.hah-inline-pill.is-primary:hover {
  background: rgba(47,111,237,0.16);
}

/* ─── Jump list ──────────────────────────────────────────────────────── */

.hah-jump-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hah-jump-btn {
  width: 100%;
  text-align: left;
  border: 1px solid var(--desk-border);
  background: rgba(255,255,255,0.72);
  border-radius: 12px;
  padding: 9px 10px;
  cursor: pointer;
  transition: background 140ms ease, border-color 140ms ease;
}

.hah-jump-btn:hover {
  background: rgba(255,255,255,1);
  border-color: rgba(25,45,72,0.14);
}

.hah-jump-btn.is-active {
  background: rgba(47,111,237,0.08);
  border-color: rgba(47,111,237,0.18);
}

.hah-jump-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.hah-jump-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--desk-text);
}

.hah-jump-sub {
  margin-top: 4px;
  font-size: 11px;
  color: var(--desk-text-muted);
}

.hah-jump-head .hah-badge {
  flex-shrink: 0;
}

/* ─── Empty / placeholder ────────────────────────────────────────────── */

.hah-surface-placeholder {
  padding: 40px 20px;
}

.hah-surface-hero {
  max-width: 500px;
  margin: 0 auto;
}

.hah-surface-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
}

.hah-surface-subtitle {
  font-size: 14px;
  color: var(--desk-text-muted);
}

/* ─── Composer footer + autosave ─────────────────────────────────────── */


/* ─── Composer footer + autosave ─────────────────────────────────────── */


/* ─── Composer footer + autosave ─────────────────────────────────────── */

.hah-composer-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
  padding-top: 6px;
  padding-bottom: 2px;
}

.hah-autosave-indicator {
  font-size: 11px;
  color: var(--desk-text-muted);
  margin-right: auto;
  opacity: 0;
  transition: opacity 300ms ease;
}

.hah-autosave-indicator.is-visible {
  opacity: 1;
}

/* ─── Composer / preview separator ──────────────────────────────────── */

.hah-composer-sep {
  height: 1px;
  background: var(--desk-border);
  margin: 14px 0 12px;
}

/* ─── Note preview box ───────────────────────────────────────────────── */

.hah-note-preview {
  border: 1px solid var(--desk-border);
  border-radius: 14px;
  overflow: hidden;
}

.hah-note-preview-head {
  justify-content: space-between;
  background: rgba(0,0,0,0.04);
  border-bottom-color: rgba(0,0,0,0.08);
}

.hah-note-preview-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--desk-text-muted);
}

.hah-note-copy-btn {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 9px;
  border-radius: 20px;
  border: 1px solid var(--desk-border);
  background: transparent;
  color: var(--desk-text-muted);
  cursor: pointer;
  transition: all 120ms ease;
}

.hah-note-copy-btn:hover {
  background: rgba(47,111,237,0.07);
  color: rgba(47,111,237,0.9);
  border-color: rgba(47,111,237,0.2);
}

.hah-note-preview-text {
  margin: 0;
  padding: 10px 12px 12px;
  font-size: 11.5px;
  font-family: ui-monospace, 'Cascadia Code', 'Fira Mono', monospace;
  line-height: 1.65;
  color: var(--desk-text);
  white-space: pre-wrap;
  word-break: break-word;
}

.hah-note-preview-footer {
  padding: 0;
}

/* ─── Send to EMIS ───────────────────────────────────────────────────── */

.hah-emis-btn {
  display: block;
  width: 100%;
  padding: 11px 16px;
  border-radius: 0 0 13px 13px;
  border: none;
  border-top: 1px solid rgba(47,111,237,0.18);
  background: rgba(47,111,237,0.1);
  color: rgba(47,111,237,0.9);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: background 140ms ease;
}

.hah-emis-btn:hover {
  background: rgba(47,111,237,0.17);
}

.hah-emis-btn:active {
  background: rgba(47,111,237,0.24);
}

.hah-emis-btn.is-disabled {
  opacity: 0.35;
  cursor: not-allowed;
  filter: grayscale(0.3);
}

/* ─── Discharge date row ─────────────────────────────────────────────── */

.hah-discharge-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hah-dchip {
  height: 30px;
  padding: 0 11px;
  border-radius: 20px;
  border: 1px solid rgba(25,45,72,0.14);
  background: rgba(255,255,255,0.85);
  font-size: 11px;
  font-weight: 500;
  color: var(--desk-text-muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 120ms ease;
}

.hah-dchip:hover {
  border-color: rgba(47,111,237,0.3);
  color: rgba(47,111,237,0.9);
  background: rgba(47,111,237,0.06);
}

.hah-dchip-ready:hover,
.hah-dchip-ready.is-active {
  background: rgba(22,163,74,0.1);
  color: #15803d;
  border-color: rgba(22,163,74,0.32);
}

.hah-dchip-ready.is-active {
  font-weight: 600;
}

.hah-dchip.is-locked {
  opacity: 0.42;
  cursor: default;
  pointer-events: none;
}

/* ─── Date input ─────────────────────────────────────────────────────── */

.hah-date-input {
  flex: 1;
  height: 30px;
  padding: 0 9px;
  border: 1px solid var(--desk-border);
  border-radius: 20px;
  font-size: 11.5px;
  font-family: inherit;
  color: var(--desk-text);
  background: #fff;
  cursor: pointer;
  min-width: 0;
  transition: none;
}

.hah-date-input:focus {
  outline: none;
}

.hah-date-input::-webkit-calendar-picker-indicator {
  opacity: 0.55;
  cursor: pointer;
}

.hah-date-input.is-locked {
  opacity: 0.42;
  cursor: default;
}

/* ─── Auto-expand textareas ──────────────────────────────────────────── */

.hah-cform-textarea.hah-autoexpand {
  resize: none;
  overflow: hidden;
  min-height: 52px;
  transition: border-color 160ms ease, background 280ms ease;
}

.hah-cform-textarea.is-pulled {
  background: rgba(180,83,9,0.04);
  border-color: rgba(180,83,9,0.2);
}

.hah-cform-textarea.is-locked {
  background: rgba(0,0,0,0.015) !important;
  color: var(--desk-text-muted);
  border-color: var(--desk-border);
  cursor: default;
}

/* ─── Toast notification ─────────────────────────────────────────────── */

.hah-card { position: relative; }

.hah-composer-toast {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--desk-text);
  color: rgba(255,255,255,0.95);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 20px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  z-index: 50;
  transition: opacity 180ms ease, transform 180ms ease;
}

.hah-composer-toast.is-visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── Discharge button ───────────────────────────────────────────────── */

.hah-discharge-btn {
  display: block;
  width: 100%;
  padding: 11px 16px;
  border-radius: 12px;
  border: 1px solid rgba(220, 38, 38, 0.35);
  background: rgba(220, 38, 38, 0.08);
  color: #b91c1c;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: background 140ms ease, border-color 140ms ease;
}

.hah-discharge-btn:hover {
  background: rgba(220, 38, 38, 0.15);
  border-color: rgba(220, 38, 38, 0.5);
}

.hah-discharge-btn:active {
  background: rgba(220, 38, 38, 0.22);
  transform: scale(0.997);
}

/* ─── Discharged list row (settings) ─────────────────────────────────── */

.hah-discharged-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

/* ─── MDM widget head ────────────────────────────────────────────────── */

.hah-mdm-widget .hah-mdm-head {
  background: rgba(0,0,0,0.04);
  border-bottom-color: rgba(0,0,0,0.08);
}

.hah-mdm-widget[data-mdm-type="micro_mdm"] .hah-mdm-head {
  background: rgba(29, 158, 117, 0.08);
  border-bottom-color: rgba(29, 158, 117, 0.22);
}

.hah-mdm-widget[data-mdm-type="resp_mdm"] .hah-mdm-head {
  background: rgba(127, 119, 221, 0.1);
  border-bottom-color: rgba(127, 119, 221, 0.24);
}

.hah-mdm-chevron-sm {
  display: inline-block;
  font-size: 9px;
  margin-right: 4px;
  transition: transform 180ms ease;
}

.hah-mdm-chevron-sm.is-open {
  transform: rotate(90deg);
}

.hah-mdm-earlier {
  border-top: 1px dashed var(--desk-border);
  background: rgba(0,0,0,0.012);
}

.hah-mdm-earlier-toggle {
  width: 100%;
  padding: 7px 12px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--desk-text-muted);
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.02em;
  transition: color 120ms ease;
}

.hah-mdm-earlier-toggle:hover {
  color: rgba(47,111,237,0.9);
}

.hah-mdm-earlier-list {
  padding: 0 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-top: 1px solid var(--desk-border);
  padding-top: 10px;
}

.hah-mdm-entry.is-earlier {
  opacity: 0.82;
}

.hah-mdm-entry.is-earlier .hah-mdm-field-body {
  color: var(--desk-text-muted);
}


/* ─── Patient compact / narrow mode ─────────────────────────────────── */

.hah-desktop-app.hah-patient-compact {
  --desk-nav-w: 0px;
}

.hah-desktop-app.hah-patient-compact .hah-nav {
  position: static;
  margin: 0 12px 12px;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 8px;
  border-right: none;
  background: rgba(255,255,255,0.95);
  border: 1px solid rgba(25,45,72,0.08);
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(17,37,63,0.1);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  z-index: 26;
  flex-shrink: 0;
  grid-area: unset;
}

/* Accent bar flips from left edge (column nav) to bottom edge (row nav) */
.hah-desktop-app.hah-patient-compact .hah-nav-btn.is-active::before {
  left: 8px;
  right: 8px;
  top: auto;
  bottom: -6px;
  width: auto;
  height: 3px;
  border-radius: 3px 3px 0 0;
}

.hah-desktop-app.hah-patient-compact .hah-nav-btn {
  width: 40px;
  height: 40px;
  border-radius: 10px;
}

.hah-desktop-app.hah-patient-compact .hah-left-pane {
  padding: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.hah-desktop-app.hah-patient-compact .hah-left-pane > .hah-stack {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  padding: 14px 12px 14px;
}

.hah-desktop-app.hah-patient-compact .hah-left-pane .hah-card-inner {
  padding: 16px 16px;
}

.hah-desktop-app.hah-patient-compact .hah-round-actions {
  gap: 5px;
  margin-bottom: 8px;
}

.hah-desktop-app.hah-patient-compact .hah-round-btn {
  padding: 7px 5px;
  font-size: 11px;
}

.hah-desktop-app.hah-patient-compact .hah-round-secondary .hah-inline-pill {
  height: 34px;
  font-size: 11.5px;
}

.hah-desktop-app.hah-patient-compact .hah-jump-list {
  gap: 6px;
}

.hah-desktop-app.hah-patient-compact .hah-jump-btn {
  padding: 8px 10px;
}

.hah-desktop-app.hah-patient-compact .hah-jump-name {
  font-size: 12.5px;
}

.hah-desktop-app.hah-patient-compact .hah-jump-sub {
  margin-top: 3px;
  font-size: 10.5px;
}

.hah-desktop-app.hah-patient-compact .hah-jump-head .hah-badge {
  width: 10px;
  min-width: 10px;
  height: 10px;
  padding: 0;
  border-radius: 999px;
  font-size: 0;
  line-height: 0;
  overflow: hidden;
}

.hah-desktop-app.hah-patient-compact .hah-jump-head .hah-badge.is-danger {
  background: rgba(193, 59, 59, 0.85);
  border-color: rgba(193, 59, 59, 0.9);
}

.hah-desktop-app.hah-patient-compact .hah-jump-head .hah-badge.is-warn {
  background: rgba(187, 121, 12, 0.82);
  border-color: rgba(187, 121, 12, 0.88);
}

.hah-desktop-app.hah-patient-compact .hah-jump-head .hah-badge.is-neutral {
  background: rgba(47, 111, 237, 0.78);
  border-color: rgba(47, 111, 237, 0.84);
}

.hah-desktop-app.hah-patient-compact .hah-jump-head .hah-badge.is-good {
  background: rgba(42, 128, 84, 0.78);
  border-color: rgba(42, 128, 84, 0.84);
}

.hah-pt-cols.is-narrow {
  grid-template-columns: 1fr;
}

.hah-pt-cols.is-narrow .hah-mdm-pair-grid {
  grid-template-columns: 1fr;
}

.hah-pt-centre-split.is-narrow .hah-mdm-body,
.hah-pt-centre-split.is-narrow .hah-ref-body {
  padding: 9px 10px;
}

.hah-pt-centre-split.is-narrow .hah-mdm-head,
.hah-pt-centre-split.is-narrow .hah-ref-head {
  padding: 8px 10px;
}

.hah-pt-log-col.is-narrow .hah-log-entry-grid {
  grid-template-columns: 1fr !important;
  gap: 12px;
}

.hah-pt-log-col.is-narrow .hah-log-field {
  gap: 4px;
}

.hah-pt-log-col.is-narrow .hah-log-field + .hah-log-field {
  padding-top: 8px;
}

.hah-pt-log-col.is-narrow .hah-log-entry {
  gap: 12px;
}

.hah-pt-log-col.is-narrow .hah-log-field-body,
.hah-pt-log-col.is-narrow .hah-issue-lines li {
  font-size: 12px;
  line-height: 1.52;
}

.hah-pt-centre-split.is-tight .hah-pt-ref-col {
  gap: 7px;
  min-width: 230px;
}

.hah-pt-centre-split.is-tight .hah-mdm-label,
.hah-pt-centre-split.is-tight .hah-ref-label {
  font-size: 11.5px;
}

.hah-pt-centre-split.is-tight .hah-ref-narrative,
.hah-pt-centre-split.is-tight .hah-mdm-field-body,
.hah-pt-centre-split.is-tight .hah-ref-med-name {
  font-size: 11.5px;
}

/* ─── Flatpickr theme overrides ──────────────────────────────────────── */

.flatpickr-input.hah-date-input {
  display: none;
}

input.hah-date-input.flatpickr-alt-input {
  display: block;
  flex: 1;
  height: 30px;
  padding: 0 34px 0 12px;
  border: 1px solid var(--desk-border);
  border-radius: 20px;
  font-size: 11.5px;
  font-family: inherit;
  color: var(--desk-text);
  background: #fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23617188' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='18' rx='2' ry='2'/><line x1='16' y1='2' x2='16' y2='6'/><line x1='8' y1='2' x2='8' y2='6'/><line x1='3' y1='10' x2='21' y2='10'/></svg>") no-repeat right 11px center;
  cursor: pointer;
  min-width: 0;
  box-sizing: border-box;

input.hah-date-input.flatpickr-alt-input:focus {
  outline: none;
  border-color: rgba(47,111,237,0.4);
}

input.hah-date-input.flatpickr-alt-input::placeholder {
  color: var(--desk-text-muted);
}

.flatpickr-calendar {
  border: 1px solid rgba(25,45,72,0.18) !important;
  border-radius: 12px !important;
  box-shadow: 0 12px 40px rgba(17,37,63,0.14) !important;
  font-family: inherit !important;

.flatpickr-calendar.arrowTop::before,
.flatpickr-calendar.arrowTop::after,
.flatpickr-calendar.arrowBottom::before,
.flatpickr-calendar.arrowBottom::after {
  display: none !important;

.flatpickr-months .flatpickr-month,
.flatpickr-current-month {
  color: var(--desk-text) !important;
}

.flatpickr-weekday {
  color: var(--desk-text-muted) !important;
  font-weight: 500 !important;
}

.flatpickr-day.selected,
.flatpickr-day.selected:hover {
  background: rgba(47,111,237,0.9) !important;
  border-color: rgba(47,111,237,0.9) !important;
}

.flatpickr-day.today {
  border-color: rgba(47,111,237,0.5) !important;
}

.flatpickr-day:hover {
  background: rgba(47,111,237,0.1) !important;
}

/* ─── Board round log — show older ───────────────────────────────────── */

.hah-log-earlier {
  border-top: 1px dashed var(--desk-border);
  background: rgba(0,0,0,0.012);
}

.hah-log-earlier-toggle {
  width: 100%;
  padding: 9px 14px;
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  color: var(--desk-text-muted);
  cursor: pointer;
  text-align: left;
  letter-spacing: 0.02em;
  transition: color 120ms ease;
}

.hah-log-earlier-toggle:hover {
  color: rgba(47,111,237,0.9);
}

.hah-log-earlier-list {
  border-top: 1px solid var(--desk-border);
  display: flex;
  flex-direction: column;
}

.hah-log-earlier-list .hah-log-entry {
  opacity: 0.85;
}

/* ─── Caseload card ──────────────────────────────────────────────────── */

.hah-caseload-card {
  padding: 12px 14px 14px;
  background: rgba(255,255,255,0.9);
}

.hah-caseload-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 8px;
}

.hah-caseload-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text);
  letter-spacing: -0.01em;
}

.hah-metric-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.hah-metric-tile {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.03);
  border: 1px solid transparent;
  border-radius: 10px;
  min-height: 56px;
  justify-content: center;
  transition: background 140ms ease, border-color 140ms ease;
}

.hah-metric-tile.is-clickable {
  cursor: pointer;
}

.hah-metric-tile.is-clickable:hover {
  background: rgba(47,111,237,0.08);
  border-color: rgba(47,111,237,0.18);
}

.hah-metric-tile.is-active-filter {
  background: rgba(47,111,237,0.12);
  border-color: rgba(47,111,237,0.35);
}

.hah-metric-tile-value {
  font-size: 20px;
  font-weight: 600;
  color: var(--desk-text);
  letter-spacing: -0.02em;
  line-height: 1.1;
  font-variant-numeric: tabular-nums;
}

.hah-metric-tile.is-active-filter .hah-metric-tile-value {
  color: rgba(47,111,237,0.95);
}

.hah-metric-tile-label {
  font-size: 10.5px;
  font-weight: 500;
  color: var(--desk-text-muted);
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 3px;
}

.hah-metric-tile.is-active-filter .hah-metric-tile-label {
  color: rgba(47,111,237,0.95);
}

.hah-metric-tile-chev {
  display: inline-block;
  width: 12px;
  height: 12px;
  text-align: center;
  line-height: 12px;
  font-size: 13px;
  color: var(--desk-text-muted);
  opacity: 0.4;
  transform-origin: center center;
  transition: opacity 140ms ease, transform 140ms ease, color 140ms ease;
}

.hah-metric-tile.is-clickable:not(.is-active-filter):hover .hah-metric-tile-chev {
  opacity: 0.85;
}

.hah-metric-tile.is-active-filter:hover .hah-metric-tile-chev {
  transform: rotate(90deg);
}

.hah-metric-tile.is-active-filter .hah-metric-tile-chev {
  opacity: 1;
  color: rgba(47,111,237,0.95);
  transform: rotate(90deg);
}

/* Semantic alert colour when a metric indicates a concerning caseload state */
.hah-metric-tile.is-alert .hah-metric-tile-value {
  color: #dc2626;
}

.hah-metric-tile.is-alert.is-active-filter .hah-metric-tile-value {
  color: #dc2626;
}

/* ─── Divider + round zone ──────────────────────────────────────────── */

.hah-caseload-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(0,0,0,0), rgba(0,0,0,0.08), rgba(0,0,0,0));
  margin: 12px 0 12px;
}

.hah-round-zone {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 6px;
}

.hah-round-zone-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.hah-round-zone-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--desk-text-muted);
}

.hah-round-zone-sub {
  font-size: 13px;
  color: var(--desk-text);
  font-weight: 500;
}

.hah-round-togo {
  cursor: pointer;
  color: rgba(47,111,237,0.95);
  transition: opacity 140ms ease;
}

.hah-round-togo:hover {
  opacity: 0.7;
  text-decoration: underline;
}

.hah-round-togo.is-active-filter {
  text-decoration: underline;
  font-weight: 600;
}

/* ─── Ring ───────────────────────────────────────────────────────────── */

.hah-ring {
  flex-shrink: 0;
  display: block;
}

.hah-ring-track {
  fill: none;
  stroke: rgba(0,0,0,0.08);
  stroke-width: 5;
}

.hah-ring-fill {
  fill: none;
  stroke: #22c55e;
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dasharray 420ms cubic-bezier(0.22, 0.9, 0.18, 1);
}

.hah-ring-text {
  font-size: 15px;
  font-weight: 600;
  fill: var(--desk-text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.hah-ring-slash {
  fill: var(--desk-text-muted);
  font-weight: 400;
}

.hah-ring-total {
  font-size: 12px;
  fill: var(--desk-text-muted);
  font-weight: 500;
}

/* ─── List filter banner ─────────────────────────────────────────────── */

.hah-list-filter-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 6px 12px;
  background: rgba(47,111,237,0.07);
  border-bottom: 1px solid rgba(47,111,237,0.15);
  font-size: 11px;
  color: rgba(47,111,237,0.95);
}

.hah-list-filter-clear {
  background: transparent;
  border: none;
  padding: 2px 6px;
  font-size: 11px;
  font-weight: 500;
  font-family: inherit;
  color: rgba(47,111,237,0.95);
  cursor: pointer;
  border-radius: 6px;
  transition: background 120ms ease;
}

.hah-list-filter-clear:hover {
  background: rgba(47,111,237,0.12);
}

/* ─── Patient list card + header ─────────────────────────────────────── */

.hah-patient-list-card {
  background: rgba(255,255,255,0.9);
  overflow: hidden;
}

.hah-list-head {
  background: rgba(0,0,0,0.04);
  border-bottom-color: rgba(0,0,0,0.08);
}

.hah-list-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text);
  margin-right: auto;
}

.hah-list-sort-wrap {
  position: relative;
}

.hah-list-sort-btn {
  width: 26px;
  height: 26px;
  border: none;
  background: transparent;
  color: var(--desk-text-muted);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 120ms ease, color 120ms ease;
}

.hah-list-sort-btn:hover {
  background: rgba(0,0,0,0.06);
  color: var(--desk-text);
}

.hah-list-sort-btn.is-open {
  background: rgba(47,111,237,0.12);
  color: rgba(47,111,237,0.95);
}

.hah-sort-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 170px;
  padding: 5px;
  background: rgba(255,255,255,0.98);
  border: 1px solid rgba(148,163,184,0.22);
  border-radius: 12px;
  box-shadow: 0 12px 28px rgba(15,23,42,0.14);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 60;
}

.hah-sort-menu button {
  width: 100%;
  border: none;
  background: transparent;
  border-radius: 8px;
  padding: 8px 10px;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--desk-text);
  cursor: pointer;
  transition: background 120ms ease;
}

.hah-sort-menu button + button {
  margin-top: 1px;
}

.hah-sort-menu button:hover {
  background: rgba(47,111,237,0.06);
}

.hah-sort-menu button.is-selected {
  background: rgba(47,111,237,0.08);
  color: rgba(47,111,237,0.95);
  font-weight: 600;
}

.hah-sort-check {
  font-size: 12px;
  color: rgba(47,111,237,0.95);
  opacity: 0;
}

.hah-sort-menu button.is-selected .hah-sort-check {
  opacity: 1;
}

/* ─── Patient list rows (tight nav style) ────────────────────────────── */

.hah-patient-list {
  display: flex;
  flex-direction: column;
}

.hah-patient-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 8px 12px;
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: left;
  min-height: 40px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  transition: background 120ms ease;
  font-family: inherit;
}

.hah-patient-row:last-child {
  border-bottom: none;
}

.hah-patient-row:hover {
  background: rgba(47,111,237,0.04);
}

.hah-patient-row.is-active {
  background: rgba(47,111,237,0.1);
  box-shadow: inset 3px 0 0 rgba(47,111,237,0.85);
}

.hah-patient-row.is-active .hah-patient-row-name {
  color: rgba(47,111,237,0.95);
  font-weight: 600;
}

.hah-patient-row-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.hah-patient-row-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--desk-text);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hah-patient-row-sub {
  font-size: 11px;
  color: var(--desk-text-muted);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.hah-patient-row.is-done .hah-patient-row-name {
  opacity: 0.6;
}

.hah-patient-row.is-done .hah-patient-row-sub {
  color: #16a34a;
}

.hah-patient-row.is-deferred .hah-patient-row-sub {
  color: #d97706;
}

.hah-patient-row.is-now .hah-patient-row-sub {
  color: rgba(47,111,237,0.95);
  font-weight: 500;
}

.hah-patient-row-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── Desktop blood results table ────────────────────────────────────── */

.hah-ref-body--bloods {
  padding: 0;
}

.dbl-table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.dbl-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12px;
}

.dbl-head-row th {
  background: rgba(0,0,0,0.02);
  font-size: 11px;
  font-weight: 700;
  color: var(--desk-text-muted);
  padding: 7px 10px;
  border-bottom: 1px solid rgba(0,0,0,0.07);
  white-space: nowrap;
}

.dbl-analyte-col {
  text-align: left;
  position: sticky;
  left: 0;
  z-index: 2;
  min-width: 44px;
}

.dbl-date-col {
  text-align: center;
  min-width: 56px;
}

.dbl-date-col:first-of-type {
  font-weight: 800;
  color: var(--desk-text);
}

.dbl-analyte {
  font-size: 11px;
  font-weight: 700;
  color: var(--desk-text-muted);
  background: rgba(0,0,0,0.015);
  padding: 6px 10px;
  text-align: left;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  position: sticky;
  left: 0;
  z-index: 1;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.dbl-table tbody tr:last-child .dbl-analyte,
.dbl-table tbody tr:last-child .dbl-cell {
  border-bottom: none;
}

.dbl-cell {
  text-align: center;
  padding: 6px 8px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  vertical-align: middle;
}

.dbl-cell.dbl-empty {
  color: rgba(0,0,0,0.2);
}

.dbl-cell.dbl-high,
.dbl-cell.dbl-low {
  background: rgba(220,38,38,0.05);
}

.dbl-val {
  font-weight: 600;
  color: var(--desk-text);
}

.dbl-cell.dbl-high .dbl-val,
.dbl-cell.dbl-low  .dbl-val {
  color: #b91c1c;
}

.dbl-trend {
  font-size: 10px;
  font-weight: 700;
  color: var(--desk-text-muted);
  margin-left: 2px;
}

.dbl-trend.dbl-trend-high,
.dbl-trend.dbl-trend-low {
  color: #b91c1c;
}


/* ─── Blood results widget refinements ───────────────────────────────── */

.hah-ref-options-btn {
  padding: 2px 7px;
  border: 1px solid var(--desk-border);
  border-radius: 8px;
  background: transparent;
  font-size: 14px;
  line-height: 1;
  color: var(--desk-text-muted);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}

.hah-ref-options-btn:hover,
.hah-ref-options-btn.is-open {
  background: rgba(47,111,237,0.08);
  color: rgba(47,111,237,0.95);
  border-color: rgba(47,111,237,0.2);
}

/* Latest column: bolder header only, cells same size as others */
.dbl-date-col.is-latest {
  color: var(--desk-text);
  font-weight: 800;
}

/* Trend arrows — neutral colour, not inheriting cell's red */
.dbl-trend {
  font-size: 10px;
  font-weight: 700;
  color: var(--desk-text-muted);
  margin-left: 2px;
}

/* Options panel */
.dbl-options-panel {
  border-top: 1px solid var(--desk-border);
  background: rgba(0,0,0,0.02);
  padding: 10px 12px 8px;
}

.dbl-options-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--desk-text-muted);
  margin-bottom: 8px;
}

.dbl-options-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.dbl-options-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}

.dbl-options-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--desk-text);
  flex: 1;
}

.dbl-options-btns {
  display: flex;
  gap: 2px;
}

.dbl-options-btn {
  width: 24px;
  height: 24px;
  border: 1px solid var(--desk-border);
  border-radius: 6px;
  background: rgba(255,255,255,0.8);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  color: var(--desk-text-muted);
  transition: background 120ms ease;
}

.dbl-options-btn:hover {
  background: rgba(47,111,237,0.08);
  color: rgba(47,111,237,0.9);
  border-color: rgba(47,111,237,0.2);
}

.dbl-options-btn-gap {
  display: inline-block;
  width: 24px;
  height: 24px;
}

.dbl-options-footer {
  margin-top: 8px;
  display: flex;
  justify-content: flex-end;
}

.dbl-options-add {
  height: 28px;
  padding: 0 12px;
  border: 1px solid rgba(47,111,237,0.25);
  border-radius: 8px;
  background: rgba(47,111,237,0.08);
  color: rgba(47,111,237,0.95);
  font-size: 11.5px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 120ms ease;
}

.dbl-options-add:hover {
  background: rgba(47,111,237,0.15);
}

/* ─── Analyte hover tooltip ──────────────────────────────────────────── */

.dbl-analyte-tip {
  position: fixed;
  z-index: 200;
  width: 240px;
  background: rgba(20,35,58,0.97);
  color: #e8edf3;
  border-radius: 10px;
  padding: 10px 12px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.3);
  pointer-events: none;
  font-family: inherit;
}

.dbl-tip-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1.2;
}

.dbl-tip-range {
  font-size: 11.5px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  margin-bottom: 6px;
}

.dbl-tip-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-right: 4px;
}

.dbl-tip-notes {
  font-size: 11px;
  color: rgba(255,255,255,0.72);
  line-height: 1.5;
  margin-bottom: 7px;
}

.dbl-tip-source {
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.04em;
}

.dbl-analyte {
  cursor: help;
}

/* ─── Board log issues text (preserve formatting) ────────────────────── */

.hah-log-issues-text {
  font-size: 12.5px;
  line-height: 1.55;
  color: var(--desk-text);
  white-space: pre-wrap;
  word-break: break-word;
}

.hah-log-issues-text div {
  min-height: 1.4em;
}

/* ─── Discharge chips — selected state ──────────────────────────────── */

.hah-dchip.is-active {
  background: rgba(47,111,237,0.12);
  border-color: rgba(47,111,237,0.4);
  color: rgba(47,111,237,0.95);
  font-weight: 600;
}

.hah-dchip-ready.is-active {
  background: rgba(22,163,74,0.12);
  border-color: rgba(22,163,74,0.4);
  color: #15803d;
}

/* ─── DNAR / ACP alert chips in composer ────────────────────────────── */

.hah-dnar-acp-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.hah-alert-chip {
  height: 32px;
  padding: 0 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(0,0,0,0.12);
  background: rgba(255,255,255,0.9);
  font-size: 12px;
  font-weight: 700;
  color: var(--desk-text-muted);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: all 140ms ease;
}

.hah-alert-chip:hover {
  border-color: rgba(0,0,0,0.22);
  color: var(--desk-text);
}

.hah-alert-chip.is-active {
  background: rgba(220,38,38,0.1);
  border-color: rgba(220,38,38,0.4);
  color: #b91c1c;
}

.hah-alert-chip--acp.is-active {
  background: rgba(217,119,6,0.1);
  border-color: rgba(217,119,6,0.4);
  color: #92400e;
}

/* ─── Patient header DNAR / ACP flags (matching mobile app) ──────────── */

.hah-pt-flag {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 24px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid rgba(15,23,42,0.08);
  font-size: 11px;
  font-weight: 800;
  line-height: 1;
  white-space: nowrap;
  letter-spacing: 0.04em;
}

.hah-pt-flag.is-dnar {
  background: #fbf2f8;
  color: #8a2c6b;
  border-color: #e7c7da;
}

.hah-pt-flag.is-acp {
  background: rgba(217,119,6,0.1);
  color: #92400e;
  border-color: rgba(217,119,6,0.4);
}

/* ─── ACP card ───────────────────────────────────────────────────────── */

.hah-acp-edit-btn {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid var(--desk-border);
  background: transparent;
  color: rgba(47,111,237,0.9);
  cursor: pointer;
  transition: background 120ms ease;
}

.hah-acp-edit-btn:hover {
  background: rgba(47,111,237,0.07);
}

.hah-acp-body {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hah-acp-row {
  display: grid;
  grid-template-columns: 64px 1fr;
  align-items: baseline;
  gap: 4px;
  font-size: 12.5px;
  line-height: 1.4;
}

.hah-acp-row.is-single {
  grid-template-columns: 1fr;
}

.hah-acp-field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--desk-text-muted);
}

.hah-acp-field-value {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--desk-text);
}

.hah-acp-row.is-dnacpr .hah-acp-field-value {
  color: #8a2c6b;
  font-weight: 700;
}

.hah-acp-notes-text {
  color: var(--desk-text-muted);
  font-size: 12px;
  font-weight: 400;
  line-height: 1.4;
}

.hah-acp-empty {

    const next = DISCHARGE_CYCLE.includes(String(value || '').trim()) ? String(value).trim() : 'Not ready';
    return patchPatientState(patientId, { dischargeReadiness: next });
  }

  function setBoardNote(patientId, note) {
    return patchPatientState(patientId, { boardNote: String(note || '').trim() });
  }

  function getTaskPatch(taskId) {
    return clone(state.taskPatches[String(taskId)] || {});
  }

  function updateTask(taskId, patch) {
    const key = String(taskId);
    const existingIndex = state.customTasks.findIndex((task) => String(task.id) === key);
    if (existingIndex >= 0) {
      state.customTasks[existingIndex] = {
        ...state.customTasks[existingIndex],
        ...cleanObject(patch),
        updatedAt: nowIso(),
        updatedBy: getActorName()
      };
      appendAudit({
        type: 'task-updated',
        entityType: 'task',
        entityId: key,
        summary: summariseTaskPatch(state.customTasks[existingIndex], patch)
      });
      saveState('task-updated', { taskId: key });
      return clone(state.customTasks[existingIndex]);
    }

    const current = state.taskPatches[key] || {};
    state.taskPatches[key] = {
      ...current,
      ...cleanObject(patch),
      updatedAt: nowIso(),
      updatedBy: getActorName()
    };
    appendAudit({
      type: 'task-updated',
      entityType: 'task',
      entityId: key,
      summary: summariseTaskPatch({ id: key }, patch)
    });
    saveState('task-patch-updated', { taskId: key });
    return getTaskPatch(taskId);
  }

  function createTask(taskInput) {
    const task = {
      id: buildManualTaskId(taskInput.patientId),
      patientId: String(taskInput.patientId || ''),
      title: String(taskInput.title || '').trim(),
      note: String(taskInput.note || '').trim(),
      category: String(taskInput.category || 'Clinical review').trim(),
      owner: String(taskInput.owner || 'Unassigned').trim(),
      dueAt: String(taskInput.dueAt || '').trim(),
      priority: String(taskInput.priority || 'Medium').trim(),
      status: String(taskInput.status || 'Open').trim(),
      blocker: String(taskInput.blocker || '').trim(),
      createdFrom: String(taskInput.createdFrom || 'Board').trim(),
      createdBy: getActorName(),
      boardLink: String(taskInput.boardLink || '').trim(),
      updatedAt: nowIso(),
      updatedBy: getActorName()
    };
    if (!task.patientId || !task.title) return null;
    state.customTasks.unshift(task);
    appendAudit({
      type: 'task-created',
      entityType: 'task',
      entityId: task.id,
      summary: `Created task: ${task.title}`
    });
    saveState('task-created', { taskId: task.id });
    return clone(task);
  }

  function buildManualTaskId(patientId) {
    return `manual:${String(patientId)}:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`;
  }

  function cleanObject(obj) {
    const out = {};
    Object.keys(obj || {}).forEach((key) => {
      const value = obj[key];
      if (value === undefined) return;
      out[key] = value;
    });
    return out;
  }

  function summarisePatientPatch(patch) {
    if (!patch || typeof patch !== 'object') return 'Updated patient state';
    if (patch.boardStatus) return `Set board status to ${patch.boardStatus}`;
    if (patch.dischargeReadiness) return `Set discharge readiness to ${patch.dischargeReadiness}`;
    if (Object.prototype.hasOwnProperty.call(patch, 'boardNote')) return patch.boardNote ? 'Updated board note' : 'Cleared board note';
    return 'Updated patient state';
  }

  function summariseTaskPatch(task, patch) {
    if (patch.status) return `Set task “${task.title || task.id}” to ${patch.status}`;
    if (patch.owner) return `Assigned task “${task.title || task.id}” to ${patch.owner}`;
    if (patch.dueAt) return `Changed due time for “${task.title || task.id}”`;
    return `Updated task “${task.title || task.id}”`;
  }

  function promptForBoardNote(patient) {
    const current = getPatientState(patient.id).boardNote || '';
    const next = window.prompt(`Board note for ${patient.name}`, current);
    if (next === null) return null;
    return setBoardNote(patient.id, next);
  }

  function promptCreateTask(patient, seed) {
    const defaults = seed || {};
    const title = window.prompt(`New task for ${patient.name}`, defaults.title || '');
    if (title == null) return null;
    if (!String(title).trim()) return null;

    const note = window.prompt('Task note (optional)', defaults.note || patient.summaryLine || '') || '';
    const category = window.prompt('Category', defaults.category || 'Clinical review') || defaults.category || 'Clinical review';
    const owner = window.prompt('Owner', defaults.owner || patient.clinician || 'Unassigned') || defaults.owner || patient.clinician || 'Unassigned';
    const dueDefault = defaults.dueAt || patient.reviewDueAt || toLocalPromptValue(new Date(Date.now() + 4 * 60 * 60 * 1000));
    const dueInput = window.prompt('Due (YYYY-MM-DD HH:MM or leave blank)', dueDefault) || '';
    const dueAt = normaliseDueInput(dueInput);
    const priority = window.prompt('Priority', defaults.priority || patient.priority || 'Medium') || defaults.priority || patient.priority || 'Medium';

    return createTask({
      patientId: patient.id,
      title,
      note,
      category,
      owner,
      dueAt,
      priority,
      status: defaults.status || 'Open',
      blocker: defaults.blocker || '',
      createdFrom: defaults.createdFrom || 'Manual',
      boardLink: defaults.boardLink || patient.boardStatus || ''
    });
  }

  function promptReassignTask(task) {
    const next = window.prompt(`Owner for ${task.title}`, task.owner || 'Unassigned');
    if (next === null) return null;
    return updateTask(task.id, { owner: String(next || 'Unassigned').trim() || 'Unassigned' });
  }

  function buildBoardroundSummary(patients, tasks, options) {
    const rows = Array.isArray(patients) ? patients.slice() : [];
    const taskRows = Array.isArray(tasks) ? tasks.slice() : [];
    const opts = options || {};
    const title = opts.title || 'H@H Boardround Summary';
    const stamp = new Date().toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

    const counts = {
      notDiscussed: rows.filter((p) => p.boardStatus === 'Not discussed').length,
      inDiscussion: rows.filter((p) => p.boardStatus === 'In discussion').length,
      discussed: rows.filter((p) => p.boardStatus === 'Discussed').length,
      actioned: rows.filter((p) => p.boardStatus === 'Actioned').length,
      deferred: rows.filter((p) => p.boardStatus === 'Deferred').length
    };

    const lines = [];
    lines.push(title);
    lines.push(`Generated ${stamp}`);
    lines.push(`Author ${getActorName()}`);
    lines.push('');
    lines.push(`Patients in round: ${rows.length}`);
    lines.push(`Not discussed: ${counts.notDiscussed}`);
    lines.push(`In discussion: ${counts.inDiscussion}`);
    lines.push(`Discussed: ${counts.discussed}`);
    lines.push(`Actioned: ${counts.actioned}`);
    lines.push(`Deferred: ${counts.deferred}`);
    lines.push('');

    rows.forEach((patient) => {
      const patientTasks = taskRows.filter((task) => String(task.patientId) === String(patient.id) && !['Done', 'Cancelled'].includes(String(task.status || '')));
      lines.push(`${patient.name} — ${patient.boardStatus}`);
      lines.push(`  Status: ${patient.currentStatus}`);
      lines.push(`  Discharge: ${patient.dischargeReadiness}`);
      if (patient.boardNote) lines.push(`  Note: ${patient.boardNote}`);
      if (patient.blockers && patient.blockers.length) lines.push(`  Blockers: ${patient.blockers.slice(0, 3).join(' | ')}`);
      if (patientTasks.length) {
        lines.push('  Actions:');
        patientTasks.slice(0, 5).forEach((task) => {
          const due = task.dueAt ? ` · ${new Date(task.dueAt).toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}` : '';
          lines.push(`    - ${task.title} [${task.status}] · ${task.owner || 'Unassigned'}${due}`);
        });
      }
      lines.push('');
    });

    return lines.join('\n').trim();
  }

  function exportBoardroundSummary(summaryText, title) {
    const text = String(summaryText || '').trim();
    if (!text) return false;
    persistRoundSummary(text, title || 'H@H Boardround Summary');
    try {
      if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
        navigator.clipboard.writeText(text).catch(() => {});
      }
    } catch (_err) {}

    try {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
      a.href = url;
      a.download = `hah-boardround-summary-${stamp}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return true;
    } catch (_err) {
      window.alert(text);
      return false;
    }
  }

  function normaliseDueInput(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const direct = Date.parse(raw);
    if (!Number.isNaN(direct)) return new Date(direct).toISOString();
    const patched = raw.replace(' ', 'T');
    const parsed = Date.parse(patched);
    if (!Number.isNaN(parsed)) return new Date(parsed).toISOString();
    return raw;
  }

  function toLocalPromptValue(date) {
    const dt = date instanceof Date ? date : new Date(date);
    if (Number.isNaN(dt.getTime())) return '';
    const pad = (v) => String(v).padStart(2, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  }

  function exportOpsBundle() {
    return JSON.stringify({
      schemaVersion: 1,
      exportedAt: nowIso(),
      exportedBy: getActorName(),
      state: clone(state)
    }, null, 2);
  }

  function downloadOpsBundle() {
    const text = exportOpsBundle();
    try {
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
      a.href = url;
      a.download = `hah-board-ops-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return true;
    } catch (_err) {
      window.alert(text);
      return false;
    }
  }

  function importOpsBundle(text, mode) {
    const raw = String(text || '').trim();
    if (!raw) return false;
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (_err) {
      return false;
    }
    const incoming = normaliseState(parsed && parsed.state ? parsed.state : parsed);
    if ((mode || 'merge') === 'replace') {
      state = incoming;
    } else {
      state = mergeStates(state, incoming);
    }
    appendAudit({
      type: 'ops-import',
      entityType: 'ops',
      entityId: 'ops-bundle',
      summary: `Imported ops snapshot (${mode || 'merge'})`
    });
    saveState('ops-imported', { imported: true, mode: mode || 'merge' });
    return true;
  }

  function mergeStates(current, incoming) {
    const next = normaliseState(current);
    next.patientStates = { ...next.patientStates, ...incoming.patientStates };
    next.taskPatches = { ...next.taskPatches, ...incoming.taskPatches };

    const taskMap = new Map();
    next.customTasks.concat(incoming.customTasks || []).forEach((task) => {
      taskMap.set(String(task.id), { ...taskMap.get(String(task.id)), ...task });
    });
    next.customTasks = Array.from(taskMap.values()).sort((a, b) => Date.parse(b.updatedAt || 0) - Date.parse(a.updatedAt || 0));

    const allEncounters = [...(incoming.encounters || []), ...(next.encounters || [])]
      .sort((a, b) => Date.parse(b.timestamp || 0) - Date.parse(a.timestamp || 0));
    next.encounters = dedupeBy(allEncounters, (e) => e.id).slice(0, MAX_ENCOUNTER_ROWS);

    const audit = [...(incoming.auditTrail || []), ...(next.auditTrail || [])]
      .sort((a, b) => Date.parse(b.at || 0) - Date.parse(a.at || 0));
    next.auditTrail = dedupeBy(audit, (row) => row.id).slice(0, MAX_AUDIT_ROWS);

    const summaries = [...(incoming.roundSummaries || []), ...(next.roundSummaries || [])]
      .sort((a, b) => Date.parse(b.createdAt || 0) - Date.parse(a.createdAt || 0));
    next.roundSummaries = dedupeBy(summaries, (row) => row.id).slice(0, MAX_SUMMARY_ROWS);

    const nextUpdated = Math.max(Date.parse(current.updatedAt || 0) || 0, Date.parse(incoming.updatedAt || 0) || 0, Date.now());
    next.updatedAt = new Date(nextUpdated).toISOString();
    next.lastMutationId = buildMutationId();
    next.lastWriter = getActorName();
    return next;
  }

  function dedupeBy(rows, pick) {
    const seen = new Set();
    const out = [];
    (rows || []).forEach((row) => {
      const key = pick(row);
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(row);
    });
    return out;
  }

  function promptImportOpsBundle() {
    const text = window.prompt('Paste exported ops JSON');
    if (text === null) return null;
    const mode = window.confirm('Use OK to merge into current state. Use Cancel to replace current state entirely.') ? 'merge' : 'replace';
    const ok = importOpsBundle(text, mode);
    if (!ok) window.alert('Could not import ops snapshot.');
    return ok;
  }

  function setActorName(name) {
    actorProfile.name = String(name || '').trim() || 'Board user';
    saveProfile();
    appendAudit({
      type: 'actor-updated',
      entityType: 'profile',
      entityId: 'actor',
      summary: `Updated actor name to ${getActorName()}`
    });
    saveState('actor-updated', { actor: getActorName() });
    return getActorName();
  }

  function promptActorName() {
    const next = window.prompt('Name to show on board actions and exports', getActorName());
    if (next === null) return null;
    return setActorName(next);
  }

  function clearAllOpsState() {
    if (!window.confirm('Clear all desktop operational state, tasks, summaries, and audit history?')) return false;
    state = clone(DEFAULT_STATE);
    appendAudit({
      type: 'ops-cleared',
      entityType: 'ops',
      entityId: 'all',
      summary: 'Cleared all desktop operational state'
    });
    saveState('ops-cleared', { destructive: true });
    return true;
  }

  function getSyncInfo(flags) {
    const info = flags || {};
    const mode = channelReady ? 'broadcast+storage' : 'storage';
    return {
      mode,
      label: info.imported ? 'Imported sync' : (channelReady ? 'Shared sync' : 'Local sync'),
      actor: getActorName(),
      updatedAt: state.updatedAt || '',
      lastWriter: state.lastWriter || '',
      auditCount: state.auditTrail.length,
      taskCount: state.customTasks.length,
      summaryCount: state.roundSummaries.length,
      encounterCount: state.encounters.length,
      remote: !!info.remote
    };
  }

  function getRecentAudit(limit) {
    const max = Math.max(1, Number(limit) || 10);
    return clone(state.auditTrail.slice(0, max));
  }

  function getRecentSummaries(limit) {
    const max = Math.max(1, Number(limit) || 10);
    return clone(state.roundSummaries.slice(0, max));
  }

  function updateEncounter(encounterId, newFields) {
    const idx = state.encounters.findIndex((e) => e.id === String(encounterId));
    if (idx < 0) return null;
    const enc = state.encounters[idx];
    const fields = cleanObject(newFields || {});
    if (enc.type === 'board_round') {
      const rawIssues = String(fields.issues || '').trim();
      fields.issueRaw  = rawIssues;
      fields.issueLines = rawIssues
        ? rawIssues.split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean)
        : [];
      fields.issues = fields.issueLines.join('\n');
    }
    state.encounters[idx] = {
      ...enc,
      fields,
      editedAt: nowIso(),
      editedBy: getActorName()
    };
    appendAudit({
      type: 'encounter-updated',
      entityType: 'encounter',
      entityId: encounterId,
      summary: `${enc.type} encounter updated for patient ${enc.patientId}`
    });
    saveState('encounter-updated', { encounterId });
    return clone(state.encounters[idx]);
  }

  function dischargePatient(patientId, snapshot) {
    const pid = String(patientId || '');
    if (!pid) return null;
    const row = {
      id: buildMutationId(),
      patientId: pid,
      dischargedAt: nowIso(),
      dischargedBy: getActorName(),
      snapshot: snapshot || null
    };
    state.dischargedPatients.unshift(row);
    state.dischargedPatients = state.dischargedPatients.slice(0, 200);
    appendAudit({
      type: 'patient-discharged',
      entityType: 'patient',
      entityId: pid,
      summary: `Discharged patient ${(snapshot && snapshot.name) || pid}`
    });
    saveState('patient-discharged', { patientId: pid });
    return clone(row);
  }

  function restorePatient(dischargeId) {
    const idx = state.dischargedPatients.findIndex((d) => d.id === String(dischargeId));
    if (idx < 0) return false;
    const row = state.dischargedPatients.splice(idx, 1)[0];
    appendAudit({
      type: 'patient-restored',
      entityType: 'patient',
      entityId: row.patientId,
      summary: `Restored patient ${(row.snapshot && row.snapshot.name) || row.patientId}`
    });
    saveState('patient-restored', { patientId: row.patientId });
    return true;
  }

  function clearDischargedPatients() {
    if (!state.dischargedPatients.length) return false;
    const count = state.dischargedPatients.length;
    state.dischargedPatients = [];
    appendAudit({
      type: 'discharged-cleared',
      entityType: 'discharge-list',
      entityId: 'all',
      summary: `Cleared ${count} discharged patient record${count === 1 ? '' : 's'}`
    });
    saveState('discharged-cleared', { count });
    return true;
  }

  function getDischargedPatients() {
    return clone(state.dischargedPatients);
  }

  function isPatientDischarged(patientId) {
    const pid = String(patientId || '');
    return state.dischargedPatients.some((d) => d.patientId === pid);
  }

  function buildEncounterId(patientId) {
    return `enc:${String(patientId)}:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`;
  }

  function createEncounter(input) {
    const patientId = String(input.patientId || '').trim();
    const type = String(input.type || 'other').trim();
    if (!patientId) return null;

    const fields = cleanObject(input.fields || {});

    if (type === 'board_round') {
      const rawIssues = String(fields.issues || '').trim();
      fields.issueRaw  = rawIssues;
      fields.issueLines = rawIssues
        ? rawIssues.split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean)
        : [];
      fields.issues = fields.issueLines.join('\n');
    }

    const encounter = {
      id: buildEncounterId(patientId),
      patientId,
      type,
      timestamp: nowIso(),
      author: getActorName(),
      fields
    };

    state.encounters.unshift(encounter);
    state.encounters = state.encounters.slice(0, MAX_ENCOUNTER_ROWS);

    appendAudit({
      type: 'encounter-created',
      entityType: 'encounter',
      entityId: encounter.id,
      summary: `${type} encounter created for patient ${patientId}`
    });
    saveState('encounter-created', { encounterId: encounter.id, patientId });
    return clone(encounter);
  }

  function deleteEncounter(encounterId) {
    const idx = state.encounters.findIndex((e) => e.id === String(encounterId));
    if (idx < 0) return false;
    const removed = state.encounters.splice(idx, 1)[0];
    appendAudit({
      type: 'encounter-deleted',
      entityType: 'encounter',
      entityId: removed.id,
      summary: `${removed.type} encounter deleted for patient ${removed.patientId}`
    });
    saveState('encounter-deleted', { encounterId: removed.id });
    return true;
  }

  function getEncountersForPatient(patientId, type) {
    const pid = String(patientId || '');
    return clone(
      state.encounters.filter((e) => {
        if (e.patientId !== pid) return false;
        if (type && e.type !== type) return false;
        return true;
      })
    );
  }

  function getLastBoardRound(patientId) {
    const pid = String(patientId || '');
    const found = state.encounters.find((e) => e.patientId === pid && e.type === 'board_round');
    return found ? clone(found) : null;
  }

  initSync();

  window.HAHBoard.ops = {
    STORAGE_KEY,
    PROFILE_KEY,
    getState,
    getPatientState,
    patchPatientState,
    cycleBoardStatus,
    setBoardStatus,
    cycleDischargeReadiness,
    setDischargeReadiness,
    setBoardNote,
    getTaskPatch,
    updateTask,
    createTask,
    promptForBoardNote,
    promptCreateTask,
    promptReassignTask,
    buildBoardroundSummary,
    exportBoardroundSummary,
    exportOpsBundle,
    downloadOpsBundle,
    importOpsBundle,
    promptImportOpsBundle,
    setActorName,
    promptActorName,
    getActorName,
    getSyncInfo,
    getRecentAudit,
    getRecentSummaries,
    createEncounter,
    updateEncounter,
    deleteEncounter,
    getEncountersForPatient,
    getLastBoardRound,
    dischargePatient,
    restorePatient,
    clearDischargedPatients,
    getDischargedPatients,
    isPatientDischarged,
    clearAllOpsState
  };
})();
