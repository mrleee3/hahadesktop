  const VALID_STATUSES = [null, STATUS_DRAFT, STATUS_SENT];

  // ─── Schema helpers ────────────────────────────────────────────────────

  function emptyLetter() {
    // Canonical default for a patient that has never had a letter generated.
    // Using null for status (rather than undefined or missing) so existence
    // checks don't accidentally treat 'draft' === undefined as truthy. The
    // schema field can also be missing entirely on older patient records;
    // getDischargeLetter() handles both shapes.
    return {
      status: null,
      body: '',
      generatedAt: null,
      updatedAt: null,
      sentAt: null,
      generationCount: 0,
      generationModel: null
    };
  }

  function getDischargeLetter(patient) {
    if (!patient) return emptyLetter();
    // v0.8.149: read paths.
    //
    // Browser path (vm.patient): the summary view-model. mapJsonPatientToLegacyRaw
    // copies operational.dischargeLetter onto the legacy raw object, then
    // 24-desktop-derived.js hoists it as a top-level summary field. So the
    // canonical browser read is `patient.dischargeLetter`.
    //
    // JSON path (raw patient document): for tests and any direct JSON
    // consumer. The schema location is `operational.dischargeLetter`.
    //
    // We try the hoisted summary field first (browser) and fall back to
    // the JSON shape (tests). Either gives us the same object.
    let dl = null;
    if (patient.dischargeLetter && typeof patient.dischargeLetter === 'object') {
      dl = patient.dischargeLetter;
    } else if (patient.operational && typeof patient.operational === 'object'
               && patient.operational.dischargeLetter
               && typeof patient.operational.dischargeLetter === 'object') {
      dl = patient.operational.dischargeLetter;
    }
    if (!dl) return emptyLetter();
    // Defensive fill — if a partial object exists (e.g. created by mobile
    // sync round-trip preserving an older shape), backfill missing fields
    // from the empty default. This is read-time only; we don't write back.
    return {
      status: VALID_STATUSES.includes(dl.status) ? dl.status : null,
      body: typeof dl.body === 'string' ? dl.body : '',
      generatedAt: typeof dl.generatedAt === 'string' ? dl.generatedAt : null,
      updatedAt: typeof dl.updatedAt === 'string' ? dl.updatedAt : null,
      sentAt: typeof dl.sentAt === 'string' ? dl.sentAt : null,
      generationCount: Number.isFinite(dl.generationCount) ? dl.generationCount : 0,
      generationModel: typeof dl.generationModel === 'string' ? dl.generationModel : null
    };
  }

  // ─── State machine ─────────────────────────────────────────────────────

  // Card states:
  //   not_ready  — patient not marked for discharge; card shows placeholder
  //   no_draft   — patient is discharge-ready, no letter yet
  //   draft      — letter exists in draft state
  //   sent       — letter has been marked sent
  //
  // Discharge readiness is derived from the timeline (see deriveDischargeReadiness
  // in 26-desktop-patient.js, since v0.8.130). We accept it as an input rather
  // than re-deriving — the card renderer receives it from the patient view-model.

  const READY_STATES = ['Ready', 'Possible today', 'Likely tomorrow'];

  function getCardState(letter, dischargeReadiness) {
    const safeLetter = letter && typeof letter === 'object' ? letter : emptyLetter();

    // Once a letter exists (draft or sent), the card surfaces it regardless
    // of discharge readiness. A clinician might continue editing a draft
    // even if the patient's readiness oscillates.
    if (safeLetter.status === STATUS_SENT) return 'sent';
    if (safeLetter.status === STATUS_DRAFT) return 'draft';

    if (READY_STATES.indexOf(dischargeReadiness) >= 0) return 'no_draft';
    return 'not_ready';
  }

  // State transitions, returning a NEW letter object (immutable update).
  // These are pure functions for testability; the action handlers below
  // wrap them with persistence.

  function transitionToDraft(letter, body, opts) {
    const o = opts || {};
    const now = o.now || new Date().toISOString();
    return {
      status: STATUS_DRAFT,
      body: typeof body === 'string' ? body : (letter && letter.body) || '',
      generatedAt: (letter && letter.generatedAt) || now,
      updatedAt: now,
      sentAt: (letter && letter.sentAt) || null,
      generationCount: ((letter && letter.generationCount) || 0) + (o.bumpGeneration ? 1 : 0),
      generationModel: o.model || (letter && letter.generationModel) || null
    };
  }

  function transitionEdit(letter, newBody, opts) {
    // In-place body edit. Does NOT change status (sent stays sent), does
    // bump updatedAt. The "sent letters stay sent on edit" rule from the
    // design discussion lives here.
    const o = opts || {};
    const now = o.now || new Date().toISOString();
    const safe = letter || emptyLetter();
    return {
      status: safe.status,
      body: newBody,
      generatedAt: safe.generatedAt,
      updatedAt: now,
      sentAt: safe.sentAt,
      generationCount: safe.generationCount,
      generationModel: safe.generationModel
    };
  }

  function transitionToSent(letter, opts) {
    const o = opts || {};
    const now = o.now || new Date().toISOString();
    const safe = letter || emptyLetter();
    return {
      status: STATUS_SENT,
      body: safe.body,
      generatedAt: safe.generatedAt,
      updatedAt: now,
      sentAt: safe.sentAt || now,
      generationCount: safe.generationCount,
      generationModel: safe.generationModel
    };
  }

  // ─── Letter spec (single source of truth for renderers) ────────────────

  // Build a letter spec from a patient view-model. Build A: most fields are
  // hard-coded mock data because the AI hasn't filled in body yet. Build B
  // will populate spec.body from the AI response; everything else stays as
  // template/placeholder until production GP details and live letterhead
  // wire-up.
  //
  // The spec is what the docx renderer and pdf renderer both consume.
  // Keeping a single spec means layout changes happen in one place.

  function buildLetterSpec(vm, letter) {
    const patient = vm && vm.patient ? vm.patient : {};
    // v0.8.149: in the browser, vm.patient is the summary (vm.patient.name
    // exists at top level). In tests, the patient may be the raw JSON
    // document (with patient.identity.name). Read both paths.
    const patientName =
      (patient && patient.name) ||
      (patient && patient.identity && patient.identity.name) ||
      'Mr Jo-test';

    // Re-derived at every render so a corrected patient name flows through.
    // Intentionally NOT pulled into the body itself — the body is the
    // clinician-edited prose; the Re: line is structured.
    const reLine = formatReLine({ name: patientName });

    return {
      // Header info
      letterheadAssetPath: 'assets/lk_medica_letterhead.png',
      senderBlock: [
        'Hospital at Home Team',
        'General Hospital',
        'Test Lane',
        'London XX1 2XX'
      ],
      dateLine: formatDate(new Date()),

      // Recipient (mock for trial — Build B+ will pull from patient.identity.gp.*)
      recipient: [
        'Dr Test-GP',
        'Test Practice Surgery',
        '1 Test Street',
        'Test Town',
        'XX1 1YY'
      ],
      salutation: 'Dear Dr Test-GP,',

      // Patient identity line
      reLine: reLine,

      // The clinician-edited prose. Single body field per the locked design.
      body: (letter && letter.body) || '',

      // Sign-off
      signOffLines: [
        'Yours sincerely,',
        '',
        '[Clinician name]',
        '[Role]',
        'Hospital at Home Service'
      ],

      // Governance footer (audit trail)
      footerLine: formatGovernanceFooter(letter)
    };
  }

  function formatReLine(identity) {
    const name = (identity && identity.name) || 'Mr Jo-test';
    return 'Re: ' + name + ', DOB yy/yy/yyyy, NHS xxx xxx xxxx';
  }

  function formatDate(d) {
    // UK format: 7 May 2026
    const months = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
    const day = d.getDate();
    const month = months[d.getMonth()];
    const year = d.getFullYear();
    return day + ' ' + month + ' ' + year;
  }

  function formatGovernanceFooter(letter) {
    if (!letter || !letter.generatedAt) {
      return 'Manually composed in H@H Board v0.8.149. Reviewed by [clinician].';
    }
    const at = new Date(letter.generatedAt);
    return 'Draft generated ' + formatDate(at) + ' from H@H Board v0.8.149. Reviewed and edited by [clinician].';
  }

  // ─── Initial body stitching ────────────────────────────────────────────
  //
  // v0.8.149-hotfix2: when a clinician creates a fresh draft, pre-populate
  // the body with the structured patient data already in the record.
  // Specifically:
  //   - "For discharge summary" textarea content (operational.forDischargeSummary)
  //   - Medication changes from timeline (medication_change entries)
  //   - Resus status if DNAR/UCP flagged on the ACP
  //
  // This is template-stitching for the *initial* body only. Once the
  // clinician edits, we don't clobber their work. Build B's AI flow will
  // replace this with proper prose generation; until then, the stitch
  // gives clinicians something to edit rather than a blank textarea.
  //
  // Pure function — takes a vm and returns a string. Tested in isolation.

  function stitchInitialBody(vm, medChangeEntries) {
    const sections = [];
    const patient = vm && vm.patient ? vm.patient : {};
    const fds = String(patient.forDischargeSummary || '').trim();
    if (fds) {
      sections.push(fds);
    } else {
      sections.push('[Summary of admission, presenting problem, key clinical events, and current state.]');
    }

    // Medication changes section — render verbatim from timeline entries.
    // Filter to in-admission entries (which will be all of them, the
    // medication_change card collects them per-admission).
    const medLines = stitchMedChangeLines(medChangeEntries || []);
    if (medLines.length) {
      sections.push('Medication changes during this admission:\n' + medLines.map((l) => '- ' + l).join('\n'));
    }

    // Recommendations / follow-up — placeholder section header for the
    // clinician to fill in. The most common request from GPs.
    sections.push('Recommendations and follow-up:\n- [Follow-up actions for the GP — bloods to repeat, dose titrations, clinic referrals, safety-netting.]');

    // Resus / ceiling of care — pulled from ACP if present.
    const resusLine = stitchResusLine(patient);
    if (resusLine) {
      sections.push('Resuscitation status:\n' + resusLine);
    }

    sections.push('Many thanks for your continued care. Please do not hesitate to contact our team if any concerns arise.');

    return sections.join('\n\n');
  }

  function stitchMedChangeLines(entries) {
    // Returns array of formatted strings, one per medication change.
    // Verb + drug + transition + reason. Pulls from the same fields the
    // medication_change card uses (drug, changeType, fromValue, toValue,
    // reason). Verb mapping kept aligned with MED_CHANGE_TYPES in
    // 26-desktop-patient.js — duplicated here to keep this module
    // self-contained. If the source list changes, both must update.
    if (!Array.isArray(entries)) return [];
    const verbMap = {
      start: 'Started', stop: 'Stopped', adjust: 'Adjusted',
      hold: 'Held', resume: 'Resumed'
    };
    const lines = [];
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      if (!e || !e.fields) continue;
      const f = e.fields;
      const drug = String(f.drug || '').trim();
      if (!drug) continue;
      const verb = verbMap[f.changeType] || 'Changed';
      const from = String(f.fromValue || '').trim();
      const to = String(f.toValue || '').trim();
      const reason = String(f.reason || '').trim();
      let line = verb + ' ' + drug;
      if (f.changeType === 'adjust' && from && to) line += ' (' + from + ' → ' + to + ')';
      else if (to && (f.changeType === 'start' || f.changeType === 'resume' || f.changeType === 'adjust')) line += ' ' + to;
      if (reason) line += ' — ' + reason;
      lines.push(line);
    }
    // Sort chronologically (oldest first) so the letter reads as a
    // narrative arc through the admission. Encounter rows come back
    // newest-first by default.
    return lines.reverse();
  }

  function stitchResusLine(patient) {
    // Pulls from patient.sourcePatient.jsonRecord.clinical.acp if present
    // (browser path), or directly from patient.clinical.acp (test path).
    const json = (patient && patient.sourcePatient && patient.sourcePatient.jsonRecord) || patient || {};
    const clinical = json.clinical || {};
    const acp = clinical.acp || {};
    const dnacpr = String(acp.dnacprStatus || '').toLowerCase();
    const tep = String(acp.tepStatus || acp.tep || '').toLowerCase();
    const ucp = String(acp.ucp || acp.universalCarePlan || '').toLowerCase();
    const ceiling = String(acp.ceilingOfCare || '').trim();

    // Only auto-populate when there's something concrete to say. Otherwise
    // leave the section out entirely — letting the clinician decide
    // whether to add it manually.
    if (dnacpr !== 'yes' && !tep && !ucp && !ceiling) return '';

    const parts = [];
    if (dnacpr === 'yes') parts.push('A DNACPR decision has been made');
    if (ceiling) parts.push('the ceiling of care has been agreed as ' + ceiling);
    if (tep === 'yes' || tep === 'present') parts.push('a TEP form is in place');
    if (ucp === 'yes' || ucp === 'present') parts.push('a UCP (Universal Care Plan) is in place');
    if (!parts.length) return '';
    return parts.join(', ').replace(/^./, (ch) => ch.toUpperCase()) + '.';
  }

  // ─── Filename helpers ──────────────────────────────────────────────────

  function buildFilename(vm, ext) {
    // v0.8.149: same dual-shape support as buildLetterSpec.
    const patient = vm && vm.patient ? vm.patient : {};
    const name =
      (patient && patient.name) ||
      (patient && patient.identity && patient.identity.name) ||
      'patient';
    const surname = name.split(/\s+/).pop().replace(/[^A-Za-z0-9_-]/g, '') || 'patient';
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    return 'discharge_letter_' + surname + '_' + yyyy + '-' + mm + '-' + dd + '.' + ext;
  }

  // ─── DOCX renderer ─────────────────────────────────────────────────────
  //
  // Generates a .docx as a Blob. Uses the global `docx` UMD bundle.
  // Library is loaded via CDN in desktop.html. If the library failed to
  // load (offline first launch), the renderer throws — caller should
  // surface a toast.

  function ensureDocxLibrary() {
    if (typeof window !== 'undefined' && window.docx) return window.docx;
    throw new Error('docx library not loaded. Check internet connection on first use.');
  }

  function loadLetterheadBytes() {
    // v0.8.149: prefer the inlined data URL if the build script bundled it
    // (single-file release HTML). Otherwise fall back to fetching the
    // asset (for development served from desktop.html with assets/).
    if (typeof window !== 'undefined' && window.HAHBoard__LETTERHEAD_DATA_URL) {
      return Promise.resolve(dataUrlToArrayBuffer(window.HAHBoard__LETTERHEAD_DATA_URL));
    }
    return fetch('assets/lk_medica_letterhead.png')
      .then((r) => {
        if (!r.ok) throw new Error('Letterhead asset not found (HTTP ' + r.status + ')');
        return r.arrayBuffer();
      });
  }

  function dataUrlToArrayBuffer(dataUrl) {
    const base64 = String(dataUrl).replace(/^data:[^;]+;base64,/, '');
    const binary = atob(base64);
    const buf = new ArrayBuffer(binary.length);
    const bytes = new Uint8Array(buf);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return buf;
  }

  function renderDocx(spec) {
    const D = ensureDocxLibrary();
    const {
      Document, Packer, Paragraph, TextRun, ImageRun,
      AlignmentType, BorderStyle, LevelFormat, Footer, Header,
      convertInchesToTwip
    } = D;

    return loadLetterheadBytes().then((letterheadBytes) => {
      // Letterhead 2361×225 source. ~700px wide in header. Negative indent
      // extends the image beyond body content margins (matches the proof-of-
      // concept layout we settled on in scoping).
      const aspect = 225 / 2361;
      const lhWidthPx = 700;
      const lhHeightPx = Math.max(40, Math.round(lhWidthPx * aspect));

      const center = AlignmentType.CENTER;
      const right = AlignmentType.RIGHT;
      const justified = AlignmentType.JUSTIFIED;

      const para = (text, opts) => {
        opts = opts || {};
        return new Paragraph({
          alignment: opts.align,
          spacing: { after: opts.after !== undefined ? opts.after : 120 },
          children: [new TextRun({
            text: text,
            bold: !!opts.bold,
            italics: !!opts.italics,
            size: opts.size,
            color: opts.color
          })]
        });
      };

      const blank = () => new Paragraph({
        spacing: { after: 80 },
        children: [new TextRun({ text: '' })]
      });

      // Body paragraphs — split the spec.body on double-newlines (paragraph
      // breaks) and render each as a justified paragraph. Inside each
      // paragraph, single newlines become line breaks (TextRun with break).
      const bodyParagraphs = bodyToDocxParagraphs(spec.body, justified, TextRun, Paragraph);

      const doc = new Document({
        styles: {
          default: { document: { run: { font: 'Calibri', size: 22 } } } // 11pt
        },
        sections: [{
          properties: {
            page: {
              size: { width: 11906, height: 16838 }, // A4
              margin: {
                top: convertInchesToTwip(1.3),
                right: convertInchesToTwip(0.9),
                bottom: convertInchesToTwip(0.5),
                left: convertInchesToTwip(0.9),
                header: convertInchesToTwip(0.4),
                footer: convertInchesToTwip(0.3)
              }
            }
          },
          headers: {
            default: new Header({
              children: [
                new Paragraph({
                  alignment: center,
                  indent: { left: -720, right: -720 },
                  children: [new ImageRun({
                    data: letterheadBytes,
                    type: 'png',
                    transformation: { width: lhWidthPx, height: lhHeightPx }
                  })]
                })
              ]
            })
          },
          footers: {
            default: new Footer({
              children: [
                new Paragraph({
                  border: { top: { color: 'AAAAAA', space: 4, style: BorderStyle.DOTTED, size: 4 } },
                  children: [new TextRun({
                    text: spec.footerLine,
                    italics: true, size: 16, color: '777777'
                  })]
                })
              ]
            })
          },
          children: [].concat(
            // Sender block (right-aligned, tight)
            spec.senderBlock.map((line, i) => {
              const isLast = i === spec.senderBlock.length - 1;
              return para(line, { align: right, after: isLast ? 200 : 0 });
            }),
            // Date
            [para(spec.dateLine, { align: right, after: 200 })],
            // Recipient
            spec.recipient.map((line, i) => {
              const isLast = i === spec.recipient.length - 1;
              return para(line, { after: isLast ? 160 : 30 });
            }),
            // Salutation + Re
            [para(spec.salutation, { after: 120 })],
            [new Paragraph({
              spacing: { after: 160 },
              children: [new TextRun({ text: spec.reLine, bold: true })]
            })],
            // Body
            bodyParagraphs,
            // Sign-off
            [blank()],
            spec.signOffLines.map((line) => para(line, { after: 30 }))
          )
        }]
      });

      return Packer.toBlob(doc);
    });
  }

  function bodyToDocxParagraphs(body, justified, TextRun, Paragraph) {
    const text = String(body || '').trim();
    if (!text) {
      return [new Paragraph({
        spacing: { after: 200 },
        alignment: justified,
        children: [new TextRun({ text: '[Letter body — type or generate to populate]', italics: true, color: '999999' })]
      })];
    }
    // Split on double newlines (paragraph breaks). Within a paragraph,
    // preserve single newlines as soft line breaks via TextRun({break:1}).
    const paras = text.split(/\n\s*\n/);
    return paras.map((p) => {
      const lines = p.split(/\n/);
      const children = [];
      lines.forEach((line, i) => {
        if (i > 0) children.push(new TextRun({ break: 1 }));
        children.push(new TextRun({ text: line }));
      });
      return new Paragraph({
        alignment: justified,
        spacing: { after: 160 },
        children: children
      });
    });
  }

  // ─── PDF renderer ──────────────────────────────────────────────────────
  //
  // Generates a PDF as a Blob via pdfmake. Library is loaded via CDN in
  // desktop.html. Fonts: pdfmake defaults to Roboto which is a reasonable
  // approximation of Calibri at small sizes. Trade-off acceptable for the
  // trial; can swap to a Calibri-equivalent VFS later.

  function ensurePdfMakeLibrary() {
    if (typeof window !== 'undefined' && window.pdfMake) return window.pdfMake;
    throw new Error('pdfmake library not loaded. Check internet connection on first use.');
  }

  function loadLetterheadDataUrl() {
    // pdfmake expects images as data URLs. Convert the bundled PNG once
    // per generation (cheap, ~50KB).
    return loadLetterheadBytes().then((buf) => {
      const bytes = new Uint8Array(buf);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return 'data:image/png;base64,' + btoa(binary);
    });
  }

  function renderPdf(spec) {
    const pdfMake = ensurePdfMakeLibrary();
    return loadLetterheadDataUrl().then((logoDataUrl) => {
      // v0.8.149-hotfix2: tightened margins and font size to match the
      // mock proportions we settled on in scoping. The previous values
      // (95pt top, 11pt body, lineHeight 1.18) read as visibly looser
      // than the docx output. Mock target was 0.5" top, 0.9" sides, 0.5"
      // bottom — translates to ~36pt top body, 65pt sides, 36pt bottom.
      // Header sits at ~25pt from page edge with the letterhead extending
      // beyond body content margins via wider negative margin.
      //
      // Font: pdfmake bundles Roboto, not Calibri. Roboto's metrics are
      // slightly larger than Calibri at the same point size, so a 10.5pt
      // Roboto reads as approximately 11pt Calibri. Dropping lineHeight
      // multiplier — pdfmake's default leading produces tighter spacing
      // than the explicit 1.18 we had.
      const docDef = {
        pageSize: 'A4',
        pageMargins: [65, 92, 65, 36], // [left, top, right, bottom] in points (top accommodates ~25pt header + 27pt header-to-body gap matching the mock)
        defaultStyle: { fontSize: 10.5 },
        header: function (currentPage, pageCount, pageSize) {
          const pageWidthPt = pageSize.width;
          const imageWidth = pageWidthPt - 60; // 30pt each side, extends beyond body's 65pt margins
          return {
            margin: [30, 25, 30, 0],
            image: logoDataUrl,
            width: imageWidth
          };
        },
        footer: function (currentPage, pageCount) {
          return {
            margin: [65, 6, 65, 0],
            stack: [
              { canvas: [{ type: 'line', x1: 0, y1: 0, x2: 470, y2: 0, dash: { length: 1, space: 2 }, lineColor: '#AAAAAA' }] },
              { text: spec.footerLine, italics: true, fontSize: 7.5, color: '#777777', margin: [0, 3, 0, 0] }
            ]
          };
        },
        content: [].concat(
          // Sender block (right-aligned, tight)
          spec.senderBlock.map((line, i) => ({
            text: line, alignment: 'right',
            margin: [0, 0, 0, i === spec.senderBlock.length - 1 ? 8 : 0]
          })),
          // Date
          [{ text: spec.dateLine, alignment: 'right', margin: [0, 0, 0, 8] }],
          // Recipient
          spec.recipient.map((line, i) => ({
            text: line,
            margin: [0, 0, 0, i === spec.recipient.length - 1 ? 6 : 1]
          })),
          // Salutation + Re
          [{ text: spec.salutation, margin: [0, 0, 0, 5] }],
          [{ text: spec.reLine, bold: true, margin: [0, 0, 0, 7] }],
          // Body
          bodyToPdfMake(spec.body),
          // Sign-off
          [{ text: '', margin: [0, 3, 0, 0] }],
          spec.signOffLines.map((line) => ({ text: line || ' ', margin: [0, 0, 0, 1] }))
        )
      };
      return new Promise((resolve, reject) => {
        try {
          pdfMake.createPdf(docDef).getBlob(resolve);
        } catch (e) {
          reject(e);
        }
      });
    });
  }

  function bodyToPdfMake(body) {
    const text = String(body || '').trim();
    if (!text) {
      return [{ text: '[Letter body — type or generate to populate]', italics: true, color: '#999999', margin: [0, 0, 0, 6] }];
    }
    return text.split(/\n\s*\n/).map((p) => ({
      text: p,
      alignment: 'justify',
      margin: [0, 0, 0, 6]
    }));
  }

  // ─── HTML preview renderer (live preview in letter editor mode) ────────
  //
  // v0.8.149-hotfix2: renders the letter as styled HTML for the live
  // preview pane below the textarea. Approximates the docx/PDF layout
  // visually without trying to be pixel-perfect — clinicians see what
  // they're producing without leaving editor mode. Updates on every
  // keystroke (cheap; just builds an HTML string).
  //
  // Letterhead is shown as the inlined data URL image (same one used in
  // docx/PDF generation), if available. Falls back to text if not.

  function renderLetterPreviewHtml(spec, opts) {
    opts = opts || {};
    const c = opts.escape || function (s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    };

    const letterheadUrl = (typeof window !== 'undefined' && window.HAHBoard__LETTERHEAD_DATA_URL) || 'assets/lk_medica_letterhead.png';
    const letterheadHtml = `<div class="hah-dl-prev-letterhead"><img src="${c(letterheadUrl)}" alt="Letterhead"></div>`;

    const senderHtml = `<div class="hah-dl-prev-sender">${spec.senderBlock.map((l) => c(l)).join('<br>')}</div>`;
    const dateHtml = `<div class="hah-dl-prev-date">${c(spec.dateLine)}</div>`;
    const recipientHtml = `<div class="hah-dl-prev-recipient">${spec.recipient.map((l) => c(l)).join('<br>')}</div>`;
    const salutationHtml = `<div class="hah-dl-prev-salutation">${c(spec.salutation)}</div>`;
    const reHtml = `<div class="hah-dl-prev-re"><strong>${c(spec.reLine)}</strong></div>`;

    // Body: split on double newlines, escape, render as paragraphs.
    // Within a paragraph, single newlines become <br>.
    const bodyText = String(spec.body || '').trim();
    let bodyHtml;
    if (!bodyText) {
      bodyHtml = `<div class="hah-dl-prev-body"><p class="hah-dl-prev-empty">[Letter body — type or generate to populate]</p></div>`;
    } else {
      const paragraphs = bodyText.split(/\n\s*\n/).map((p) => {
        return '<p>' + p.split(/\n/).map((line) => c(line)).join('<br>') + '</p>';
      }).join('');
      bodyHtml = `<div class="hah-dl-prev-body">${paragraphs}</div>`;
    }

    const signOffHtml = `<div class="hah-dl-prev-signoff">${spec.signOffLines.map((l) => l ? c(l) : '&nbsp;').join('<br>')}</div>`;
    const footerHtml = `<div class="hah-dl-prev-footer"><em>${c(spec.footerLine)}</em></div>`;

    return [letterheadHtml, senderHtml, dateHtml, recipientHtml, salutationHtml, reHtml, bodyHtml, signOffHtml, footerHtml].join('');
  }

  function renderDischargeLetterCard(vm, state, helpers) {
    // helpers passes the c (components) object from 26-desktop-patient.js
    // for HTML escaping. Avoids cross-module coupling on a global.
    const c = helpers && helpers.c ? helpers.c : { escapeHtml: (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])) };
    const patient = vm.patient;
    const letter = getDischargeLetter(patient);
    // v0.8.149: discharge readiness lives on vm.patient.dischargeReadiness,
    // derived from the timeline by 24-desktop-derived.js (since v0.8.130).
    // The legacy operational.dischargeReadiness field is ignored on read
    // per JSON_SCHEMA.md — don't fall back to it. Bug found in field test:
    // setting Possible today via board round didn't enable the card
    // because we were reading the wrong field.
    const dischargeReadiness = (patient && patient.dischargeReadiness) || '';
    const cardState = getCardState(letter, dischargeReadiness);

    const previewText = previewSnippet(letter.body);
    const wordCount = countWords(letter.body);

    const titleBar = (extras) => `<div class="hah-dl-head">
      <div class="hah-dl-head-left">
        <span class="hah-dl-title">Discharge letter</span>
        ${extras.badge || ''}
      </div>
      ${extras.action || ''}
    </div>`;

    if (cardState === 'not_ready') {
      return `<div class="hah-dl-card is-quiet">
        ${titleBar({})}
        <div class="hah-dl-body">
          <p class="hah-dl-quiet-msg">Available when patient is marked Possible today, Likely tomorrow, or Ready.</p>
        </div>
      </div>`;
    }

    if (cardState === 'no_draft') {
      return `<div class="hah-dl-card">
        ${titleBar({
          action: `<button type="button" class="hah-dl-add-btn" data-patient-action="dl-open-editor" data-create="1" title="Generate a new discharge letter draft">+ Generate</button>`
        })}
        <div class="hah-dl-body">
          <p class="hah-dl-empty-msg">No draft yet.</p>
        </div>
      </div>`;
    }

    // draft or sent
    const isDraft = cardState === 'draft';
    const badgeHtml = isDraft
      ? `<span class="hah-dl-badge is-draft">Draft</span>`
      : `<span class="hah-dl-badge is-sent">✓ Sent</span>`;

    const meta = isDraft
      ? `<span>${wordCount} words</span><span class="hah-dl-meta-sep">·</span><span>${c.escapeHtml(formatRelativeTime(letter.updatedAt) || 'just now')}</span>`
      : `<span>${c.escapeHtml('Sent ' + (formatRelativeTime(letter.sentAt) || ''))}</span>`;

    const actionRow = isDraft
      ? `<div class="hah-dl-actions">
          <button type="button" class="hah-dl-action-btn" data-patient-action="dl-export-pdf" title="Open as PDF">PDF</button>
          <button type="button" class="hah-dl-action-btn" data-patient-action="dl-export-docx" title="Download Word document">Word</button>
          <button type="button" class="hah-dl-action-btn" data-patient-action="dl-mark-sent" title="Mark this letter as sent">Sent</button>
        </div>`
      : `<div class="hah-dl-actions">
          <button type="button" class="hah-dl-action-btn" data-patient-action="dl-export-pdf" title="Open as PDF">PDF</button>
          <button type="button" class="hah-dl-action-btn" data-patient-action="dl-export-docx" title="Download Word document">Word</button>
        </div>`;

    return `<div class="hah-dl-card">
      ${titleBar({
        badge: badgeHtml,
        action: `<button type="button" class="hah-dl-edit-btn" data-patient-action="dl-open-editor" title="Edit this discharge letter">Edit</button>`
      })}
      <div class="hah-dl-body">
        <p class="hah-dl-preview">${c.escapeHtml(previewText)}</p>
        <div class="hah-dl-meta">${meta}</div>
      </div>
      ${actionRow}
    </div>`;
  }

  function previewSnippet(body) {
    const trimmed = String(body || '').trim();
    if (!trimmed) return '(Empty draft.)';
    if (trimmed.length <= 140) return '"' + trimmed + '"';
    return '"' + trimmed.substring(0, 137) + '…"';
  }

  function countWords(body) {
    const trimmed = String(body || '').trim();
    if (!trimmed) return 0;
    return trimmed.split(/\s+/).length;
  }

  function formatRelativeTime(iso) {
    if (!iso) return '';
    try {
      const t = new Date(iso);
      const now = new Date();
      const diffMs = now.getTime() - t.getTime();
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return diffMin + 'm ago';
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return diffHr + 'h ago';
      // > 24h: show date and time
      const hh = String(t.getHours()).padStart(2, '0');
      const mm = String(t.getMinutes()).padStart(2, '0');
      return formatDate(t) + ', ' + hh + ':' + mm;
    } catch (_) { return ''; }
  }

  // ─── Right pane letter editor ──────────────────────────────────────────

  function renderLetterPane(vm, state, helpers) {
    const c = helpers && helpers.c ? helpers.c : { escapeHtml: (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch])) };
    const patient = vm.patient;
    const letter = getDischargeLetter(patient);
    const isDraft = letter.status === STATUS_DRAFT;
    const isSent = letter.status === STATUS_SENT;
    const wordCount = countWords(letter.body);

    const badgeHtml = isSent
      ? `<span class="hah-dl-badge is-sent">✓ Sent</span>`
      : `<span class="hah-dl-badge is-draft">Draft</span>`;

    const generatedLine = letter.generatedAt
      ? 'Generated ' + (formatRelativeTime(letter.generatedAt) || 'recently')
      : 'New draft';
    const editedLine = letter.updatedAt && letter.updatedAt !== letter.generatedAt
      ? 'Last edited ' + (formatRelativeTime(letter.updatedAt) || 'recently')
      : '';

    return `<div class="hah-dl-pane">
      <div class="hah-dl-pane-head">
        <div class="hah-dl-pane-title">
          <span class="hah-dl-pane-icon" aria-hidden="true">✎</span>
          <span>Editing discharge letter</span>
          ${badgeHtml}
        </div>
        <button type="button" class="hah-dl-pane-close" data-patient-action="dl-close-editor" aria-label="Close letter editor">✕</button>
      </div>
      <div class="hah-dl-pane-statusrow">
        <div class="hah-dl-pane-meta">
          <div>${c.escapeHtml(generatedLine)}</div>
          ${editedLine ? `<div>${c.escapeHtml(editedLine)}</div>` : ''}
        </div>
        <button type="button" class="hah-dl-regen-btn is-disabled" disabled title="AI re-generation arrives in v0.8.150">↻ Re-generate</button>
      </div>
      <div class="hah-dl-pane-bodywrap">
        <textarea
          id="hahDlBody"
          class="hah-dl-body-textarea"
          data-patient-id="${c.escapeHtml(patient.id || '')}"
          placeholder="Type the letter body here. It will autosave as you write."
          spellcheck="true">${c.escapeHtml(letter.body)}</textarea>
        <div class="hah-dl-pane-footer">
          <span class="hah-dl-wordcount" id="hahDlWordCount">${wordCount} words</span>
          <span class="hah-dl-savestate" id="hahDlSaveState">Saved</span>
        </div>
      </div>
      <div class="hah-dl-preview-pane" id="hahDlPreviewPane" aria-label="Live letter preview">
        <div class="hah-dl-preview-label">Preview</div>
        <div class="hah-dl-preview-paper" id="hahDlPreviewPaper">
          <!-- Populated by bindLetterEditor on initial render and on every input -->
        </div>
      </div>
      <div class="hah-dl-pane-actions">
        <button type="button" class="hah-dl-action-btn is-primary" data-patient-action="dl-export-pdf">
          📄 Open as PDF
        </button>
        <button type="button" class="hah-dl-action-btn" data-patient-action="dl-export-docx">
          ⬇ Word doc
        </button>
        ${!isSent ? `<button type="button" class="hah-dl-action-btn" data-patient-action="dl-mark-sent">✓ Mark sent</button>` : ''}
      </div>
    </div>`;
  }

  // ─── Persistence helpers (browser-side only) ───────────────────────────
  //
  // These wrap the cross-module state machine functions with the actual
  // store/JSON write paths exposed by 26-desktop-patient.js. They live
  // here to keep the discharge-letter module self-contained.

  function persistLetterPatch(api, patientId, newLetter) {
    // api: { persistPatientPatchToJson, store, ops } — passed in from
    // 26-desktop-patient.js to avoid circular module dependencies.
    if (!api || !patientId) return;
    const patch = { operational: { dischargeLetter: newLetter } };
    if (typeof api.persistPatientPatchToJson === 'function') {
      api.persistPatientPatchToJson(patientId, patch);
    }
    // v0.8.149-hotfix2: NO store.setState() here. Triggering a re-render
    // after each autosave caused the textarea innerHTML to be rebuilt
    // mid-typing — visible to the user as the value reverting briefly to
    // the just-persisted body and then catching up. The persistence path
    // already updates the in-memory cache via patchPatientCacheRow, so the
    // next legitimate re-render (anything else changing state) will see
    // fresh data. The card preview snippet refreshes naturally on the
    // next render — no need to force one purely for autosave.
    //
    // The live preview pane in letter editor mode updates directly via
    // DOM manipulation in bindLetterEditor's input handler, not through
    // the render system.
  }

  // ─── Action handlers (called from 26-desktop-patient.js handleClick) ───

  function handleDlAction(action, target, state, api) {
    const vm = api.buildVm(state);
    if (!vm) return false;
    const patientId = vm.patient.id;

    if (action === 'dl-open-editor') {
      const create = target.getAttribute('data-create') === '1';
      const existing = getDischargeLetter(vm.patient);
      // If creating fresh and there's no letter yet, create a draft
      // pre-populated with structured stitching of the patient record.
      // This pulls operational.forDischargeSummary content, all
      // medication_change timeline entries, and ACP resus status into a
      // starter body that the clinician edits. (Build B will replace
      // this stitch with AI prose generation; until then, stitching
      // gives clinicians something useful rather than a blank textarea.)
      if (create && existing.status === null) {
        const medChanges = (typeof api.getPatientEncounterRows === 'function')
          ? api.getPatientEncounterRows(vm.patient).filter((e) => e && e.type === 'medication_change')
          : [];
        const initialBody = stitchInitialBody(vm, medChanges);
        const fresh = transitionToDraft(existing, initialBody, { now: new Date().toISOString(), bumpGeneration: false });
        persistLetterPatch(api, patientId, fresh);
      }
      api.store.setState({ patient: { dischargeLetterMode: true, dischargeLetterPatientId: patientId } });
      return true;
    }

    if (action === 'dl-close-editor') {
      api.store.setState({ patient: { dischargeLetterMode: false, dischargeLetterPatientId: null } });
      return true;
    }

    if (action === 'dl-export-pdf') {
      const letter = getDischargeLetter(vm.patient);
      const spec = buildLetterSpec(vm, letter);
      // Open a placeholder window synchronously so popup blockers don't fire.
      const win = window.open('', '_blank');
      if (win) {
        win.document.write('<html><head><title>Generating PDF…</title></head><body style="font-family:sans-serif;padding:2rem;color:#666">Generating PDF…</body></html>');
      }
      renderPdf(spec).then((blob) => {
        const url = URL.createObjectURL(blob);
        if (win) {
          win.location.href = url;
        } else {
          // Popup blocked — fall back to download
          triggerDownload(blob, buildFilename(vm, 'pdf'));
        }
      }).catch((err) => {
        console.error('[dischargeLetter] PDF generation failed', err);
        if (win) win.close();
        if (typeof api.showToast === 'function') api.showToast('PDF generation failed: ' + (err && err.message ? err.message : err));
        else window.alert('PDF generation failed: ' + (err && err.message ? err.message : err));
      });
      return true;
    }

    if (action === 'dl-export-docx') {
      const letter = getDischargeLetter(vm.patient);
      const spec = buildLetterSpec(vm, letter);
      renderDocx(spec).then((blob) => {
        triggerDownload(blob, buildFilename(vm, 'docx'));
      }).catch((err) => {
        console.error('[dischargeLetter] DOCX generation failed', err);
        if (typeof api.showToast === 'function') api.showToast('Word doc generation failed: ' + (err && err.message ? err.message : err));
        else window.alert('Word doc generation failed: ' + (err && err.message ? err.message : err));
      });
      return true;
    }

    if (action === 'dl-mark-sent') {
      const existing = getDischargeLetter(vm.patient);
      if (existing.status !== STATUS_DRAFT) return true; // Already sent or no draft
      const sent = transitionToSent(existing);
      persistLetterPatch(api, patientId, sent);
      return true;
    }

    return false;
  }

  function triggerDownload(blob, filename) {
    // FileSaver-style invocation. We don't depend on FileSaver.js here —
    // a temporary <a> element with a blob URL works in all desktop browsers
    // and saves us a library.
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  // ─── afterRender hook (autosave wiring) ────────────────────────────────
  //
  // Called from 26-desktop-patient.js after the right pane is rendered in
  // letter mode. Wires the textarea to autosave on input.

  // Single module-scoped timer (mirrors the v0.8.148 composer race fix —
  // multiple concurrent timers caused cross-patient draft contamination
  // there, and the same hazard exists if a clinician switches patients
  // while a letter save is pending).
  let dlSaveTimer = null;
  let dlSavePatientId = null;
  const DL_SAVE_DEBOUNCE_MS = 1400;

  function cancelPendingDlSave() {
    if (dlSaveTimer) {
      clearTimeout(dlSaveTimer);
      dlSaveTimer = null;
      dlSavePatientId = null;
    }
  }

  function bindLetterEditor(pane, state, api) {
    const ta = pane.querySelector('#hahDlBody');
    if (!ta) return;

    const wordCountEl = pane.querySelector('#hahDlWordCount');
    const saveStateEl = pane.querySelector('#hahDlSaveState');
    const previewEl   = pane.querySelector('#hahDlPreviewPaper');

    // Capture the patient id at bind time. The save function checks the
    // current patient at fire time and bails if it's changed (defense in
    // depth, mirroring v0.8.148 pattern).
    const capturedPatientId = ta.getAttribute('data-patient-id');

    const updateWordCount = () => {
      if (wordCountEl) wordCountEl.textContent = countWords(ta.value) + ' words';
    };

    // v0.8.149-hotfix2: live preview update. Builds spec from current vm
    // (re-read each time so identifier changes flow through) plus the
    // current textarea value, renders to HTML, swaps preview innerHTML.
    // Cheap operation — just string building. No throttle needed.
    const updatePreview = () => {
      if (!previewEl) return;
      try {
        const currentState = api.store.getState();
        const currentVm = api.buildVm(currentState);
        if (!currentVm) return;
        // Construct a "live" letter object reflecting the current textarea
        // value, even before autosave has persisted it. The persisted
        // letter is used for generatedAt/updatedAt; the body comes from
        // the textarea.
        const persisted = getDischargeLetter(currentVm.patient);
        const liveLetter = Object.assign({}, persisted, { body: ta.value });
        const spec = buildLetterSpec(currentVm, liveLetter);
        previewEl.innerHTML = renderLetterPreviewHtml(spec);
      } catch (e) {
        // Preview is best-effort; never let it crash the editor
        console.warn('[dischargeLetter] preview update failed', e);
      }
    };

    const setSaveState = (label, modifier) => {
      if (!saveStateEl) return;
      saveStateEl.textContent = label;
      saveStateEl.className = 'hah-dl-savestate' + (modifier ? ' ' + modifier : '');
    };

    const scheduleSave = () => {
      cancelPendingDlSave();
      setSaveState('Saving…', 'is-saving');
      dlSavePatientId = capturedPatientId;
      dlSaveTimer = setTimeout(() => {
        try {
          // Verify patient hasn't changed since timer was scheduled
          const currentState = api.store.getState();
          const currentVm = api.buildVm(currentState);
          if (!currentVm || currentVm.patient.id !== capturedPatientId) {
            // Patient switched — abandon the save (the new patient's
            // editor will have its own state). Do nothing rather than
            // writing this body into the wrong patient's letter.
            return;
          }
          const existing = getDischargeLetter(currentVm.patient);
          // If the letter doesn't exist yet (status === null), create a
          // fresh draft. Otherwise edit in place.
          let updated;
          if (existing.status === null) {
            updated = transitionToDraft(existing, ta.value);
          } else {
            updated = transitionEdit(existing, ta.value);
          }
          persistLetterPatch(api, capturedPatientId, updated);
          setSaveState('Saved');
        } catch (err) {
          console.error('[dischargeLetter] autosave failed', err);
          setSaveState('Save failed', 'is-error');
        } finally {
          dlSaveTimer = null;
          dlSavePatientId = null;
        }
      }, DL_SAVE_DEBOUNCE_MS);
    };

    ta.addEventListener('input', () => {
      updateWordCount();
      updatePreview();
      scheduleSave();
    });

    // Set initial focus so the clinician can start typing immediately
    // (only if body is empty — don't steal focus when reopening to read).
    if (!ta.value) {
      try { ta.focus(); } catch (_) {}
    }

    updateWordCount();
    updatePreview();
  }

  // ─── Module exports ────────────────────────────────────────────────────

  const exports = {
    // Schema
    STATUS_DRAFT, STATUS_SENT, READY_STATES,
    emptyLetter, getDischargeLetter,
    // State machine
    getCardState,
    transitionToDraft, transitionEdit, transitionToSent,
    // Letter spec
    buildLetterSpec, formatReLine, formatDate, formatGovernanceFooter,
    // Initial body stitching (testable)
    stitchInitialBody, stitchMedChangeLines, stitchResusLine,
    // Filename
    buildFilename,
    // Renderers (browser-only — gracefully no-op in Node)
    renderDocx, renderPdf,
    // UI
    renderDischargeLetterCard, renderLetterPane, renderLetterPreviewHtml,
    // Action plumbing (called from 26-desktop-patient.js)
    handleDlAction, bindLetterEditor, cancelPendingDlSave,
    // Helpers (testable)
    previewSnippet, countWords,
    // Body conversion (also testable)
    bodyToPdfMake
  };

  if (typeof window !== 'undefined') {
    window.HAHBoard = window.HAHBoard || {};
    window.HAHBoard.dischargeLetter = exports;
  }
  if (typeof module !== 'undefined' && module.exports) {
    module.exports = exports;
  }
})();

  function bindShellEvents() {
    rootEl.addEventListener('click', function (event) {
      const state = store.getState();
      const screenHandled = delegateScreenClick(event, state);
      if (screenHandled) return;

      const navTarget = event.target.closest('[data-nav]');
      if (navTarget) {
        const view = navTarget.getAttribute('data-nav');
        router.navigate({ view });
        return;
      }

      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) return;
      const action = actionTarget.getAttribute('data-action');
      if (action === 'open-board') {
        router.goToBoard();
        return;
      }
      if (action === 'open-settings') {
        router.navigate({ view: 'settings' });
        return;
      }
      if (action === 'sync-json') {
        performSharedJsonSync(state);
        return;
      }
      if (action === 'toggle-boardround') {
        const current = store.getState().boardroundMode;
        store.setState({ boardroundMode: !current });
        return;
      }
      if (action && action.indexOf('settings-json-') === 0) {
        handleSharedJsonStoreAction(action);
        return;
      }
      if (action === 'settings-actor' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptActorName();
        return;
      }
      if (action === 'settings-export' && window.HAHBoard.ops) {
        window.HAHBoard.ops.downloadOpsBundle();
        return;
      }
      if (action === 'settings-import' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptImportOpsBundle();
        return;
      }

        if (window.HAHBoard.update && typeof window.HAHBoard.update.checkForUpdate === 'function') {
          window.HAHBoard.update.checkForUpdate(true);
        }
      }
      if (action === 'settings-clear' && window.HAHBoard.ops) {
        window.HAHBoard.ops.clearAllOpsState();
      }
      if (action === 'settings-clear-discharged' && window.HAHBoard.ops) {
        const list = window.HAHBoard.ops.getDischargedPatients() || [];
        if (!list.length) return;
        if (window.confirm('Clear all ' + list.length + ' discharged patient record(s)? This cannot be undone.')) {
          window.HAHBoard.ops.clearDischargedPatients();
        }
      }
      if (action === 'settings-restore-patient' && window.HAHBoard.ops) {
        const id = actionTarget.getAttribute('data-discharge-id');
        if (id) window.HAHBoard.ops.restorePatient(id);
      }
      if (action === 'settings-restore-json-patient') {
        const id = actionTarget.getAttribute('data-patient-id');
        const shared = window.HAHBoard.sharedJsonStore;
        if (id && shared && typeof shared.restoreArchivedPatientRecord === 'function') {

  async function performSharedJsonSync(stateSnapshot) {
    const shared = window.HAHBoard.sharedJsonStore;
    if (!shared || typeof shared.loadPatientDataset !== 'function') {
      window.alert('Shared JSON store module is not loaded.');
      return;
    }
    const startedAt = new Date();
    try {
      store.setState({ ui: { syncState: 'syncing' } });
      await shared.loadPatientDataset();
      if (shared && typeof shared.loadTaskDataset === 'function') {
        try { await shared.loadTaskDataset(); } catch (_) {}
      }
      const time = startedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      store.setState({ ui: { syncState: 'JSON synced ' + time } });
    } catch (err) {
      console.error('[H@H JSON store]', err);
      store.setState({ ui: { syncState: 'error' } });
      window.alert(err && err.message ? err.message : 'Shared JSON sync failed.');
    }
  }

  function startJsonUpdatePoller() {
    if (jsonUpdatePollTimer) return;
    jsonUpdatePollTimer = window.setInterval(async function () {
      try {
        const shared = window.HAHBoard.sharedJsonStore;
        if (!shared || typeof shared.checkForRemoteUpdates !== 'function') return;
        const snap = store.getState ? store.getState() : {};
        const route = snap.route || {};
        if (route.view !== 'board' && route.view !== 'patient') return;
        const patientId = route.view === 'patient' ? (route.entityId || snap.selectedPatientId || '') : '';
        await shared.checkForRemoteUpdates(patientId || null);
      } catch (_) {}
    }, 60000);
  }

  async function handleSharedJsonStoreAction(action) {
    const shared = window.HAHBoard.sharedJsonStore;
    if (!shared) {
      window.alert('Shared JSON store module is not loaded.');
      return;
    }
    try {
      if (action === 'settings-json-client') shared.promptClientId();
      else if (action === 'settings-json-folder') shared.promptFolderPath();
      else if (action === 'settings-json-signin') await shared.signIn();
      else if (action === 'settings-json-init') await shared.initialiseStore();
      else if (action === 'settings-json-test') await shared.testReadWrite();
      else if (action === 'settings-json-create-test-patient') await shared.createTestPatient();
      else if (action === 'settings-json-load-patients') await shared.loadPatientDataset();
      else if (action === 'settings-json-load-tasks') await shared.loadTaskDataset();
      else if (action === 'settings-json-clear-patient-cache') shared.clearPatientCache();
      else if (action === 'settings-json-download-schema') shared.downloadStarterSchemas();
      else if (action === 'settings-json-refresh') {
        if (window.HAHBoard.store) window.HAHBoard.store.setState({ ui: { syncState: 'JSON store' } });
      }
    } catch (err) {
      console.error('[H@H JSON store]', err);
      window.alert(err && err.message ? err.message : 'Shared JSON store action failed.');
    }
    if (window.HAHBoard.store) {
      const snap = window.HAHBoard.store.getState();
      window.HAHBoard.store.setState({ ui: { syncState: snap.ui && snap.ui.syncState ? snap.ui.syncState : 'JSON store' } });
    }
  }

  function delegateScreenClick(event, state) {
    const screen = getActiveScreenModule(state);
    if (!screen || typeof screen.handleClick !== 'function') return false;
    return !!screen.handleClick(event, state);
  }

  function getActiveScreenModule(state) {
    switch (state.route.view) {
      case 'board': return window.HAHBoard.boardScreen || null;
      case 'patient': return window.HAHBoard.patientScreen || null;
      case 'tasks': return window.HAHBoard.tasksScreen || null;
      case 'insights': return window.HAHBoard.insightsScreen || null;
      default: return null;
    }
  }

  function renderFromState(state) {
    updateHeader(state);
    updateNav(state);
    updatePanes(state);
  }

  function updateHeader(state) {
    const syncPill = rootEl.querySelector('#hahSyncPill');
    if (syncPill) {
      const rawState = state.ui && state.ui.syncState;
      syncPill.textContent = normaliseSyncLabel(rawState);
      syncPill.classList.toggle('is-update', rawState === 'update-available');
      syncPill.classList.toggle('is-syncing', rawState === 'syncing');
      syncPill.classList.toggle('is-error', rawState === 'error');
      syncPill.title = rawState === 'update-available' ? 'JSON update available — press to reload' : 'Sync with shared JSON';
    }
    const boardroundBtn = rootEl.querySelector('#hahBoardroundBtn');
    if (boardroundBtn) boardroundBtn.classList.toggle('is-active', !!state.boardroundMode);
    const env = rootEl.querySelector('#hahEnvironmentLabel');
    if (env) env.textContent = getSurfaceKicker(state);
  }

  function getSurfaceKicker(state) {
    const map = {
      board: 'MDM / boardround workspace',
      patient: 'Single-patient desktop briefing',
      tasks: 'Action, ownership, and blockers',
      insights: 'Service intelligence and drill-in',
      settings: 'Desktop options and configuration'
    };
    let label = map[state.route.view] || 'Desktop workspace';
    if (state.boardroundMode && state.route.view !== 'settings') label += ' · Boardround mode';
    return label;
  }

  function updateNav(state) {
    const buttons = rootEl.querySelectorAll('[data-nav]');
    buttons.forEach((btn) => btn.classList.toggle('is-active', btn.getAttribute('data-nav') === state.route.view));
  }

  function updatePanes(state) {
    const leftPane  = rootEl.querySelector('#hahLeftPane');
    const mainPane  = rootEl.querySelector('#hahMainPane');
    const rightPane = rootEl.querySelector('#hahRightPane');

    // If the nav was previously re-parented into the left pane (compact
    // mode), move it back onto the app before we wipe innerHTML so it
    // survives the render. The layout code will re-parent it if needed.
    const nav = rootEl.querySelector('#hahNav');
    const app = rootEl.querySelector('#hahDesktopApp');
    if (nav && leftPane.contains(nav) && app) {
      app.insertBefore(nav, leftPane);
    }

    // Capture scroll positions BEFORE wiping innerHTML so the user doesn't
    // jump back to the top whenever something triggers a re-render (e.g.
    // tapping Clear or Undo in the right-pane composer, or any state
    // change that bubbles a render). Restore right after re-render.
    const scrollState = {
      left: leftPane.scrollTop,
      main: mainPane.scrollTop,
      right: rightPane.scrollTop
    };

    leftPane.innerHTML  = renderLeftPane(state);
    mainPane.innerHTML  = renderMainPane(state);
    rightPane.innerHTML = renderRightPane(state);
    const screen = getActiveScreenModule(state);
    if (screen && typeof screen.afterRender === 'function') {
      screen.afterRender(state, rightPane);
    }
    // Re-apply responsive layout (including compact-mode nav re-parenting)
    // after innerHTML has wiped the left pane. Run synchronously to avoid
    // a frame flash of missing nav.
    if (typeof window.HAHBoard.applyPatientLayout === 'function') {
      window.HAHBoard.applyPatientLayout();
    } else {
      window.dispatchEvent(new CustomEvent('hah:panes-resized'));
    }
    // Restore scroll. Browsers reset scrollTop to 0 when innerHTML is
    // replaced; this puts it back. We do this AFTER applyPatientLayout
    // because layout reparenting could affect available scroll height.
    leftPane.scrollTop = scrollState.left;
    mainPane.scrollTop = scrollState.main;
    rightPane.scrollTop = scrollState.right;
  }

  function bindResizeHandles() {
    const PANE_L_KEY = 'hah_pane_left_w';
    const PANE_R_KEY = 'hah_pane_right_w';

    const savedLeft  = parseInt(localStorage.getItem(PANE_L_KEY)  || '292', 10);
    const savedRight = parseInt(localStorage.getItem(PANE_R_KEY) || '680', 10);
    document.documentElement.style.setProperty('--desk-left-w',  savedLeft  + 'px');
    document.documentElement.style.setProperty('--desk-right-w', savedRight + 'px');

    function startDrag(e, side) {
      e.preventDefault();
      const handle   = e.currentTarget;
      const startX   = e.clientX;
      const startVal = parseInt(
        getComputedStyle(document.documentElement)
          .getPropertyValue(side === 'left' ? '--desk-left-w' : '--desk-right-w'), 10
      );
      handle.classList.add('is-dragging');
      window.HAHBoard.__resizingPanes = true;
      rootEl.classList.add('is-resizing-panes');

      function onMove(e) {
        const dx = e.clientX - startX;
        const min = side === 'left' ? 180 : 280;
        const max = side === 'left' ? 520 : 900;
        const next = Math.max(min, Math.min(max, side === 'left' ? startVal + dx : startVal - dx));
        document.documentElement.style.setProperty(
          side === 'left' ? '--desk-left-w' : '--desk-right-w',
          next + 'px'
        );
      }

      function onUp() {
        handle.classList.remove('is-dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        const lw = getComputedStyle(document.documentElement).getPropertyValue('--desk-left-w').trim();
        const rw = getComputedStyle(document.documentElement).getPropertyValue('--desk-right-w').trim();
        try {
          localStorage.setItem(PANE_L_KEY, parseInt(lw, 10));
          localStorage.setItem(PANE_R_KEY, parseInt(rw, 10));
        } catch (_) {}
        window.HAHBoard.__resizingPanes = false;
        rootEl.classList.remove('is-resizing-panes');
        window.dispatchEvent(new CustomEvent('hah:panes-resized'));
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    }

    const lh = rootEl.querySelector('#hahResizeLeft');
    const rh = rootEl.querySelector('#hahResizeRight');
    if (lh) lh.addEventListener('mousedown', (e) => startDrag(e, 'left'));
    if (rh) rh.addEventListener('mousedown', (e) => startDrag(e, 'right'));
  }

// 30-websocket-sync.js
// Real-time sync for HaH Board desktop.
// Hooks into window.HAHBoard.sharedJsonStore writes and broadcasts change
// notifications to other connected clients via the Azure WebSocket relay.
// On receive, triggers a re-pull from OneDrive using the existing public API.
//
// OneDrive remains the source of truth — this module only carries deltas.

(function () {
  'use strict';

  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const WS_URL = 'wss://hah-sync-mrleee3-hpaje8aca7dgd4fw.westeurope-01.azurewebsites.net/sync';
  const RECONNECT_BASE_MS = 1000;
  const RECONNECT_MAX_MS = 30000;
  const REFRESH_DEBOUNCE_MS = 200;
  const DEVICE_TAG = 'desktop';

  // Allow disabling via localStorage if it ever misbehaves
  if (localStorage.getItem('hah_wssync_disabled') === '1') {
    console.log('[WSSync] Disabled via localStorage flag');
    return;
  }

  // ─── WEBSOCKET CONNECTION ──────────────────────────────────────────────────
  let socket = null;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  let intentionalClose = false;
  let clientId = null;
  const listeners = new Set();
  const sendQueue = [];

  function connect() {
    if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) return;
    intentionalClose = false;
    try {
      socket = new WebSocket(WS_URL);
    } catch (e) {
      console.error('[WSSync] construct failed:', e);
      scheduleReconnect();
      return;
    }
    socket.addEventListener('open', () => {
      console.log('[WSSync] connected');
      reconnectAttempt = 0;
      while (sendQueue.length && socket.readyState === WebSocket.OPEN) socket.send(sendQueue.shift());
      window.dispatchEvent(new CustomEvent('wssync:connected'));
    });
    socket.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch (_) { return; }
      if (msg.type === 'welcome') { clientId = msg.clientId; console.log('[WSSync] client id:', clientId); return; }
      if (msg.type === 'ack') return;
      if (msg.type === 'error') { console.warn('[WSSync] server error:', msg.message); return; }
      listeners.forEach(fn => { try { fn(msg); } catch (e) { console.error('[WSSync] listener threw:', e); } });
      window.dispatchEvent(new CustomEvent('wssync:message', { detail: msg }));
    });
    socket.addEventListener('close', () => {
      window.dispatchEvent(new CustomEvent('wssync:disconnected'));
      if (!intentionalClose) scheduleReconnect();
    });
    socket.addEventListener('error', () => { /* close will fire next */ });
  }

  function scheduleReconnect() {
    if (reconnectTimer) return;
    const delay = Math.min(RECONNECT_BASE_MS * Math.pow(2, reconnectAttempt), RECONNECT_MAX_MS);
    reconnectAttempt++;
    console.log(`[WSSync] reconnect in ${delay}ms (attempt ${reconnectAttempt})`);
    reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, delay);
  }

  function send(type, payload) {
    const msg = JSON.stringify({ type, payload, device: DEVICE_TAG, ts: Date.now() });
    if (socket && socket.readyState === WebSocket.OPEN) socket.send(msg);
    else { sendQueue.push(msg); if (!socket || socket.readyState === WebSocket.CLOSED) connect(); }

  document.addEventListener('visibilitychange', () => {

  // updatePatientCore in some flows).
  let nestingDepth = 0;

  // (returnValue, originalArgs) -> [type, payload]
  const WRAPPERS = {
    createPatientRecord:           (r)            => ['patient.changed', { patientId: String((r && r.id) || '') }],
    updatePatientCore:             (_, [pid])     => ['patient.changed', { patientId: String(pid || '') }],
    patchPatientRecord:            (_, [pid])     => ['patient.changed', { patientId: String(pid || '') }],
    archivePatientRecord:          (_, [pid])     => ['service.changed', { patientId: String(pid || ''), action: 'archive' }],
    restoreArchivedPatientRecord:  (_, [pid])     => ['service.changed', { patientId: String(pid || ''), action: 'restore' }],
    upsertPatientTimelineEntry:    (_, [pid])     => ['patient.changed', { patientId: String(pid || '') }],
    saveTasks:                     ()             => ['tasks.changed', {}],
    upsertTaskRecord:              ()             => ['tasks.changed', {}],
    patchTaskRecord:               ()             => ['tasks.changed', {}],
    saveRound:                     (_, [date])    => ['round.changed', { date: String(date || '') }],
  };

  function wrapMethod(obj, name) {
    const original = obj[name];
    if (typeof original !== 'function' || original.__wssync) return;
    const after = WRAPPERS[name];
    obj[name] = async function () {
      const args = Array.from(arguments);
      nestingDepth++;
      try {
        const result = await original.apply(this, args);
        if (nestingDepth === 1 && after) {
          try {
            const [type, payload] = after(result, args);
            if (type) {
              send(type, payload || {});
              console.log('[WSSync] broadcast', name, '->', type);
            }
          } catch (e) { console.warn('[WSSync] hook error:', name, e); }
        }
        return result;
      } finally {
        nestingDepth--;
      }
    };
    obj[name].__wssync = true;
  }

  function instrument() {
    const store = window.HAHBoard && window.HAHBoard.sharedJsonStore;
    if (!store) {
      // Try again shortly — store loads after this script
      setTimeout(instrument, 200);
      return;
    }
    if (store.__wssync_instrumented) return;
    Object.keys(WRAPPERS).forEach(name => wrapMethod(store, name));
    store.__wssync_instrumented = true;
    console.log('[WSSync] instrumented sharedJsonStore methods');
  }

  // ─── RECEIVER ──────────────────────────────────────────────────────────────
  // Coalesce multiple incoming messages within REFRESH_DEBOUNCE_MS into
  // one refresh, so rapid bursts of edits on the other device don't cause
  // rapid-fire reloads here.
  let refreshTimer = null;
  let pending = { patient: false, tasks: false };

  function scheduleRefresh(flags) {
    if (flags.patient) pending.patient = true;
    if (flags.tasks) pending.tasks = true;
    if (refreshTimer) return;
    refreshTimer = setTimeout(doRefresh, REFRESH_DEBOUNCE_MS);
  }

  async function doRefresh() {
    refreshTimer = null;
    const flags = { ...pending };
    pending = { patient: false, tasks: false };
    const store = window.HAHBoard && window.HAHBoard.sharedJsonStore;
    if (!store) return;
    try {
      if (flags.patient && typeof store.loadPatientDataset === 'function') {
        await store.loadPatientDataset();
      }
      if (flags.tasks && typeof store.loadTaskDataset === 'function') {
        await store.loadTaskDataset();
      }
      // Nudge the desktop store to re-render. Setting state with no change
      // still triggers subscribers; pick a benign field.
      try {
        const s = window.HAHBoard && window.HAHBoard.store;
        if (s && typeof s.setState === 'function') {
          s.setState({ ui: { lastWsRefreshAt: Date.now() } });
        }
      } catch (_) {}
      console.log('[WSSync] refreshed', flags);
    } catch (e) {
      console.warn('[WSSync] refresh failed:', e);
    }
  }

  on((msg) => {
    if (!msg || !msg.type) return;
    switch (msg.type) {
      case 'patient.changed':
      case 'service.changed':
      case 'round.changed':
        scheduleRefresh({ patient: true });
        break;
      case 'tasks.changed':
        scheduleRefresh({ tasks: true });
        break;
      default:
        // Unknown type — ignore
        break;
    }
  });

  // On reconnect after a disconnect, do a one-shot full refresh to catch up
  // on anything missed while we were offline.
  window.addEventListener('wssync:connected', () => {
    // Skip the very first connect — initial app load already pulls fresh data
    if (window.WSSync.__initialConnectDone) {
      console.log('[WSSync] reconnected — running catchup refresh');
      scheduleRefresh({ patient: true, tasks: true });
    }
    window.WSSync.__initialConnectDone = true;
  });

  // ─── BOOT ──────────────────────────────────────────────────────────────────
  instrument();
  connect();

  // ─── STATUS DOT ───────────────────────────────────────────────────────────
  // The dot itself lives in the board template (rendered by 25-desktop-board.js)
  // with class .hah-ws-dot. We don't touch the dot directly. Instead we toggle
  // classes on <body>: hah-ws-connected | hah-ws-connecting. CSS handles the
  // rest. This means the board can re-render as often as it likes — the dot
  // re-appears already styled correctly by CSS, with no JS DOM observation
  // and no chance of interfering with other layout code.
  function setBodyWsClass(state) {
    const body = document.body;
    if (!body) return;
    body.classList.toggle('hah-ws-connected',  state === 'connected');
    body.classList.toggle('hah-ws-connecting', state === 'connecting');
  }
  setBodyWsClass('connecting');
  window.addEventListener('wssync:connected',    () => setBodyWsClass('connected'));
  window.addEventListener('wssync:disconnected', () => setBodyWsClass('connecting'));

  console.log('[WSSync] desktop module loaded');
})();

/* inlined: js/31-wssync-debug-panel.js */
// 21-wssync-debug-panel.js  (mobile)
// 31-wssync-debug-panel.js  (desktop — same code, different filename)
//
// Small floating debug panel for the WebSocket sync layer.
// Shows live connection status and a rolling log of events.
// Tap to expand/collapse. Long-press to clear log.
//
// Hidden by default. To show:
//   localStorage.setItem('hah_wssync_debug', '1');
// or call: WSSyncDebug.show()
//
// To hide:
//   localStorage.removeItem('hah_wssync_debug');
// or call: WSSyncDebug.hide()

(function () {
  'use strict';

  const MAX_LOG_ENTRIES = 30;
  const SHOW_KEY = 'hah_wssync_debug';

  let isVisible = false;
  let isExpanded = false;
  let logEntries = [];
  let panelEl = null;
  let summaryEl = null;
  let listEl = null;
  let lastConnectAt = 0;

  function isShowEnabled() {
    try { return localStorage.getItem(SHOW_KEY) === '1'; } catch (_) { return false; }
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    return d.toTimeString().slice(0, 8);
  }

  function fmtElapsed(ms) {
    if (ms < 1000) return ms + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    if (ms < 3600000) return Math.round(ms / 60000) + 'm';
    return Math.round(ms / 3600000) + 'h';
  }

  function getStateLabel() {
    const ws = window.WSSync;
    if (!ws) return 'no module';
    if (ws.isConnected && ws.isConnected()) return 'connected';
    return 'disconnected';
  }

  function getStateColor() {
    return getStateLabel() === 'connected' ? '#10b981' : '#ef4444';
  }

  function ensurePanel() {
    if (panelEl) return panelEl;
    panelEl = document.createElement('div');
    panelEl.id = 'wssyncDebugPanel';

    // Restore last position if we have one, otherwise default to bottom-left
    let pos = null;
    try { pos = JSON.parse(localStorage.getItem('hah_wssync_debug_pos') || 'null'); } catch (_) {}

    const baseStyle = [
      'position:fixed',
      'z-index:99999',
      'font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif',
      'font-size:11px',
      'line-height:1.3',
      'background:rgba(17,24,39,0.92)',
      'color:#f3f4f6',
      'border-radius:8px',
      'box-shadow:0 4px 14px rgba(0,0,0,0.4)',
      'backdrop-filter:saturate(140%) blur(8px)',
      '-webkit-backdrop-filter:saturate(140%) blur(8px)',
      'border:1px solid rgba(255,255,255,0.08)',
      'overflow:hidden',
      'max-width:calc(100vw - 16px)',
      'user-select:none',
      '-webkit-user-select:none',
      'touch-action:none'
    ].join(';');

    panelEl.style.cssText = baseStyle;
    if (pos && Number.isFinite(pos.x) && Number.isFinite(pos.y)) {
      panelEl.style.left = pos.x + 'px';
      panelEl.style.top = pos.y + 'px';
    } else {
      panelEl.style.left = '8px';
      panelEl.style.bottom = 'calc(8px + env(safe-area-inset-bottom, 0px))';
    }

    summaryEl = document.createElement('div');
    summaryEl.style.cssText = 'padding:6px 10px;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:grab';
    panelEl.appendChild(summaryEl);

    listEl = document.createElement('div');
    listEl.style.cssText = 'padding:0 10px 8px;border-top:1px solid rgba(255,255,255,0.08);max-height:240px;overflow:auto;display:none;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:10px';
    panelEl.appendChild(listEl);

    // ─── Drag + tap + long-press all on the summary bar ─────────────────────

    let dragging = false;
    let didDrag = false;
    let startX = 0, startY = 0;
    let originLeft = 0, originTop = 0;
    const DRAG_THRESHOLD_PX = 6;
    const LONG_PRESS_MS = 800;

    function clampToViewport(x, y, w, h) {

      const maxY = Math.max(0, window.innerHeight - h);

      originLeft = rect.left;
      originTop = rect.top;
      // Switch to top/left positioning so we can move freely
      panelEl.style.bottom = 'auto';
      panelEl.style.right = 'auto';
      panelEl.style.left = originLeft + 'px';
      panelEl.style.top = originTop + 'px';
      summaryEl.style.cursor = 'grabbing';
      pressTimer = setTimeout(() => {
        if (!didDrag) {
          logEntries = [];
          addLog('debug', 'log cleared');
          renderList();
        }
        pressTimer = null;
      }, LONG_PRESS_MS);
    });

    summaryEl.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

        didDrag = true;
        if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      }
      if (didDrag) {
        const rect = panelEl.getBoundingClientRect();
        const next = clampToViewport(originLeft + dx, originTop + dy, rect.width, rect.height);
        panelEl.style.left = next.x + 'px';
        panelEl.style.top = next.y + 'px';
      }
    });

    function endPointer(e) {
      if (!dragging) return;
      try { summaryEl.releasePointerCapture && summaryEl.releasePointerCapture(e.pointerId); } catch (_) {}
      dragging = false;
      summaryEl.style.cursor = 'grab';
      if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
      if (didDrag) {
        // Save new position
        const rect = panelEl.getBoundingClientRect();
        try { localStorage.setItem('hah_wssync_debug_pos', JSON.stringify({ x: rect.left, y: rect.top })); } catch (_) {}

        // No drag → treat as tap
        toggleExpanded();

    summaryEl.addEventListener('pointercancel', endPointer);

    // Keep panel in viewport if window resizes / device rotates
    window.addEventListener('resize', () => {
      const rect = panelEl.getBoundingClientRect();
      const next = clampToViewport(rect.left, rect.top, rect.width, rect.height);

        panelEl.style.left = next.x + 'px';
        panelEl.style.top = next.y + 'px';
      }

    document.body.appendChild(panelEl);
    return panelEl;
  }

  function toggleExpanded() {
    isExpanded = !isExpanded;
    if (listEl) listEl.style.display = isExpanded ? 'block' : 'none';
    renderSummary();
  }

  function renderSummary() {
    if (!summaryEl) return;
    const state = getStateLabel();
    const dot = `<span style="width:8px;height:8px;border-radius:50%;background:${getStateColor()};display:inline-block;flex:0 0 auto"></span>`;
    const since = lastConnectAt ? ` · ${fmtElapsed(Date.now() - lastConnectAt)}` : '';
    const last = logEntries.length ? ` · ${logEntries[logEntries.length - 1].label}` : '';
    const arrow = `<span style="opacity:.6;margin-left:4px">${isExpanded ? '▾' : '▸'}</span>`;
    summaryEl.innerHTML = `${dot}<span>WS ${state}${since}${last}</span>${arrow}`;
  }

  function renderList() {
    if (!listEl) return;
    if (!logEntries.length) {
      listEl.innerHTML = '<div style="opacity:.5;padding:8px 0">No events yet.</div>';
      return;
    }
    const rows = logEntries.slice().reverse().map(e => {
      const colour = e.level === 'error' ? '#fca5a5' : e.level === 'warn' ? '#fcd34d' : e.level === 'event' ? '#86efac' : '#d1d5db';

    }).join('');

  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
  }

  function addLog(level, label) {
    logEntries.push({ ts: Date.now(), level, label });
    while (logEntries.length > MAX_LOG_ENTRIES) logEntries.shift();
    if (isVisible) {
      renderSummary();
      if (isExpanded) renderList();
    }
  }

  function show() {
    isVisible = true;
    ensurePanel();
    panelEl.style.display = 'block';
    renderSummary();
    renderList();
  }

  function hide() {
    isVisible = false;
    if (panelEl) panelEl.style.display = 'none';
  }

  // ─── Wire up to WSSync events ──────────────────────────────────────────────
  function attach() {
    window.addEventListener('wssync:connected', () => {
      lastConnectAt = Date.now();
      addLog('event', 'WS connected');
    });
    window.addEventListener('wssync:disconnected', () => {
      addLog('warn', 'WS disconnected');
    });
    window.addEventListener('wssync:message', (e) => {
      const m = e && e.detail;
      if (!m) return;
      if (m.type === 'patient.changed') addLog('event', `← ${m._from || '?'} ${m.type} ${m.payload && m.payload.patientId ? '(' + String(m.payload.patientId).slice(0, 12) + ')' : ''}`);
      else addLog('event', `← ${m._from || '?'} ${m.type}`);
    });

    // Hook console for refresh outcomes — match the existing log strings the
    // sync module emits, so we don't have to touch that module to wire signals.
    const origLog = console.log.bind(console);
    const origWarn = console.warn.bind(console);
    console.log = function () {
      try {
        const first = arguments[0];
        if (typeof first === 'string' && first.indexOf('[WSSync]') === 0) {
          addLog('info', first.replace('[WSSync] ', ''));
        }
      } catch (_) {}
      return origLog.apply(console, arguments);
    };
    console.warn = function () {
      try {
        const first = arguments[0];
        if (typeof first === 'string' && first.indexOf('[WSSync]') === 0) {
          addLog('warn', first.replace('[WSSync] ', ''));
        }
      } catch (_) {}
      return origWarn.apply(console, arguments);
    };

    // Re-render summary periodically to keep "connected · 12s" fresh
    setInterval(() => { if (isVisible) renderSummary(); }, 1000);
  }

  // ─── Public API ────────────────────────────────────────────────────────────
  window.WSSyncDebug = {
    show: () => { try { localStorage.setItem(SHOW_KEY, '1'); } catch (_) {} show(); },
    hide: () => { try { localStorage.removeItem(SHOW_KEY); } catch (_) {} hide(); },
    toggle: () => { isVisible ? window.WSSyncDebug.hide() : window.WSSyncDebug.show(); },
    log: (label) => addLog('info', label),
    isVisible: () => isVisible
  };

  // Auto-show if flag is set
  function init() {
    attach();
    if (isShowEnabled()) show();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
