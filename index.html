  }

  function saveDraft(patientId, type, fields) {
    try { localStorage.setItem(DRAFT_PREFIX + patientId + ':' + type, JSON.stringify({ fields, at: Date.now() })); } catch (_) {}
  }
  function loadDraft(patientId, type) {
    try { const r = localStorage.getItem(DRAFT_PREFIX + patientId + ':' + type); return r ? JSON.parse(r) : null; } catch (_) { return null; }
  }
  function clearDraft(patientId, type) {
    try { localStorage.removeItem(DRAFT_PREFIX + patientId + ':' + type); } catch (_) {}
  }

  function getBoardSelectionStoreKey() {
    return BOARD_SELECTION_PREFIX + todayIso();
  }

  function loadBoardSelectionToday() {
    try {
      const raw = localStorage.getItem(getBoardSelectionStoreKey());
      if (!raw) return { members: [], otherText: '' };
      const parsed = JSON.parse(raw);
      const members = Array.isArray(parsed.members) ? parsed.members.filter(Boolean) : [];
      const otherText = parsed.otherText ? String(parsed.otherText) : '';
      return { members, otherText };
    } catch (_) {
      return { members: [], otherText: '' };
    }
  }

  function saveBoardSelectionToday(selection) {
    const payload = {
      members: Array.isArray(selection && selection.members) ? selection.members.slice() : [],
      otherText: selection && selection.otherText ? String(selection.otherText) : ''
    };
    try { localStorage.setItem(getBoardSelectionStoreKey(), JSON.stringify(payload)); } catch (_) {}
  }

  function normaliseEncounterType(type) {
    const raw = String(type || '').trim().toLowerCase().replace(/[-\s]+/g, '_');
    if (raw === 'boardround' || raw === 'board_round') return 'board_round';
    if (raw === 'mobile_clinical_review' || raw === 'mobileclinicalreview' || raw === 'mobile_clinical_update' || raw === 'mobileclinicalupdate') return 'mobile_clinical_review';
    if (raw === 'micro_mdm' || raw === 'micromdm' || raw === 'micro') return 'micro_mdm';
    if (raw === 'resp_mdm' || raw === 'respiratory_mdm' || raw === 'respmdm' || raw === 'resp') return 'resp_mdm';
    // v0.8.145: medication_change entries logged via the new card.
    if (raw === 'medication_change' || raw === 'medicationchange' || raw === 'med_change' || raw === 'medchange') return 'medication_change';
    return 'other';
  }

  function encounterFromJsonTimelineEntry(patientId, entry) {
    if (!entry) return null;
    const note = entry.note || {};
    const fields = Object.assign({}, entry.fields || {}, {
      issues: String((entry.fields && entry.fields.issues) || note.issues || '').trim(),
      progress: String((entry.fields && (entry.fields.progress || entry.fields.currently)) || note.progress || '').trim(),
      currently: String((entry.fields && (entry.fields.currently || entry.fields.progress)) || note.progress || '').trim(),
      examination: String((entry.fields && entry.fields.examination) || note.examination || '').trim(),
      bloods: String((entry.fields && (entry.fields.bloods || entry.fields.bloodsIx)) || note.bloodsIx || note.bloods || '').trim(),
      plan: String((entry.fields && entry.fields.plan) || note.plan || '').trim()
    });
    const type = normaliseEncounterType(entry.type);
    if (type === 'board_round' || type === 'mobile_clinical_review') {
      const rawIssues = String(fields.issues || '').trim();
      fields.issueRaw = fields.issueRaw || rawIssues;
      fields.issueLines = Array.isArray(fields.issueLines) && fields.issueLines.length
        ? fields.issueLines
        : (rawIssues ? rawIssues.split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean) : []);
      fields.issues = fields.issueLines.length ? fields.issueLines.join('\n') : rawIssues;
    }
    return {
      id: String(entry.id || `json:${patientId}:${entry.timestamp || ''}`),
      patientId: String(patientId || ''),
      type,
      timestamp: entry.timestamp || entry.completedAt || entry.updatedAt || '',
      author: entry.author || entry.updatedBy || 'Board user',
      fields,
      source: 'json'
    };
  }

  function getJsonTimelineEncounters(patientSummary) {
    const raw = patientSummary && patientSummary.sourcePatient ? patientSummary.sourcePatient : {};
    const jsonRecord = raw && raw.jsonRecord ? raw.jsonRecord : null;
    const timeline = Array.isArray(jsonRecord && jsonRecord.timeline) ? jsonRecord.timeline : [];
    return timeline.map((entry) => encounterFromJsonTimelineEntry(patientSummary.id, entry)).filter(Boolean);
  }

  function getPatientEncounterRows(patientSummary, type) {
    const localRows = ops && typeof ops.getEncountersForPatient === 'function'
      ? ops.getEncountersForPatient(patientSummary.id)
      : [];
    const jsonRows = getJsonTimelineEncounters(patientSummary);
    const map = new Map();
    jsonRows.concat(localRows || []).forEach((row) => {
      if (!row) return;
      const key = String(row.id || '');
      if (!key) return;
      // Hide any encounter whose deletion is in flight on the JSON side.
      // The local ops.deleteEncounter has already removed it from
      // state.encounters, but jsonRows still contains it until the network
      // round trip completes. Suppressing it here makes the UI feel instant.
      if (pendingDeleteIds.has(key)) return;
      map.set(key, Object.assign({}, map.get(key) || {}, row));
    });
    return Array.from(map.values())
      .filter((row) => !type || row.type === type)
      .sort((a, b) => Date.parse(b.timestamp || 0) - Date.parse(a.timestamp || 0));
  }

  function getLastBoardRoundEntry(patientSummary) {
    return getPatientEncounterRows(patientSummary, 'board_round')[0] || null;
  }

  function isBoardTemplateEncounter(enc) {
    return enc && (enc.type === 'board_round' || enc.type === 'mobile_clinical_review');
  }

  function getLastBoardTemplateEntry(patientSummary) {
    return (getPatientEncounterRows(patientSummary) || []).find(isBoardTemplateEncounter) || null;
  }

  function persistEncounterToJson(patientSummary, encounter) {
    const raw = patientSummary && patientSummary.sourcePatient ? patientSummary.sourcePatient : {};
    if (!raw || !raw.jsonRecord) return Promise.resolve();
    const api = window.HAHBoard.sharedJsonStore;
    if (!api || typeof api.upsertPatientTimelineEntry !== 'function') return Promise.resolve();
    return api.upsertPatientTimelineEntry(patientSummary.id, encounter)
      .then(function () {
        store.setState({ patient: { _jsonSavedAt: Date.now() } });
      })
      .catch(function (err) {
        console.warn('[H@H JSON store] Could not save patient timeline entry', err);
        const pane = document.querySelector('#hahRightPane');
        if (pane) showToast(pane, 'Saved locally · JSON write failed');
      });
  }
  function persistPatientPatchToJson(patientId, patch) {
    const api = window.HAHBoard.sharedJsonStore;
    if (!api || typeof api.patchPatientRecord !== 'function') return Promise.resolve();
    return api.patchPatientRecord(String(patientId || ''), patch || {})
      .then(function () {
        store.setState({ patient: { _jsonPatientSavedAt: Date.now() } });
      })
      .catch(function (err) {
        // Local/demo patients will not have a JSON file yet; keep the local workflow quiet.
        console.warn('[H@H JSON store] Could not patch patient record', err);
      });
  }

  function isJsonPatient(patient) {
    const raw = patient && patient.sourcePatient ? patient.sourcePatient : {};
    return !!(raw && raw.jsonRecord);
  }

  function getJsonPatientRecord(patient) {
    const raw = patient && patient.sourcePatient ? patient.sourcePatient : {};
    return raw && raw.jsonRecord ? raw.jsonRecord : null;
  }

  function updatePatientCoreJson(patientId, fields) {
    const api = window.HAHBoard.sharedJsonStore;
    if (!api || typeof api.updatePatientCore !== 'function') return Promise.reject(new Error('Shared JSON store is not available.'));
    return api.updatePatientCore(String(patientId || ''), fields || {});
  }

  function archivePatientJson(patientId) {
    const api = window.HAHBoard.sharedJsonStore;
    if (!api || typeof api.archivePatientRecord !== 'function') return Promise.reject(new Error('Shared JSON store is not available.'));
    return api.archivePatientRecord(String(patientId || ''));
  }

  function acpPatchForJson(acp) {
    const row = acp || {};
    const hasAcp = !!(row.dnacprStatus || row.tepStatus || row.jicMeds || row.tep || (row.notes && String(row.notes).trim()));
    const escalationParts = [];
    if (row.tep) escalationParts.push(String(row.tep).trim());
    if (row.tepStatus) escalationParts.push('UCP ' + String(row.tepStatus).replace(/_/g, ' '));
    return {
      alerts: {
        dnar: row.dnacprStatus === 'yes',
        acp: hasAcp,
        escalation: escalationParts.filter(Boolean).join(' · ')
      },
      clinical: {
        acp: Object.assign({}, row)
      }
    };
  }

  function getJsonAcpForPatient(patientSummary) {
    const raw = patientSummary && patientSummary.sourcePatient ? patientSummary.sourcePatient : {};
    const jsonRecord = raw && raw.jsonRecord ? raw.jsonRecord : null;
    return jsonRecord && jsonRecord.clinical && jsonRecord.clinical.acp && typeof jsonRecord.clinical.acp === 'object'
      ? jsonRecord.clinical.acp
      : {};
  }

  function normaliseAcpState(row) {
    const acp = Object.assign({}, row || {});
    function boolVal(value) {
      const text = String(value == null ? '' : value).trim().toLowerCase();
      if (text === 'true' || text === 'yes' || text === '1') return true;
      if (text === 'false' || text === 'no' || text === '0' || text === '') return false;
      return !!value;
    }
    if (acp.dnacprFormSeen != null) acp.dnacprFormSeen = boolVal(acp.dnacprFormSeen);
    if (!acp.tep && acp.ceilingOfCare) acp.tep = acp.ceilingOfCare;
    if (!acp.notes && acp.acpNotes) acp.notes = acp.acpNotes;
    return acp;
  }

  function getAcpStateForVm(vm) {
    const jsonAcp = normaliseAcpState(getJsonAcpForPatient(vm.patient));
    const hasJsonAcp = !!Object.keys(jsonAcp).some(function (key) {
      const value = jsonAcp[key];
      return value != null && String(value).trim() !== '';
    });
    const raw = vm && vm.patient && vm.patient.sourcePatient ? vm.patient.sourcePatient : {};
    if (raw && raw.jsonRecord && hasJsonAcp) return jsonAcp;
    const ps = ops ? ops.getPatientState(vm.patient.id) : {};
    const localAcp = ps && ps.acp && typeof ps.acp === 'object' ? normaliseAcpState(ps.acp) : {};
    return Object.keys(localAcp).length ? localAcp : jsonAcp;
  }

  function todayIso()    { return new Date().toISOString().split('T')[0]; }
  function tomorrowIso() { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().split('T')[0]; }

  function formatEDD(dateStr, isReady) {
    if (isReady) return 'Ready for discharge';
    if (!dateStr) return '';
    const dt = new Date(dateStr + 'T12:00:00');
    if (isNaN(dt.getTime())) return dateStr;
    if (dateStr === todayIso())    return 'Today';
    if (dateStr === tomorrowIso()) return 'Tomorrow';
    return dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function deriveDischargeReadiness(dateStr, isReady) {
    if (isReady)         return 'Ready';
    if (!dateStr)        return null;
    if (dateStr === todayIso())    return 'Possible today';
    if (dateStr === tomorrowIso()) return 'Likely tomorrow';
    return 'Not ready';
  }

  function renderLeftPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return c.stack([c.card('Patients', c.emptyState('No patient selected', 'Choose a patient from the board.'))]);

    const sortMode  = (state.patient && state.patient.listSort) || 'name';
    const rawFilter = (state.patient && state.patient.listFilter) || null;
    const filterSet = new Set(Array.isArray(rawFilter) ? rawFilter : rawFilter ? [rawFilter] : []);

    const allRows = sortPatientRows(vm.contextRows, sortMode);
    const metrics = computeCaseloadMetrics(allRows);
    const filteredRows = applyListFilter(allRows, filterSet);

    const activeRound = ops ? ops.getActiveRound() : null;
    const statusMenuFor = (state.patient && state.patient.statusMenuFor) || null;

    // Round-start cascade: when start-round fires, the patient list rows
    // do a staggered "roll call" — each card pops up briefly with a green
    // pip flash, in sequence top-to-bottom. Fixed stagger (~80 ms between
    // cards) so each card's turn is visibly distinct rather than overlapping
    // into a smooth wave. Total duration grows with list length but each
    // row's animation is short and snappy (280 ms) so even ~20 patients
    // completes in ~1.8s.
    const ROUND_START_ANIM_PER_ROW_MS = 280;
    const ROUND_START_ANIM_STAGGER_MS = 80;
    const animAt = state && state.patient && state.patient.roundStartAnimAt;
    const rowCount = filteredRows.length;
    const totalAnimDuration = (rowCount * ROUND_START_ANIM_STAGGER_MS) + ROUND_START_ANIM_PER_ROW_MS + 200;
    const animActive = !!(animAt && (Date.now() - animAt) < totalAnimDuration);
    const stagger = animActive ? ROUND_START_ANIM_STAGGER_MS : 0;

    const jumpRows = filteredRows.map((row, idx) => {
      const active = String(row.id) === String(vm.patient.id) ? ' is-active' : '';
      const status = row.boardStatus || 'Not discussed';
      const statusTone = status === 'Discussed' || status === 'Actioned' ? 'is-done'
                      : status === 'Deferred' ? 'is-deferred'
                      : status === 'In discussion' ? 'is-now'
                      : '';
      const dotHtml = activeRound
        ? renderStatusDotOverlay(row, status, statusMenuFor === row.id)
        : renderStatusDotStatic(status);
      const animAttr = animActive ? ` style="--hah-round-start-delay:${idx * stagger}ms"` : '';
      const animClass = animActive ? ' is-round-starting' : '';
      return `<div class="hah-patient-row-wrap${activeRound ? ' is-round-active' : ''}${animClass}"${animAttr}>
        <button type="button" class="hah-patient-row${active} ${statusTone}"
          data-patient-action="jump" data-patient-id="${c.escapeHtml(row.id)}">
          <div class="hah-patient-row-main">
            <span class="hah-patient-row-name">${c.escapeHtml(row.name)}</span>
            <span class="hah-patient-row-sub">${c.escapeHtml(status)}</span>
          </div>
          ${!activeRound ? dotHtml : ''}
        </button>
        ${activeRound ? dotHtml : ''}
      </div>`;
    }).join('');

    const sortLabel = sortMode === 'admission' ? 'Admission date' : 'Name (A–Z)';
    const sortMenuOpen = !!(state.patient && state.patient.sortMenuOpen);

    const listHead = `
      <div class="hah-list-head">
        <span class="hah-list-title">Patient list</span>
        <span class="hah-ws-dot" aria-hidden="true"></span>
        <div class="hah-list-sort-wrap">
          <button type="button" class="hah-list-sort-btn${sortMenuOpen ? ' is-open' : ''}"
            data-patient-action="toggle-sort-menu" title="Sort: ${c.escapeHtml(sortLabel)}">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/>
            </svg>
          </button>
          ${sortMenuOpen ? `
          <div class="hah-sort-menu">
            <button type="button" class="${sortMode === 'name' ? 'is-selected' : ''}"
              data-patient-action="set-list-sort" data-sort="name">
              <span>Name (A–Z)</span><span class="hah-sort-check">✓</span>
            </button>
            <button type="button" class="${sortMode === 'admission' ? 'is-selected' : ''}"
              data-patient-action="set-list-sort" data-sort="admission">
              <span>Admission date</span><span class="hah-sort-check">✓</span>
            </button>
          </div>` : ''}
        </div>
      </div>`;

    return c.stack([
      renderCaseloadCard(metrics, filterSet),
      `<section class="hah-card hah-patient-list-card">
        ${listHead}
        ${filterSet.size ? `
        <div class="hah-list-filter-banner">
          <span>Showing ${filteredRows.length} of ${allRows.length}</span>
          <button type="button" class="hah-list-filter-clear" data-patient-action="clear-list-filter">Clear filter${filterSet.size > 1 ? 's' : ''}</button>
        </div>` : ''}
        <div class="hah-patient-list">${jumpRows}</div>
      </section>`
    ]);
  }

  function computeCaseloadMetrics(rows) {
    const total = rows.length;
    const now = Date.now();
    const losList = rows.map((r) => {
      const t = parseAdmissionDate(r.admissionDate);
      if (!t) return null;
      return Math.max(0, Math.floor((now - t) / 86400000));
    }).filter((v) => v !== null);
    const avgLOS = losList.length ? (losList.reduce((a, b) => a + b, 0) / losList.length) : 0;
    const over7 = losList.filter((v) => v > 7).length;
    const dischargeToday = rows.filter((r) => r.dischargeReadiness === 'Ready' || r.dischargeReadiness === 'Possible today').length;
    const discussed = rows.filter((r) => r.boardStatus === 'Discussed' || r.boardStatus === 'Actioned').length;
    const toGo = total - discussed;
    return { total, avgLOS, over7, dischargeToday, discussed, toGo };
  }

  function applyListFilter(rows, filterSet) {
    if (!filterSet || !filterSet.size) return rows;
    const now = Date.now();
    return rows.filter((r) => {
      if (filterSet.has('over-7')) {
        const t = parseAdmissionDate(r.admissionDate);
        if (!t) return false;
        if (Math.floor((now - t) / 86400000) <= 7) return false;
      }
      if (filterSet.has('discharge-today')) {
        if (!(r.dischargeReadiness === 'Ready' || r.dischargeReadiness === 'Possible today')) return false;
      }
      if (filterSet.has('to-go')) {
        if (r.boardStatus === 'Discussed' || r.boardStatus === 'Actioned') return false;
      }
      return true;
    });
  }

  function renderCaseloadCard(m, filterSet) {
    const activeRound = ops ? ops.getActiveRound() : null;
    const lastSummary = ops ? ops.getLastRoundSummary() : null;
    const showSummary = lastSummary && !lastSummary.dismissed && !activeRound;
    const avgLabel   = m.total && m.avgLOS ? m.avgLOS.toFixed(1) + 'd' : '—';
    // Round-start animation: when the round started within the last ~1s,
    // mark the zone for the fade-in animation. Reads from store state
    // directly (set by the start-round action handler).
    const stateForAnim = store && typeof store.getState === 'function' ? store.getState() : {};
    const animAt = stateForAnim.patient && stateForAnim.patient.roundStartAnimAt;
    const roundJustStarted = !!(animAt && (Date.now() - animAt) < 1000);

    function tile(label, value, filterKey, alert) {
      const isActive  = filterKey && filterSet.has(filterKey);
      const clickable = !!filterKey;
      const classes = [
        'hah-metric-tile',
        clickable ? 'is-clickable' : '',
        isActive ? 'is-active-filter' : '',
        alert ? 'is-alert' : ''
      ].filter(Boolean).join(' ');
      return `<div class="${classes}"
        ${clickable ? `data-patient-action="toggle-list-filter" data-filter="${c.escapeHtml(filterKey)}"` : ''}>
        <span class="hah-metric-tile-value">${value}</span>
        <span class="hah-metric-tile-label">${c.escapeHtml(label)}${clickable ? ' <span class="hah-metric-tile-chev">›</span>' : ''}</span>
      </div>`;
    }

    const avgAlert  = m.total > 0 && m.avgLOS > 7;
    const over7Alert = m.over7 > 0;

    const tilesBlock = `<div class="hah-metric-tiles">
      ${tile('Total', m.total || '—')}
      ${tile('Avg LOS', avgLabel, null, avgAlert)}
      ${tile('Over 7 days', m.over7, 'over-7', over7Alert)}
      ${tile('Discharge today', m.dischargeToday, 'discharge-today')}
    </div>`;

    // Zone below the tiles — three states
    let zoneHtml = '';

    if (activeRound) {
      // ── Active round: ring + remaining + End button ──
      const ringFrac = m.total ? m.discussed / m.total : 0;
      const ringCirc = 2 * Math.PI * 26;
      const ringFill = (ringFrac * ringCirc).toFixed(1);
      const ringEmpty = ringCirc.toFixed(1);
      const ringDisplay = m.total ? `${m.discussed}<tspan class="hah-ring-slash">/</tspan><tspan class="hah-ring-total">${m.total}</tspan>` : '—';
      const allDone = m.total > 0 && m.toGo === 0;

      zoneHtml = `
        <div class="hah-caseload-divider"></div>
        <div class="hah-round-zone${roundJustStarted ? ' is-just-started' : ''}">
          <svg class="hah-ring" width="64" height="64" viewBox="0 0 64 64">
            <circle class="hah-ring-track" cx="32" cy="32" r="26" />
            <circle class="hah-ring-fill" cx="32" cy="32" r="26"
              stroke-dasharray="${ringFill} ${ringEmpty}"
              stroke-dashoffset="0"
              transform="rotate(-90 32 32)" />
            <text class="hah-ring-text" x="32" y="32" text-anchor="middle" dominant-baseline="central">${ringDisplay}</text>
          </svg>
          <div class="hah-round-zone-text">
            <div class="hah-round-zone-title">Round progress</div>
            <div class="hah-round-zone-sub">
              ${m.total
                ? (m.toGo === 0 ? 'All discussed' : `<a class="hah-round-togo${filterSet.has('to-go') ? ' is-active-filter' : ''}" data-patient-action="toggle-list-filter" data-filter="to-go">${m.toGo} to go</a>`)
                : 'No patients'}
            </div>
          </div>
        </div>
        <button type="button" class="hah-round-end-btn${allDone ? ' is-complete' : ''}" data-patient-action="end-round">
          ${allDone ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px"><polyline points="20 6 9 17 4 12"></polyline></svg>End round' : 'End round'}
        </button>`;
    } else if (showSummary) {
      // ── Post-round summary ──
      const totalMin = Math.round(lastSummary.durationMs / 60000);
      const avgMin = lastSummary.avgMsPerPatient
        ? (lastSummary.avgMsPerPatient / 60000).toFixed(1)
        : '0';
      zoneHtml = `
        <div class="hah-caseload-divider"></div>
        <div class="hah-round-summary">
          <div class="hah-round-summary-head">
            <span class="hah-round-summary-title">Round complete</span>
          </div>
          <div class="hah-round-summary-grid">
            <div class="hah-round-summary-stat">
              <div class="hah-round-summary-val">${totalMin}<span class="hah-round-summary-unit">min</span></div>
              <div class="hah-round-summary-label">Total</div>
            </div>
            <div class="hah-round-summary-stat">
              <div class="hah-round-summary-val">${lastSummary.discussedCount}</div>
              <div class="hah-round-summary-label">Discussed</div>
            </div>
            <div class="hah-round-summary-stat">
              <div class="hah-round-summary-val">${avgMin}<span class="hah-round-summary-unit">min</span></div>
              <div class="hah-round-summary-label">Avg / pt</div>
            </div>
          </div>
          <button type="button" class="hah-round-reset-btn" data-patient-action="reset-round">Reset</button>
        </div>`;
    } else {
      // ── Idle: Start round button ──
      zoneHtml = `
        <div class="hah-caseload-divider"></div>
        <button type="button" class="hah-round-start-btn" data-patient-action="start-round">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px">
            <polygon points="6 4 20 12 6 20 6 4"></polygon>
          </svg>
          Start board round
        </button>`;
    }

    return `<section class="hah-card hah-caseload-card${activeRound ? ' is-round-active' : ''}">
      <div class="hah-caseload-head">
        <span class="hah-caseload-title">Caseload</span>
      </div>
      ${tilesBlock}
      ${zoneHtml}
    </section>`;
  }

  function formatElapsed(ms) {
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    if (min < 60) return String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
    const hr = Math.floor(min / 60);
    const rm = min % 60;
    return hr + 'h ' + String(rm).padStart(2, '0') + 'm';
  }

  function sortPatientRows(rows, mode) {
    const arr = rows.slice();
    if (mode === 'admission') {
      return arr.sort((a, b) => {
        const da = parseAdmissionDate(a.admissionDate);
        const db = parseAdmissionDate(b.admissionDate);
        if (da && db) return da - db;
        if (da) return -1;
        if (db) return 1;
        return 0;
      });
    }
    return arr.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
  }

  function parseAdmissionDate(value) {
    if (!value) return 0;
    const s = String(value).trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return new Date(+m[1], +m[2] - 1, +m[3]).getTime();
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m) {
      const yr = +m[3] < 100 ? 2000 + +m[3] : +m[3];
      return new Date(yr, +m[2] - 1, +m[1]).getTime();
    }
    const fallback = new Date(s).getTime();
    return isNaN(fallback) ? 0 : fallback;
  }

  function priorityDot(priority) {
    const tone = priority === 'Critical' ? '#dc2626'
              : priority === 'High' ? '#f59e0b'
              : priority === 'Low' ? '#16a34a'
              : '#94a3b8';
    return `<span class="hah-patient-row-dot" style="background:${tone}" title="Priority: ${c.escapeHtml(priority || 'Normal')}"></span>`;
  }

  function renderStatusDotStatic(status) {
    const colour = status === 'Discussed' || status === 'Actioned' ? '#16a34a'
                : status === 'In discussion' ? '#2f6fed'
                : status === 'Deferred' ? '#f59e0b'
                : '#cbd5e1';
    return `<span class="hah-patient-row-dot" style="background:${colour}" title="${c.escapeHtml(status)}"></span>`;
  }

  function renderStatusDotOverlay(row, status, menuOpen) {
    const colour = status === 'Discussed' || status === 'Actioned' ? '#16a34a'
                : status === 'In discussion' ? '#2f6fed'
                : status === 'Deferred' ? '#f59e0b'
                : '#cbd5e1';
    const menuHtml = menuOpen ? `
      <div class="hah-status-menu" data-patient-action="status-menu-swallow">
        ${status !== 'Discussed' ? `<button type="button" class="hah-status-menu-item" data-patient-action="status-set" data-patient-id="${c.escapeHtml(row.id)}" data-status="Discussed">
          <span class="hah-status-menu-dot" style="background:#16a34a"></span>Mark discussed
        </button>` : ''}
        ${status !== 'Deferred' ? `<button type="button" class="hah-status-menu-item" data-patient-action="status-set" data-patient-id="${c.escapeHtml(row.id)}" data-status="Deferred">
          <span class="hah-status-menu-dot" style="background:#f59e0b"></span>Defer
        </button>` : ''}
        ${status !== 'Not discussed' ? `<button type="button" class="hah-status-menu-item" data-patient-action="status-set" data-patient-id="${c.escapeHtml(row.id)}" data-status="Not discussed">
          <span class="hah-status-menu-dot" style="background:#cbd5e1"></span>Reset
        </button>` : ''}
      </div>` : '';
    return `<span class="hah-status-overlay${menuOpen ? ' is-open' : ''}">
      <button type="button" class="hah-status-dot" style="background:${colour}"
        data-patient-action="toggle-status-menu" data-patient-id="${c.escapeHtml(row.id)}"
        title="${c.escapeHtml(status)}" aria-label="Change status"></button>
      ${menuHtml}
    </span>`;
  }

  const WS_LAYOUT_KEY = 'hah_ws_layout';
  const WS_DEFAULT_LAYOUT = { left: ['board_round', 'mdm_pair'], right: ['acp', 'bloods', 'medications', 'medication_changes', 'discharge_letter'] };

  function getWsLayout() {
    try {
      const saved = JSON.parse(localStorage.getItem(WS_LAYOUT_KEY) || 'null');
      if (saved && Array.isArray(saved.left) && Array.isArray(saved.right)) {
        // Forward-migration: add any new default sections not present in saved layout
        const allSaved = new Set([...saved.left, ...saved.right]);
        const allDefault = [...WS_DEFAULT_LAYOUT.left, ...WS_DEFAULT_LAYOUT.right];
        let changed = false;
        allDefault.forEach((key) => {
          if (!allSaved.has(key)) {
            // Add to the column it belongs to in the default
            const inDefaultRight = WS_DEFAULT_LAYOUT.right.includes(key);
            if (inDefaultRight) saved.right.unshift(key);
            else saved.left.push(key);
            changed = true;
          }
        });
        if (changed) saveWsLayout(saved);
        return saved;
      }
    } catch (_) {}
    return { left: [...WS_DEFAULT_LAYOUT.left], right: [...WS_DEFAULT_LAYOUT.right] };
  }

  function saveWsLayout(layout) {
    try { localStorage.setItem(WS_LAYOUT_KEY, JSON.stringify(layout)); } catch (_) {}
  }

  function renderMainPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return renderEmpty();
    const patient     = vm.patient;
    const encounters  = getPatientEncounterRows(patient);
    const patientLog = encounters.filter(isBoardTemplateEncounter);
    const microMdms   = encounters.filter((e) => e.type === 'micro_mdm');
    const respMdms    = encounters.filter((e) => e.type === 'resp_mdm');
    const otherEncs   = encounters.filter((e) => e.type === 'other');
    // v0.8.145: medication_change entries are timeline events shown only
    // in the dedicated medication-changes card. Filter them out from the
    // generic encounter buckets above (they wouldn't have matched any of
    // those filters anyway, but listing the filter explicitly here makes
    // the code's intent clear when reading top-down).
    const medChanges  = encounters.filter((e) => e.type === 'medication_change');

    const layout = getWsLayout();

    function renderSection(key) {
      switch (key) {
        case 'board_round':
          return `<div class="hah-ws-section" data-section="board_round" draggable="true">
            ${renderPatientLog(patientLog, state)}
          </div>`;
        case 'mdm_pair':
          return `<div class="hah-ws-section hah-ws-section--mdm-pair" data-section="mdm_pair" draggable="true">
            <div class="hah-mdm-pair-grid">
              ${renderMdmWidget('micro_mdm', 'Micro MDM', '#1D9E75', microMdms, state)}
              ${renderMdmWidget('resp_mdm',  'Resp MDM',  '#7F77DD', respMdms,  state)}
            </div>
          </div>`;
        case 'acp':
          return `<div class="hah-ws-section" data-section="acp" draggable="true">
            ${renderAcpCard(vm)}
          </div>`;
        case 'bloods':
          return `<div class="hah-ws-section" data-section="bloods" draggable="true">
            ${renderBloodsWidget(vm, state)}
          </div>`;
        case 'medications':
          return `<div class="hah-ws-section" data-section="medications" draggable="true">
            ${renderMedsWidget(vm)}
            ${otherEncs.length ? renderOtherWidget(otherEncs) : ''}
          </div>`;
        case 'medication_changes':
          return `<div class="hah-ws-section" data-section="medication_changes" draggable="true">
            ${renderMedicationChangesCard(vm, state, medChanges)}
          </div>`;
        case 'discharge_letter':
          // v0.8.149: discharge letter card. Renders 4 states (not_ready /
          // no_draft / draft / sent) based on patient discharge readiness
          // and the operational.dischargeLetter field. Module owns its own
          // logic in 33-desktop-discharge-letter.js; we delegate.
          if (window.HAHBoard && window.HAHBoard.dischargeLetter) {
            return `<div class="hah-ws-section" data-section="discharge_letter" draggable="true">
              ${window.HAHBoard.dischargeLetter.renderDischargeLetterCard(vm, state, { c: c })}
            </div>`;
          }
          return '';
        default: return '';
      }
    }

    const leftHtml  = layout.left.map(renderSection).join('');
    const rightHtml = layout.right.map(renderSection).join('');

    return `<div class="hah-pt-workspace">
      ${renderPatientHeader(vm, state)}
      ${renderObsStrip(vm)}
      <div class="hah-pt-cols">
        <div class="hah-ws-col" data-col="left">${leftHtml}</div>
        <div class="hah-ws-col" data-col="right">${rightHtml}</div>
      </div>
      ${state.patient && state.patient.acpModalOpen ? renderAcpModal(vm) : ''}
      ${state.patient && state.patient.editPatientModalOpen ? renderPatientRecordModal(vm) : ''}
    </div>`;
  }

  function renderPatientHeader(vm, state) {
    const patient = vm.patient;
    const ageSex = [patient.age || '', patient.sex || ''].filter(Boolean).join('');
    const losMeta = buildLengthOfStayMeta(vm.admissionDate);
    const metaParts = [
      vm.referralSource ? { text: vm.referralSource + ' referral' } : null,
      vm.admissionDate  ? { text: 'Adm ' + vm.admissionDate } : null,
      losMeta,
      patient.pathway ? { text: patient.pathway } : null,
      patient.escalationSummary && !/^DNAR(\s*\+\s*ACP)?$/i.test(patient.escalationSummary) && patient.escalationSummary !== 'Full escalation'
        ? { text: patient.escalationSummary }
        : null
    ].filter(Boolean);

    const ps      = ops ? ops.getPatientState(patient.id) : {};
    const acpData = ps.acp || {};
    const showDnar = patient.dnar || acpData.dnacprStatus === 'yes';
    // The "TEP" chip surfaces the Treatment Escalation Plan (the
    // ceiling-of-care free-text). The underlying field is currently named
    // tep / ceilingOfCare; tepStatus is actually a UCP-document marker
    // (Universal Care Plan present/absent) — the rename to ucpStatus is
    // deferred to ROADMAP. Until then, the chip's clinical meaning is
    // "is there a TEP filled in?" — i.e. ceilingOfCare/tep has content.
    const tepText = String(acpData.tep || acpData.ceilingOfCare || '').trim();
    const showTep = !!tepText;

    // Both chips open the ACP modal when pressed (matches the Edit button
    // already on the ACP card; saves the user from scrolling to find it).
    const rightFlags = [
      showTep  ? `<button type="button" class="hah-pt-flag is-acp" data-patient-action="open-acp-modal" title="Open ACP — TEP: ${c.escapeHtml(tepText)}">TEP</button>`  : '',
      showDnar ? `<button type="button" class="hah-pt-flag is-dnar" data-patient-action="open-acp-modal" title="Open ACP — DNACPR documented">DNAR</button>` : ''
    ].filter(Boolean).join('');

    return `<div class="hah-pt-header-bar">
      <div class="hah-pt-header-top">
        <div class="hah-pt-header-main">
          <span class="hah-pt-name">${c.escapeHtml(patient.name)}</span>
          ${ageSex ? `<span class="hah-pt-age-sex">${c.escapeHtml(ageSex)}</span>` : ''}
        </div>
        <div class="hah-pt-header-alerts">${rightFlags}</div>
      </div>
      ${metaParts.length ? `<div class="hah-pt-meta-row">${metaParts.map(renderPatientMetaPart).join('')}</div>` : ''}
    </div>`;
  }

  function renderPatientMetaPart(part) {
    const tone = part && part.tone ? ` is-${part.tone}` : '';
    return `<span class="hah-pt-meta-item${tone}">${c.escapeHtml(part && part.text ? part.text : '')}</span>`;
  }

  function buildLengthOfStayMeta(admissionDate) {
    const ts = parseAdmissionDate(admissionDate);
    if (!ts) return null;
    const start = new Date(ts);
    const now = new Date();
    const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
    const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const days = Math.max(0, Math.floor((nowDay - startDay) / 86400000));
    const tone = days < 7 ? 'good' : days === 7 ? 'warn' : 'danger';
    return { text: `LOS ${days}d`, tone };
  }

  function renderObsStrip(vm, state) {
    const items = vm.obsItems.filter((i) => i.value && i.value !== '—').slice(0, 7);
    if (items.length) {
      return `<div class="hah-obs-strip">${items.map((item) => {
        const cls = isObsDanger(item.label, item.value) ? ' is-danger' : isObsWarn(item.label, item.value) ? ' is-warn' : '';
        return `<div class="hah-obs-cell${cls}"><div class="hah-obs-label">${c.escapeHtml(item.label)}</div><div class="hah-obs-val">${c.escapeHtml(item.value)}</div></div>`;
      }).join('')}</div>`;
    }

    const encounters = getPatientEncounterRows(vm.patient);
    const latestBoard = encounters.find((e) => e.type === 'board_round') || encounters[0] || null;
    let taskCount = 0;
    try {
      const tasksVm = d.buildTasksViewModel({ ...state, tasks: { ...(state.tasks || {}), savedView: 'all-open', filters: { patientId: vm.patient.id } } });
      taskCount = Array.isArray(tasksVm && tasksVm.rows) ? tasksVm.rows.length : 0;
    } catch (_) {}
    const bloodLabel = vm.bloodSamples && vm.bloodSamples.length ? vm.bloodSamples[0].time : 'No recent bloods';
    const blocker = (vm.patient.blockers && vm.patient.blockers[0]) || 'No active blocker';
    const statusItems = [
      { label: 'Latest entry', value: latestBoard ? formatCompactDateTime(latestBoard.timestamp) : 'None yet' },
      { label: 'Latest bloods', value: bloodLabel },
      { label: 'Open tasks', value: String(taskCount) },
      { label: 'Discharge', value: vm.patient.dischargeReadiness || 'Not ready' },
      { label: 'Primary blocker', value: blocker }
    ];
    return `<div class="hah-status-strip">${statusItems.map((item) => `<div class="hah-status-cell"><div class="hah-obs-label">${c.escapeHtml(item.label)}</div><div class="hah-status-val">${c.escapeHtml(item.value)}</div></div>`).join('')}</div>`;
  }

  function renderPatientLog(entries, state) {
    const showOlder = !!(state && state.patient && state.patient.logShowOlder);
    const header = `<div class="hah-log-head">
      <div class="hah-log-dot" style="background:#378ADD"></div>
      <span class="hah-log-title">Patient log</span>
      <span class="hah-log-count">${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}</span>
    </div>`;
    if (!entries.length) {
      return `<div class="hah-log-card">${header}<div class="hah-log-empty">No patient log entries yet. Use the composer or mobile app to add a clinical review.</div></div>`;
    }

    const latest  = entries[0];
    const earlier = entries.slice(1);
    const latestHtml = renderPatientLogEntry(latest, true);
    const earlierHtml = earlier.length ? `
      <div class="hah-log-earlier${showOlder ? ' is-open' : ''}">
        <button type="button" class="hah-log-earlier-toggle" data-patient-action="toggle-log-older">
          <span class="hah-mdm-chevron-sm${showOlder ? ' is-open' : ''}">▸</span>
          ${showOlder ? 'Hide' : 'Show'} older (${earlier.length})
        </button>
        ${showOlder ? `<div class="hah-log-earlier-list">${earlier.map((e) => renderPatientLogEntry(e, false)).join('')}</div>` : ''}
      </div>` : '';

    return `<div class="hah-log-card">${header}<div class="hah-log-entries">${latestHtml}</div>${earlierHtml}</div>`;
  }

  function renderPatientLogEntry(enc, isLatest) {
    const f = enc.fields || {};
    const type = enc.type || 'board_round';
    const isMobile = type === 'mobile_clinical_review';
    const typeLabel = isMobile ? 'Mobile clinical review' : 'Board round';
    // Preserve the original issue text format exactly as entered, including
    // sub-bullets (lines starting with "-"), numbering, and blank lines.
    const rawIssues = String(f.issueRaw || f.issues || '').trim();
    const issuesHtml = rawIssues
      ? `<div class="hah-log-issues-text">${rawIssues.split('\n').map((l) => `<div>${c.escapeHtml(l) || '&nbsp;'}</div>`).join('')}</div>`
      : '<span class="hah-log-empty-inline">—</span>';
    const edd = f.dischargeDate ? formatEDD(f.dischargeDate, f.dischargeReady) : '';
    const currently = String(f.currently || f.progress || '').trim();
    const progressBody = currently
      ? `<div class="hah-log-field-body">${c.escapeHtml(currently)}</div>`
      : '<span class="hah-log-empty-inline">—</span>';
    const examination = String(f.examination || '').trim();
    const examinationBody = examination
      ? `<div class="hah-log-field-body">${c.escapeHtml(examination)}</div>`
      : '';
    const bloods = String(f.bloodsIx || f.bloods || '').trim();
    const bloodsBody = bloods
      ? `<div class="hah-log-field-body">${c.escapeHtml(bloods)}</div>`
      : '';
    const planText = [f.plan || '', edd ? 'EDD: ' + edd : ''].filter(Boolean).join('\n');
    const planBody = planText
      ? `<div class="hah-log-field-body">${c.escapeHtml(planText)}</div>`
      : '<span class="hah-log-empty-inline">—</span>';
    // Mobile clinical review entries carry the patient's "For discharge summary"
    // text snapshotted at save time. Surface it as its own field so it's
    // visible on the entry alongside issues/currently/plan.
    const forDischargeSummary = String(f.forDischargeSummary || '').trim();
    const forDischargeBody = forDischargeSummary
      ? `<div class="hah-log-field-body">${c.escapeHtml(forDischargeSummary)}</div>`
      : '';
    const cols = isMobile ? [
      `<div class="hah-log-field"><div class="hah-log-field-label">Issues</div>${issuesHtml}</div>`,
      `<div class="hah-log-field"><div class="hah-log-field-label">Currently</div>${progressBody}</div>`,
      examination ? `<div class="hah-log-field"><div class="hah-log-field-label">Examination</div>${examinationBody}</div>` : '',
      // Bloods column omitted intentionally — the bloods card on the right
      // pane is the canonical view. The per-encounter bloods text still
      // lives in the entry's fields.bloodsIx and feeds into the clinical
      // note preview when the round is committed; we just don't show a
      // duplicate column in the patient log here.
      `<div class="hah-log-field"><div class="hah-log-field-label">Plan</div>${planBody}</div>`,
      forDischargeSummary ? `<div class="hah-log-field"><div class="hah-log-field-label">For discharge summary</div>${forDischargeBody}</div>` : ''
    ].filter(Boolean) : [
      `<div class="hah-log-field"><div class="hah-log-field-label">Issues</div>${issuesHtml}</div>`,
      `<div class="hah-log-field"><div class="hah-log-field-label">Progress</div>${progressBody}</div>`,
      `<div class="hah-log-field"><div class="hah-log-field-label">Plan</div>${planBody}</div>`,
      // Board round entries also carry forDischargeSummary in their fields
      // (set by composer-done). Surface it here for the same reason as
      // mobile entries — the user committed it, the log should show what
      // was committed.
      forDischargeSummary ? `<div class="hah-log-field"><div class="hah-log-field-label">For discharge summary</div>${forDischargeBody}</div>` : ''
    ].filter(Boolean);
    return `<div class="hah-log-entry${isLatest ? ' is-latest' : ''}${isMobile ? ' is-mobile-review' : ''}">
      <div class="hah-log-entry-bar">
        <span class="hah-log-entry-date${isLatest ? ' is-today' : ''}">${formatEntryDate(enc.timestamp)}</span>
        <span class="hah-log-entry-type">${c.escapeHtml(typeLabel)}</span>
        <span class="hah-log-author">${c.escapeHtml(enc.author || '')}</span>
        ${isMobile ? '' : `<button type="button" class="hah-log-edit" data-patient-action="edit-encounter"
          data-encounter-id="${c.escapeHtml(enc.id)}" title="Edit entry">Edit</button>`}
        <button type="button" class="hah-log-delete" data-patient-action="delete-encounter"
          data-encounter-id="${c.escapeHtml(enc.id)}" title="Delete">×</button>
      </div>
      <div class="hah-log-entry-grid${isMobile ? ' is-mobile-review' : ''}">${cols.join('')}</div>
    </div>`;
  }

  function renderMdmWidget(type, label, colour, entries, state) {
    const showOlder = !!(state && state.patient && state.patient.mdmEarlier && state.patient.mdmEarlier[type]);
    const hasEntries = entries.length > 0;
    const countText  = entries.length
      ? entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies')
      : 'No entries';
    const earlierEntries = entries.slice(1);

    const head = `
      <div class="hah-mdm-head">
        <div class="hah-mdm-dot" style="background:${colour}"></div>
        <span class="hah-mdm-label">${c.escapeHtml(label)}</span>
        <span class="hah-mdm-count">${c.escapeHtml(countText)}</span>
      </div>`;

    const bodyHtml = hasEntries
      ? renderMdmEntry(entries[0])
      : `<div class="hah-mdm-empty">No ${c.escapeHtml(label)} input for this admission.</div>`;

    const olderHtml = earlierEntries.length ? `
      <div class="hah-mdm-earlier${showOlder ? ' is-open' : ''}">
        <button type="button" class="hah-mdm-earlier-toggle"
          data-patient-action="toggle-mdm-earlier" data-mdm-type="${c.escapeHtml(type)}">
          <span class="hah-mdm-chevron-sm${showOlder ? ' is-open' : ''}">▸</span>
          ${showOlder ? 'Hide' : 'Show'} older (${earlierEntries.length})
        </button>
        ${showOlder ? `<div class="hah-mdm-earlier-list">${earlierEntries.map((e) => renderMdmEntry(e, true)).join('')}</div>` : ''}
      </div>` : '';

    const addBtn = entries.length >= 2 ? '' : `
      <button type="button" class="hah-mdm-add" data-patient-action="open-composer"
        data-encounter-type="${c.escapeHtml(type)}">+ Add ${c.escapeHtml(label)} entry</button>`;

    return `<div class="hah-mdm-widget" data-mdm-type="${c.escapeHtml(type)}">
      ${head}
      <div class="hah-mdm-body">${bodyHtml}</div>
      ${olderHtml}
      ${addBtn}
    </div>`;
  }

  function renderMdmEntry(enc, isEarlier) {
    const f = enc.fields || {};
    const fieldMap = enc.type === 'micro_mdm'
      ? [['Question', f.question], ['Recommendation', f.recommendation], ['Follow-up', f.followUp]]
      : [['Summary presented', f.summary], ['Recommendation', f.recommendation], ['Action', f.action]];
    const fieldsHtml = fieldMap.filter(([, v]) => v).map(([label, value]) =>
      `<div class="hah-mdm-field"><div class="hah-mdm-field-label">${c.escapeHtml(label)}</div><div class="hah-mdm-field-body">${c.escapeHtml(value)}</div></div>`
    ).join('');
    return `<div class="hah-mdm-entry${isEarlier ? ' is-earlier' : ''}">
      <div class="hah-mdm-entry-meta">${formatEntryDate(enc.timestamp)} · ${c.escapeHtml(enc.author || '')}</div>
      ${fieldsHtml || '<span class="hah-mdm-empty">No content recorded.</span>'}
    </div>`;
  }

  function renderOtherWidget(entries) {
    const latest = entries[0]; if (!latest) return '';
    const f = latest.fields || {};
    return `<div class="hah-mdm-widget" data-mdm-type="other">
      <div class="hah-mdm-head"><div class="hah-mdm-dot" style="background:#888780"></div>
        <span class="hah-mdm-label">${c.escapeHtml(f.source || 'Other')}</span>
        <span class="hah-mdm-count">${formatEntryDate(latest.timestamp)}</span>
      </div>
      <div class="hah-mdm-body"><div class="hah-mdm-entry">
        <div class="hah-mdm-entry-meta">${c.escapeHtml(latest.author || '')}</div>
        <div class="hah-mdm-field-body">${c.escapeHtml(f.note || '')}</div>
      </div></div>
    </div>`;
  }

  function renderAcpCard(vm) {
    const acp    = getAcpStateForVm(vm);
    const dnacpr = acp.dnacprStatus || '';
    const ucp    = acp.tepStatus    || '';
    const tep    = acp.tep          || '';
    const jic    = acp.jicMeds      || '';

    const dnacprText = dnacpr === 'yes' ? 'Yes' + (acp.dnacprFormSeen ? ' · Form seen' : '')
                      : dnacpr === 'no' ? 'No'
                      : dnacpr === 'unknown' ? 'Unknown' : '';
    const ucpText    = ucp === 'present' ? 'Present' : ucp === 'absent' ? 'Absent' : ucp === 'unknown' ? 'Unknown' : '';
    const jicText    = jic === 'in_property'  ? 'In property'
                     : jic === 'in_process'   ? 'In process'
                     : jic === 'not_prescribed' ? 'Not prescribed' : '';
    const hasData    = dnacpr || ucp || tep || jic || (acp.notes && String(acp.notes).trim());

    function row(label, value, extraClass) {
      if (!value) return '';

  // ─── Medication changes card (v0.8.145) ────────────────────────────────
  // Tracks discrete medication transitions during admission as
  // medication_change timeline entries. See JSON_SCHEMA.md for the full
  // entry shape. UI is intentionally compact: one line per change with
  // a coloured chip (Started/Stopped/Adjusted/Held/Resumed), drug name,
  // transition string, optional reason, date, and edit pencil.

  const MED_CHANGE_TYPES = [
    { key: 'start',   verb: 'Started',  cls: 'is-start',   needsFrom: false, needsTo: true  },
    { key: 'stop',    verb: 'Stopped',  cls: 'is-stop',    needsFrom: false, needsTo: false },
    { key: 'adjust',  verb: 'Adjusted', cls: 'is-adjust',  needsFrom: true,  needsTo: true  },
    { key: 'hold',    verb: 'Held',     cls: 'is-hold',    needsFrom: false, needsTo: false },
    { key: 'resume',  verb: 'Resumed',  cls: 'is-resume',  needsFrom: false, needsTo: false }
  ];
  function getMedChangeTypeMeta(key) {
    return MED_CHANGE_TYPES.find((t) => t.key === key) || MED_CHANGE_TYPES[0];
  }
  // Format the transition string for an entry. 'start' → toValue alone.
  // 'adjust' → "from → to". 'stop'/'hold' → faded "(stopped)"/"(held)".
  // 'resume' → just the verb is enough; show toValue if provided.
  function formatMedChangeTransition(fields) {
    const meta = getMedChangeTypeMeta(fields.changeType);
    const from = String(fields.fromValue || '').trim();
    const to   = String(fields.toValue   || '').trim();
    if (meta.key === 'adjust' && from && to) return `${c.escapeHtml(from)} <span class="hah-medchg-arrow">→</span> ${c.escapeHtml(to)}`;
    if (meta.key === 'adjust' && to) return c.escapeHtml(to);
    if (meta.key === 'start'  && to) return c.escapeHtml(to);
    if (meta.key === 'resume' && to) return c.escapeHtml(to);
    return '';
  }
  // Date label for a med change. Today / Yesterday / "5 May".
  function formatMedChangeDate(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const now = new Date();
      const isSameDay = (a, b) =>
        a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
      if (isSameDay(d, now)) return 'Today';
      if (isSameDay(d, yesterday)) return 'Yesterday';
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    } catch (_) { return ''; }
  }
  // Default composer state shape.
  function defaultMedChangeComposer() {
    return {
      open: false,
      editingId: null,
      drug: '',
      changeType: 'start',
      fromValue: '',
      toValue: '',
      reason: ''
    };
  }
  function getMedChangeComposer(state) {
    const cur = state && state.patient && state.patient.medChangeComposer;
    if (cur && typeof cur === 'object') {
      // Merge with defaults to handle partially-stored state
      return Object.assign(defaultMedChangeComposer(), cur);
    }
    return defaultMedChangeComposer();
  }

  function renderMedicationChangesCard(vm, state, changes) {
    const composer = getMedChangeComposer(state);
    // v0.8.147: detect single-day. If every entry shares the same local
    // calendar date, suppress per-row date labels and surface a quiet
    // header hint instead. Removes "Today · Today · Today" repetition.
    let suppressDates = false;
    let singleDayLabel = '';
    if (changes.length >= 2) {
      const dayKey = (iso) => {
        try {
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return '';
          return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        } catch (_) { return ''; }
      };
      const firstKey = dayKey(changes[0].timestamp);
      if (firstKey && changes.every((e) => dayKey(e.timestamp) === firstKey)) {
        suppressDates = true;
        singleDayLabel = formatMedChangeDate(changes[0].timestamp);
      }
    }

    const headerCount = changes.length
      ? `<span class="hah-medchg-count">${changes.length}</span>`
      : '';
    const headerHint = suppressDates && singleDayLabel
      ? `<span class="hah-medchg-day-hint">${c.escapeHtml('All ' + singleDayLabel.toLowerCase())}</span>`
      : '';
    const addBtn = composer.open
      ? '' // hide add button while composer is open
      : `<button type="button" class="hah-medchg-add-btn" data-patient-action="medchg-open-add" title="Log a new medication change">+ Add</button>`;

    const composerHtml = composer.open ? renderMedChangeComposer(composer) : '';

    const listHtml = changes.length
      ? `<div class="hah-medchg-list">${changes.map((entry) => renderMedChangeRow(entry, composer, { suppressDates })).join('')}</div>`
      : (composer.open ? '' : `<div class="hah-medchg-empty">No medication changes logged yet during this admission.</div>`);

    return `<div class="hah-medchg-card">
      <div class="hah-medchg-head">
        <span class="hah-medchg-title">Medication changes</span>
        ${headerCount}
        ${headerHint}
        ${addBtn}
      </div>
      ${composerHtml}
      ${listHtml}
    </div>`;
  }

  function renderMedChangeRow(entry, composer, opts) {
    const f = entry.fields || {};
    const meta = getMedChangeTypeMeta(f.changeType);
    const transition = formatMedChangeTransition(f);
    const reason = String(f.reason || '').trim();
    // v0.8.147: omit individual date labels when every entry is from the
    // same day (e.g. all "Today"). The card header surfaces a quiet
    // "All today" hint instead. Saves repetitive visual noise.
    const showDate = !(opts && opts.suppressDates);
    const dateLabel = showDate ? formatMedChangeDate(entry.timestamp) : '';
    const drug = c.escapeHtml(String(f.drug || '').trim() || '—');
    const isEditing = composer.open && composer.editingId === entry.id;
    const rowClass = isEditing ? 'hah-medchg-row is-editing' : 'hah-medchg-row';

    // v0.8.147: chip → coloured-text verb. Lighter visual weight, more
    // horizontal space for drug + transition + reason. Verb still
    // carries the change-type signal via colour.
    const verbHtml = `<span class="hah-medchg-verb ${meta.cls}">${meta.verb}</span>`;
    const drugHtml = `<span class="hah-medchg-drug">${drug}</span>`;
    const transitionHtml = transition
      ? `<span class="hah-medchg-transition">${transition}</span>`
      : '';
    const reasonHtml = reason
      ? `<span class="hah-medchg-reason">${c.escapeHtml(reason)}</span>`
      : '';
    const dateHtml = dateLabel
      ? `<span class="hah-medchg-date">${c.escapeHtml(dateLabel)}</span>`
      : '';
    // v0.8.147: edit pencil hover-reveal. Stays visible when row is
    // .is-editing so the binding to the composer is clear.
    const editBtn = `<button type="button" class="hah-medchg-edit-btn" data-patient-action="medchg-edit" data-entry-id="${c.escapeHtml(entry.id)}" title="Edit this change" aria-label="Edit this medication change">✎</button>`;

    return `<div class="${rowClass}">${verbHtml}${drugHtml}${transitionHtml}${reasonHtml}${dateHtml}${editBtn}</div>`;
  }

  function renderMedChangeComposer(composer) {
    const isEdit = !!composer.editingId;
    const meta = getMedChangeTypeMeta(composer.changeType);
    const typeRadios = MED_CHANGE_TYPES.map((t) => {
      const checked = composer.changeType === t.key ? 'checked' : '';
      return `<label class="hah-medchg-radio ${composer.changeType === t.key ? 'is-active' : ''}">
        <input type="radio" name="medchg-type" value="${t.key}" data-patient-action="medchg-set-type" data-type="${t.key}" ${checked}>
        <span class="hah-medchg-radio-chip ${t.cls}">${t.verb}</span>
      </label>`;
    }).join('');

    // Conditional from/to fields based on change type.
    const showFrom = meta.needsFrom;
    const showTo   = meta.needsTo;

    return `<div class="hah-medchg-composer">
      <div class="hah-medchg-comp-row">
        <label class="hah-medchg-comp-label">Drug</label>
        <input type="text" class="hah-medchg-comp-input" id="medChangeDrug"
          placeholder="e.g. Apixaban"
          value="${c.escapeHtml(composer.drug || '')}"
          autocomplete="off">
      </div>
      <div class="hah-medchg-comp-row">
        <label class="hah-medchg-comp-label">Change</label>
        <div class="hah-medchg-radio-group">${typeRadios}</div>
      </div>
      ${showFrom ? `<div class="hah-medchg-comp-row">
        <label class="hah-medchg-comp-label">From</label>
        <input type="text" class="hah-medchg-comp-input" id="medChangeFromValue"
          placeholder="e.g. 5mg OD"
          value="${c.escapeHtml(composer.fromValue || '')}"
          autocomplete="off">
      </div>` : ''}
      ${showTo ? `<div class="hah-medchg-comp-row">
        <label class="hah-medchg-comp-label">${meta.key === 'start' ? 'Dose' : 'To'}</label>
        <input type="text" class="hah-medchg-comp-input" id="medChangeToValue"
          placeholder="e.g. ${meta.key === 'start' ? '5mg BD' : '10mg OD'}"
          value="${c.escapeHtml(composer.toValue || '')}"
          autocomplete="off">
      </div>` : ''}
      <div class="hah-medchg-comp-row">
        <label class="hah-medchg-comp-label">Reason</label>
        <input type="text" class="hah-medchg-comp-input" id="medChangeReason"
          placeholder="optional"
          value="${c.escapeHtml(composer.reason || '')}"
          autocomplete="off">
      </div>
      <div class="hah-medchg-comp-actions">
        <button type="button" class="hah-medchg-comp-btn is-cancel" data-patient-action="medchg-cancel">Cancel</button>
        <button type="button" class="hah-medchg-comp-btn is-save" data-patient-action="medchg-save">${isEdit ? 'Update' : 'Save'}</button>
      </div>
    </div>`;
  }

  // ─── End of medication changes card ──────────────────────────────────

  // Each analyte: key, label, aliases (for regex), unit, range, flag fn, fullName, notes
  // Regex is built dynamically: \b(?:alias1|alias2|...)\s+VALUE
  function mkRe(aliases) {
    const pat = aliases.map((a) => a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    return new RegExp('\\b(?:' + pat + ')\\s*[=:]?\\s*(-?\\d+(?:\\.\\d+)?)', 'i');
  }

  const BLOOD_DEFAULT_ORDER = ['CRP','WCC','Hb','Na','K','Cr'];
  const BLOOD_ORDER_KEY = 'hah_blood_analyte_order';

  function getBloodAnalyteOrder() {
    try {
      const saved = JSON.parse(localStorage.getItem(BLOOD_ORDER_KEY) || 'null');
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (_) {}
    return BLOOD_DEFAULT_ORDER.slice();
  }

  // Build the same date→values structure that the bloods card displays,
  // for consumers that need the bloods data in structured form (e.g. the
  // clinical note preview when "Include previous bloods" is on). Returns
  // an array of {date, vals} sorted newest-first, top 5.
  //
  // This mirrors the data-build inside renderBloodsWidget. Long-term
  // (see ROADMAP "Unify clinical note generator") both should call a
  // single shared function that lives in either app's source. For now
  // this is a tightly-scoped duplicate so the note preview can read the
  // card's view without entangling with renderBloodsWidget's render code.
  function getBloodsCardColumns(vm) {
    const raw  = vm && vm.patient && vm.patient.sourcePatient || {};
    const form = raw.form || {};
    const todayStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    const MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const DATE_LINE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?\s*[:]\s*/i;
    const DATE_TEXT_RE = /^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s*[:]\s*/i;

    function formatEmbeddedDate(d, m) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[(+m) - 1] || '';
      const date = d + ' ' + month;
      return date === todayStr ? 'Today' : date;
    }
    function normaliseBloodDateLabel(rawText) {
      let text = String(rawText || '').trim();
      if (!text) return '';
      text = text.replace(/\s+\d{1,2}:\d{2}(:\d{2})?$/, '').trim();
      if (!text) return '';
      if (/^today$/i.test(text)) return 'Today';
      let m = text.match(/^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?$/);
      if (m) return formatEmbeddedDate(m[1], m[2]);
      m = text.match(/^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*$/i);
      if (m) {
        const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
        if (mo) return formatEmbeddedDate(m[1], mo);
      }
      return text === todayStr ? 'Today' : text;
    }

    // 1. Mobile bloods textarea content
    const mobileMap = {};
    (String(form.bloods || '')).split(/\n+/).map((l) => l.trim()).filter(Boolean)
      .slice(0, 5).forEach((line) => {
        let dateLabel = 'Today';
        let rest = line;
        const pipeMatch = line.match(/^([^|\n]{1,32})\|\s*/);
        if (pipeMatch) {
          const dateClean = pipeMatch[1].trim().replace(/\s+\d{2}:\d{2}(:\d{2})?$/, '').trim();
          dateLabel = dateClean === todayStr ? 'Today' : dateClean;
          rest = line.slice(pipeMatch[0].length).trim();
        } else {
          let m = line.match(DATE_LINE_RE);
          if (m) { dateLabel = formatEmbeddedDate(m[1], m[2]); rest = line.slice(m[0].length).trim(); }
          else {
            m = line.match(DATE_TEXT_RE);
            if (m) {
              const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
              if (mo) { dateLabel = formatEmbeddedDate(m[1], mo); rest = line.slice(m[0].length).trim(); }
            }
          }
        }
        if (!dateLabel || !rest) return;
        if (!mobileMap[dateLabel]) mobileMap[dateLabel] = {};
        BLOOD_DB.forEach(({ key, re }) => {
          const m = rest.match(re);
          if (m) mobileMap[dateLabel][key] = parseFloat(m[1]);
        });
      });

    // 2. Timeline encounters
    const encounters = (typeof getPatientEncounterRows === 'function')
      ? (getPatientEncounterRows(vm.patient) || [])
      : [];
    const composerMap = {};
    encounters
      .filter((e) => (e.type === 'board_round' || e.type === 'mobile_clinical_review')
        && e.fields && String(e.fields.bloods || e.fields.bloodsIx || '').trim())
      .forEach((e) => {
        const dt = new Date(e.timestamp);
        const encDateStr = isNaN(dt.getTime()) ? null
          : dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const encounterDate = encDateStr === todayStr ? 'Today' : (encDateStr || null);

        String(e.fields.bloods || e.fields.bloodsIx || '').split(/\n+/).forEach((rawLine) => {
          let line = rawLine.trim();
          if (!line) return;
          let date = encounterDate;

          let m = line.match(/^([^|\n]{1,32})\|\s*/);
          if (m) {
            const parsedLabel = normaliseBloodDateLabel(m[1]);
            if (parsedLabel) date = parsedLabel;
            line = line.slice(m[0].length).trim();
          } else {
            m = line.match(DATE_LINE_RE);
            if (m) { date = formatEmbeddedDate(m[1], m[2]); line = line.slice(m[0].length).trim(); }
            else {
              m = line.match(DATE_TEXT_RE);
              if (m) {
                const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
                if (mo) { date = formatEmbeddedDate(m[1], mo); line = line.slice(m[0].length).trim(); }
              }
            }
          }
          if (!date || !line) return;
          if (!composerMap[date]) composerMap[date] = {};
          BLOOD_DB.forEach(({ key, re }) => {
            const hit = line.match(re);
            if (hit) composerMap[date][key] = parseFloat(hit[1]);
          });
          const remaining = line.replace(/\d{1,2}[\/\-\.]\d{1,2}/g, '');
          const unknownRe = /\b([A-Za-z][A-Za-z0-9\-]*)\s+(\d+(?:\.\d+)?)/g;
          let hit2;
          while ((hit2 = unknownRe.exec(remaining)) !== null) {
            const candidate = hit2[1];
            const alreadyKnown = BLOOD_DB.some((a) => a.re.test(candidate + ' ' + hit2[2]));
            if (!alreadyKnown) {
              const uKey = '_u_' + candidate.toUpperCase();
              if (!composerMap[date][uKey]) composerMap[date][uKey] = parseFloat(hit2[2]);
            }
          }
        });
      });

    function parseDateForSort(label) {
      if (label === 'Today') return Date.now();
      const MMAP = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      const m = label.match(/^(\d{1,2})\s+([a-z]{3})/i);
      if (m) {
        const mo = MMAP[(m[2] || '').toLowerCase()];
        if (mo !== undefined) {
          const yr = new Date().getFullYear();
          return new Date(yr, mo, +m[1]).getTime();
        }
      }
      const t = new Date(label).getTime();
      return isNaN(t) ? 0 : t;
    }
    const allDates = [...new Set([...Object.keys(composerMap), ...Object.keys(mobileMap)])]
      .sort((a, b) => parseDateForSort(b) - parseDateForSort(a));
    return allDates.slice(0, 5).map((date) => ({
      date,
      vals: Object.assign({}, mobileMap[date] || {}, composerMap[date] || {})
    }));
  }

  function renderBloodsWidget(vm, state) {
    const raw  = vm.patient.sourcePatient || {};
    const form = raw.form || {};
    const sex  = vm.patient.sex || '';
    const showOptions = !!(state.patient && state.patient.bloodOptionsOpen);

    // Build date→vals maps from both sources
    const todayStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    // Date-extraction patterns shared by both the mobile bloods parser
    // (below) and the timeline encounter parser (further down). Defined
    // here so both can use them and stay consistent.
    const MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const DATE_LINE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?\s*[:]\s*/i;
    const DATE_TEXT_RE = /^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s*[:]\s*/i;
    const DATE_PIPE_RE = /^([^|\n]{1,32})\|\s*/i;

    function formatEmbeddedDate(d, m, y) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[(+m) - 1] || '';
      const date = d + ' ' + month;
      return date === todayStr ? 'Today' : date;
    }

    function normaliseBloodDateLabel(raw) {
      let text = String(raw || '').trim();
      if (!text) return '';
      // Strip trailing HH:MM or HH:MM:SS time suffix. Without this,
      // "04/04 07:55" doesn't match the date regexes below and falls
      // through to be returned verbatim — producing a duplicate column
      // alongside "04/04" parsed from the mobileMap path. Both sources
      // refer to the same date but generate different column keys.
      text = text.replace(/\s+\d{1,2}:\d{2}(:\d{2})?$/, '').trim();
      if (!text) return '';
      if (/^today$/i.test(text)) return 'Today';
      let m = text.match(/^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?$/);
      if (m) return formatEmbeddedDate(m[1], m[2], m[3]);
      m = text.match(/^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*$/i);
      if (m) {
        const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
        if (mo) return formatEmbeddedDate(m[1], mo, null);
      }
      return text === todayStr ? 'Today' : text;
    }

    // 1. Mobile app: lines may be in any of these formats:
    //   "15 Apr|CRP 45 Na 138 ..."          (pipe-delimited, original)
    //   "01/05: Cr 156"                     (slash date with colon)
    //   "01 May: Cr 156"                    (text date with colon)
    //   "Cr 156"                            (no date at all — assumed today)
    // Previously the parser assumed pipe-delimited and treated the whole
    // line as a date label when no pipe was present, producing nonsense
    // column headers like "01/05: Cr 156" or "03:05: cr 100".
    const mobileMap = {};
    (String(form.bloods || '')).split(/\n+/).map((l) => l.trim()).filter(Boolean)
      .slice(0, 5).forEach((line) => {
        let dateLabel = 'Today';
        let rest = line;
        // Try pipe format first (preserves original behaviour)
        const pipeMatch = line.match(/^([^|\n]{1,32})\|\s*/);
        if (pipeMatch) {
          const dateRaw = pipeMatch[1].trim();
          // Strip trailing HH:MM if present (e.g. "15 Apr 09:30")
          const dateClean = dateRaw.replace(/\s+\d{2}:\d{2}(:\d{2})?$/, '').trim();
          dateLabel = dateClean === todayStr ? 'Today' : dateClean;
          rest = line.slice(pipeMatch[0].length).trim();
        } else {
          // No pipe — try date-prefix patterns
          let m = line.match(DATE_LINE_RE);
          if (m) {
            dateLabel = formatEmbeddedDate(m[1], m[2], m[3]);
            rest = line.slice(m[0].length).trim();
          } else {
            m = line.match(DATE_TEXT_RE);
            if (m) {
              const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
              if (mo) {
                dateLabel = formatEmbeddedDate(m[1], mo, null);
                rest = line.slice(m[0].length).trim();
              }
            }
            // No date prefix at all — assume Today (already the default)
          }
        }

        if (!dateLabel || !rest) return;
        if (!mobileMap[dateLabel]) mobileMap[dateLabel] = {};
        BLOOD_DB.forEach(({ key, re }) => {
          const m = rest.match(re);
          if (m) mobileMap[dateLabel][key] = parseFloat(m[1]);
        });
      });

    // 2. Timeline encounters: board round + mobile clinical review entries with fields.bloods (free text)
    // Each line may start with a date: "18/04: CRP 78", "18 Apr: CRP 78", "18 Apr|CRP 78" or just "CRP 78"
    // (Date-extraction helpers MONTHS, DATE_LINE_RE, DATE_TEXT_RE, DATE_PIPE_RE,
    //  formatEmbeddedDate, normaliseBloodDateLabel are defined above in the
    //  mobile bloods parser block and are in scope here.)

    const encounters = getPatientEncounterRows(vm.patient);
    const composerMap = {};
    encounters
      .filter((e) => (e.type === 'board_round' || e.type === 'mobile_clinical_review') && e.fields && String(e.fields.bloods || e.fields.bloodsIx || '').trim())
      .forEach((e) => {
        const dt = new Date(e.timestamp);
        const encDateStr = isNaN(dt.getTime()) ? null
          : dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const encounterDate = encDateStr === todayStr ? 'Today' : (encDateStr || null);

        String(e.fields.bloods || e.fields.bloodsIx || '').split(/\n+/).forEach((rawLine) => {
          let line = rawLine.trim();
          if (!line) return;
          let date = encounterDate;

          // Try extracting date prefix: DD/MM:, DD Mon:, or mobile pipe format (e.g. 18 Apr|CRP 78)
          let m;
          m = line.match(DATE_PIPE_RE);
          if (m) {
            const parsedLabel = normaliseBloodDateLabel(m[1]);
            if (parsedLabel) date = parsedLabel;
            line = line.slice(m[0].length).trim();
          } else {
            m = line.match(DATE_LINE_RE);
            if (m) {
              date = formatEmbeddedDate(m[1], m[2], m[3]);
              line = line.slice(m[0].length).trim();
            } else {
              m = line.match(DATE_TEXT_RE);
              if (m) {
                const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
                if (mo) {
                  date = formatEmbeddedDate(m[1], mo, null);
                  line = line.slice(m[0].length).trim();
                }
              }
            }
          }

          if (!date || !line) return;
          if (!composerMap[date]) composerMap[date] = {};

          // Parse known analytes
          BLOOD_DB.forEach(({ key, re }) => {
            const hit = line.match(re);
            if (hit) composerMap[date][key] = parseFloat(hit[1]);
          });

          // Capture unrecognised WORD NUMBER pairs so they appear in table
          const remaining = line.replace(/\d{1,2}[\/\-\.]\d{1,2}/g, ''); // strip date-like patterns
          const unknownRe = /\b([A-Za-z][A-Za-z0-9\-]*)\s+(\d+(?:\.\d+)?)/g;
          let hit2;
          while ((hit2 = unknownRe.exec(remaining)) !== null) {
            const candidate = hit2[1];
            // Skip if already captured by a known analyte (avoid double-counting)
            const alreadyKnown = BLOOD_DB.some((a) => a.re.test(candidate + ' ' + hit2[2]));
            if (!alreadyKnown) {
              const uKey = '_u_' + candidate.toUpperCase();
              if (!composerMap[date][uKey]) composerMap[date][uKey] = parseFloat(hit2[2]);
            }
          }
        });
      });

    // 3. Merge: all dates from both sources, composer values take priority on overlap
    // Parse and sort by actual date, newest first
    function parseDateForSort(label) {
      if (label === 'Today') return Date.now();
      const MMAP = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      // "20 Apr" or "20 Apr 2026"
      const m = label.match(/^(\d{1,2})\s+([a-z]{3})/i);
      if (m) {
        const mo = MMAP[(m[2] || '').toLowerCase()];
        if (mo !== undefined) {
          const yr = new Date().getFullYear();
          return new Date(yr, mo, +m[1]).getTime();
        }
      }
      const t = new Date(label).getTime();
      return isNaN(t) ? 0 : t;
    }

    const allDates = [...new Set([...Object.keys(composerMap), ...Object.keys(mobileMap)])]
      .sort((a, b) => parseDateForSort(b) - parseDateForSort(a));

    const cols = allDates.slice(0, 5).map((date) => ({
      date,
      vals: Object.assign({}, mobileMap[date] || {}, composerMap[date] || {})
    }));

    if (!cols.length || !cols.some((col) => Object.keys(col.vals).length > 0)) return '';

    // Build ordered analyte list:
    // 1. User's saved order (from options panel)
    // 2. Any DB analytes that have data but aren't in the order
    // 3. Any unrecognised analytes (_u_)
    const analyteOrder = getBloodAnalyteOrder();
    const analyteMap   = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a]));
    const orderedAnalytes = analyteOrder.map((k) => analyteMap[k]).filter(Boolean);

    // Auto-include DB analytes with data not already in order
    const allDataKeys = [...new Set(cols.flatMap((col) => Object.keys(col.vals).filter((k) => !k.startsWith('_u_'))))];
    const extraDBAnalytes = allDataKeys
      .filter((k) => !analyteOrder.includes(k) && analyteMap[k])
      .map((k) => analyteMap[k]);

    // Collect unknown analyte keys (prefixed _u_) from all cols
    const unknownKeys = [...new Set(cols.flatMap((col) =>
      Object.keys(col.vals).filter((k) => k.startsWith('_u_'))
    ))];
    const unknownAnalytes = unknownKeys.map((k) => ({
      key: k,
      label: k.replace('_u_', ''),
      fullName: k.replace('_u_', ''),
      range: '—', unit: '', notes: 'Reference range not available.',
      flag: () => null,
      unknown: true
    }));
    const allAnalytes = [...orderedAnalytes, ...extraDBAnalytes, ...unknownAnalytes];

    const optionsPanel = showOptions ? `
      <div class="dbl-options-panel">
        <div class="dbl-options-title">Analyte order</div>
        <div class="dbl-options-list">
          ${analyteOrder.map((key, idx) => `
          <div class="dbl-options-row" data-analyte="${c.escapeHtml(key)}">
            <span class="dbl-options-name">${c.escapeHtml(key)}</span>
            <div class="dbl-options-btns">
              ${idx > 0 ? `<button type="button" class="dbl-options-btn" data-patient-action="blood-order-up" data-analyte="${c.escapeHtml(key)}" title="Move up">↑</button>` : '<span class="dbl-options-btn-gap"></span>'}
              ${idx < analyteOrder.length - 1 ? `<button type="button" class="dbl-options-btn" data-patient-action="blood-order-down" data-analyte="${c.escapeHtml(key)}" title="Move down">↓</button>` : '<span class="dbl-options-btn-gap"></span>'}
            </div>
          </div>`).join('')}
        </div>
        <div class="dbl-options-footer">
          <button type="button" class="dbl-options-add" data-patient-action="blood-options-close">Done</button>
        </div>
      </div>` : '';

    const thead = `<tr class="dbl-head-row">
      <th class="dbl-analyte-col"></th>
      ${cols.map((col, ci) => `<th class="dbl-date-col${ci === 0 ? ' is-latest' : ''}">${c.escapeHtml(col.date)}</th>`).join('')}
    </tr>`;

    const tbody = allAnalytes.map(({ key, label, flag, unknown }) => {
      const hasValues = cols.some((col) => col.vals[key] !== undefined);
      if (!hasValues) return '';
      const cells = cols.map((col, ci) => {
        const val = col.vals[key];
        if (val === undefined) return '<td class="dbl-cell dbl-empty">—</td>';
        const fClass = flag(val, sex);
        return `<td class="dbl-cell${fClass ? ' dbl-' + fClass : ''}${ci === 0 ? ' is-latest' : ''}">
          <span class="dbl-val">${val % 1 === 0 ? val : val.toFixed(1)}</span>
        </td>`;
      }).join('');
      return `<tr><th class="dbl-analyte" data-key="${c.escapeHtml(key)}">${c.escapeHtml(label)}</th>${cells}</tr>`;
    }).filter(Boolean).join('');

    return `<div class="hah-ref-widget">
      <div class="hah-ref-head">
        <span class="hah-ref-label">Blood results</span>
        <button type="button" class="hah-ref-options-btn${showOptions ? ' is-open' : ''}"
          data-patient-action="toggle-blood-options" title="Options">⋯</button>
      </div>
      ${optionsPanel}
      <div class="hah-ref-body hah-ref-body--bloods">
        <div class="dbl-table-wrap">
          <table class="dbl-table">
            <thead>${thead}</thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }
