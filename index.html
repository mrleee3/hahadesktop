      referralSource: 'GP', doa: '2026-04-12',
      form: { bloods: '15 Apr|CRP 58 WCC 11.4 Hb 126 Na 140 K 4.2 Cr 88\n14 Apr|CRP 84 WCC 14.2 Hb 128 Na 141 K 4.1 Cr 90\n13 Apr|CRP 122 WCC 17.8 Hb 130 Na 139 K 4.3 Cr 86\n12 Apr|CRP 168 WCC 21.2 Hb 131 Na 138 K 4.4 Cr 84' }
    }
  ];

  function getLocalStorageKeys() {
    try {
      return Object.keys(window.localStorage || {});
    } catch (_err) {
      return [];
    }
  }

  function getStorageCandidateKeys() {
    const keys = getLocalStorageKeys();
    const dynamic = keys
      .filter((key) => STORAGE_KEY_REGEX.test(key) && key !== PRIMARY_STORAGE_KEY)
      .sort()
      .reverse();
    return [PRIMARY_STORAGE_KEY].concat(dynamic);
  }

  function readStoredPayload() {
    const keys = getStorageCandidateKeys();
    for (const key of keys) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) continue;
        const parsed = JSON.parse(raw);
        if (parsed && parsed.patients && typeof parsed.patients === 'object') {
          return {
            key,
            patients: parsed.patients,
            currentPatientId: parsed.currentPatient ? String(parsed.currentPatient) : null,
            deletedPatients: Array.isArray(parsed.deletedPatients) ? parsed.deletedPatients : [],
            patientSortMode: parsed.patientSortMode || '',
            patientSortDirection: parsed.patientSortDirection || ''
          };
        }
      } catch (_err) {}
    }
    return null;
  }

  function getPatientSourceBundle() {
    const adapter = window.HAHBoard.adapters && window.HAHBoard.adapters.getPatients;
    if (typeof adapter === 'function') {
      const result = adapter();
      if (Array.isArray(result) && result.length) {
        return { source: 'adapter', storageKey: null, currentPatientId: null, rows: result.slice() };
      }
    }

    const stored = readStoredPayload();
    if (stored) {
      const rows = Object.keys(stored.patients).map((id) => {
        const patient = stored.patients[id] || {};
        return { ...patient, id: String(id) };
      });
      return {
        source: 'live',
        storageKey: stored.key,
        currentPatientId: stored.currentPatientId,
        patientSortMode: stored.patientSortMode,
        patientSortDirection: stored.patientSortDirection,
        rows
      };
    }

    return { source: 'demo', storageKey: null, currentPatientId: null, rows: demoPatients.slice() };
  }


  function getOpsState() {
    const api = window.HAHBoard.ops;
    if (!api || typeof api.getState !== 'function') {
      return { patientStates: {}, taskPatches: {}, customTasks: [] };
    }
    return api.getState();
  }

  function getPatientOps(patientId) {
    const state = getOpsState();
    return (state.patientStates && state.patientStates[String(patientId)]) || {};
  }

  function getTaskPatch(taskId) {
    const state = getOpsState();
    return (state.taskPatches && state.taskPatches[String(taskId)]) || {};
  }

  function applyPatientOperationalState(summary) {
    const patch = getPatientOps(summary.id);
    const next = { ...summary, boardNote: String(patch.boardNote || '').trim() };
    if (patch.priority) next.priority = patch.priority;
    if (patch.currentStatus) next.currentStatus = patch.currentStatus;
    if (patch.boardStatus) next.boardStatus = patch.boardStatus;
    if (patch.dischargeReadiness) next.dischargeReadiness = patch.dischargeReadiness;
    if (Array.isArray(patch.blockers)) next.blockers = patch.blockers.slice();
    return next;
  }

  function applyTaskPatch(task) {
    const patch = getTaskPatch(task.id);
    if (!patch || !Object.keys(patch).length) return task;
    const merged = { ...task, ...patch };
    merged.dueState = deriveDueState(merged.dueAt);
    return merged;
  }


  function isReviewOverdue(reviewDueAt) {
    if (!reviewDueAt) return false;
    const ts = Date.parse(reviewDueAt);
    if (Number.isNaN(ts)) return false;
    return ts < Date.now();
  }

  function firstNonEmpty() {
    for (let i = 0; i < arguments.length; i += 1) {
      const value = arguments[i];
      if (value == null) continue;
      const text = String(value).trim();
      if (text) return text;
    }
    return '';
  }

  function splitSummaryHeadline(summary) {
    const text = String(summary || '').trim();
    if (!text) return '';
    return text.split('•')[0].trim();
  }

  function firstIssueLine(issues) {
    const lines = String(issues || '')
      .split(/\n+/)
      .map((line) => line.replace(/^\s*\d+[.)-]?\s*/, '').trim())
      .filter(Boolean);
    return lines[0] || '';
  }

  function derivePathway(raw) {
    return firstNonEmpty(raw.pathway, splitSummaryHeadline(raw.summary), firstIssueLine(raw.form && raw.form.issues), 'General');
  }

  function deriveLocation(raw) {
    if (raw.location) return String(raw.location).trim();
    if (raw.doa) return `Adm ${String(raw.doa).trim()}`;
    if (raw.referralSource) return String(raw.referralSource).trim();
    return '—';
  }

  function deriveClinician(raw) {
    return firstNonEmpty(raw.clinician, raw.assignedClinician, raw.owner, raw.referralSource, '—');
  }

  function detectBooleanFromText(text, patterns) {
    const haystack = String(text || '').toLowerCase();
    return patterns.some((pattern) => pattern.test(haystack));
  }

  function getCombinedText(raw) {
    const form = raw.form || {};
    return [raw.summary, form.issues, form.examination, form.plan, form.forDischargeSummary, raw.listDetails]
      .map((part) => String(part || '').trim())
      .filter(Boolean)
      .join('\n');
  }

  function extractOxygenLpm(raw) {
    const form = raw.form || {};
    const direct = parseFloat(String(form.oxygenFlow || '').replace(/[^0-9.]+/g, ''));
    if (Number.isFinite(direct) && direct > 0) return direct;
    const numeric = parseFloat(String(form.oxygen || '').replace(/[^0-9.]+/g, ''));
    if (Number.isFinite(numeric) && numeric > 0) return numeric;

    const details = String(raw.listDetails || '');
    const match = details.match(/sp[oò]?[₂2]?\s*\d+%\s*([0-9]+(?:\.[0-9]+)?)\s*l/i) || details.match(/([0-9]+(?:\.[0-9]+)?)\s*l\b/i);
    if (match) {
      const value = parseFloat(match[1]);
      if (Number.isFinite(value) && value > 0) return value;
    }
    return 0;
  }

  function inferEscalationFlags(raw) {
    const text = getCombinedText(raw);
    return {
      dnar: detectBooleanFromText(text, [/\bdnar\b/, /not for resuscitation/, /not for cpr/]),
      acp: detectBooleanFromText(text, [/\bacp\b/, /advance care/i, /ceiling of care/i])
    };
  }

  function mapAcuityToPriority(raw, oxygenLpm) {
    const acuity = String(raw.acuityClass || raw.acuity || '').toLowerCase();
    if (acuity === 'red') return oxygenLpm >= 2 ? 'Critical' : 'High';
    if (acuity === 'amber') return oxygenLpm >= 2 ? 'High' : 'Medium';
    if (acuity === 'green') return 'Low';
    if (oxygenLpm >= 2) return 'High';
    return 'Medium';
  }

  function derivePriority(raw, oxygenLpm, iv) {
    if (raw.priority) return raw.priority;
    const mapped = mapAcuityToPriority(raw, oxygenLpm);
    if (mapped !== 'Medium') return mapped;
    if (iv) return 'Medium';
    return mapped;
  }

  function parseBloodLine(line) {
    const text = String(line || '');
    const map = {};
    const defs = {
      CRP: /\bCRP\s+(-?\d+(?:\.\d+)?)/i,
      Cr: /\bCr\s+(-?\d+(?:\.\d+)?)/i,
      Na: /\bNa\s+(-?\d+(?:\.\d+)?)/i,
      K: /\bK\+?\s+(-?\d+(?:\.\d+)?)/i,
      Hb: /\bHb\s+(-?\d+(?:\.\d+)?)/i,
      WCC: /\bWCC\s+(-?\d+(?:\.\d+)?)/i
    };
    Object.keys(defs).forEach((key) => {
      const match = text.match(defs[key]);
      if (match) map[key] = parseFloat(match[1]);
    });
    return map;
  }

  function trendArrow(current, previous) {
    if (!Number.isFinite(current) || !Number.isFinite(previous)) return '';
    if (current > previous) return '↑';
    if (current < previous) return '↓';
    return '→';
  }

  function formatNumber(value) {
    if (!Number.isFinite(value)) return '';
    return Number.isInteger(value) ? String(value) : String(value.toFixed(1));
  }

  function buildBloodTrendSummary(bloodsText) {
    const lines = String(bloodsText || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
    if (!lines.length) return 'No recent blood summary';

    const latest = parseBloodLine(lines[0]);
    const prev = lines[1] ? parseBloodLine(lines[1]) : {};
    const parts = [];

    ['CRP', 'Cr', 'Na', 'K', 'Hb'].forEach((key) => {
      if (!Number.isFinite(latest[key])) return;
      const arrow = trendArrow(latest[key], prev[key]);
      const label = key === 'Cr' ? 'Cr' : key;
      if (arrow && arrow !== '→') parts.push(`${label} ${arrow} ${formatNumber(latest[key])}`);
      else parts.push(`${label} ${formatNumber(latest[key])}`);
    });

    if (parts.length) return parts.slice(0, 3).join(' · ');

    const first = lines[0].replace(/^\d{1,2}\/\d{1,2}(?:\/\d{2,4})?\s+\d{1,2}:\d{2}\s*\|\s*/,'');
    return truncateText(first, 90);
  }

  function buildObsSummary(raw) {
    const form = raw.form || {};
    const parts = [];
    if (form.temp) parts.push(`T ${String(form.temp).trim()}`);
    if (form.bp) parts.push(`BP ${String(form.bp).trim()}`);
    if (form.hr) parts.push(`HR ${String(form.hr).trim()}`);
    if (form.spo2) {
      const oxygenFlow = String(form.oxygenFlow || '').trim();
      parts.push(`SpO₂ ${String(form.spo2).trim()}%${oxygenFlow ? ` on ${oxygenFlow}` : ' RA'}`);
    }
    if (form.rr) parts.push(`RR ${String(form.rr).trim()}`);
    if (parts.length) return truncateText(parts.join(' · '), 96);

    const listDetails = String(raw.listDetails || '').replace(/^Obs:\s*/i, '').trim();
    if (listDetails) return truncateText(listDetails, 96);
    return 'No recent obs summary';
  }

  function truncateText(text, maxLen) {
    const value = String(text || '').trim();
    if (!value) return '';
    if (value.length <= maxLen) return value;
    return value.slice(0, Math.max(0, maxLen - 1)).trimEnd() + '…';
  }

  function deriveLatestReviewAt(raw) {
    return firstNonEmpty(raw.updatedAt, raw.importedAt, raw.createdAt, raw.timestamp);
  }

  function deriveReviewDueAt(raw) {
    return firstNonEmpty(raw.reviewDueAt, raw.nextReviewAt, raw.nextReviewDueAt);
  }

  function deriveStatus(raw, oxygenLpm, priority) {
    if (raw.currentStatus) return raw.currentStatus;
    if (priority === 'Critical') return 'Deteriorating';
    if (oxygenLpm >= 2) return 'Needs review';
    if (String(raw.acuityClass || raw.acuity || '').toLowerCase() === 'amber') return 'Needs review';
    if (String(raw.acuityClass || raw.acuity || '').toLowerCase() === 'green') return 'Stable';
    return 'Awaiting result';
  }

  function deriveDischargeReadiness(raw, oxygenLpm, iv, priority) {
    const dischargeText = String(raw.form && raw.form.forDischargeSummary || '').trim();
    if (!dischargeText) return 'Not ready';
    if (priority === 'Low' && oxygenLpm === 0 && !iv) return 'Possible today';
    if (priority === 'Medium' && oxygenLpm === 0) return 'Likely tomorrow';
    return 'Not ready';
  }

  function deriveChangedSinceYesterday(raw, latestReviewAt, bloodSummary, priority) {
    const ts = Date.parse(latestReviewAt || '');
    if (!Number.isNaN(ts) && (Date.now() - ts) < 36 * 60 * 60 * 1000) return true;
    if (/[↑↓]/.test(bloodSummary || '')) return true;
    return priority === 'Critical' || priority === 'High';
  }

  function deriveBlockers(raw, oxygenLpm, iv, dischargeReadiness) {
    if (oxygenLpm > 0) return [`O₂ requirement${oxygenLpm ? ` (${formatNumber(oxygenLpm)}L)` : ''}`];
    if (iv) return ['IV treatment ongoing'];
    if (dischargeReadiness === 'Possible today') return ['Discharge plan in progress'];

    const firstPlanLine = String(raw.form && raw.form.plan || '')
      .split(/\n+/)
      .map((line) => line.replace(/^\s*\d+[.)-]?\s*/, '').trim())
      .filter(Boolean)[0] || '';
    if (firstPlanLine) return [truncateText(firstPlanLine, 52)];
    return [];
  }

  function deriveTreatmentFlags(raw, oxygenLpm, iv, dnar) {
    const flags = [];
    if (oxygenLpm > 0) flags.push(`O2 ${formatNumber(oxygenLpm)}L`);
    if (iv || !!(raw.form && raw.form.ivGiven)) flags.push('IV');
    if (dnar) flags.push('DNAR');
    if (raw.form && raw.form.medsGiven) flags.push('Meds');
    return flags;
  }

  function deriveSummaryLine(raw) {
    return firstNonEmpty(raw.summary, firstIssueLine(raw.form && raw.form.issues), 'No summary');
  }

  function buildPatientSummary(raw) {
    const oxygenLpm = extractOxygenLpm(raw);
    const iv = !!(raw.iv || (raw.form && raw.form.ivGiven) || (raw.form && Array.isArray(raw.form.ivEntries) && raw.form.ivEntries.length));
    const escalationFlags = inferEscalationFlags(raw);
    const priority = derivePriority(raw, oxygenLpm, iv);
    const latestReviewAt = deriveLatestReviewAt(raw);
    const reviewDueAt = deriveReviewDueAt(raw);
    const bloodTrendSummary = buildBloodTrendSummary(raw.form && raw.form.bloods);
    const dischargeReadiness = deriveDischargeReadiness(raw, oxygenLpm, iv, priority);
    const treatmentFlags = deriveTreatmentFlags(raw, oxygenLpm, iv, escalationFlags.dnar);

    const summary = {
      id: String(raw.id),
      name: firstNonEmpty(raw.name, `Patient ${raw.id}`),
      age: raw.age || '',
      sex: raw.sex || '',
      location: deriveLocation(raw),
      pathway: derivePathway(raw),
      clinician: deriveClinician(raw),
      priority,
      currentStatus: deriveStatus(raw, oxygenLpm, priority),
      boardStatus: raw.boardStatus || 'Not discussed',
      dischargeReadiness,
      escalationSummary: escalationFlags.dnar && escalationFlags.acp ? 'DNAR + ACP' : escalationFlags.dnar ? 'DNAR' : escalationFlags.acp ? 'ACP' : 'Full escalation',
      alerts: treatmentFlags.slice(),
      latestReviewAt,
      reviewDueAt,
      changedSinceYesterday: deriveChangedSinceYesterday(raw, latestReviewAt, bloodTrendSummary, priority),
      reviewOverdue: isReviewOverdue(reviewDueAt),
      obsSummary: buildObsSummary(raw),
      bloodTrendSummary,
      treatmentFlags,
      blockers: deriveBlockers(raw, oxygenLpm, iv, dischargeReadiness),
      oxygenLpm,
      iv,
      dnar: escalationFlags.dnar,
      acp: escalationFlags.acp,
      sourcePatient: raw,
      summaryLine: deriveSummaryLine(raw),
      boardNote: '',
      admissionDate: String(raw.doa || '').trim()
    };

    return applyPatientOperationalState(summary);
  }

  function filterPatients(rows, savedView) {
    switch (savedView) {
      case 'high-priority':
        return rows.filter((r) => r.priority === 'High' || r.priority === 'Critical');
      case 'overdue-reviews':
        return rows.filter((r) => r.reviewOverdue);
      case 'likely-discharge':
        return rows.filter((r) => r.dischargeReadiness === 'Possible today' || r.dischargeReadiness === 'Ready');
      case 'oxygen-patients':
        return rows.filter((r) => r.oxygenLpm > 0);
      case 'iv-patients':
        return rows.filter((r) => r.iv);
      case 'changed':
        return rows.filter((r) => r.changedSinceYesterday);
      default:
        return rows;
    }
  }

  function sortPatients(rows, sortKey) {
    const out = rows.slice();
    switch (sortKey) {
      case 'name':
        out.sort((a, b) => a.name.localeCompare(b.name));
        return out;
      case 'review':
        out.sort((a, b) => {
          const aTs = Date.parse(a.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
          const bTs = Date.parse(b.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
          return aTs - bTs;
        });
        return out;
      case 'priority':
      default:
        out.sort((a, b) => {
          const p = (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99);
          if (p !== 0) return p;
          return a.name.localeCompare(b.name);
        });
        return out;
    }
  }

  function buildBoardMetrics(rows) {
    const highPriority = rows.filter((r) => r.priority === 'High' || r.priority === 'Critical').length;
    const overdueReviews = rows.filter((r) => r.reviewOverdue).length;
    const likelyDischarge = rows.filter((r) => r.dischargeReadiness === 'Possible today' || r.dischargeReadiness === 'Ready').length;
    const oxygenPatients = rows.filter((r) => r.oxygenLpm > 0).length;
    const ivPatients = rows.filter((r) => r.iv).length;
    const changed = rows.filter((r) => r.changedSinceYesterday).length;
    return [
      { key: 'all-active', label: 'Caseload', value: rows.length, subtext: 'All active patients' },
      { key: 'high-priority', label: 'High priority', value: highPriority, subtext: 'Needs senior attention', tone: highPriority ? 'warn' : '' },
      { key: 'overdue-reviews', label: 'Overdue reviews', value: overdueReviews, subtext: 'Past due time', tone: overdueReviews ? 'danger' : '' },
      { key: 'likely-discharge', label: 'Likely discharge', value: likelyDischarge, subtext: 'Today or ready', tone: likelyDischarge ? 'good' : '' },
      { key: 'oxygen-patients', label: 'Oxygen', value: oxygenPatients, subtext: 'Currently requiring O2' },
      { key: 'iv-patients', label: 'IV patients', value: ivPatients, subtext: 'Receiving IV treatment' },
      { key: 'changed', label: 'Changed since yesterday', value: changed, subtext: 'Live status shift' }
    ];
  }

  function pickSelectedPatient(rows, state, currentPatientId) {
    const selectedId = String(state.selectedPatientId || state.route.entityId || currentPatientId || '');
    const found = rows.find((r) => String(r.id) === selectedId);
    return found || rows[0] || null;
  }

  function buildBoardViewModel(state) {
    const sourceBundle = getPatientSourceBundle();
    const ops = window.HAHBoard && window.HAHBoard.ops;
    const isDischarged = ops && typeof ops.isPatientDischarged === 'function'
      ? (id) => ops.isPatientDischarged(id)
      : () => false;
    const activeRows = sourceBundle.rows.filter((row) => !isDischarged(row.id));
    const allRows = activeRows.map(buildPatientSummary);
    const filtered = filterPatients(allRows, state.board.savedView);
    const sorted = sortPatients(filtered, state.board.sort);
    const selectedPatient = pickSelectedPatient(sorted, state, sourceBundle.currentPatientId);

    return {
      rows: sorted,
      metrics: buildBoardMetrics(allRows),
      selectedPatient,
      totalPatients: sorted.length,
      source: sourceBundle.source,
      storageKey: sourceBundle.storageKey,
      currentPatientId: sourceBundle.currentPatientId,
      patientSortMode: sourceBundle.patientSortMode || '',
      patientSortDirection: sourceBundle.patientSortDirection || ''
    };
  }

  function getPatientSummaryById(id) {
    if (!id) return null;
    const sourceBundle = getPatientSourceBundle();
    const match = sourceBundle.rows.find((row) => String(row.id) === String(id));
    return match ? buildPatientSummary(match) : null;
  }

  function splitCleanLines(text) {
    return String(text || '')
      .split(/\n+/)
      .map((line) => String(line || '').replace(/^\s*\d+[.)-]?\s*/, '').trim())
      .filter(Boolean);
  }

  function buildLatestReviewText(raw) {
    const form = raw.form || {};
    const blocks = [];
    if (raw.summary) blocks.push(String(raw.summary).trim());
    if (form.examination) blocks.push(String(form.examination).trim());
    if (form.plan) blocks.push('Plan\n' + String(form.plan).trim());
    return blocks.filter(Boolean).join('\n\n');
  }

  function buildObsItems(raw, summary) {
    const form = raw.form || {};
    return [
      { label: 'Temp', value: form.temp || '—' },
      { label: 'BP', value: form.bp || '—' },
      { label: 'HR', value: form.hr || '—' },
      { label: 'SpO₂', value: form.spo2 ? `${form.spo2}%${form.oxygenFlow ? ` on ${form.oxygenFlow}` : ' RA'}` : '—' },
      { label: 'RR', value: form.rr || '—' },
      { label: 'BM', value: form.bm || '—' },
      { label: 'Weight', value: form.weight ? `${form.weight}kg` : '—' },
      { label: 'Scores', value: form.scoreMode || summary.currentStatus || '—' }
    ];
  }

  function parseBloodSamples(text) {
    const lines = String(text || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
    return lines.slice(0, 5).map((line) => {
      const parts = line.split('|').map((part) => part.trim()).filter(Boolean);
      const time = parts[0] || 'Sample';
      const main = parts.slice(1, 3).join(' | ') || line;
      const tail = parts.slice(3).join(' | ');
      return { time, main: truncateText(main, 140), tail: truncateText(tail, 160) };
    });
  }

  function formatMedEntry(entry) {
    if (!entry) return null;
    const name = firstNonEmpty(entry.name, entry.medication);
    if (!name) return null;
    const parts = [name, entry.dose, entry.frequency].map((x) => String(x || '').trim()).filter(Boolean);
    const detail = String(entry.details || entry.serialExpiry || '').trim();
    return {
      title: parts.join(' · '),
      detail: detail || ''
    };
  }

  function buildMedicationItems(raw) {
    const form = raw.form || {};
    const meds = Array.isArray(form.medEntries) ? form.medEntries.map(formatMedEntry).filter(Boolean) : [];
    const ivs = Array.isArray(form.ivEntries) ? form.ivEntries.map(formatMedEntry).filter(Boolean) : [];
    return { meds, ivs };
  }

  function buildPatientWorkspaceModel(state) {
    const boardVm = buildBoardViewModel(state);
    const selectedId = String(state.route.entityId || state.selectedPatientId || (boardVm.selectedPatient && boardVm.selectedPatient.id) || '');
    const summary = getPatientSummaryById(selectedId) || boardVm.selectedPatient;
    if (!summary) return null;

    const raw = summary.sourcePatient || {};
    const form = raw.form || {};
    const issues = splitCleanLines(form.issues || raw.summary).slice(0, 6);
    const planLines = splitCleanLines(form.plan).slice(0, 6);
    const dischargeLines = splitCleanLines(form.forDischargeSummary).slice(0, 4);
    const bloodSamples = parseBloodSamples(form.bloods);
    const meds = buildMedicationItems(raw);
    const obsItems = buildObsItems(raw, summary);
    const contextRows = boardVm.rows;
    const selectedIndex = contextRows.findIndex((row) => String(row.id) === String(summary.id));

    return {
      patient: summary,
      summaryText: summary.summaryLine || raw.summary || 'No summary available',
      reviewText: buildLatestReviewText(raw),
      issues,
      planLines,
      dischargeLines,
      bloodSamples,
      obsItems,
      medications: meds.meds,
      ivs: meds.ivs,
      listDetails: String(raw.listDetails || '').replace(/^Obs:\s*/i, '').trim(),
      admissionDate: String(raw.doa || '').trim(),
      referralSource: String(raw.referralSource || '').trim(),
      contextRows,
      selectedIndex
    };
  }

  function inferTaskCategory(title) {
    const text = String(title || '').toLowerCase();
    if (/blood|crp|u&e|u&e|urea|electrolyte|result|sample|culture|micro/.test(text)) return 'Bloods/results';
    if (/discharge|tto|transport|home|equipment/.test(text)) return 'Discharge';
    if (/family|relative|carer/.test(text)) return 'Family update';
    if (/iv|antibiotic|line|vip/.test(text)) return 'IV / treatment';
    if (/oxygen|o2|sats|review/.test(text)) return 'Clinical review';
    return 'Clinical review';
  }

  function inferTaskStatus(title) {
    const text = String(title || '').toLowerCase();
    if (/awaiting|pending|chase|follow up/.test(text)) return 'Waiting external';
    return 'Open';
  }

  function normaliseTaskPriority(patient, category, title) {
    if (patient.priority === 'Critical') return 'Critical';
    if (category === 'Discharge' && (patient.dischargeReadiness === 'Possible today' || patient.dischargeReadiness === 'Ready')) return 'High';
    if (category === 'Bloods/results' && /pending|awaiting/.test(String(title || '').toLowerCase())) return patient.priority === 'Low' ? 'Medium' : patient.priority;
    return patient.priority === 'Low' ? 'Low' : patient.priority === 'Medium' ? 'Medium' : 'High';
  }

  function buildTaskId(patientId, slug, index) {
    return `task:${patientId}:${slug}:${index}`;
  }

  function toSlug(text) {
    return String(text || '')
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || 'task';
  }

  function deriveDueState(dueAt) {
    if (!dueAt) return 'No due date';
    const ts = Date.parse(dueAt);
    if (Number.isNaN(ts)) return 'No due date';
    const now = new Date();
    const due = new Date(ts);
    const startToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const startTomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
    const startDayAfter = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2).getTime();
    if (ts < Date.now()) return 'Overdue';
    if (ts >= startToday && ts < startTomorrow) return 'Due today';
    if (ts >= startTomorrow && ts < startDayAfter) return 'Due tomorrow';
    return 'Future';
  }

  function makeTask(patient, options, index) {
    const title = String(options.title || '').trim();
    if (!title) return null;
    const category = options.category || inferTaskCategory(title);
    const dueAt = options.dueAt || patient.reviewDueAt || patient.latestReviewAt || '';
    const blocker = options.blocker || '';
    const status = options.status || inferTaskStatus(title);
    return {
      id: buildTaskId(patient.id, toSlug(title), index),
      patientId: patient.id,
      title,
      note: options.note || patient.summaryLine || '',
      category,
      owner: options.owner || patient.clinician || 'Unassigned',
      dueAt,
      dueState: deriveDueState(dueAt),
      priority: options.priority || normaliseTaskPriority(patient, category, title),
      status,
      blocker,
      createdFrom: options.createdFrom || 'Patient view',
      createdBy: options.createdBy || patient.clinician || 'H@H Board',
      updatedAt: options.updatedAt || patient.latestReviewAt || dueAt || '',
      boardLink: options.boardLink || patient.boardStatus || 'Not discussed',
      patient,
      sourceLine: options.sourceLine || ''
    };
  }

  function buildTasksForPatient(patient) {
    const raw = patient.sourcePatient || {};
    const form = raw.form || {};
    const tasks = [];
    let idx = 1;

    const addTask = (options) => {
      const task = makeTask(patient, options, idx++);
      if (!task) return;
      if (tasks.some((existing) => existing.title === task.title && existing.category === task.category)) return;
      tasks.push(task);
    };

    if (patient.reviewDueAt) {
      addTask({
        title: patient.reviewOverdue ? 'Complete overdue clinical review' : 'Clinical review due',
        category: 'Clinical review',
        dueAt: patient.reviewDueAt,
        status: 'Open',
        createdFrom: 'Board cadence'
      });
    }

    patient.blockers.forEach((blocker) => {
      addTask({
        title: blocker,
        category: inferTaskCategory(blocker),
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        blocker,
        status: inferTaskStatus(blocker),
        createdFrom: 'Derived blocker'
      });
    });

    if (patient.iv) {
      addTask({
        title: 'Review IV therapy plan',
        category: 'IV / treatment',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Treatment state'
      });
    }

    if (patient.oxygenLpm > 0) {
      addTask({
        title: `Review oxygen requirement (${patient.oxygenLpm}L)`,
        category: 'Clinical review',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Treatment state'
      });
    }

    if ((patient.dischargeReadiness === 'Possible today' || patient.dischargeReadiness === 'Ready') && !patient.blockers.some((x) => /tto|discharge/i.test(x))) {
      addTask({
        title: 'Progress discharge plan',
        category: 'Discharge',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Discharge readiness'
      });
    }

    splitCleanLines(form.plan).slice(0, 3).forEach((line) => {
      addTask({
        title: truncateText(line, 84),
        category: inferTaskCategory(line),
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        sourceLine: line,
        status: inferTaskStatus(line),
        createdFrom: 'Plan'
      });
    });

    if (/pending|awaiting|repeat blood|u&e|crp|wcc/i.test(patient.bloodTrendSummary) && !tasks.some((task) => task.category === 'Bloods/results')) {
      addTask({
        title: 'Review blood results / trend',
        category: 'Bloods/results',
        dueAt: patient.reviewDueAt || patient.latestReviewAt,
        createdFrom: 'Blood trend'
      });
    }

    return tasks.slice(0, 6);
  }

  function filterTasks(rows, state) {
    let out = rows.slice();
    const savedView = state.tasks.savedView;
    const patientId = state.tasks.filters && state.tasks.filters.patientId;
    if (patientId) {
      out = out.filter((task) => String(task.patientId) === String(patientId));
    }
    switch (savedView) {
      case 'due-today':
        out = out.filter((task) => task.dueState === 'Due today');
        break;
      case 'overdue':
        out = out.filter((task) => task.dueState === 'Overdue');
        break;
      case 'waiting-external':
        out = out.filter((task) => task.status === 'Waiting external');
        break;
      case 'discharge-blockers':
        out = out.filter((task) => task.category === 'Discharge' || /tto|transport|home|equipment|discharge/i.test(task.title + ' ' + task.blocker));
        break;
      case 'review-due':
        out = out.filter((task) => task.category === 'Clinical review');
        break;
      case 'high-priority':
        out = out.filter((task) => task.priority === 'High' || task.priority === 'Critical');
        break;
      case 'unassigned':
        out = out.filter((task) => !task.owner || task.owner === 'Unassigned' || task.owner === '—');
        break;
      case 'patient-focus':
        break;
      case 'boardround-actions':
        out = out.filter((task) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(task.boardLink || '')) || /boardround/i.test(String(task.createdFrom || '')));
        break;
      default:
        break;
    }
    return out;
  }

  function sortTasks(rows, sortKey) {
    const out = rows.slice();
    const dueRank = { 'Overdue': 0, 'Due today': 1, 'Due tomorrow': 2, 'Future': 3, 'No due date': 4 };
    const priRank = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    switch (sortKey) {
      case 'priority':
        out.sort((a, b) => (priRank[a.priority] ?? 99) - (priRank[b.priority] ?? 99) || a.title.localeCompare(b.title));
        return out;
      case 'patient':
        out.sort((a, b) => a.patient.name.localeCompare(b.patient.name) || a.title.localeCompare(b.title));
        return out;
      case 'due':
      default:
        out.sort((a, b) => {
          const dueCmp = (dueRank[a.dueState] ?? 99) - (dueRank[b.dueState] ?? 99);
          if (dueCmp !== 0) return dueCmp;
          const aTs = Date.parse(a.dueAt || '') || Number.MAX_SAFE_INTEGER;
          const bTs = Date.parse(b.dueAt || '') || Number.MAX_SAFE_INTEGER;
          if (aTs !== bTs) return aTs - bTs;
          return a.title.localeCompare(b.title);
        });
        return out;
    }
  }

  function buildTaskMetrics(rows) {
    return [
      { key: 'all-open', label: 'Open tasks', value: rows.length, subtext: 'Visible operational actions', tone: rows.length ? '' : 'good' },
      { key: 'due-today', label: 'Due today', value: rows.filter((r) => r.dueState === 'Due today').length, subtext: 'Needs action today' },
      { key: 'overdue', label: 'Overdue', value: rows.filter((r) => r.dueState === 'Overdue').length, subtext: 'Past due', tone: rows.some((r) => r.dueState === 'Overdue') ? 'danger' : '' },
      { key: 'waiting-external', label: 'Waiting external', value: rows.filter((r) => r.status === 'Waiting external').length, subtext: 'Pending other input' },
      { key: 'discharge-blockers', label: 'Discharge blockers', value: rows.filter((r) => r.category === 'Discharge' || /discharge|tto|transport|home/i.test(r.title + ' ' + r.blocker)).length, subtext: 'Flow-limiting work', tone: 'warn' },
      { key: 'review-due', label: 'Review tasks', value: rows.filter((r) => r.category === 'Clinical review').length, subtext: 'Clinical review cadence' },
      { key: 'boardround-actions', label: 'Boardround actions', value: rows.filter((r) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(r.boardLink || '')) || /boardround/i.test(String(r.createdFrom || ''))).length, subtext: 'Live actions from the round', tone: 'warn' }
    ];
  }

  function buildTaskViewCounts(rows) {
    return {
      'all-open': rows.length,
      'due-today': rows.filter((r) => r.dueState === 'Due today').length,
      overdue: rows.filter((r) => r.dueState === 'Overdue').length,
      'waiting-external': rows.filter((r) => r.status === 'Waiting external').length,
      'discharge-blockers': rows.filter((r) => r.category === 'Discharge' || /discharge|tto|transport|home/i.test(r.title + ' ' + r.blocker)).length,
      'review-due': rows.filter((r) => r.category === 'Clinical review').length,
      'boardround-actions': rows.filter((r) => ['Not discussed', 'In discussion', 'Discussed'].includes(String(r.boardLink || '')) || /boardround/i.test(String(r.createdFrom || ''))).length,
      'high-priority': rows.filter((r) => r.priority === 'High' || r.priority === 'Critical').length,
      unassigned: rows.filter((r) => !r.owner || r.owner === 'Unassigned' || r.owner === '—').length
    };
  }


  function buildCustomTask(customTask, patientMap) {
    const patient = patientMap.get(String(customTask.patientId));
    if (!patient) return null;
    const task = {
      id: String(customTask.id),
      patientId: String(customTask.patientId),
      title: String(customTask.title || '').trim(),
      note: String(customTask.note || patient.summaryLine || '').trim(),
      category: String(customTask.category || 'Clinical review').trim(),
      owner: String(customTask.owner || patient.clinician || 'Unassigned').trim(),
      dueAt: String(customTask.dueAt || '').trim(),
      dueState: deriveDueState(customTask.dueAt),
      priority: String(customTask.priority || patient.priority || 'Medium').trim(),
      status: String(customTask.status || 'Open').trim(),
      blocker: String(customTask.blocker || '').trim(),
      createdFrom: String(customTask.createdFrom || 'Manual').trim(),
      createdBy: String(customTask.createdBy || 'H@H Board').trim(),
      updatedAt: String(customTask.updatedAt || '').trim(),
      boardLink: String(customTask.boardLink || patient.boardStatus || '').trim(),
      patient,
      sourceLine: ''
    };
    return applyTaskPatch(task);
  }

  function buildAllTasks(boardRows) {
    const patientMap = new Map(boardRows.map((row) => [String(row.id), row]));
    const opsState = getOpsState();
    const derivedTasks = boardRows.flatMap(buildTasksForPatient).map(applyTaskPatch);
    const customTasks = Array.isArray(opsState.customTasks)
      ? opsState.customTasks.map((task) => buildCustomTask(task, patientMap)).filter(Boolean)
      : [];
    return derivedTasks.concat(customTasks);
  }


  function buildTasksViewModel(state) {
    const boardVm = buildBoardViewModel(state);
    const allTasks = buildAllTasks(boardVm.rows).filter((task) => !['Done', 'Cancelled'].includes(task.status));
    const filtered = filterTasks(allTasks, state);
    const sorted = sortTasks(filtered, state.tasks.sort || 'due');
    const selectedTaskId = String(state.selectedTaskId || state.route.entityId || (sorted[0] && sorted[0].id) || '');
    const selectedTask = sorted.find((task) => String(task.id) === selectedTaskId) || sorted[0] || null;
    const selectedPatient = selectedTask ? selectedTask.patient : null;
    const relatedTasks = selectedTask ? sorted.filter((task) => task.patientId === selectedTask.patientId && task.id !== selectedTask.id).slice(0, 4) : [];
    const sourceLabel = boardVm.source === 'live' ? 'Live app storage' : boardVm.source === 'adapter' ? 'Adapter' : 'Demo data';
    return {
      rows: sorted,
      metrics: buildTaskMetrics(allTasks),
      viewCounts: buildTaskViewCounts(allTasks),
      selectedTask,
      selectedPatient,
      relatedTasks,
      totalTasks: sorted.length,
      source: boardVm.source,
      sourceLabel,
      storageKey: boardVm.storageKey,
      boardRows: boardVm.rows
    };
  }

  function uniquePatients(rows) {
    const seen = new Set();
    const out = [];
    rows.forEach((row) => {
      if (!row || seen.has(String(row.id))) return;
      seen.add(String(row.id));
      out.push(row);
    });
    return out;
  }

  function limitPatients(rows, max) {
    return uniquePatients(rows).slice(0, max || 6);
  }

  function aggregateBy(rows, accessor) {
    const map = new Map();
    rows.forEach((row) => {
      const key = accessor(row) || '—';
      map.set(key, (map.get(key) || 0) + 1);
    });
    return Array.from(map.entries()).map(([label, value]) => ({ label, value })).sort((a, b) => b.value - a.value);
  }

  function getInsightsPreset(state) {
    return state.route.preset || state.insights.preset || 'service-overview';
  }

  function buildBoardroundViewModel(state) {
    const boardVm = buildBoardViewModel(state);
    const tasksVm = buildTasksViewModel({ ...state, tasks: { ...(state.tasks || {}), savedView: 'all-open', filters: { patientId: null } } });
    const statusRank = { 'In discussion': 0, 'Not discussed': 1, 'Discussed': 2, 'Actioned': 3, 'Deferred': 4 };
    const queueRows = boardVm.rows.slice().sort((a, b) => {
      const s = (statusRank[a.boardStatus] ?? 99) - (statusRank[b.boardStatus] ?? 99);
      if (s !== 0) return s;
      const p = (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99);
      if (p !== 0) return p;
      const aTs = Date.parse(a.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
      const bTs = Date.parse(b.reviewDueAt || '') || Number.MAX_SAFE_INTEGER;
      return aTs - bTs;
    });
    const selectedId = String(state.selectedPatientId || state.route.entityId || (boardVm.selectedPatient && boardVm.selectedPatient.id) || '');
    const currentIndex = Math.max(0, queueRows.findIndex((row) => String(row.id) === selectedId));
    const activePatient = queueRows[currentIndex] || queueRows[0] || null;
    const queueTasks = activePatient ? tasksVm.rows.filter((task) => String(task.patientId) === String(activePatient.id)) : [];
    const counts = {
      total: queueRows.length,
      notDiscussed: queueRows.filter((p) => p.boardStatus === 'Not discussed').length,
      inDiscussion: queueRows.filter((p) => p.boardStatus === 'In discussion').length,
      discussed: queueRows.filter((p) => p.boardStatus === 'Discussed').length,
      actioned: queueRows.filter((p) => p.boardStatus === 'Actioned').length,
      deferred: queueRows.filter((p) => p.boardStatus === 'Deferred').length
    };
    return {
      queueRows,
      activePatient,
      activeTasks: queueTasks.slice(0, 6),
      currentIndex,
      counts,
      allTasks: tasksVm.rows
    };
  }

          { label: 'Oxygen / IV', value: cohorts['oxygen-iv'].count, subtext: 'Higher-support cohort' }
        ]
      }
    ];

    const detWatchPatients = allPatients.filter((p) => p.priority === 'Critical' || p.reviewOverdue || p.changedSinceYesterday).slice(0, 5);
    const topPathways = aggregateBy(allPatients, (row) => row.pathway).slice(0, 4);
    const topClinicians = aggregateBy(allPatients, (row) => row.clinician).slice(0, 4);
    const blockerCats = aggregateBy(allTasks.filter((t) => t.blocker), (task) => task.category).slice(0, 4);

    const cohortPanels = [
      {
        key: 'changed',
        title: 'Deterioration watch',
        subtitle: 'Recent shifts and review drift',
        type: 'list',
        items: detWatchPatients.map((patient) => ({
          title: patient.name,
          subtext: [patient.currentStatus, patient.bloodTrendSummary, patient.location].filter(Boolean).join(' · ')
        }))
      },
      {
        key: 'oxygen-iv',
        title: 'Oxygen / IV cohort',
        subtitle: 'Support-heavy patients likely to need more operational attention',
        type: 'bars',
        items: [
          { label: 'Oxygen', value: allPatients.filter((p) => p.oxygenLpm > 0).length, subtext: 'Currently on oxygen' },
          { label: 'IV', value: allPatients.filter((p) => p.iv).length, subtext: 'Receiving IV treatment' },
          { label: 'Either', value: cohorts['oxygen-iv'].count, subtext: 'Combined support cohort' }

      },
      {
        key: 'open-tasks',
        title: 'Task burden and blockers',
        subtitle: 'Where current operational friction sits',
        type: 'bars',
        items: blockerCats.length ? blockerCats.map((item) => ({ label: item.label, value: item.value, subtext: 'Blocking workload' })) : [
          { label: 'No blockers', value: 0, subtext: 'No current blocker-derived tasks' }
        ]
      }
    ];

    const operationalPanels = [
      {
        key: 'team-pressure',
        title: 'Team and ownership pressure',
        subtitle: 'Caseload concentrated by current visible owner',
        type: 'bars',
        items: topClinicians.length ? topClinicians.map((item) => ({ label: item.label, value: item.value, subtext: 'Patients in current view' })) : [{ label: '—', value: 0, subtext: 'No owner data' }]
      },
      {
        key: 'pathway-distribution',
        title: 'Pathway distribution',
        subtitle: 'Current service composition by pathway',
        type: 'bars',
        items: topPathways.length ? topPathways.map((item) => ({ label: item.label, value: item.value, subtext: 'Patients in pathway' })) : [{ label: '—', value: 0, subtext: 'No pathway data' }]
      }
    ];

    const selectedKey = state.selectedInsightKey || (preset === 'board-prep' ? 'overdue-reviews' : preset === 'clinical-risk' ? 'high-priority' : preset === 'capacity-flow' ? 'discharge-blockers' : 'caseload');
    let selectedDetail = cohorts[selectedKey] || null;
    if (!selectedDetail && selectedKey === 'team-pressure') {
      selectedDetail = {
        key: 'team-pressure',
        label: 'Team and ownership pressure',
        summary: 'Visible patients grouped by current clinician/owner label.',
        explanation: 'This is a quick balancing view rather than a definitive performance lens.',
        patients: limitPatients(allPatients, 8),
        count: allPatients.length,
        subtitle: 'Ownership distribution',
        boardPreset: 'all-active',
        tasksPreset: 'all-open'
      };
    }
    if (!selectedDetail && selectedKey === 'pathway-distribution') {
      selectedDetail = {
        key: 'pathway-distribution',
        label: 'Pathway distribution',
        summary: 'Current patients grouped by dominant pathway label.',
        explanation: 'Useful for seeing whether the service is being driven by a particular disease stream today.',
        patients: limitPatients(allPatients, 8),
        count: allPatients.length,
        subtitle: 'Pathway mix',
        boardPreset: 'all-active',
        tasksPreset: 'all-open'
      };
    }

    const markActive = (panel) => ({ ...panel, active: panel.key === selectedKey });

    return {
      preset,
      presetLabel: preset === 'board-prep' ? 'Board prep' : preset === 'clinical-risk' ? 'Clinical risk' : preset === 'capacity-flow' ? 'Capacity and flow' : 'Service overview',
      range,
      rangeLabel: range === 'today' ? 'Today' : range === '48h' ? 'Last 48h' : range === '30d' ? 'Last 30 days' : 'Last 7 days',
      headerSubtitle: `${boardVm.source === 'live' ? 'Live app storage' : boardVm.source === 'adapter' ? 'Adapter data' : 'Demo data'} · current service intelligence view`,
      sourceLabel: boardVm.source === 'live' ? 'Live app storage' : boardVm.source === 'adapter' ? 'Adapter' : 'Demo data',
      boardRows: allPatients,
      allTasks,
      metrics,
      mainPanels: mainPanels.map(markActive),
      cohortPanels: cohortPanels.map(markActive),
      operationalPanels: operationalPanels.map(markActive),
      selectedKey,
      selectedDetail
    };
  }

  window.HAHBoard.derived = {
    getPatientSourceBundle,
    buildPatientSummary,
    buildBoardViewModel,
    getPatientSummaryById,
    buildPatientWorkspaceModel,
    buildTasksViewModel,
    buildInsightsViewModel,
    buildAllTasks,
    splitCleanLines
  };
})();

(function () {

  function renderLeftPane(state) {

      `) : '',
      c.card('Service snapshot', c.keyValueGrid([
        { label: 'Active', value: vm.metrics[0]?.value ?? vm.totalPatients },
        { label: 'High priority', value: vm.metrics[1]?.value ?? '—' },
        { label: 'Likely discharge', value: vm.metrics[3]?.value ?? '—' },
        { label: 'Changed', value: vm.metrics[6]?.value ?? '—' }
      ])),
      c.card('Board context', `
        <div class="hah-board-context-list">
          <div class="hah-board-context-row"><span>Current view</span><strong>${c.escapeHtml(viewLabel(state.board.savedView))}</strong></div>

  }

  function renderMainPane(state) {
    const vm = d.buildBoardViewModel(state);
    if (!vm.rows.length) {
      return `<div class="hah-board-surface">${c.emptyState('No patients in this view', 'Try a different saved view or clear filters.')}</div>`;
    }

    const metricsHtml = vm.metrics.map((metric) => c.metricCard({ ...metric, active: metric.key === state.board.savedView })).join('');
    const rowsHtml = vm.rows.map((row) => renderRow(row, vm.selectedPatient)).join('');

    return `

        <div class="hah-board-metrics-head">
          <div>
            <div class="hah-board-title">${c.escapeHtml(viewLabel(state.board.savedView))}</div>

        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-board-toolbar">
              <div class="hah-board-toolbar-group hah-board-toolbar-copy">

              <div class="hah-board-toolbar-group">
                ${renderSortButton('Priority', 'priority', state.board.sort)}

                ${renderSortButton('Name', 'name', state.board.sort)}
                ${c.pillButton('Open selected', 'open-selected-patient')}
              </div>

              [
                { label: 'Patient', width: '260px' },
                { label: 'Source/team', width: '120px' },
                { label: 'Pathway', width: '150px' },
                { label: 'Priority', width: '112px' },
                { label: 'Current status', width: '168px' },
                { label: 'Review due', width: '128px' },
                { label: 'Obs / score', width: '190px' },
                { label: 'Blood trend', width: '180px' },
                { label: 'Treatment flags', width: '170px' },
                { label: 'Discharge', width: '152px' },
                { label: 'Board status', width: '136px' }
              ],
              rowsHtml,
              { className: 'hah-board-table-wrap' }
            )}
          </div>
        </section>
      </div>
    `;
  }

  function renderRow(row, selectedPatient) {
    const selected = selectedPatient && selectedPatient.id === row.id;
    const reviewMeta = row.reviewDueAt ? formatDateTime(row.reviewDueAt) : '—';

    return `
      <tr class="${selected ? 'is-selected' : ''}" data-board-action="select-patient" data-patient-id="${c.escapeHtml(row.id)}">
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.name)}</div>
          <div class="hah-row-sub">${c.escapeHtml([row.age || '—', row.location].filter(Boolean).join(' · '))}</div>
        </td>
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.clinician)}</div>
        </td>
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.pathway)}</div>
          <div class="hah-row-sub">${c.escapeHtml(row.summaryLine || '')}</div>
        </td>
        <td>${priorityBadge(row.priority)}</td>
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.currentStatus)}</div>
          <div class="hah-row-sub">${row.reviewOverdue ? 'Review overdue' : 'Review tracked'}</div>
        </td>
        <td>
          <div class="hah-row-main">${reviewMeta}</div>
          <div class="hah-row-sub">${row.reviewOverdue ? 'Needs action' : 'On schedule'}</div>
        </td>
        <td>
          <div class="hah-row-main hah-clamp-2">${c.escapeHtml(row.obsSummary)}</div>
        </td>
        <td>
          <div class="hah-row-main hah-clamp-2">${c.escapeHtml(row.bloodTrendSummary)}</div>
        </td>
        <td>
          <div class="hah-board-flags">${row.treatmentFlags.length ? row.treatmentFlags.slice(0, 3).map((flag) => c.badge(flag, 'neutral')).join('') : '<span class="hah-row-sub">—</span>'}</div>
        </td>
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.dischargeReadiness)}</div>
          <div class="hah-row-sub hah-clamp-2">${c.escapeHtml(row.blockers[0] || 'No active blocker')}</div>
        </td>
        <td>
          <div class="hah-row-main">${c.escapeHtml(row.boardStatus)}</div>
        </td>
      </tr>
    `;
  }

  function renderRightPane(state) {
    const vm = d.buildBoardViewModel(state);
    const patient = vm.selectedPatient;
    if (!patient) {
      return c.stack([
        c.card('Selected patient preview', c.emptyState('No patient selected', 'Select a row on the board to see the live snapshot.'))
      ]);
    }

    return c.stack([
      c.card(
        patient.name,
        `
          <div class="hah-board-sub">${c.escapeHtml([patient.age || '—', patient.location, patient.pathway].filter(Boolean).join(' · '))}</div>
          <div style="margin-top:8px;" class="hah-board-sub">${c.escapeHtml(patient.summaryLine || '')}</div>
          <div style="margin-top:16px;" class="hah-board-flags">
            ${priorityBadge(patient.priority)}
            ${c.badge(patient.currentStatus, 'neutral')}
            ${patient.dnar ? c.badge('DNAR', 'danger') : ''}
            ${patient.acp ? c.badge('ACP', 'neutral') : ''}
          </div>
        `,
        { subtitle: patient.clinician }
      ),
      c.card('Board decision', `
        ${c.keyValueGrid([
          { label: 'Board status', value: patient.boardStatus },
          { label: 'Discharge', value: patient.dischargeReadiness },
          { label: 'Review due', value: formatDateTime(patient.reviewDueAt) },
          { label: 'Tasks', value: patient.blockers[0] || 'No active blocker' }
        ])}
        <div style="margin-top:16px;" class="hah-task-note">${c.escapeHtml(patient.boardNote || 'No board note recorded yet.')}</div>
      `),
      c.card('Today focus', `
        <div class="hah-summary-banner hah-summary-banner-tight">${c.escapeHtml(buildTodayFocusText(patient))}</div>
        <div style="margin-top:16px;">
          ${c.keyValueGrid([
            { label: 'Obs', value: patient.obsSummary },
            { label: 'Bloods', value: patient.bloodTrendSummary },
            { label: 'Escalation', value: patient.escalationSummary },
            { label: 'Discharge', value: patient.dischargeReadiness }
          ])}
        </div>
      `),
      c.card('Actions', `
        <div class="hah-board-right-actions">
          ${c.pillButton('Open patient', 'open-selected-patient')}
          ${c.pillButton('Open tasks', 'open-selected-tasks')}
          ${c.pillButton('Cycle board status', 'cycle-board-status')}
          ${c.pillButton('Cycle discharge', 'cycle-discharge')}
          ${c.pillButton('Board note', 'edit-board-note')}
          ${c.pillButton('Add task', 'add-task')}
        </div>
      `)
    ]);
  }

  function renderBoardroundStrip(state) {
    const roundVm = d.buildBoardroundViewModel(state);
    if (!roundVm || !roundVm.activePatient) return '';
    return c.card('Boardround mode', `
      <div class="hah-boardround-strip">
        <div class="hah-boardround-copy">
          <div class="hah-boardround-title">Current patient</div>
          <div class="hah-boardround-patient">${c.escapeHtml(roundVm.activePatient.name)}</div>
          <div class="hah-boardround-sub">${c.escapeHtml([roundVm.activePatient.currentStatus, roundVm.activePatient.dischargeReadiness, roundVm.activePatient.blockers[0] || 'No blocker'].join(' · '))}</div>
        </div>
        <div class="hah-boardround-stats">
          <div class="hah-boardround-stat"><span>Position</span><strong>${roundVm.currentIndex + 1} / ${roundVm.counts.total}</strong></div>
          <div class="hah-boardround-stat"><span>Not discussed</span><strong>${roundVm.counts.notDiscussed}</strong></div>
          <div class="hah-boardround-stat"><span>Actioned</span><strong>${roundVm.counts.actioned}</strong></div>

  function renderRoundQueue(state) {

    if (!roundVm || !roundVm.queueRows.length) return '<div class="hah-task-note">No patients in current boardround queue.</div>';

  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-board-action]');
    if (!target) return false;
    const action = target.getAttribute('data-board-action');
    const vm = d.buildBoardViewModel(state);
    const patient = vm.selectedPatient;

    if (action === 'set-view') {
      const viewKey = target.getAttribute('data-view-key') || 'all-active';
      store.setState({ board: { savedView: viewKey } });
      return true;
    }
    if (action === 'metric-filter') {
      const metricKey = target.getAttribute('data-metric-key');
      if (!metricKey) return false;
      store.setState({ board: { savedView: metricKey } });
      return true;
    }
    if (action === 'set-sort') {
      const sortKey = target.getAttribute('data-sort-key') || 'priority';
      store.setState({ board: { sort: sortKey } });
      return true;
    }
    if (action === 'select-patient') {
      const patientId = target.getAttribute('data-patient-id');
      if (!patientId) return false;
      store.setState({ selectedPatientId: patientId });
      return true;
    }
    if (action === 'open-selected-patient') {
      if (!patient) return true;
      store.setState({ selectedPatientId: patient.id });
      router.goToPatient(patient.id);
      return true;
    }
    if (action === 'open-selected-tasks') {
      if (!patient) return true;
      store.setState({ selectedPatientId: patient.id, selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId: patient.id } } });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'cycle-board-status') {
      if (!patient || !ops) return true;
      ops.cycleBoardStatus(patient.id, patient.boardStatus);
      return true;
    }
    if (action === 'cycle-discharge') {
      if (!patient || !ops) return true;
      ops.cycleDischargeReadiness(patient.id, patient.dischargeReadiness);
      return true;
    }
    if (action === 'edit-board-note') {
      if (!patient || !ops) return true;
      ops.promptForBoardNote(patient);
      return true;
    }
    if (action === 'add-task') {
      if (!patient || !ops) return true;
      const created = ops.promptCreateTask(patient, { createdFrom: 'Board', boardLink: patient.boardStatus, dueAt: patient.reviewDueAt || '' });
      if (created) {
        store.setState({ selectedTaskId: created.id });
      }
      return true;
    }
    return false;
  }

  function buildViewCounts(state) {
    const out = {};
    VIEW_DEFS.forEach((view) => {
      const vm = d.buildBoardViewModel({
        ...state,
        board: {
          ...state.board,
          savedView: view.key
        }
      });
      out[view.key] = vm.totalPatients;
    });
    return out;
  }

  function renderSavedViewButton(view, activeView, count) {
    const active = view.key === activeView ? ' is-active' : '';
    return `
      <button type="button" class="hah-saved-view-btn${active}" data-board-action="set-view" data-view-key="${c.escapeHtml(view.key)}">
        <span>
          <span class="hah-saved-view-label">${c.escapeHtml(view.label)}</span>
          <span class="hah-saved-view-sub">${c.escapeHtml(savedViewSub(view.key, count))}</span>
        </span>
        <span class="hah-saved-view-count">${c.escapeHtml(count)}</span>
      </button>
    `;
  }

  function savedViewSub(key, count) {
    switch (key) {
      case 'high-priority': return count ? 'Needs senior attention' : 'No current red flags';
      case 'overdue-reviews': return count ? 'Past planned review time' : 'All reviews on track';
      case 'likely-discharge': return count ? 'Possible today or ready' : 'No immediate discharge cohort';
      case 'oxygen-patients': return count ? 'Currently requiring oxygen' : 'No oxygen patients';
      case 'iv-patients': return count ? 'Receiving IV treatment' : 'No IV therapies';
      case 'changed': return count ? 'Status shifted recently' : 'Stable service state';
      default: return 'Whole active service';
    }
  }

  function renderSortButton(label, key, activeKey) {
    const attrs = `data-sort-key="${c.escapeHtml(key)}"`;
    const btn = c.pillButton(label, 'set-sort', attrs);
    if (key !== activeKey) return btn;
    return btn.replace('class="hah-inline-pill"', 'class="hah-inline-pill is-active"');
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority, tone);
  }

  function buildTodayFocusText(patient) {
    const parts = [patient.currentStatus, patient.bloodTrendSummary, patient.blockers[0] || 'No active blocker'];
    return parts.filter(Boolean).join(' · ');
  }

  function viewLabel(key) {
    const found = VIEW_DEFS.find((view) => view.key === key);
    return found ? found.label : 'Board';
  }

  function formatDateTime(value) {
    const raw = String(value || '').trim();
    if (!raw) return '—';
    const dt = new Date(raw);
    if (!Number.isNaN(dt.getTime())) {
      return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    const compact = raw.match(/(\d{1,2}:\d{2})/);
    return compact ? compact[1] : raw;
  }

  window.HAHBoard.boardScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>
