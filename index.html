    { key: 'hf-mon', label: 'HF MON', text: 'Aim for 0.5-1kg weight loss/day - if greater flag with Dr' }
  ];
  const BOARD_SELECTION_PREFIX = 'hah_board_selection:';

  function saveDraft(patientId, type, fields) {
    try { localStorage.setItem(DRAFT_PREFIX + patientId + ':' + type, JSON.stringify({ fields, at: Date.now() })); } catch (_) {}
  }
  function loadDraft(patientId, type) {
    try { const r = localStorage.getItem(DRAFT_PREFIX + patientId + ':' + type); return r ? JSON.parse(r) : null; } catch (_) { return null; }
  }
  function clearDraft(patientId, type) {
    try { localStorage.removeItem(DRAFT_PREFIX + patientId + ':' + type); } catch (_) {}
  }

  function getBoardSelectionStoreKey() {
    return BOARD_SELECTION_PREFIX + todayIso();
  }

  function loadBoardSelectionToday() {
    try {
      const raw = localStorage.getItem(getBoardSelectionStoreKey());
      if (!raw) return { members: [], otherText: '' };
      const parsed = JSON.parse(raw);
      const members = Array.isArray(parsed.members) ? parsed.members.filter(Boolean) : [];
      const otherText = parsed.otherText ? String(parsed.otherText) : '';
      return { members, otherText };
    } catch (_) {
      return { members: [], otherText: '' };
    }
  }

  function saveBoardSelectionToday(selection) {
    const payload = {
      members: Array.isArray(selection && selection.members) ? selection.members.slice() : [],
      otherText: selection && selection.otherText ? String(selection.otherText) : ''
    };
    try { localStorage.setItem(getBoardSelectionStoreKey(), JSON.stringify(payload)); } catch (_) {}
  }

  function todayIso()    { return new Date().toISOString().split('T')[0]; }
  function tomorrowIso() { const d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().split('T')[0]; }

  function formatEDD(dateStr, isReady) {
    if (isReady) return 'Ready for discharge';
    if (!dateStr) return '';
    const dt = new Date(dateStr + 'T12:00:00');
    if (isNaN(dt.getTime())) return dateStr;
    if (dateStr === todayIso())    return 'Today';
    if (dateStr === tomorrowIso()) return 'Tomorrow';
    return dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function deriveDischargeReadiness(dateStr, isReady) {
    if (isReady)         return 'Ready';
    if (!dateStr)        return null;
    if (dateStr === todayIso())    return 'Possible today';
    if (dateStr === tomorrowIso()) return 'Likely tomorrow';
    return 'Not ready';
  }

  function renderLeftPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return c.stack([c.card('Patients', c.emptyState('No patient selected', 'Choose a patient from the board.'))]);

    const sortMode  = (state.patient && state.patient.listSort) || 'name';
    const rawFilter = (state.patient && state.patient.listFilter) || null;
    const filterSet = new Set(Array.isArray(rawFilter) ? rawFilter : rawFilter ? [rawFilter] : []);

    const allRows = sortPatientRows(vm.contextRows, sortMode);
    const metrics = computeCaseloadMetrics(allRows);
    const filteredRows = applyListFilter(allRows, filterSet);

    const jumpRows = filteredRows.map((row) => {
      const active = String(row.id) === String(vm.patient.id) ? ' is-active' : '';
      const status = row.boardStatus || 'Not discussed';
      const statusTone = status === 'Discussed' || status === 'Actioned' ? 'is-done'
                      : status === 'Deferred' ? 'is-deferred'
                      : status === 'In discussion' ? 'is-now'
                      : '';
      return `<button type="button" class="hah-patient-row${active} ${statusTone}"
        data-patient-action="jump" data-patient-id="${c.escapeHtml(row.id)}">
        <div class="hah-patient-row-main">
          <span class="hah-patient-row-name">${c.escapeHtml(row.name)}</span>
          <span class="hah-patient-row-sub">${c.escapeHtml(status)}</span>
        </div>
        ${priorityDot(row.priority)}
      </button>`;
    }).join('');

    const sortLabel = sortMode === 'admission' ? 'Admission date' : 'Name (A–Z)';
    const sortMenuOpen = !!(state.patient && state.patient.sortMenuOpen);

    const listHead = `
      <div class="hah-list-head">
        <span class="hah-list-title">Patient list</span>
        <div class="hah-list-sort-wrap">
          <button type="button" class="hah-list-sort-btn${sortMenuOpen ? ' is-open' : ''}"
            data-patient-action="toggle-sort-menu" title="Sort: ${c.escapeHtml(sortLabel)}">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"/><path d="M7 12h10"/><path d="M11 18h2"/>
            </svg>
          </button>
          ${sortMenuOpen ? `
          <div class="hah-sort-menu">
            <button type="button" class="${sortMode === 'name' ? 'is-selected' : ''}"
              data-patient-action="set-list-sort" data-sort="name">
              <span>Name (A–Z)</span><span class="hah-sort-check">✓</span>
            </button>
            <button type="button" class="${sortMode === 'admission' ? 'is-selected' : ''}"
              data-patient-action="set-list-sort" data-sort="admission">
              <span>Admission date</span><span class="hah-sort-check">✓</span>
            </button>
          </div>` : ''}
        </div>
      </div>`;

    return c.stack([
      renderCaseloadCard(metrics, filterSet),
      `<section class="hah-card hah-patient-list-card">
        ${listHead}
        ${filterSet.size ? `
        <div class="hah-list-filter-banner">
          <span>Showing ${filteredRows.length} of ${allRows.length}</span>
          <button type="button" class="hah-list-filter-clear" data-patient-action="clear-list-filter">Clear filter${filterSet.size > 1 ? 's' : ''}</button>
        </div>` : ''}
        <div class="hah-patient-list">${jumpRows}</div>
      </section>`
    ]);
  }

  function computeCaseloadMetrics(rows) {
    const total = rows.length;
    const now = Date.now();
    const losList = rows.map((r) => {
      const t = parseAdmissionDate(r.admissionDate);
      if (!t) return null;
      return Math.max(0, Math.floor((now - t) / 86400000));
    }).filter((v) => v !== null);
    const avgLOS = losList.length ? (losList.reduce((a, b) => a + b, 0) / losList.length) : 0;
    const over7 = losList.filter((v) => v > 7).length;
    const dischargeToday = rows.filter((r) => r.dischargeReadiness === 'Ready' || r.dischargeReadiness === 'Possible today').length;
    const discussed = rows.filter((r) => r.boardStatus === 'Discussed' || r.boardStatus === 'Actioned').length;
    const toGo = total - discussed;
    return { total, avgLOS, over7, dischargeToday, discussed, toGo };
  }

  function applyListFilter(rows, filterSet) {
    if (!filterSet || !filterSet.size) return rows;
    const now = Date.now();
    return rows.filter((r) => {
      if (filterSet.has('over-7')) {
        const t = parseAdmissionDate(r.admissionDate);
        if (!t) return false;
        if (Math.floor((now - t) / 86400000) <= 7) return false;
      }
      if (filterSet.has('discharge-today')) {
        if (!(r.dischargeReadiness === 'Ready' || r.dischargeReadiness === 'Possible today')) return false;
      }
      if (filterSet.has('to-go')) {
        if (r.boardStatus === 'Discussed' || r.boardStatus === 'Actioned') return false;
      }
      return true;
    });
  }

  function renderCaseloadCard(m, filterSet) {
    const avgLabel = m.total && m.avgLOS ? m.avgLOS.toFixed(1) + 'd' : '—';
    const ringFrac = m.total ? m.discussed / m.total : 0;
    const ringCirc = 2 * Math.PI * 26; // radius 26
    const ringFill = (ringFrac * ringCirc).toFixed(1);
    const ringEmpty = ringCirc.toFixed(1);
    const ringDisplay = m.total ? `${m.discussed}<tspan class="hah-ring-slash">/</tspan><tspan class="hah-ring-total">${m.total}</tspan>` : '—';

    function tile(label, value, filterKey, alert) {
      const isActive  = filterKey && filterSet.has(filterKey);
      const clickable = !!filterKey;
      const classes = [
        'hah-metric-tile',
        clickable ? 'is-clickable' : '',
        isActive ? 'is-active-filter' : '',
        alert ? 'is-alert' : ''
      ].filter(Boolean).join(' ');
      return `<div class="${classes}"
        ${clickable ? `data-patient-action="toggle-list-filter" data-filter="${c.escapeHtml(filterKey)}"` : ''}>
        <span class="hah-metric-tile-value">${value}</span>
        <span class="hah-metric-tile-label">${c.escapeHtml(label)}${clickable ? ' <span class="hah-metric-tile-chev">›</span>' : ''}</span>
      </div>`;
    }

    const avgAlert  = m.total > 0 && m.avgLOS > 7;
    const over7Alert = m.over7 > 0;

    return `<section class="hah-card hah-caseload-card">
      <div class="hah-caseload-head">
        <span class="hah-caseload-title">Caseload</span>
      </div>
      <div class="hah-metric-tiles">
        ${tile('Total', m.total || '—')}
        ${tile('Avg LOS', avgLabel, null, avgAlert)}
        ${tile('Over 7 days', m.over7, 'over-7', over7Alert)}
        ${tile('Discharge today', m.dischargeToday, 'discharge-today')}
      </div>
      <div class="hah-caseload-divider"></div>
      <div class="hah-round-zone">
        <svg class="hah-ring" width="64" height="64" viewBox="0 0 64 64">
          <circle class="hah-ring-track" cx="32" cy="32" r="26" />
          <circle class="hah-ring-fill" cx="32" cy="32" r="26"
            stroke-dasharray="${ringFill} ${ringEmpty}"
            stroke-dashoffset="0"
            transform="rotate(-90 32 32)" />
          <text class="hah-ring-text" x="32" y="32" text-anchor="middle" dominant-baseline="central">${ringDisplay}</text>
        </svg>
        <div class="hah-round-zone-text">
          <div class="hah-round-zone-title">Round progress</div>
          <div class="hah-round-zone-sub">
            ${m.total
              ? (m.toGo === 0 ? 'All discussed' : `<a class="hah-round-togo${filterSet.has('to-go') ? ' is-active-filter' : ''}" data-patient-action="toggle-list-filter" data-filter="to-go">${m.toGo} to go</a>`)
              : 'No patients'}
          </div>
        </div>
      </div>
    </section>`;
  }

  function sortPatientRows(rows, mode) {
    const arr = rows.slice();
    if (mode === 'admission') {
      return arr.sort((a, b) => {
        const da = parseAdmissionDate(a.admissionDate);
        const db = parseAdmissionDate(b.admissionDate);
        if (da && db) return da - db;
        if (da) return -1;
        if (db) return 1;
        return 0;
      });
    }
    return arr.sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
  }

  function parseAdmissionDate(value) {
    if (!value) return 0;
    const s = String(value).trim();
    let m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return new Date(+m[1], +m[2] - 1, +m[3]).getTime();
    m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
    if (m) {
      const yr = +m[3] < 100 ? 2000 + +m[3] : +m[3];
      return new Date(yr, +m[2] - 1, +m[1]).getTime();
    }
    const fallback = new Date(s).getTime();
    return isNaN(fallback) ? 0 : fallback;
  }

  function priorityDot(priority) {
    const tone = priority === 'Critical' ? '#dc2626'
              : priority === 'High' ? '#f59e0b'
              : priority === 'Low' ? '#16a34a'
              : '#94a3b8';
    return `<span class="hah-patient-row-dot" style="background:${tone}" title="Priority: ${c.escapeHtml(priority || 'Normal')}"></span>`;
  }

  const WS_LAYOUT_KEY = 'hah_ws_layout';
  const WS_DEFAULT_LAYOUT = { left: ['board_round', 'mdm_pair'], right: ['acp', 'bloods', 'medications'] };

  function getWsLayout() {
    try {
      const saved = JSON.parse(localStorage.getItem(WS_LAYOUT_KEY) || 'null');
      if (saved && Array.isArray(saved.left) && Array.isArray(saved.right)) return saved;
    } catch (_) {}
    return { left: [...WS_DEFAULT_LAYOUT.left], right: [...WS_DEFAULT_LAYOUT.right] };
  }

  function saveWsLayout(layout) {
    try { localStorage.setItem(WS_LAYOUT_KEY, JSON.stringify(layout)); } catch (_) {}
  }

  function renderMainPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return renderEmpty();
    const patient     = vm.patient;
    const encounters  = ops ? ops.getEncountersForPatient(patient.id) : [];
    const boardRounds = encounters.filter((e) => e.type === 'board_round');
    const microMdms   = encounters.filter((e) => e.type === 'micro_mdm');
    const respMdms    = encounters.filter((e) => e.type === 'resp_mdm');
    const otherEncs   = encounters.filter((e) => e.type === 'other');

    const layout = getWsLayout();

    function renderSection(key) {
      switch (key) {
        case 'board_round':
          return `<div class="hah-ws-section" data-section="board_round" draggable="true">
            ${renderBoardRoundLog(boardRounds, state)}
          </div>`;
        case 'mdm_pair':
          return `<div class="hah-ws-section hah-ws-section--mdm-pair" data-section="mdm_pair" draggable="true">
            <div class="hah-mdm-pair-grid">
              ${renderMdmWidget('micro_mdm', 'Micro MDM', '#1D9E75', microMdms, state)}
              ${renderMdmWidget('resp_mdm',  'Resp MDM',  '#7F77DD', respMdms,  state)}
            </div>
          </div>`;
        case 'acp':
          return `<div class="hah-ws-section" data-section="acp" draggable="true">
            ${renderAcpCard(vm)}
          </div>`;
        case 'bloods':
          return `<div class="hah-ws-section" data-section="bloods" draggable="true">
            ${renderBloodsWidget(vm, state)}
          </div>`;
        case 'medications':
          return `<div class="hah-ws-section" data-section="medications" draggable="true">
            ${renderMedsWidget(vm)}
            ${otherEncs.length ? renderOtherWidget(otherEncs) : ''}
          </div>`;
        default: return '';
      }
    }

    const leftHtml  = layout.left.map(renderSection).join('');
    const rightHtml = layout.right.map(renderSection).join('');

    return `<div class="hah-pt-workspace">
      ${renderPatientHeader(vm, state)}
      ${renderObsStrip(vm)}
      <div class="hah-pt-cols">
        <div class="hah-ws-col" data-col="left">${leftHtml}</div>
        <div class="hah-ws-col" data-col="right">${rightHtml}</div>
      </div>
      ${state.patient && state.patient.acpModalOpen ? renderAcpModal(vm) : ''}
    </div>`;
  }

  function renderPatientHeader(vm, state) {
    const patient = vm.patient;
    const ageSex = [patient.age || '', patient.sex || ''].filter(Boolean).join('');
    const losMeta = buildLengthOfStayMeta(vm.admissionDate);
    const metaParts = [
      vm.referralSource ? { text: vm.referralSource + ' referral' } : null,
      vm.admissionDate  ? { text: 'Adm ' + vm.admissionDate } : null,
      losMeta,
      patient.pathway ? { text: patient.pathway } : null,
      patient.escalationSummary && !/^DNAR(\s*\+\s*ACP)?$/i.test(patient.escalationSummary) && patient.escalationSummary !== 'Full escalation'
        ? { text: patient.escalationSummary }
        : null
    ].filter(Boolean);

    const ps      = ops ? ops.getPatientState(patient.id) : {};
    const acpData = ps.acp || {};
    const showDnar = patient.dnar || acpData.dnacprStatus === 'yes';
    const showAcp  = patient.acp  || !!(acpData.dnacprStatus || acpData.tepStatus || acpData.notes || acpData.tep);

    const rightFlags = [
      showAcp  ? `<span class="hah-pt-flag is-acp">ACP</span>`  : '',
      showDnar ? `<span class="hah-pt-flag is-dnar">DNAR</span>` : ''
    ].filter(Boolean).join('');

    return `<div class="hah-pt-header-bar">
      <div class="hah-pt-header-top">
        <div class="hah-pt-header-main">
          <span class="hah-pt-name">${c.escapeHtml(patient.name)}</span>
          ${ageSex ? `<span class="hah-pt-age-sex">${c.escapeHtml(ageSex)}</span>` : ''}
        </div>
        <div class="hah-pt-header-alerts">${rightFlags}</div>
      </div>
      ${metaParts.length ? `<div class="hah-pt-meta-row">${metaParts.map(renderPatientMetaPart).join('')}</div>` : ''}
    </div>`;
  }

  function renderPatientMetaPart(part) {
    const tone = part && part.tone ? ` is-${part.tone}` : '';
    return `<span class="hah-pt-meta-item${tone}">${c.escapeHtml(part && part.text ? part.text : '')}</span>`;
  }

  function buildLengthOfStayMeta(admissionDate) {
    const ts = parseAdmissionDate(admissionDate);
    if (!ts) return null;
    const start = new Date(ts);
    const now = new Date();
    const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate()).getTime();
    const nowDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
    const days = Math.max(0, Math.floor((nowDay - startDay) / 86400000));
    const tone = days < 7 ? 'good' : days === 7 ? 'warn' : 'danger';
    return { text: `LOS ${days}d`, tone };
  }

  function renderObsStrip(vm, state) {
    const items = vm.obsItems.filter((i) => i.value && i.value !== '—').slice(0, 7);
    if (items.length) {
      return `<div class="hah-obs-strip">${items.map((item) => {
        const cls = isObsDanger(item.label, item.value) ? ' is-danger' : isObsWarn(item.label, item.value) ? ' is-warn' : '';
        return `<div class="hah-obs-cell${cls}"><div class="hah-obs-label">${c.escapeHtml(item.label)}</div><div class="hah-obs-val">${c.escapeHtml(item.value)}</div></div>`;
      }).join('')}</div>`;
    }

    const encounters = ops ? ops.getEncountersForPatient(vm.patient.id) : [];
    const latestBoard = encounters.find((e) => e.type === 'board_round') || encounters[0] || null;
    let taskCount = 0;
    try {
      const tasksVm = d.buildTasksViewModel({ ...state, tasks: { ...(state.tasks || {}), savedView: 'all-open', filters: { patientId: vm.patient.id } } });
      taskCount = Array.isArray(tasksVm && tasksVm.rows) ? tasksVm.rows.length : 0;
    } catch (_) {}
    const bloodLabel = vm.bloodSamples && vm.bloodSamples.length ? vm.bloodSamples[0].time : 'No recent bloods';
    const blocker = (vm.patient.blockers && vm.patient.blockers[0]) || 'No active blocker';
    const statusItems = [
      { label: 'Latest entry', value: latestBoard ? formatCompactDateTime(latestBoard.timestamp) : 'None yet' },
      { label: 'Latest bloods', value: bloodLabel },
      { label: 'Open tasks', value: String(taskCount) },
      { label: 'Discharge', value: vm.patient.dischargeReadiness || 'Not ready' },
      { label: 'Primary blocker', value: blocker }
    ];
    return `<div class="hah-status-strip">${statusItems.map((item) => `<div class="hah-status-cell"><div class="hah-obs-label">${c.escapeHtml(item.label)}</div><div class="hah-status-val">${c.escapeHtml(item.value)}</div></div>`).join('')}</div>`;
  }

  function renderBoardRoundLog(entries, state) {
    const showOlder = !!(state && state.patient && state.patient.logShowOlder);
    const header = `<div class="hah-log-head">
      <div class="hah-log-dot" style="background:#378ADD"></div>
      <span class="hah-log-title">Board round log</span>
      <span class="hah-log-count">${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}</span>
    </div>`;
    if (!entries.length) {
      return `<div class="hah-log-card">${header}<div class="hah-log-empty">No board round entries yet. Use the composer to add today's entry.</div></div>`;
    }

    const latest  = entries[0];
    const earlier = entries.slice(1);
    const latestHtml = renderBoardRoundEntry(latest, true);
    const earlierHtml = earlier.length ? `
      <div class="hah-log-earlier${showOlder ? ' is-open' : ''}">
        <button type="button" class="hah-log-earlier-toggle" data-patient-action="toggle-log-older">
          <span class="hah-mdm-chevron-sm${showOlder ? ' is-open' : ''}">▸</span>
          ${showOlder ? 'Hide' : 'Show'} older (${earlier.length})
        </button>
        ${showOlder ? `<div class="hah-log-earlier-list">${earlier.map((e) => renderBoardRoundEntry(e, false)).join('')}</div>` : ''}
      </div>` : '';

    return `<div class="hah-log-card">${header}<div class="hah-log-entries">${latestHtml}</div>${earlierHtml}</div>`;
  }

  function renderBoardRoundEntry(enc, isLatest) {
    const f = enc.fields || {};
    // Preserve the original issue text format exactly as entered, including
    // sub-bullets (lines starting with "-"), numbering, and blank lines.
    const rawIssues = String(f.issueRaw || f.issues || '').trim();
    const issuesHtml = rawIssues
      ? `<div class="hah-log-issues-text">${rawIssues.split('\n').map((l) => `<div>${c.escapeHtml(l) || '&nbsp;'}</div>`).join('')}</div>`
      : '<span class="hah-log-empty-inline">—</span>';
    const edd = f.dischargeDate ? formatEDD(f.dischargeDate, f.dischargeReady) : '';
    const cols = [
      `<div class="hah-log-field"><div class="hah-log-field-label">Issues</div>${issuesHtml}</div>`,
      f.progress ? `<div class="hah-log-field"><div class="hah-log-field-label">Progress</div><div class="hah-log-field-body">${c.escapeHtml(f.progress)}</div></div>` : '',
      f.plan     ? `<div class="hah-log-field"><div class="hah-log-field-label">Plan</div><div class="hah-log-field-body">${c.escapeHtml(f.plan)}${edd ? `\nEDD: ${edd}` : ''}</div></div>` : ''
    ].filter(Boolean);
    return `<div class="hah-log-entry${isLatest ? ' is-latest' : ''}">
      <div class="hah-log-entry-bar">
        <span class="hah-log-entry-date${isLatest ? ' is-today' : ''}">${formatEntryDate(enc.timestamp)}</span>
        <span class="hah-log-author">${c.escapeHtml(enc.author || '')}</span>
        <button type="button" class="hah-log-delete" data-patient-action="delete-encounter"
          data-encounter-id="${c.escapeHtml(enc.id)}" title="Delete">×</button>
      </div>
      <div class="hah-log-entry-grid" style="grid-template-columns:repeat(${Math.min(cols.length,4)},1fr)">${cols.join('')}</div>
    </div>`;
  }

  function renderMdmWidget(type, label, colour, entries, state) {
    const showOlder = !!(state && state.patient && state.patient.mdmEarlier && state.patient.mdmEarlier[type]);
    const hasEntries = entries.length > 0;
    const countText  = entries.length
      ? entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies')
      : 'No entries';
    const earlierEntries = entries.slice(1);

    const head = `
      <div class="hah-mdm-head">
        <div class="hah-mdm-dot" style="background:${colour}"></div>
        <span class="hah-mdm-label">${c.escapeHtml(label)}</span>
        <span class="hah-mdm-count">${c.escapeHtml(countText)}</span>
      </div>`;

    const bodyHtml = hasEntries
      ? renderMdmEntry(entries[0])
      : `<div class="hah-mdm-empty">No ${c.escapeHtml(label)} input for this admission.</div>`;

    const olderHtml = earlierEntries.length ? `
      <div class="hah-mdm-earlier${showOlder ? ' is-open' : ''}">
        <button type="button" class="hah-mdm-earlier-toggle"
          data-patient-action="toggle-mdm-earlier" data-mdm-type="${c.escapeHtml(type)}">
          <span class="hah-mdm-chevron-sm${showOlder ? ' is-open' : ''}">▸</span>
          ${showOlder ? 'Hide' : 'Show'} older (${earlierEntries.length})
        </button>
        ${showOlder ? `<div class="hah-mdm-earlier-list">${earlierEntries.map((e) => renderMdmEntry(e, true)).join('')}</div>` : ''}
      </div>` : '';

    const addBtn = entries.length >= 2 ? '' : `
      <button type="button" class="hah-mdm-add" data-patient-action="open-composer"
        data-encounter-type="${c.escapeHtml(type)}">+ Add ${c.escapeHtml(label)} entry</button>`;

    return `<div class="hah-mdm-widget" data-mdm-type="${c.escapeHtml(type)}">
      ${head}
      <div class="hah-mdm-body">${bodyHtml}</div>
      ${olderHtml}
      ${addBtn}
    </div>`;
  }

  function renderMdmEntry(enc, isEarlier) {
    const f = enc.fields || {};
    const fieldMap = enc.type === 'micro_mdm'
      ? [['Question', f.question], ['Recommendation', f.recommendation], ['Follow-up', f.followUp]]
      : [['Summary presented', f.summary], ['Recommendation', f.recommendation], ['Action', f.action]];
    const fieldsHtml = fieldMap.filter(([, v]) => v).map(([label, value]) =>
      `<div class="hah-mdm-field"><div class="hah-mdm-field-label">${c.escapeHtml(label)}</div><div class="hah-mdm-field-body">${c.escapeHtml(value)}</div></div>`
    ).join('');
    return `<div class="hah-mdm-entry${isEarlier ? ' is-earlier' : ''}">
      <div class="hah-mdm-entry-meta">${formatEntryDate(enc.timestamp)} · ${c.escapeHtml(enc.author || '')}</div>
      ${fieldsHtml || '<span class="hah-mdm-empty">No content recorded.</span>'}
    </div>`;
  }

  function renderOtherWidget(entries) {
    const latest = entries[0]; if (!latest) return '';
    const f = latest.fields || {};
    return `<div class="hah-mdm-widget" data-mdm-type="other">
      <div class="hah-mdm-head"><div class="hah-mdm-dot" style="background:#888780"></div>
        <span class="hah-mdm-label">${c.escapeHtml(f.source || 'Other')}</span>
        <span class="hah-mdm-count">${formatEntryDate(latest.timestamp)}</span>
      </div>
      <div class="hah-mdm-body"><div class="hah-mdm-entry">
        <div class="hah-mdm-entry-meta">${c.escapeHtml(latest.author || '')}</div>
        <div class="hah-mdm-field-body">${c.escapeHtml(f.note || '')}</div>
      </div></div>
    </div>`;
  }

  function renderAcpCard(vm) {
    const ps     = ops ? ops.getPatientState(vm.patient.id) : {};
    const acp    = ps.acp || {};
    const dnacpr = acp.dnacprStatus || '';
    const ucp    = acp.tepStatus    || '';
    const tep    = acp.tep          || '';
    const notes  = acp.notes        || '';

    const dnacprText = dnacpr === 'yes' ? 'Yes' + (acp.dnacprFormSeen ? ' · Form seen' : '')
                      : dnacpr === 'no' ? 'No'
                      : dnacpr === 'unknown' ? 'Unknown' : '';
    const ucpText    = ucp === 'present' ? 'Present' : ucp === 'absent' ? 'Absent' : ucp === 'unknown' ? 'Unknown' : '';
    const hasData    = dnacpr || ucp || tep || notes;

    function row(label, value, extraClass) {
      if (!value) return '';
      return `<div class="hah-acp-row${extraClass ? ' ' + extraClass : ''}">
        <span class="hah-acp-field-label">${c.escapeHtml(label)}</span>
        <span class="hah-acp-field-value">${c.escapeHtml(value)}</span>
      </div>`;
    }

    return `<div class="hah-ref-widget hah-acp-card">
      <div class="hah-ref-head">
        <span class="hah-ref-label">Advanced Care Plan</span>
        <button type="button" class="hah-acp-edit-btn" data-patient-action="open-acp-modal">
          ${hasData ? 'Edit' : '+ Add'}
        </button>
      </div>
      ${hasData ? `
      <div class="hah-acp-body">
        ${row('DNACPR', dnacprText, dnacpr === 'yes' ? 'is-dnacpr' : '')}
        ${row('UCP', ucpText)}
        ${row('TEP', tep)}
        ${notes ? `<div class="hah-acp-row is-single"><span class="hah-acp-notes-text">${c.escapeHtml(notes)}</span></div>` : ''}
      </div>` : `
      <div class="hah-acp-empty">No ACP recorded for this admission.</div>`}
    </div>`;
  }

  function renderMedsWidget(vm) {
    const all = [...vm.medications, ...vm.ivs]; if (!all.length) return '';
    return `<div class="hah-ref-widget">
      <div class="hah-ref-head"><span class="hah-ref-label">Medications</span><span class="hah-ref-count">${all.length}</span></div>
      <div class="hah-ref-body">${all.slice(0, 8).map((m) =>

      ).join('')}</div>
    </div>`;
  }

  // Each analyte: key, label, aliases (for regex), unit, range, flag fn, fullName, notes
  // Regex is built dynamically: \b(?:alias1|alias2|...)\s+VALUE
  function mkRe(aliases) {
    const pat = aliases.map((a) => a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
    return new RegExp('\\b(?:' + pat + ')\\s*[=:]?\\s*(-?\\d+(?:\\.\\d+)?)', 'i');
  }

      flag:(v)=>v<100?'low':null,
      fullName:'Cortisol',

    { key:'LDH',    label:'LDH',    aliases:['LDH','Lactate dehydrogenase'],
      unit:'U/L',    range:'140–280',
      flag:(v)=>v>280?'high':null,
      fullName:'Lactate Dehydrogenase',
      notes:'Non-specific marker of cell damage. Raised in haemolysis, malignancy (particularly lymphoma), pulmonary infarction, liver disease.' },
    { key:'Urate',  label:'Urate',  aliases:['Urate','Uric acid','UA'],
      unit:'µmol/L', range:'M 200–430 · F 140–360',
      flag:(v,sex)=>v>((sex||'').toUpperCase()==='F'?360:430)?'high':null,
      fullName:'Urate',
      notes:'Raised in gout, renal failure, diuretic use, high purine diet. Allopurinol or febuxostat for prevention. Acute gout does not always correlate with level.' },
    { key:'ESR',    label:'ESR',    aliases:['ESR','Erythrocyte sedimentation rate','Sed rate'],
      unit:'mm/hr',  range:'M <15 · F <20',
      flag:(v)=>v>20?'high':null,
      fullName:'Erythrocyte Sedimentation Rate',
      notes:'Raised in inflammation, infection, malignancy, anaemia. Very high (>100) in temporal arteritis, multiple myeloma. Slower to change than CRP.' },
    { key:'Prot',   label:'Prot',   aliases:['Prot','Protein','Serum protein','Total protein','TP'],
      unit:'g/L',    range:'60–80',
      flag:(v)=>v<60?'low':v>80?'high':null,
      fullName:'Total Protein',
      notes:'Low in malnutrition, liver disease, protein-losing states. High may indicate dehydration or paraprotein. Consider SPEP if isolated rise.' },
    { key:'Prealb', label:'Prealb', aliases:['Prealb','Prealbumin','Transthyretin','TTR'],
      unit:'mg/L',   range:'180–360',
      flag:(v)=>v<180?'low':null,
      fullName:'Prealbumin (Transthyretin)',
      notes:'Short half-life (2 days) — sensitive nutritional marker, responds faster than albumin. Reduced in acute illness/inflammation.' },
    { key:'CaAdj',  label:'Ca(adj)', aliases:['CaAdj','AdjCa','Adj calcium','Corrected calcium','Corrected Ca','Adj Ca'],
      unit:'mmol/L', range:'2.20–2.60',
      flag:(v)=>v<2.2?'low':v>2.6?'high':null,
      fullName:'Adjusted Calcium',
      notes:'Corrected for albumin: adj Ca = Ca + 0.02×(40−Alb). Use adjusted calcium for clinical decisions. True hypercalcaemia requires exclusion of low albumin.' },
    { key:'Hct',    label:'Hct',    aliases:['Hct','Haematocrit','PCV','Packed cell volume'],
      unit:'L/L',    range:'M 0.40–0.52 · F 0.37–0.47',
      flag:(v,sex)=>{const lo=(sex||'').toUpperCase()==='F'?0.37:0.40;const hi=(sex||'').toUpperCase()==='F'?0.47:0.52;return v<lo?'low':v>hi?'high':null;},
      fullName:'Haematocrit',
      notes:'Proportion of blood volume occupied by red cells. Rises in dehydration, polycythaemia. Falls in anaemia, haemodilution.' },
    { key:'RDW',    label:'RDW',    aliases:['RDW','Red cell distribution width'],
      unit:'%',      range:'11.5–15.0',
      flag:(v)=>v>15?'high':null,
      fullName:'Red Cell Distribution Width',
      notes:'High RDW indicates mixed picture (iron + B12 deficiency, recent transfusion). Low MCV + high RDW suggests iron deficiency early.' },
    { key:'Bili_conj', label:'Bili(c)', aliases:['Conjugated bilirubin','Direct bilirubin','Direct bili','Conjugated bili'],
      unit:'µmol/L', range:'<5',
      flag:(v)=>v>5?'high':null,
      fullName:'Conjugated (Direct) Bilirubin',
      notes:'Predominantly elevated in obstructive jaundice and hepatocellular disease. Differentiates biliary obstruction from haemolysis.' }
  ].map((a) => ({ ...a, re: mkRe(a.aliases) }));

  const BLOOD_DEFAULT_ORDER = ['CRP','WCC','Hb','Na','K','Cr'];
  const BLOOD_ORDER_KEY = 'hah_blood_analyte_order';

  function getBloodAnalyteOrder() {
    try {
      const saved = JSON.parse(localStorage.getItem(BLOOD_ORDER_KEY) || 'null');
      if (Array.isArray(saved) && saved.length) return saved;
    } catch (_) {}
    return BLOOD_DEFAULT_ORDER.slice();
  }

  function renderBloodsWidget(vm, state) {
    const raw  = vm.patient.sourcePatient || {};
    const form = raw.form || {};
    const sex  = vm.patient.sex || '';
    const showOptions = !!(state.patient && state.patient.bloodOptionsOpen);

    // Build date→vals maps from both sources
    const todayStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

    // 1. Mobile app: pipe-delimited "15 Apr|CRP 45 Na 138 ..."
    const mobileMap = {};
    (String(form.bloods || '')).split(/\n+/).map((l) => l.trim()).filter(Boolean)
      .slice(0, 5).forEach((line) => {
        const parts = line.split('|').map((p) => p.trim());
        const dateRaw = parts[0] || '';
        const date = dateRaw.replace(/\s+\d{2}:\d{2}(:\d{2})?$/, '').trim();
        const dateLabel = date === todayStr ? 'Today' : date;
        if (!date) return;
        if (!mobileMap[dateLabel]) mobileMap[dateLabel] = {};
        const rest = parts.slice(1).join(' ');
        BLOOD_DB.forEach(({ key, re }) => {
          const m = rest.match(re);
          if (m) mobileMap[dateLabel][key] = parseFloat(m[1]);
        });
      });

    // 2. Desktop composer: board_round encounters with fields.bloods (free text)
    // Each line may start with a date: "18/04: CRP 78" or "18 Apr CRP 78" or just "CRP 78"
    const MONTHS = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
    const DATE_LINE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?\s*[:]\s*/i;
    const DATE_TEXT_RE = /^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s*[:]\s*/i;

    function formatEmbeddedDate(d, m, y) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const month = months[(+m) - 1] || '';
      const date = d + ' ' + month;
      return date === todayStr ? 'Today' : date;
    }

    const encounters = ops ? ops.getEncountersForPatient(vm.patient.id) : [];
    const composerMap = {};
    encounters
      .filter((e) => e.type === 'board_round' && e.fields && String(e.fields.bloods || '').trim())
      .forEach((e) => {
        const dt = new Date(e.timestamp);
        const encDateStr = isNaN(dt.getTime()) ? null
          : dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        const encounterDate = encDateStr === todayStr ? 'Today' : (encDateStr || null);

        String(e.fields.bloods).split(/\n+/).forEach((rawLine) => {
          let line = rawLine.trim();
          if (!line) return;
          let date = encounterDate;

          // Try extracting date prefix: DD/MM or DD/MM/YY(YY)
          let m;
          m = line.match(DATE_LINE_RE);
          if (m) {
            date = formatEmbeddedDate(m[1], m[2], m[3]);
            line = line.slice(m[0].length).trim();
          } else {
            m = line.match(DATE_TEXT_RE);
            if (m) {
              const mo = MONTHS[(m[2] || '').toLowerCase().slice(0, 3)];
              if (mo) {
                date = formatEmbeddedDate(m[1], mo, null);
                line = line.slice(m[0].length).trim();
              }
            }
          }

          if (!date || !line) return;
          if (!composerMap[date]) composerMap[date] = {};

          // Parse known analytes
          BLOOD_DB.forEach(({ key, re }) => {
            const hit = line.match(re);
            if (hit) composerMap[date][key] = parseFloat(hit[1]);
          });

          // Capture unrecognised WORD NUMBER pairs so they appear in table
          const remaining = line.replace(/\d{1,2}[\/\-\.]\d{1,2}/g, ''); // strip date-like patterns
          const unknownRe = /\b([A-Za-z][A-Za-z0-9\-]*)\s+(\d+(?:\.\d+)?)/g;
          let hit2;
          while ((hit2 = unknownRe.exec(remaining)) !== null) {
            const candidate = hit2[1];
            // Skip if already captured by a known analyte (avoid double-counting)
            const alreadyKnown = BLOOD_DB.some((a) => a.re.test(candidate + ' ' + hit2[2]));
            if (!alreadyKnown) {
              const uKey = '_u_' + candidate.toUpperCase();
              if (!composerMap[date][uKey]) composerMap[date][uKey] = parseFloat(hit2[2]);
            }
          }
        });
      });

    // 3. Merge: all dates from both sources, composer values take priority on overlap
    // Parse and sort by actual date, newest first
    function parseDateForSort(label) {
      if (label === 'Today') return Date.now();
      const MMAP = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      // "20 Apr" or "20 Apr 2026"
      const m = label.match(/^(\d{1,2})\s+([a-z]{3})/i);
      if (m) {
        const mo = MMAP[(m[2] || '').toLowerCase()];
        if (mo !== undefined) {
          const yr = new Date().getFullYear();
          return new Date(yr, mo, +m[1]).getTime();
        }
      }
      const t = new Date(label).getTime();
      return isNaN(t) ? 0 : t;
    }

    const allDates = [...new Set([...Object.keys(composerMap), ...Object.keys(mobileMap)])]
      .sort((a, b) => parseDateForSort(b) - parseDateForSort(a));

    const cols = allDates.slice(0, 5).map((date) => ({
      date,
      vals: Object.assign({}, mobileMap[date] || {}, composerMap[date] || {})
    }));

    if (!cols.length || !cols.some((col) => Object.keys(col.vals).length > 0)) return '';

    // Build ordered analyte list:
    // 1. User's saved order (from options panel)
    // 2. Any DB analytes that have data but aren't in the order
    // 3. Any unrecognised analytes (_u_)
    const analyteOrder = getBloodAnalyteOrder();
    const analyteMap   = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a]));
    const orderedAnalytes = analyteOrder.map((k) => analyteMap[k]).filter(Boolean);

    // Auto-include DB analytes with data not already in order
    const allDataKeys = [...new Set(cols.flatMap((col) => Object.keys(col.vals).filter((k) => !k.startsWith('_u_'))))];
    const extraDBAnalytes = allDataKeys
      .filter((k) => !analyteOrder.includes(k) && analyteMap[k])
      .map((k) => analyteMap[k]);

    // Collect unknown analyte keys (prefixed _u_) from all cols
    const unknownKeys = [...new Set(cols.flatMap((col) =>
      Object.keys(col.vals).filter((k) => k.startsWith('_u_'))
    ))];
    const unknownAnalytes = unknownKeys.map((k) => ({
      key: k,
      label: k.replace('_u_', ''),
      fullName: k.replace('_u_', ''),
      range: '—', unit: '', notes: 'Reference range not available.',
      flag: () => null,
      unknown: true
    }));
    const allAnalytes = [...orderedAnalytes, ...extraDBAnalytes, ...unknownAnalytes];

    const optionsPanel = showOptions ? `
      <div class="dbl-options-panel">
        <div class="dbl-options-title">Analyte order</div>
        <div class="dbl-options-list">
          ${analyteOrder.map((key, idx) => `
          <div class="dbl-options-row" data-analyte="${c.escapeHtml(key)}">
            <span class="dbl-options-name">${c.escapeHtml(key)}</span>
            <div class="dbl-options-btns">
              ${idx > 0 ? `<button type="button" class="dbl-options-btn" data-patient-action="blood-order-up" data-analyte="${c.escapeHtml(key)}" title="Move up">↑</button>` : '<span class="dbl-options-btn-gap"></span>'}
              ${idx < analyteOrder.length - 1 ? `<button type="button" class="dbl-options-btn" data-patient-action="blood-order-down" data-analyte="${c.escapeHtml(key)}" title="Move down">↓</button>` : '<span class="dbl-options-btn-gap"></span>'}
            </div>
          </div>`).join('')}
        </div>
        <div class="dbl-options-footer">
          <button type="button" class="dbl-options-add" data-patient-action="blood-options-close">Done</button>
        </div>
      </div>` : '';

    const thead = `<tr class="dbl-head-row">
      <th class="dbl-analyte-col"></th>
      ${cols.map((col, ci) => `<th class="dbl-date-col${ci === 0 ? ' is-latest' : ''}">${c.escapeHtml(col.date)}</th>`).join('')}
    </tr>`;

    const tbody = allAnalytes.map(({ key, label, flag, unknown }) => {
      const hasValues = cols.some((col) => col.vals[key] !== undefined);
      if (!hasValues) return '';
      const cells = cols.map((col, ci) => {
        const val = col.vals[key];
        if (val === undefined) return '<td class="dbl-cell dbl-empty">—</td>';
        const fClass = flag(val, sex);
        return `<td class="dbl-cell${fClass ? ' dbl-' + fClass : ''}${ci === 0 ? ' is-latest' : ''}">
          <span class="dbl-val">${val % 1 === 0 ? val : val.toFixed(1)}</span>
        </td>`;
      }).join('');
      return `<tr><th class="dbl-analyte" data-key="${c.escapeHtml(key)}">${c.escapeHtml(label)}</th>${cells}</tr>`;
    }).filter(Boolean).join('');

    return `<div class="hah-ref-widget">
      <div class="hah-ref-head">
        <span class="hah-ref-label">Blood results</span>
        <button type="button" class="hah-ref-options-btn${showOptions ? ' is-open' : ''}"
          data-patient-action="toggle-blood-options" title="Options">⋯</button>
      </div>
      ${optionsPanel}
      <div class="hah-ref-body hah-ref-body--bloods">
        <div class="dbl-table-wrap">
          <table class="dbl-table">
            <thead>${thead}</thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }

  function renderRightPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return c.stack([c.card("Today's board round", c.emptyState('No patient selected', 'Open a patient from the board.'), { subtitle: "Select a patient to continue today’s note." })]);
    const composerType = (state.patient && state.patient.composerType) || 'board_round';
    const scopedComposer = getScopedComposerState(state, vm.patient.id);
    const isLocked     = !!scopedComposer.locked;
    const lastRound    = ops ? ops.getLastBoardRound(vm.patient.id) : null;
    const boardSel     = loadBoardSelectionToday();
    const heading      = getComposerHeading(composerType, isLocked);
    const typeTabs     = ENCOUNTER_TYPES.map((t) => {
      const active = t.key === composerType ? ' is-active type-' + t.key.replace(/_/g, '-') : '';
      return `<button type="button" class="hah-composer-tab${active}" data-patient-action="set-composer-type"
        data-composer-type="${c.escapeHtml(t.key)}">${c.escapeHtml(t.label)}</button>`;
    }).join('');
    return c.stack([
      c.card(heading, `
      <div class="hah-composer-tabs">${typeTabs}</div>
      <div class="hah-board-members">
        <div class="hah-board-members-label">Who's on board</div>
        <div class="hah-board-members-chips">
          ${renderBoardMemberChips(boardSel)}
        </div>
        <div class="hah-board-members-other" id="hahBoardMembersOtherWrap"${boardSel.members.includes('Other') ? '' : ' style="display:none"'}>
          <input type="text" id="hahBoardMembersOther" class="hah-board-members-input" placeholder="Other board member(s)" value="${c.escapeHtml(boardSel.otherText || '')}">
        </div>
      </div>
      <div class="hah-composer-form" id="hahComposerForm">
        ${renderComposerForm(composerType, lastRound, vm)}
      </div>
      <div class="hah-composer-footer">
        <span class="hah-autosave-indicator" id="hahAutosaveIndicator"></span>
        <button type="button" class="hah-inline-pill"
          data-patient-action="${isLocked ? 'composer-new' : 'composer-clear'}">${isLocked ? 'New note' : 'Clear'}</button>
        <button type="button" class="hah-inline-pill is-primary"
          data-patient-action="composer-done">${isLocked ? 'Edit' : 'Done'}</button>
      </div>
      ${composerType === 'board_round' ? `
      <div class="hah-composer-sep"></div>
      <div class="hah-note-preview" id="hahNotePreview" style="display:none">
        <div class="hah-note-preview-head">
          <span class="hah-note-preview-label">Clinical note preview</span>
          <button type="button" class="hah-note-copy-btn" id="hahNoteCopyBtn">Copy</button>
        </div>
        <pre class="hah-note-preview-text" id="hahNotePreviewText"></pre>
        <div class="hah-note-preview-footer">
          <button type="button" class="hah-emis-btn${isLocked ? '' : ' is-disabled'}"
            id="hahEmisSendBtn"${isLocked ? '' : ' disabled'}>Send to EMIS</button>
        </div>
      </div>` : ''}
    `),
      `<button type="button" class="hah-discharge-btn" data-patient-action="discharge-patient">Discharge</button>`
    ]);
  }

  function getComposerHeading(type, isLocked) {
    if (type === 'board_round') return isLocked ? "Today's board round" : "Today's board round";
    if (type === 'micro_mdm')   return isLocked ? "Today's Micro MDM"   : "Today's Micro MDM";
    if (type === 'resp_mdm')    return isLocked ? "Today's Resp MDM"    : "Today's Resp MDM";
    return isLocked ? "Today's other note" : "Today's other note";
  }

  function getComposerSubheading(type, isLocked, lastRound) {
    const base = type === 'board_round'
      ? "Continue today’s H@H board round note."
      : type === 'micro_mdm'
        ? "Capture today’s Micro MDM advice and updates."
        : type === 'resp_mdm'
          ? "Capture today’s respiratory MDM outcome and plan."
          : "Capture today’s clinical update.";
    const tail = isLocked
      ? ' This entry is completed — choose Edit to amend or New note to start again.'
      : (lastRound && type === 'board_round')
        ? ' Issues and plan can be carried forward from the latest completed board round.'
        : '';
    return base + tail;
  }

  function getScopedComposerState(state, patientId) {
    const map = (state && state.patient && state.patient.composerByPatient) || {};
    const scoped = map && map[patientId] ? map[patientId] : {};
    return {
      locked: !!scoped.locked,
      editId: scoped.editId || null
    };
  }

  function patchScopedComposerState(patientId, patch) {
    if (!patientId) return;
    const currentState = store.getState();
    const map = (currentState.patient && currentState.patient.composerByPatient) || {};
    const prev = map[patientId] || {};
    store.setState({
      patient: {
        composerByPatient: {
          ...map,
          [patientId]: { ...prev, ...patch }
        }
      }
    });
  }

  function renderBoardMemberChips(selection) {
    const sel = selection || { members: [], otherText: '' };
    return BOARD_MEMBER_OPTIONS.map((label) => {
      const active = sel.members.includes(label) ? ' is-active' : '';
      return `<button type="button" class="hah-board-member-chip${active}" data-board-member="${c.escapeHtml(label)}">${c.escapeHtml(label)}</button>`;
    }).join('');
  }

  function renderComposerForm(type, lastRound, vm) {
    if (type === 'board_round') {
      const lastF          = lastRound ? (lastRound.fields || {}) : null;
      const fallbackIssues = vm ? vm.issues.map((l, i) => (i + 1) + '. ' + l).join('\n') : '';
      const pulledIssues   = lastF
        ? (Array.isArray(lastF.issueLines) && lastF.issueLines.length
            ? lastF.issueLines.map((l, i) => (i + 1) + '. ' + l).join('\n')
            : String(lastF.issues || '').trim())
        : fallbackIssues;
      const pulledPlan = lastF ? String(lastF.plan || '').trim() : '';
      const prevDate   = lastF ? (lastF.dischargeDate || '') : '';

      return `
        <div class="hah-cform-field">
          <label class="hah-cform-label">Issues</label>
          <textarea class="hah-cform-textarea hah-autoexpand${pulledIssues ? ' is-pulled' : ''}" id="cform-issues"
            placeholder="1. Issue one&#10;2. Issue two">${c.escapeHtml(pulledIssues)}</textarea>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Progress</label>
          <textarea class="hah-cform-textarea hah-autoexpand" id="cform-progress" rows="2"
            placeholder="Clinical progress since last review…"></textarea>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Bloods</label>
          <textarea class="hah-cform-textarea hah-autoexpand" id="cform-bloods" rows="2"
            placeholder="e.g. CRP 45  WBC 8.2  Cr 112  Na 138"></textarea>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Plan</label>
          <textarea class="hah-cform-textarea hah-autoexpand${pulledPlan ? ' is-pulled' : ''}" id="cform-plan" rows="3"
            placeholder="Today's plan…">${c.escapeHtml(pulledPlan)}</textarea>
          <div class="hah-plan-presets">
            <div class="hah-plan-presets-label">Common plan actions</div>
            <div class="hah-plan-presets-chips">
              ${PLAN_PRESETS.map((preset) => `<button type="button" class="hah-plan-preset-chip" data-patient-action="insert-plan-preset" data-plan-preset-key="${c.escapeHtml(preset.key)}">${c.escapeHtml(preset.label)}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Estimated discharge</label>
          <div class="hah-discharge-row">
            <button type="button" class="hah-dchip" data-discharge-quick="today" id="cform-chip-today">Possible today</button>
            <button type="button" class="hah-dchip" data-discharge-quick="tomorrow" id="cform-chip-tomorrow">Tomorrow</button>
            <button type="button" class="hah-dchip hah-dchip-ready" id="cform-ready-chip" data-discharge-quick="ready">Ready</button>
            <input type="date" id="cform-discharge-date" class="hah-date-input"
              placeholder="Select date"
              min="${todayIso()}" value="${c.escapeHtml(prevDate)}">
          </div>
        </div>`;
    }

    if (type === 'micro_mdm') return `
      <div class="hah-cform-field"><label class="hah-cform-label">Question</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-question" rows="2" placeholder="Question posed to microbiology…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Recommendation</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-recommendation" rows="3" placeholder="Advice given…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Follow-up</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-followup" rows="2" placeholder="Review triggers / actions…"></textarea></div>`;

    if (type === 'resp_mdm') return `
      <div class="hah-cform-field"><label class="hah-cform-label">Summary presented</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-summary" rows="2" placeholder="Brief clinical summary for MDM…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Recommendation</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-recommendation" rows="3" placeholder="Resp MDM recommendation…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Action</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-action" rows="2" placeholder="What follows from this review…"></textarea></div>`;

    return `
      <div class="hah-cform-field"><label class="hah-cform-label">Source</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-source" rows="1" placeholder="e.g. Palliative care, Dietetics, Family discussion…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Note</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-note" rows="5" placeholder="Free text…"></textarea></div>`;
  }

  function collectComposerFields(type) {
    function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function active(id) { const el = document.getElementById(id); return el ? el.dataset.active === 'true' : false; }
    if (type === 'board_round') return {
      issues: val('cform-issues'), progress: val('cform-progress'),
      bloods: val('cform-bloods'), plan: val('cform-plan'),
      dischargeDate: val('cform-discharge-date'),
      dischargeReady: active('cform-ready-chip'),
      dnar: active('cform-dnar'),
      acp:  active('cform-acp'),
      boardMembers: loadBoardSelectionToday().members,
      boardOtherText: loadBoardSelectionToday().otherText
    };
    if (type === 'micro_mdm') return { question: val('cform-question'), recommendation: val('cform-recommendation'), followUp: val('cform-followup') };
    if (type === 'resp_mdm')  return { summary: val('cform-summary'),   recommendation: val('cform-recommendation'), action:   val('cform-action') };
    return { source: val('cform-source'), note: val('cform-note') };
  }

  function formatBloodsDateLabel(vm) {
    const candidates = [
      vm && vm.patient && vm.patient.bloodDate,
      vm && vm.patient && vm.patient.latestBloodDate,
      vm && vm.latestBloodDate,
      vm && vm.patient && vm.patient.latestReviewAt,
      vm && vm.patient && vm.patient.reviewDueAt
    ].filter(Boolean);

    for (const value of candidates) {
      const dt = new Date(value);
      if (!Number.isNaN(dt.getTime())) {
        return dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });
      }
      const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}`;
    }

    return todayIso().split('-').reverse().slice(0,2).join('/');
  }

  function buildNotePreviewText(vm, type, fields) {
    if (type !== 'board_round') return '';
    const now   = new Date();
    const stamp = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const boardSel = loadBoardSelectionToday();
    const members = (boardSel.members || []).filter((m) => m !== 'Other');
    if ((boardSel.otherText || '').trim()) members.push((boardSel.otherText || '').trim());
    const lines = ['H@H BOARD ROUND — ' + stamp];
    if (members.length) lines.push('Present: ' + members.join(', '));
    if (members.length && (vm.referralSource || '').trim()) lines.push('');
    if ((vm.referralSource || '').trim()) lines.push('Referred from ' + vm.referralSource.trim());
    lines.push('');

    const issueText = (fields.issues || '').trim();
    if (issueText) {
      lines.push('ACTIVE ISSUES');
      const issueLines = issueText.split('\n').map((l) => l.trimEnd());
      while (issueLines.length && !issueLines[0].trim()) issueLines.shift();
      while (issueLines.length && !issueLines[issueLines.length - 1].trim()) issueLines.pop();
      issueLines.forEach((l) => lines.push(l));
      lines.push('');
    }
    if ((fields.progress || '').trim()) {
      lines.push('PROGRESS');
      lines.push(fields.progress.trim());
      lines.push('');
    }
    const newBloods = (fields.bloods || '').trim();
    if (newBloods) {
      lines.push('BLOODS');
      // Parse lines, extracting date prefixes and formatting as [date]: analyte result
      const BMONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
      const todayLabel = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const B_DATE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?\s*[:]\s*/i;
      const B_TEXT_RE = /^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s*[:]\s*/i;

      const bloodLines = newBloods.split('\n').map((l) => l.trim()).filter(Boolean);
      const encDate = todayLabel;
      const bloodEntries = [];
      let pendingDate = encDate;

      bloodLines.forEach((raw) => {
        let rest = raw;
        let dt = pendingDate;
        let m;
        m = rest.match(B_DATE_RE);
        if (m) {
          const mo = +m[2] - 1;
          const mo_months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          dt = m[1] + ' ' + mo_months[mo];
          pendingDate = dt;
          rest = rest.slice(m[0].length).trim();
        } else {
          m = rest.match(B_TEXT_RE);
          if (m) {
            const mo2 = BMONTHS[(m[2] || '').toLowerCase().slice(0,3)];
            const mo_months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            if (mo2 !== undefined) { dt = m[1] + ' ' + mo_months[mo2]; pendingDate = dt; rest = rest.slice(m[0].length).trim(); }
          }
        }
        if (rest) bloodEntries.push({ dt, rest });
      });

      // Sort oldest first, group by date
      bloodEntries.sort((a, b) => {
        const parse = (s) => { if (s === todayLabel) return Date.now(); const x = new Date(s + ' 2026').getTime(); return isNaN(x) ? 0 : x; };
        return parse(a.dt) - parse(b.dt);
      });
      bloodEntries.forEach(({ dt, rest }) => lines.push(dt + ': ' + rest));
      lines.push('');
    }
    if ((fields.plan || '').trim()) {
      lines.push('PLAN');
      lines.push(fields.plan.trim());
      lines.push('');
    }
    const edd = formatEDD(fields.dischargeDate, fields.dischargeReady);
    if (edd) {
      lines.push('EDD: ' + edd);
      lines.push('');
    }
    return lines.join('\n').trim();
  }

    initBloodTooltip();
    initWsDragDrop();
    setupResponsivePatientLayout();
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return;
    const type     = (state.patient && state.patient.composerType) || 'board_round';
    const scopedComposer = getScopedComposerState(state, vm.patient.id);
    const isLocked = !!scopedComposer.locked;

    const draft = loadDraft(vm.patient.id, type);
    if (draft && draft.fields) restoreFields(draft.fields, type);

    autoExpandAll(pane);

    bindBoardMemberControls(pane);

    if (isLocked) {
      pane.querySelectorAll('.hah-cform-textarea').forEach((ta) => {
        ta.setAttribute('readonly', '');

      const dateInput = pane.querySelector('#cform-discharge-date');

      pane.querySelectorAll('.hah-dchip').forEach((chip) => { chip.disabled = true; chip.classList.add('is-locked'); });
      pane.querySelectorAll('.hah-plan-preset-chip').forEach((chip) => { chip.disabled = true; chip.classList.add('is-locked'); });
      refreshPreview(vm, type);

    pane.querySelectorAll('.hah-cform-textarea.hah-autoexpand').forEach((ta) => {
      if (ta.classList.contains('is-pulled')) {

      }
    });

    let saveTimer = null;
    pane.querySelectorAll('.hah-cform-textarea').forEach((ta) => {
      ta.addEventListener('input', () => {
        autoExpand(ta);
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveDraft(vm.patient.id, type, collectComposerFields(type));
          showAutosaveIndicator(pane);
        }, 1400);
      });
    });

    const dischargeDateInput = pane.querySelector('#cform-discharge-date');
    const readyChip          = pane.querySelector('#cform-ready-chip');

    let fp = null;
    if (dischargeDateInput && typeof window.flatpickr === 'function') {
      fp = window.flatpickr(dischargeDateInput, {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'D j M Y',
        minDate: 'today',
        disableMobile: true,
        onChange: function () {
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
          const tc = pane.querySelector('#cform-chip-today'), tm = pane.querySelector('#cform-chip-tomorrow');
          [tc, tm].forEach((c) => { if (c) { c.dataset.active = 'false'; c.classList.remove('is-active'); } });
          refreshPreview(vm, type);
          clearTimeout(saveTimer);
          saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
        }
      });
    }

    if (dischargeDateInput && !fp) {
      dischargeDateInput.addEventListener('change', () => {
        if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    }
    pane.querySelectorAll('[data-discharge-quick]').forEach((chip) => {
      chip.addEventListener('click', () => {
        const quick = chip.getAttribute('data-discharge-quick');
        const setDate = (iso) => {
          if (fp) fp.setDate(iso, false);
          else if (dischargeDateInput) dischargeDateInput.value = iso;
        };
        const todayChip    = pane.querySelector('#cform-chip-today');
        const tomorrowChip = pane.querySelector('#cform-chip-tomorrow');
        function clearDateChips() {
          [todayChip, tomorrowChip].forEach((c) => { if (c) { c.dataset.active = 'false'; c.classList.remove('is-active'); } });
        }
        if (quick === 'today') {
          clearDateChips();
          setDate(todayIso());
          if (chip) { chip.dataset.active = 'true'; chip.classList.add('is-active'); }
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        }
        if (quick === 'tomorrow') {
          clearDateChips();
          setDate(tomorrowIso());
          if (chip) { chip.dataset.active = 'true'; chip.classList.add('is-active'); }
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        }
        if (quick === 'ready') {
          const nowActive = chip.dataset.active === 'true';
          chip.dataset.active = nowActive ? 'false' : 'true';
          chip.classList.toggle('is-active', !nowActive);
          if (!nowActive) setDate('');
        }
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    });

    // Wire alert chips (DNAR / ACP)
    pane.querySelectorAll('.hah-alert-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const wasActive = chip.dataset.active === 'true';
        chip.dataset.active = wasActive ? 'false' : 'true';
        chip.classList.toggle('is-active', !wasActive);
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    });
  }

  function setupResponsivePatientLayout() {
    const app = document.querySelector('.hah-desktop-app');
    const mainPane = document.querySelector('#hahMainPane');
    const centre = document.querySelector('.hah-pt-cols');
    const logCol = document.querySelector('.hah-ws-col');
    const refCol = document.querySelector('.hah-pt-mdm-row');
    if (!app || !mainPane || !centre || !logCol) return;

    if (window.HAHBoard.__patientLayoutCleanup) {
      try { window.HAHBoard.__patientLayoutCleanup(); } catch (_) {}
      window.HAHBoard.__patientLayoutCleanup = null;
    }

    const prev = window.HAHBoard.__patientLayoutState || {};
    const layoutState = {
      compact: !!prev.compact,
      narrow: !!prev.narrow,
      tight: !!prev.tight,
      logNarrow: !!prev.logNarrow,
      raf: 0
    };

    function applyLayoutClasses() {
      layoutState.raf = 0;
      if (window.HAHBoard.__resizingPanes) return;

      const appWidth = app.clientWidth || window.innerWidth || 0;
      const mainWidth = mainPane.clientWidth || 0;
      const centreWidth = centre.clientWidth || mainWidth || 0;
      const logWidth = logCol.clientWidth || 0;
      const refWidth = refCol ? refCol.clientWidth || 0 : 0;

      layoutState.compact = layoutState.compact
        ? (appWidth <= 1740 || mainWidth <= 1000)
        : (appWidth <= 1630 || mainWidth <= 920);

      layoutState.narrow = layoutState.narrow
        ? (centreWidth <= 1090)
        : (centreWidth <= 980);

      layoutState.tight = layoutState.tight
        ? (centreWidth <= 860 || refWidth <= 300)
        : (centreWidth <= 780 || refWidth <= 265);

      layoutState.logNarrow = layoutState.logNarrow
        ? (logWidth <= 840)
        : (logWidth <= 760);

      app.classList.toggle('hah-patient-compact', layoutState.compact);
      centre.classList.toggle('is-narrow', layoutState.narrow);
      centre.classList.toggle('is-tight', layoutState.tight);
      logCol.classList.toggle('is-narrow', layoutState.logNarrow);

      // Re-parent nav so compact mode's floating pill sits inside the
      // resizable left pane (scrolling content stops above it, width
      // follows pane width).
      const nav = document.getElementById('hahNav');
      const leftPane = app.querySelector('.hah-left-pane');
      if (nav && leftPane) {
        if (layoutState.compact) {
          if (nav.parentElement !== leftPane) leftPane.appendChild(nav);
        } else {
          if (nav.parentElement === leftPane) app.insertBefore(nav, leftPane);
        }
      }
      window.HAHBoard.__patientLayoutState = layoutState;
    }

    function requestApply() {
      if (window.HAHBoard.__resizingPanes) return;
      if (layoutState.raf) return;
      layoutState.raf = window.requestAnimationFrame(applyLayoutClasses);
    }

    applyLayoutClasses();

    // Expose for shell to call synchronously after re-renders
    window.HAHBoard.applyPatientLayout = applyLayoutClasses;

    let ro = null;
    if (typeof ResizeObserver === 'function') {
      ro = new ResizeObserver(() => requestApply());
      ro.observe(app);
      ro.observe(mainPane);
      ro.observe(centre);
      ro.observe(logCol);
      if (refCol) ro.observe(refCol) // hah-pt-mdm-row;
    }
    window.addEventListener('resize', requestApply, { passive: true });
    window.addEventListener('hah:panes-resized', requestApply);

    window.HAHBoard.__patientLayoutCleanup = function () {
      window.removeEventListener('resize', requestApply);
      window.removeEventListener('hah:panes-resized', requestApply);
      if (layoutState.raf) window.cancelAnimationFrame(layoutState.raf);
      if (ro) ro.disconnect();
    };
  }

  function bindBoardMemberControls(pane) {
    const chips = pane.querySelectorAll('[data-board-member]');
    const otherWrap = pane.querySelector('#hahBoardMembersOtherWrap');
    const otherInput = pane.querySelector('#hahBoardMembersOther');

    function currentSelection() {
      return loadBoardSelectionToday();
    }

    function renderSelection(sel) {
      chips.forEach((chip) => {
        const label = chip.getAttribute('data-board-member');
        chip.classList.toggle('is-active', sel.members.includes(label));
      });
      if (otherWrap) otherWrap.style.display = sel.members.includes('Other') ? '' : 'none';
      if (otherInput && otherInput.value !== (sel.otherText || '')) otherInput.value = sel.otherText || '';
    }

    function updatePreview() {
      const state = store.getState();
      const vm = d.buildPatientWorkspaceModel(state);
      const type = (state.patient && state.patient.composerType) || 'board_round';
      if (vm) refreshPreview(vm, type);
    }

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        const label = chip.getAttribute('data-board-member');
        const sel = currentSelection();
        const has = sel.members.includes(label);
        sel.members = has ? sel.members.filter((m) => m !== label) : sel.members.concat(label);
        if (!sel.members.includes('Other')) sel.otherText = '';
        saveBoardSelectionToday(sel);
        renderSelection(sel);
        updatePreview();
      });
    });

    if (otherInput) {
      otherInput.addEventListener('input', () => {
        const sel = currentSelection();
        sel.otherText = otherInput.value || '';
        if (sel.otherText && !sel.members.includes('Other')) sel.members = sel.members.concat('Other');
        saveBoardSelectionToday(sel);
        renderSelection(sel);
        updatePreview();
      });
    }

    renderSelection(currentSelection());
  }

  function bindCopyBtn(pane) {
    const copyBtn = pane.querySelector('#hahNoteCopyBtn');

      copyBtn.addEventListener('click', () => {
        const text = (pane.querySelector('#hahNotePreviewText') || {}).textContent || '';
        if (!text) return;
        navigator.clipboard && navigator.clipboard.writeText(text).then(() => {
          copyBtn.textContent = 'Copied';
          setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
        }).catch(() => {});
      });
    }

  function restoreFields(fields, type) {
    function set(id, v) {
      const el = document.getElementById(id);
      if (el && v !== undefined && v !== null && String(v).length > 0) {
        el.value = String(v);
        el.classList.remove('is-pulled');
      }
    }
    function setChip(id, v) {
      const el = document.getElementById(id);
      if (!el) return;
      const active = v === true || v === 'true';
      el.dataset.active = active ? 'true' : 'false';
      el.classList.toggle('is-active', active);
    }
    if (type === 'board_round') {
      set('cform-issues', fields.issues); set('cform-progress', fields.progress);
      set('cform-bloods', fields.bloods); set('cform-plan', fields.plan);
      set('cform-discharge-date', fields.dischargeDate);
      setChip('cform-ready-chip', fields.dischargeReady);
      setChip('cform-dnar', fields.dnar);
      setChip('cform-acp', fields.acp);
    }
    if (type === 'micro_mdm') { set('cform-question', fields.question); set('cform-recommendation', fields.recommendation); set('cform-followup', fields.followUp); }
    if (type === 'resp_mdm')  { set('cform-summary', fields.summary);   set('cform-recommendation', fields.recommendation); set('cform-action', fields.action); }
    if (type === 'other')     { set('cform-source', fields.source);     set('cform-note', fields.note); }
  }

    const previewEl = document.getElementById('hahNotePreviewText');
    if (!previewEl) return;
    const fields = collectComposerFields(type);

    });

  function showToast(pane, text) {
    const existing = pane.querySelector('.hah-composer-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'hah-composer-toast';
    toast.textContent = text;

    card.appendChild(toast);

      requestAnimationFrame(() => toast.classList.add('is-visible'));

    const el = pane.querySelector('#hahAutosaveIndicator');
