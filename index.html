  function renderRightPane(state) {
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return c.stack([c.card("Today's board round", c.emptyState('No patient selected', 'Open a patient from the board.'), { subtitle: "Select a patient to continue today’s note." })]);
    const composerType = (state.patient && state.patient.composerType) || 'board_round';
    const scopedComposer = getScopedComposerState(state, vm.patient.id);
    let isLocked     = !!scopedComposer.locked;
    let editingId    = scopedComposer.editId || null;
    let editingEnc   = editingId ? (getPatientEncounterRows(vm.patient) || []).find((e) => e.id === editingId) : null;
    // If editId points at an encounter that no longer exists in the merged
    // encounter set (deleted locally, or deleted on another device and
    // synced through), drop the lock state. Without this, the composer
    // would keep showing "New note" / "Edit" buttons referencing nothing.
    if (editingId && !editingEnc) {
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
      isLocked = false;
      editingId = null;
      editingEnc = null;
    }
    const lastRound    = getLastBoardTemplateEntry(vm.patient);
    const boardSel     = loadBoardSelectionToday();
    const heading      = getComposerHeading(composerType, isLocked, editingEnc);
    const typeTabs     = ENCOUNTER_TYPES.map((t) => {
      const active = t.key === composerType ? ' is-active type-' + t.key.replace(/_/g, '-') : '';
      return `<button type="button" class="hah-composer-tab${active}" data-patient-action="set-composer-type"
        data-composer-type="${c.escapeHtml(t.key)}">${c.escapeHtml(t.label)}</button>`;
    }).join('');

    // Compute clear/undo button state. If we're inside an active undo
    // window for this patient, the button renders as Undo with the
    // remaining time on the progress bar. Without this, every re-render
    // during the undo window would rebuild the button DOM in its default
    // Clear state (because the original morph in the action handler only
    // touched a now-stale DOM element). The CSS animation needs to know
    // how much time has already elapsed so the bar continues from the
    // right position rather than restarting at full.
    const undoActive = !isLocked
      && composerClearSnapshot
      && composerClearDeadline > Date.now()
      && composerClearSnapshot.patientId === vm.patient.id;
    const undoElapsedMs = undoActive ? Math.max(0, COMPOSER_UNDO_WINDOW_MS - (composerClearDeadline - Date.now())) : 0;
    const clearBtnClass = undoActive ? 'hah-inline-pill is-undo' : 'hah-inline-pill';
    const clearBtnAction = isLocked ? 'composer-new' : (undoActive ? 'composer-undo' : 'composer-clear');
    const clearBtnLabel = isLocked ? 'New note' : (undoActive ? 'Undo' : 'Clear');
    // Negative animation-delay seeks the running animation forward by that
    // amount — picks up where the original timer is. We pass it as a CSS
    // custom property because the animation lives on the ::after
    // pseudo-element, and inline `animation-delay` on the host element
    // doesn't cascade to pseudo-elements; CSS custom properties do.
    const clearBtnStyle = undoActive ? ` style="--hah-undo-elapsed:${undoElapsedMs}ms"` : '';

    return c.stack([
      c.card(heading, `
      <div class="hah-composer-tabs">${typeTabs}</div>
      <div class="hah-board-members">
        <div class="hah-board-members-label">Who's on board</div>
        <div class="hah-board-members-chips">
          ${renderBoardMemberChips(boardSel)}
        </div>
        <div class="hah-board-members-other" id="hahBoardMembersOtherWrap"${boardSel.members.includes('Other') ? '' : ' style="display:none"'}>
          <input type="text" id="hahBoardMembersOther" class="hah-board-members-input" placeholder="Other board member(s)" value="${c.escapeHtml(boardSel.otherText || '')}">
        </div>
      </div>
      <div class="hah-composer-form" id="hahComposerForm">
        ${renderComposerForm(composerType, lastRound, vm)}
      </div>
      <div class="hah-composer-footer">
        <span class="hah-autosave-indicator" id="hahAutosaveIndicator"></span>
        <button type="button" class="${clearBtnClass}" id="hahComposerClearBtn"
          data-patient-action="${clearBtnAction}"${clearBtnStyle}>${clearBtnLabel}</button>
        <button type="button" class="hah-inline-pill is-primary"
          data-patient-action="composer-done">${isLocked ? 'Edit' : 'Done'}</button>
      </div>
      ${composerType === 'board_round' ? `
      <div class="hah-composer-sep"></div>
      <div class="hah-note-preview" id="hahNotePreview" style="display:none">
        <div class="hah-note-preview-head">
          <span class="hah-note-preview-label">Clinical note preview</span>
          <button type="button" class="hah-note-copy-btn" id="hahNoteCopyBtn">Copy</button>
        </div>
        <pre class="hah-note-preview-text" id="hahNotePreviewText"></pre>
        <div class="hah-note-preview-footer">
          <button type="button" class="hah-emis-btn${isLocked ? '' : ' is-disabled'}"
            id="hahEmisSendBtn"${isLocked ? '' : ' disabled'}>Send to EMIS</button>
        </div>
      </div>` : ''}
    `),
      renderPatientRecordCard(vm),
      `<button type="button" class="hah-discharge-btn" data-patient-action="discharge-patient">${isJsonPatient(vm.patient) ? 'Archive / discharge' : 'Discharge'}</button>`
    ]);
  }

  function getComposerHeading(type, isLocked, editingEnc) {
    // If editing a past encounter, show its date instead of "Today's"
    if (editingEnc) {
      const dt = new Date(editingEnc.timestamp);
      const isToday = !isNaN(dt.getTime()) && dt.toDateString() === new Date().toDateString();
      const dateLabel = isNaN(dt.getTime())
        ? 'entry'
        : (isToday ? 'Today' : dt.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }));
      if (type === 'board_round') return `Editing board round · ${dateLabel}`;
      if (type === 'mobile_clinical_review') return `Editing mobile review · ${dateLabel}`;
      if (type === 'micro_mdm')   return `Editing Micro MDM · ${dateLabel}`;
      if (type === 'resp_mdm')    return `Editing Resp MDM · ${dateLabel}`;
      return `Editing note · ${dateLabel}`;
    }
    if (type === 'board_round') return "Today's board round";
    if (type === 'mobile_clinical_review') return "Today's mobile review";
    if (type === 'micro_mdm')   return "Today's Micro MDM";
    if (type === 'resp_mdm')    return "Today's Resp MDM";
    return "Today's other note";
  }

  function getComposerSubheading(type, isLocked, lastRound) {
    const base = type === 'board_round'
      ? "Continue today’s H@H board round note."
      : type === 'micro_mdm'
        ? "Capture today’s Micro MDM advice and updates."
        : type === 'resp_mdm'
          ? "Capture today’s respiratory MDM outcome and plan."
          : "Capture today’s clinical update.";
    const tail = isLocked
      ? ' This entry is completed — choose Edit to amend or New note to start again.'
      : (lastRound && type === 'board_round')
        ? ' Issues and plan can be carried forward from the latest completed board round.'
        : '';
    return base + tail;
  }

  function getScopedComposerState(state, patientId) {
    const map = (state && state.patient && state.patient.composerByPatient) || {};
    const scoped = map && map[patientId] ? map[patientId] : {};
    return {
      locked: !!scoped.locked,
      editId: scoped.editId || null
    };
  }

  function patchScopedComposerState(patientId, patch) {
    if (!patientId) return;
    const currentState = store.getState();
    const map = (currentState.patient && currentState.patient.composerByPatient) || {};
    const prev = map[patientId] || {};
    store.setState({
      patient: {
        composerByPatient: {
          ...map,
          [patientId]: { ...prev, ...patch }
        }
      }
    });
  }

  function renderBoardMemberChips(selection) {
    const sel = selection || { members: [], otherText: '' };
    return BOARD_MEMBER_OPTIONS.map((label) => {
      const active = sel.members.includes(label) ? ' is-active' : '';
      return `<button type="button" class="hah-board-member-chip${active}" data-board-member="${c.escapeHtml(label)}">${c.escapeHtml(label)}</button>`;
    }).join('');
  }

  function renderComposerForm(type, lastRound, vm) {
    if (type === 'board_round') {
      const lastF          = lastRound ? (lastRound.fields || {}) : null;
      const fallbackIssues = vm ? vm.issues.map((l, i) => (i + 1) + '. ' + l).join('\n') : '';
      const pulledIssues   = lastF
        ? (Array.isArray(lastF.issueLines) && lastF.issueLines.length
            ? lastF.issueLines.map((l, i) => (i + 1) + '. ' + l).join('\n')
            : String(lastF.issues || '').trim())
        : fallbackIssues;
      const pulledPlan = lastF ? String(lastF.plan || '').trim() : '';
      const prevDate   = lastF ? (lastF.dischargeDate || '') : '';
      // Discharge summary: render with the patient's persisted value on
      // initial mount. Like Issues and Plan, this gets overwritten by
      // restoreFields() if the encounter draft has a value (including
      // empty string after a Clear). The markup is the "no draft" default;
      // restoreFields applies "draft says X" on top.
      const pulledDischargeSummary = String(vm && vm.patient && vm.patient.forDischargeSummary || '').trim();

      return `
        <div class="hah-cform-field">
          <label class="hah-cform-label">Issues</label>
          <textarea class="hah-cform-textarea hah-autoexpand${pulledIssues ? ' is-pulled' : ''}" id="cform-issues"
            placeholder="1. Issue one&#10;2. Issue two">${c.escapeHtml(pulledIssues)}</textarea>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Progress</label>
          <textarea class="hah-cform-textarea hah-autoexpand" id="cform-progress" rows="2"
            placeholder="Clinical progress since last review…"></textarea>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Bloods</label>
          <textarea class="hah-cform-textarea hah-autoexpand" id="cform-bloods" rows="2"
            placeholder="e.g. CRP 45  WBC 8.2  Cr 112  Na 138"></textarea>
          <label class="hah-cform-checkbox-row">
            <input type="checkbox" id="cform-include-prev-bloods" class="hah-cform-checkbox">
            <span>Include previous bloods in note</span>
          </label>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Plan</label>
          <textarea class="hah-cform-textarea hah-autoexpand${pulledPlan ? ' is-pulled' : ''}" id="cform-plan" rows="3"
            placeholder="Today's plan…">${c.escapeHtml(pulledPlan)}</textarea>
          <div class="hah-plan-presets">
            <div class="hah-plan-presets-label">Common plan actions</div>
            <div class="hah-plan-presets-chips">
              ${PLAN_PRESETS.map((preset) => `<button type="button" class="hah-plan-preset-chip" data-patient-action="insert-plan-preset" data-plan-preset-key="${c.escapeHtml(preset.key)}">${c.escapeHtml(preset.label)}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">Estimated discharge</label>
          <div class="hah-discharge-row">
            <button type="button" class="hah-dchip" data-discharge-quick="today" id="cform-chip-today">Possible today</button>
            <button type="button" class="hah-dchip" data-discharge-quick="tomorrow" id="cform-chip-tomorrow">Tomorrow</button>
            <button type="button" class="hah-dchip hah-dchip-ready" id="cform-ready-chip" data-discharge-quick="ready">Ready</button>
            <input type="date" id="cform-discharge-date" class="hah-date-input"
              placeholder="Select date"
              min="${todayIso()}"
              data-pulled-date="${c.escapeHtml(prevDate)}">
          </div>
        </div>
        <div class="hah-cform-field">
          <label class="hah-cform-label">For discharge summary</label>
          <textarea class="hah-cform-textarea hah-autoexpand${pulledDischargeSummary ? ' is-pulled' : ''}" id="cform-discharge-summary" rows="3"
            data-pulled-value="${c.escapeHtml(pulledDischargeSummary)}"
            placeholder="Notes that will feed into the eventual discharge summary…">${c.escapeHtml(pulledDischargeSummary)}</textarea>
        </div>`;
    }

    if (type === 'micro_mdm') return `
      <div class="hah-cform-field"><label class="hah-cform-label">Question</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-question" rows="2" placeholder="Question posed to microbiology…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Recommendation</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-recommendation" rows="3" placeholder="Advice given…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Follow-up</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-followup" rows="2" placeholder="Review triggers / actions…"></textarea></div>`;

    if (type === 'resp_mdm') return `
      <div class="hah-cform-field"><label class="hah-cform-label">Summary presented</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-summary" rows="2" placeholder="Brief clinical summary for MDM…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Recommendation</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-recommendation" rows="3" placeholder="Resp MDM recommendation…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Action</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-action" rows="2" placeholder="What follows from this review…"></textarea></div>`;

    return `
      <div class="hah-cform-field"><label class="hah-cform-label">Source</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-source" rows="1" placeholder="e.g. Palliative care, Dietetics, Family discussion…"></textarea></div>
      <div class="hah-cform-field"><label class="hah-cform-label">Note</label>
        <textarea class="hah-cform-textarea hah-autoexpand" id="cform-note" rows="5" placeholder="Free text…"></textarea></div>`;
  }

  function collectComposerFields(type) {
    function val(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function active(id) { const el = document.getElementById(id); return el ? el.dataset.active === 'true' : false; }
    function checked(id) { const el = document.getElementById(id); return el ? !!el.checked : false; }
    if (type === 'board_round') return {
      issues: val('cform-issues'), progress: val('cform-progress'),
      bloods: val('cform-bloods'), plan: val('cform-plan'),
      // Discharge summary is collected as a draft field like the others.
      // It only commits to operational.forDischargeSummary on composer-done,
      // not while typing — see the principle in CHANGELOG-desktop.md v0.8.125.
      forDischargeSummary: val('cform-discharge-summary'),
      dischargeDate: val('cform-discharge-date'),
      dischargeReady: active('cform-ready-chip'),
      // Per-round opt-in to include previous bloods (last 5 from the bloods
      // card, deduped against today's textarea value if any) in the note
      // preview. Default off; lives in the encounter draft like every
      // other composer field.
      includePrevBloods: checked('cform-include-prev-bloods'),
      dnar: active('cform-dnar'),
      acp:  active('cform-acp'),
      boardMembers: loadBoardSelectionToday().members,
      boardOtherText: loadBoardSelectionToday().otherText
    };
    if (type === 'micro_mdm') return { question: val('cform-question'), recommendation: val('cform-recommendation'), followUp: val('cform-followup') };
    if (type === 'resp_mdm')  return { summary: val('cform-summary'),   recommendation: val('cform-recommendation'), action:   val('cform-action') };
    return { source: val('cform-source'), note: val('cform-note') };
  }

  function formatBloodsDateLabel(vm) {
    const candidates = [
      vm && vm.patient && vm.patient.bloodDate,
      vm && vm.patient && vm.patient.latestBloodDate,
      vm && vm.latestBloodDate,
      vm && vm.patient && vm.patient.latestReviewAt,
      vm && vm.patient && vm.patient.reviewDueAt
    ].filter(Boolean);

    for (const value of candidates) {
      const dt = new Date(value);
      if (!Number.isNaN(dt.getTime())) {
        return dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit' });
      }
      const m = String(value).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}`;
    }

    return todayIso().split('-').reverse().slice(0,2).join('/');
  }

  function buildNotePreviewText(vm, type, fields) {
    if (type !== 'board_round') return '';
    const now   = new Date();
    const stamp = now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const boardSel = loadBoardSelectionToday();
    const members = (boardSel.members || []).filter((m) => m !== 'Other');
    if ((boardSel.otherText || '').trim()) members.push((boardSel.otherText || '').trim());
    const lines = ['H@H BOARD ROUND — ' + stamp];
    if (members.length) lines.push('Present: ' + members.join(', '));
    if (members.length && (vm.referralSource || '').trim()) lines.push('');
    if ((vm.referralSource || '').trim()) lines.push('Referred from ' + vm.referralSource.trim());
    lines.push('');

    const issueText = (fields.issues || '').trim();
    if (issueText) {
      lines.push('ACTIVE ISSUES');
      const issueLines = issueText.split('\n').map((l) => l.trimEnd());
      while (issueLines.length && !issueLines[0].trim()) issueLines.shift();
      while (issueLines.length && !issueLines[issueLines.length - 1].trim()) issueLines.pop();
      issueLines.forEach((l) => lines.push(l));
      lines.push('');
    }
    if ((fields.progress || '').trim()) {
      lines.push('PROGRESS');
      lines.push(fields.progress.trim());
      lines.push('');
    }
    const newBloods = (fields.bloods || '').trim();
    const includePrev = !!fields.includePrevBloods;

    // Build the consolidated BLOODS section. Two sources:
    //   1. The user's typed bloods textarea (fields.bloods) — always
    //      included if present.
    //   2. The bloods card's columns (last 5 dates) — included only when
    //      "Include previous bloods" is ticked. Deduped against any dates
    //      already covered by source (1).
    // Both render under a single BLOODS heading, oldest first, in the
    // format "DD/MM: analyte result analyte result" with no dots.

    const todayLabel = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    const BMONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

    function parseBloodsDateForSort(label) {
      if (label === 'Today') return Date.now();
      const m = label.match(/^(\d{1,2})\s+([a-z]{3})/i);
      if (m) {
        const mo = BMONTHS[(m[2] || '').toLowerCase()];
        if (mo !== undefined) {
          return new Date(new Date().getFullYear(), mo, +m[1]).getTime();
        }
      }
      const t = new Date(label).getTime();
      return isNaN(t) ? 0 : t;
    }
    function dateLabelToShort(label) {
      // Convert "12 Apr" / "Today" → "DD/MM" form. Today gets the actual
      // date so the note has a stable date reference rather than "Today"
      // (which becomes wrong if the note is re-read later).
      if (label === 'Today') {
        const d = new Date();
        const dd = String(d.getDate()).padStart(2, '0');
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        return dd + '/' + mm;
      }
      const m = label.match(/^(\d{1,2})\s+([a-z]{3})/i);
      if (m) {
        const mo = BMONTHS[(m[2] || '').toLowerCase()];
        if (mo !== undefined) {
          const dd = String(+m[1]).padStart(2, '0');
          const mm = String(mo + 1).padStart(2, '0');
          return dd + '/' + mm;
        }
      }
      return label; // fall through unchanged
    }

    // 1. Parse typed bloods → entries[]
    const B_DATE_RE = /^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?\s*[:]\s*/i;
    const B_TEXT_RE = /^(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)\w*\s*[:]\s*/i;
    const typedEntries = [];
    if (newBloods) {
      const bloodLines = newBloods.split('\n').map((l) => l.trim()).filter(Boolean);
      let pendingDate = todayLabel;
      bloodLines.forEach((raw) => {
        let rest = raw;
        let dt = pendingDate;
        let m = rest.match(B_DATE_RE);
        if (m) {
          const mo_months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          dt = m[1] + ' ' + mo_months[+m[2] - 1];
          pendingDate = dt;
          rest = rest.slice(m[0].length).trim();
        } else {
          m = rest.match(B_TEXT_RE);
          if (m) {
            const mo2 = BMONTHS[(m[2] || '').toLowerCase().slice(0,3)];
            const mo_months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            if (mo2 !== undefined) { dt = m[1] + ' ' + mo_months[mo2]; pendingDate = dt; rest = rest.slice(m[0].length).trim(); }
          }
        }
        if (rest) typedEntries.push({ dateLabel: dt, content: rest, source: 'typed' });
      });
    }

    // 2. If checkbox ticked, get card columns. Filter out dates the typed
    //    entries already cover (dedupe — typed wins).
    const typedDates = new Set(typedEntries.map((e) => e.dateLabel));
    const prevEntries = [];
    if (includePrev && vm) {
      try {
        const cols = (typeof getBloodsCardColumns === 'function') ? getBloodsCardColumns(vm) : [];
        const order = (typeof getBloodAnalyteOrder === 'function') ? getBloodAnalyteOrder() : [];
        const labelByKey = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a.label || a.key]));
        const formatVal = (v) => (v % 1 === 0) ? String(v) : String(+(+v).toFixed(1));
        cols.forEach((col) => {
          if (typedDates.has(col.date)) return;
          const parts = [];
          // Render in saved order first
          order.forEach((key) => {
            const v = col.vals[key];
            if (v === undefined || v === null || isNaN(v)) return;
            const label = labelByKey[key] || key;
            parts.push(label + ' ' + formatVal(v));
          });
          // Then any analytes not in the order list (including unrecognised _u_)
          Object.keys(col.vals).forEach((key) => {
            if (order.indexOf(key) >= 0) return;
            const v = col.vals[key];
            if (v === undefined || v === null || isNaN(v)) return;
            const label = key.startsWith('_u_') ? key.slice(3) : (labelByKey[key] || key);
            parts.push(label + ' ' + formatVal(v));
          });
          if (parts.length) {
            prevEntries.push({ dateLabel: col.date, content: parts.join(' '), source: 'card' });
          }
        });
      } catch (_) {}
    }

    // 3. Combine, sort oldest-first, render
    const allBloodEntries = typedEntries.concat(prevEntries);
    if (allBloodEntries.length) {
      lines.push('BLOODS');
      allBloodEntries.sort((a, b) => parseBloodsDateForSort(a.dateLabel) - parseBloodsDateForSort(b.dateLabel));
      allBloodEntries.forEach((e) => {
        lines.push(dateLabelToShort(e.dateLabel) + ': ' + e.content);
      });
      lines.push('');
    }
    if ((fields.plan || '').trim()) {
      lines.push('PLAN');
      lines.push(fields.plan.trim());
      lines.push('');
    }
    // ACP block — mirrors the mobile clinical note generator's "Advanced
    // care plan:" section. Sources from getAcpStateForVm which resolves
    // JSON vs local state correctly and is the same helper the ACP card
    // on the left pane uses. Only included when at least one field has
    // content.
    const acp = getAcpStateForVm(vm);
    const acpLines = [];
    const dnacprStatus = String(acp.dnacprStatus || '').trim();
    const dnacprFormSeen = !!acp.dnacprFormSeen;
    const tepStatus = String(acp.tepStatus || '').trim();
    const ceilingOfCare = String(acp.tep || acp.ceilingOfCare || '').trim();
    const acpNotes = String(acp.notes || acp.acpNotes || '').trim();
    if (dnacprStatus) {
      const dnar = dnacprStatus === 'yes'
        ? (dnacprFormSeen ? 'Yes, form seen' : 'Yes')
        : (dnacprStatus === 'no' ? 'No' : 'Unknown');
      acpLines.push('DNACPR: ' + dnar);
    }
    if (tepStatus) {
      const ucp = tepStatus === 'present' ? 'Present'
        : tepStatus === 'absent' ? 'Absent' : 'Unknown';
      acpLines.push('UCP: ' + ucp);
    }
    if (ceilingOfCare) acpLines.push('TEP: ' + ceilingOfCare);
    if (acpNotes) acpLines.push('ACP notes: ' + acpNotes);
    if (acpLines.length) {
      lines.push('ADVANCED CARE PLAN');
      acpLines.forEach((l) => lines.push(l));
      lines.push('');
    }
    const edd = formatEDD(fields.dischargeDate, fields.dischargeReady);
    if (edd) {
      lines.push('EDD: ' + edd);
      lines.push('');
    }
    // For discharge summary text — sourced from the live textarea if present
    // (optimistic), otherwise the patient's persisted operational.forDischargeSummary.
    // This field is patient-scoped, not encounter-draft-scoped — it round-trips
    // with mobile's "For discharge summary" textarea.
    const dcLiveEl = document.getElementById('cform-discharge-summary');
    const dcText = String(
      dcLiveEl !== null && dcLiveEl !== undefined
        ? dcLiveEl.value
        : (vm && vm.patient && vm.patient.forDischargeSummary || '')
    ).trim();
    if (dcText) {
      lines.push('FOR DISCHARGE SUMMARY');
      lines.push(dcText);
      lines.push('');
    }
    return lines.join('\n').trim();
  }

  function afterRender(state, pane) {
    initBloodTooltip();
    initWsDragDrop();
    setupResponsivePatientLayout();
    const vm = d.buildPatientWorkspaceModel(state);
    if (!vm) return;
    const type     = (state.patient && state.patient.composerType) || 'board_round';
    const scopedComposer = getScopedComposerState(state, vm.patient.id);
    const isLocked = !!scopedComposer.locked;

    const draft = loadDraft(vm.patient.id, type);
    if (draft && draft.fields) restoreFields(draft.fields, type);

    autoExpandAll(pane);

    bindBoardMemberControls(pane);

    if (isLocked) {
      pane.querySelectorAll('.hah-cform-textarea').forEach((ta) => {
        ta.setAttribute('readonly', '');
        ta.classList.add('is-locked');
      });
      const dateInput = pane.querySelector('#cform-discharge-date');
      if (dateInput) { dateInput.disabled = true; dateInput.classList.add('is-locked'); }
      pane.querySelectorAll('.hah-dchip').forEach((chip) => { chip.disabled = true; chip.classList.add('is-locked'); });
      pane.querySelectorAll('.hah-plan-preset-chip').forEach((chip) => { chip.disabled = true; chip.classList.add('is-locked'); });
      refreshPreview(vm, type);
      bindCopyBtn(pane);
      return;
    }

    pane.querySelectorAll('.hah-cform-textarea.hah-autoexpand').forEach((ta) => {
      if (ta.classList.contains('is-pulled')) {
        ta.addEventListener('input', () => ta.classList.remove('is-pulled'), { once: true });
      }
    });

    let saveTimer = null;
    pane.querySelectorAll('.hah-cform-textarea').forEach((ta) => {
      // All composer textareas — including discharge summary — autosave
      // to the encounter draft, NOT to the patient JSON. The patient JSON
      // only changes when the user presses Done. This is the same rule
      // every note-taking app follows: nothing commits until you save.
      // Previously the discharge textarea was special-cased to write
      // directly to operational.forDischargeSummary on every keystroke,
      // which created cross-device sync events on every typed character
      // and forced a complex undo dance to handle Clear correctly.
      ta.addEventListener('input', () => {
        autoExpand(ta);
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveDraft(vm.patient.id, type, collectComposerFields(type));
          showAutosaveIndicator(pane);
        }, 1400);
      });
    });

    // Include-previous-bloods checkbox: refresh the note preview
    // immediately on change (so the user sees what gets included), then
    // save the draft via the same path as field input.
    const includePrevBloodsCb = pane.querySelector('#cform-include-prev-bloods');
    if (includePrevBloodsCb) {
      includePrevBloodsCb.addEventListener('change', () => {
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveDraft(vm.patient.id, type, collectComposerFields(type));
          showAutosaveIndicator(pane);
        }, 1400);
      });
    }

    const dischargeDateInput = pane.querySelector('#cform-discharge-date');
    const readyChip          = pane.querySelector('#cform-ready-chip');

    let fp = null;
    if (dischargeDateInput && typeof window.flatpickr === 'function') {
      fp = window.flatpickr(dischargeDateInput, {
        dateFormat: 'Y-m-d',
        altInput: true,
        altFormat: 'D j M Y',
        minDate: 'today',
        disableMobile: true,
        onChange: function () {
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
          const tc = pane.querySelector('#cform-chip-today'), tm = pane.querySelector('#cform-chip-tomorrow');
          [tc, tm].forEach((c) => { if (c) { c.dataset.active = 'false'; c.classList.remove('is-active'); } });
          refreshPreview(vm, type);
          clearTimeout(saveTimer);
          saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
        }
      });

      // Apply initial date AFTER flatpickr is alive: prefer the draft's value
      // (which may be empty if the user just cleared), then fall back to the
      // pulled date from the last round (stored as data attribute, not as a
      // value="..." in the HTML — see the input markup above for why).
      // This is the single source-of-truth point for the initial date,
      // replacing the previous fight between value="${prevDate}" (HTML
      // default) and restoreFields' set('cform-discharge-date', '') call.
      const draftForDate = draft && draft.fields ? draft.fields : null;
      const draftHasDateField = draftForDate && Object.prototype.hasOwnProperty.call(draftForDate, 'dischargeDate');
      const pulledDate = dischargeDateInput.getAttribute('data-pulled-date') || '';
      const initialDate = draftHasDateField ? String(draftForDate.dischargeDate || '') : pulledDate;
      if (initialDate) {
        fp.setDate(initialDate, false);
      } else {
        fp.clear();
      }
    }

    if (dischargeDateInput && !fp) {
      dischargeDateInput.addEventListener('change', () => {
        if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    }
    pane.querySelectorAll('[data-discharge-quick]').forEach((chip) => {
      chip.addEventListener('click', () => {
        const quick = chip.getAttribute('data-discharge-quick');
        const setDate = (iso) => {
          if (fp) fp.setDate(iso, false);
          else if (dischargeDateInput) dischargeDateInput.value = iso;
        };
        const todayChip    = pane.querySelector('#cform-chip-today');
        const tomorrowChip = pane.querySelector('#cform-chip-tomorrow');
        function clearDateChips() {
          [todayChip, tomorrowChip].forEach((c) => { if (c) { c.dataset.active = 'false'; c.classList.remove('is-active'); } });
        }
        if (quick === 'today') {
          clearDateChips();
          setDate(todayIso());
          if (chip) { chip.dataset.active = 'true'; chip.classList.add('is-active'); }
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        }
        if (quick === 'tomorrow') {
          clearDateChips();
          setDate(tomorrowIso());
          if (chip) { chip.dataset.active = 'true'; chip.classList.add('is-active'); }
          if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active'); }
        }
        if (quick === 'ready') {
          const nowActive = chip.dataset.active === 'true';
          chip.dataset.active = nowActive ? 'false' : 'true';
          chip.classList.toggle('is-active', !nowActive);
          if (!nowActive) setDate('');
        }
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    });

    // Wire alert chips (DNAR / ACP)
    pane.querySelectorAll('.hah-alert-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        const wasActive = chip.dataset.active === 'true';
        chip.dataset.active = wasActive ? 'false' : 'true';
        chip.classList.toggle('is-active', !wasActive);
        refreshPreview(vm, type);
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => { saveDraft(vm.patient.id, type, collectComposerFields(type)); showAutosaveIndicator(pane); }, 1400);
      });
    });

    // Initial render of the preview
    bindCopyBtn(pane);
    refreshPreview(vm, type);
  }

  function setupResponsivePatientLayout() {
    const app = document.querySelector('.hah-desktop-app');
    const mainPane = document.querySelector('#hahMainPane');
    const centre = document.querySelector('.hah-pt-cols');
    const logCol = document.querySelector('.hah-ws-col');
    const refCol = document.querySelector('.hah-pt-mdm-row');
    if (!app || !mainPane || !centre || !logCol) return;

    if (window.HAHBoard.__patientLayoutCleanup) {
      try { window.HAHBoard.__patientLayoutCleanup(); } catch (_) {}
      window.HAHBoard.__patientLayoutCleanup = null;
    }

    const prev = window.HAHBoard.__patientLayoutState || {};
    const layoutState = {
      compact: !!prev.compact,
      narrow: !!prev.narrow,
      tight: !!prev.tight,
      logNarrow: !!prev.logNarrow,
      raf: 0
    };

    function applyLayoutClasses() {
      layoutState.raf = 0;
      if (window.HAHBoard.__resizingPanes) return;

      const appWidth = app.clientWidth || window.innerWidth || 0;
      const mainWidth = mainPane.clientWidth || 0;
      const centreWidth = centre.clientWidth || mainWidth || 0;
      const logWidth = logCol.clientWidth || 0;
      const refWidth = refCol ? refCol.clientWidth || 0 : 0;

      layoutState.compact = layoutState.compact
        ? (appWidth <= 1740 || mainWidth <= 1000)
        : (appWidth <= 1630 || mainWidth <= 920);

      layoutState.narrow = layoutState.narrow
        ? (centreWidth <= 1090)
        : (centreWidth <= 980);

      layoutState.tight = layoutState.tight
        ? (centreWidth <= 860 || refWidth <= 300)
        : (centreWidth <= 780 || refWidth <= 265);

      layoutState.logNarrow = layoutState.logNarrow
        ? (logWidth <= 840)
        : (logWidth <= 760);

      app.classList.toggle('hah-patient-compact', layoutState.compact);
      centre.classList.toggle('is-narrow', layoutState.narrow);
      centre.classList.toggle('is-tight', layoutState.tight);
      logCol.classList.toggle('is-narrow', layoutState.logNarrow);

      // Re-parent nav so compact mode's floating pill sits inside the
      // resizable left pane (scrolling content stops above it, width
      // follows pane width).
      const nav = document.getElementById('hahNav');
      const leftPane = app.querySelector('.hah-left-pane');
      if (nav && leftPane) {
        if (layoutState.compact) {
          if (nav.parentElement !== leftPane) leftPane.appendChild(nav);
        } else {
          if (nav.parentElement === leftPane) app.insertBefore(nav, leftPane);
        }
      }
      window.HAHBoard.__patientLayoutState = layoutState;
    }

    function requestApply() {
      if (window.HAHBoard.__resizingPanes) return;
      if (layoutState.raf) return;
      layoutState.raf = window.requestAnimationFrame(applyLayoutClasses);
    }

    applyLayoutClasses();

    // Expose for shell to call synchronously after re-renders
    window.HAHBoard.applyPatientLayout = applyLayoutClasses;

    let ro = null;
    if (typeof ResizeObserver === 'function') {
      ro = new ResizeObserver(() => requestApply());
      ro.observe(app);
      ro.observe(mainPane);
      ro.observe(centre);
      ro.observe(logCol);
      if (refCol) ro.observe(refCol) // hah-pt-mdm-row;
    }
    window.addEventListener('resize', requestApply, { passive: true });
    window.addEventListener('hah:panes-resized', requestApply);

    window.HAHBoard.__patientLayoutCleanup = function () {
      window.removeEventListener('resize', requestApply);
      window.removeEventListener('hah:panes-resized', requestApply);
      if (layoutState.raf) window.cancelAnimationFrame(layoutState.raf);
      if (ro) ro.disconnect();
    };
  }

  function bindBoardMemberControls(pane) {
    const chips = pane.querySelectorAll('[data-board-member]');
    const otherWrap = pane.querySelector('#hahBoardMembersOtherWrap');
    const otherInput = pane.querySelector('#hahBoardMembersOther');

    function currentSelection() {
      return loadBoardSelectionToday();
    }

    function renderSelection(sel) {
      chips.forEach((chip) => {
        const label = chip.getAttribute('data-board-member');
        chip.classList.toggle('is-active', sel.members.includes(label));
      });
      if (otherWrap) otherWrap.style.display = sel.members.includes('Other') ? '' : 'none';
      if (otherInput && otherInput.value !== (sel.otherText || '')) otherInput.value = sel.otherText || '';
    }

    function updatePreview() {
      const state = store.getState();
      const vm = d.buildPatientWorkspaceModel(state);
      const type = (state.patient && state.patient.composerType) || 'board_round';
      if (vm) refreshPreview(vm, type);
    }

    chips.forEach((chip) => {
      chip.addEventListener('click', () => {
        const label = chip.getAttribute('data-board-member');
        const sel = currentSelection();
        const has = sel.members.includes(label);
        sel.members = has ? sel.members.filter((m) => m !== label) : sel.members.concat(label);
        if (!sel.members.includes('Other')) sel.otherText = '';
        saveBoardSelectionToday(sel);
        renderSelection(sel);
        updatePreview();
      });
    });

    if (otherInput) {
      otherInput.addEventListener('input', () => {
        const sel = currentSelection();
        sel.otherText = otherInput.value || '';
        if (sel.otherText && !sel.members.includes('Other')) sel.members = sel.members.concat('Other');
        saveBoardSelectionToday(sel);
        renderSelection(sel);
        updatePreview();
      });
    }

    renderSelection(currentSelection());
  }

  function bindCopyBtn(pane) {

        if (!text) return;

          copyBtn.textContent = 'Copied';

  function autoExpand(ta) {
    ta.style.height = 'auto';

    pane.querySelectorAll('.hah-cform-textarea.hah-autoexpand').forEach(autoExpand);
  }

  function restoreFields(fields, type) {
    // Pulled values from the last round (same computation as renderComposerForm)
    const vm = d.buildPatientWorkspaceModel(store.getState());
    const lastRound = vm ? getLastBoardRoundEntry(vm.patient) : null;
    const lastF     = lastRound && lastRound.fields;
    const pulledIssues = lastF
      ? (Array.isArray(lastF.issueLines) && lastF.issueLines.length
          ? lastF.issueLines.map((l, i) => (i + 1) + '. ' + l).join('\n')
          : String(lastF.issues || '').trim())
      : '';
    const pulledPlan = lastF ? String(lastF.plan || '').trim() : '';
    const pulledDischarge = vm && vm.patient && vm.patient.forDischargeSummary
      ? String(vm.patient.forDischargeSummary).trim() : '';

    function set(id, v, pulledValue) {
      const el = document.getElementById(id);
      if (!el || v === undefined || v === null) return;
      // Special case for the flatpickr-wrapped date input — its visible
      // altInput is separate from the underlying input, so setting
      // .value alone leaves the displayed date out of sync. The flatpickr
      // setDate / clear API updates both.
      if (el._flatpickr && typeof el._flatpickr.setDate === 'function') {
        if (String(v) === '') el._flatpickr.clear();
        else el._flatpickr.setDate(String(v), false); // false = don't fire onChange
        return;
      }
      // Honour empty values from the draft. The previous behaviour of
      // silently skipping empties left pulled content in place, which
      // broke both the Clear button (clearing the draft would re-render
      // with pulled values) and manual field deletion (an autosaved empty
      // draft was treated as "no draft" so the pull came back). Now an
      // empty draft field is authoritative — the user cleared it.
      el.value = String(v);
      if (pulledValue && String(v).trim() === String(pulledValue).trim()) {
        el.classList.add('is-pulled');
      } else {
        el.classList.remove('is-pulled');
      }
    }
    function setChip(id, v) {
      const el = document.getElementById(id);
      if (!el) return;
      const active = v === true || v === 'true';
      el.dataset.active = active ? 'true' : 'false';
      el.classList.toggle('is-active', active);
    }
    function setCheckbox(id, v) {
      const el = document.getElementById(id);
      if (!el) return;
      el.checked = v === true || v === 'true';
    }
    if (type === 'board_round') {
      set('cform-issues', fields.issues, pulledIssues); set('cform-progress', fields.progress);
      set('cform-bloods', fields.bloods); set('cform-plan', fields.plan, pulledPlan);
      set('cform-discharge-summary', fields.forDischargeSummary, pulledDischarge);
      set('cform-discharge-date', fields.dischargeDate);
      setChip('cform-ready-chip', fields.dischargeReady);
      setChip('cform-dnar', fields.dnar);
      setChip('cform-acp', fields.acp);
      setCheckbox('cform-include-prev-bloods', fields.includePrevBloods);
    }
    if (type === 'micro_mdm') { set('cform-question', fields.question); set('cform-recommendation', fields.recommendation); set('cform-followup', fields.followUp); }
    if (type === 'resp_mdm')  { set('cform-summary', fields.summary);   set('cform-recommendation', fields.recommendation); set('cform-action', fields.action); }
    if (type === 'other')     { set('cform-source', fields.source);     set('cform-note', fields.note); }
  }

  function refreshPreview(vm, type) {
    const previewEl = document.getElementById('hahNotePreviewText');
    if (!previewEl) return;
    const fields = collectComposerFields(type);
    const text   = buildNotePreviewText(vm, type, fields);
    previewEl.textContent = text;

  function resetComposerDOM() {
    document.querySelectorAll('.hah-cform-textarea').forEach((el) => {
      el.value = ''; el.classList.remove('is-pulled', 'is-locked'); el.removeAttribute('readonly'); el.style.height = '';
    });
    const readyChip = document.getElementById('cform-ready-chip');
    if (readyChip) { readyChip.dataset.active = 'false'; readyChip.classList.remove('is-active', 'is-locked'); readyChip.disabled = false; }
    const todayChip = document.getElementById('cform-chip-today');
    if (todayChip) { todayChip.dataset.active = 'false'; todayChip.classList.remove('is-active'); }
    const tomorrowChip = document.getElementById('cform-chip-tomorrow');
    if (tomorrowChip) { tomorrowChip.dataset.active = 'false'; tomorrowChip.classList.remove('is-active'); }
    const dateInput = document.getElementById('cform-discharge-date');
    if (dateInput) {
      // The date input is wrapped by flatpickr, which creates an "altInput"
      // displaying the formatted date (e.g. "Mon 4 May 2026") alongside the
      // hidden underlying input. Setting input.value = '' only clears the
      // underlying input; the altInput keeps its display value, the calendar
      // popup keeps the selected date, and refreshPreview reads the stale
      // value back via val('cform-discharge-date'). Use the flatpickr API
      // (parked on the element as ._flatpickr) to clear both.
      if (dateInput._flatpickr && typeof dateInput._flatpickr.clear === 'function') {
        dateInput._flatpickr.clear();
      } else {
        dateInput.value = '';
      }
      dateInput.disabled = false;
      dateInput.classList.remove('is-locked');
    }
  }

  function showToast(pane, text) {
    const existing = pane.querySelector('.hah-composer-toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'hah-composer-toast';

  function showAutosaveIndicator(pane) {
    const el = pane.querySelector('#hahAutosaveIndicator');
    if (!el) return;
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  function getPlanPresetByKey(key) {
    return PLAN_PRESETS.find((preset) => preset.key === key) || null;
  }

  function splitPlanParagraphs(text) {
    return String(text || '')
      .split(/\n+/)
      .map((line) => line.trim())
      .filter(Boolean);
  }

  function normalisePlanLine(text) {
    return String(text || '')
      .replace(/^\s*\d+[\.)]\s*/, '')
      .replace(/[.]\s*$/, '')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function nextPlanNumber(existingText) {
    const nums = String(existingText || '')
      .split('\n')
      .map((line) => {
        const m = line.match(/^\s*(\d+)[\.)]\s/);
        return m ? Number(m[1]) : null;
      })
      .filter((n) => Number.isFinite(n));
    return nums.length ? Math.max(...nums) + 1 : 1;
  }

  function insertPlanPresetIntoComposer(presetKey, patientId, composerType) {
    if (composerType !== 'board_round') return false;
    const preset = getPlanPresetByKey(presetKey);
    const planEl = document.getElementById('cform-plan');
    if (!preset || !planEl) return false;

    const existingText = planEl.value || '';
    const existingParagraphs = splitPlanParagraphs(existingText);
    const existingNormalised = existingParagraphs.map(normalisePlanLine);
    const presetNorm = normalisePlanLine(preset.text);
    const alreadyExists = existingNormalised.includes(presetNorm);

    if (alreadyExists) {
      planEl.focus();
      planEl.classList.remove('hah-preset-flash');
      void planEl.offsetWidth;
      planEl.classList.add('hah-preset-flash');
      return true;
    }

    const number = nextPlanNumber(existingText);
    const newLine = `${number}. ${preset.text}`;
    const spacer = existingText.trim() ? '\n' : '';
    planEl.value = `${existingText.trimEnd()}${spacer}${newLine}`.trim();
    planEl.classList.remove('is-pulled');
    autoExpand(planEl);
    planEl.focus();
    const pane = document.querySelector('#hahRightPane');
    if (pane) showAutosaveIndicator(pane);
    saveDraft(patientId, composerType, collectComposerFields(composerType));
    return true;
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const action = target.getAttribute('data-patient-action');
    const vm = d.buildPatientWorkspaceModel(state);

    if (action === 'jump') {
      const pid = target.getAttribute('data-patient-id');
      if (!pid) return false;
      // If a round is active, mark this patient as "In discussion"
      if (ops && typeof ops.getActiveRound === 'function' && ops.getActiveRound()) {
        ops.enterPatient(pid);
      }
      store.setState({ selectedPatientId: pid, patient: { sortMenuOpen: false } });
      router.goToPatient(pid);
      return true;
    }
    if (action === 'start-round' && ops) {
      // Clear all scoped composer states so each patient gets a fresh draft
      store.setState({ patient: { composerByPatient: {} } });
      ops.startRound();
      // If there's a selected patient, mark them in discussion
      if (vm && vm.patient && vm.patient.id) ops.enterPatient(vm.patient.id);
      return true;
    }
    if (action === 'toggle-status-menu') {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      const current = (state.patient && state.patient.statusMenuFor) || null;
      store.setState({ patient: { statusMenuFor: current === pid ? null : pid } });
      return true;
    }
    if (action === 'status-menu-swallow') {
      event.stopPropagation();
      return true;
    }
    if (action === 'status-set' && ops) {
      event.stopPropagation();
      const pid = target.getAttribute('data-patient-id');
      const newStatus = target.getAttribute('data-status');
      if (!pid || !newStatus) return false;
      if (newStatus === 'Discussed') {
        ops.markPatientDiscussed(pid);
      } else {
        ops.setBoardStatus(pid, newStatus);
      }
      persistPatientPatchToJson(pid, { operational: { boardStatus: newStatus } });
      store.setState({ patient: { statusMenuFor: null } });
      return true;
    }
    if (action === 'end-round' && ops) {
      const summary = ops.endRound({});
      store.setState({ patient: { _roundEnded: Date.now() } });
      return true;
    }
    if (action === 'dismiss-round-summary' && ops) {
      ops.clearLastRoundSummaryFlag();
      return true;
    }
    if (action === 'reset-round' && ops) {
      store.setState({ patient: { composerByPatient: {} } });
      ops.clearLastRoundSummaryFlag();
      ops.resetAllBoardStatuses();
      return true;
    }
    if (action === 'open-acp-modal') {
      store.setState({ patient: { acpModalOpen: true } }); return true;
    }
    if (action === 'close-acp-modal') {
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-modal-backdrop') {
      if (event.target.id === 'hahAcpModal') store.setState({ patient: { acpModalOpen: false } });
      return true;
    }
    if (action === 'acp-choice' && vm && ops) {
      const field = target.getAttribute('data-acp-field');
      const val   = target.getAttribute('data-acp-value');
      if (!field) return false;
      const ps  = ops.getPatientState(vm.patient.id);
      const acp = Object.assign({}, ps.acp || {});
      // Toggle: if already set to this value, clear it; otherwise set
      if (field === 'dnacprFormSeen') {
        acp.dnacprFormSeen = val === '1' && !acp.dnacprFormSeen ? true : false;
      } else {
        acp[field] = (acp[field] === val) ? '' : val;
      }
      ops.patchPatientState(vm.patient.id, { acp });
      persistPatientPatchToJson(vm.patient.id, acpPatchForJson(acp));
      return true;
    }
    if (action === 'acp-done' && vm && ops) {
      const tep   = (document.getElementById('hahAcpTep')   || {}).value || '';
      const notes = (document.getElementById('hahAcpNotes') || {}).value || '';
      const ps    = ops.getPatientState(vm.patient.id);
      const acp   = Object.assign({}, ps.acp || {}, { tep: tep.trim(), notes: notes.trim() });
      ops.patchPatientState(vm.patient.id, { acp });
      persistPatientPatchToJson(vm.patient.id, acpPatchForJson(acp));
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'acp-clear' && vm && ops) {
      ops.patchPatientState(vm.patient.id, { acp: {} });
      persistPatientPatchToJson(vm.patient.id, { alerts: { dnar: false, acp: false, escalation: '' }, clinical: { acp: {} } });
      store.setState({ patient: { acpModalOpen: false } }); return true;
    }
    if (action === 'toggle-blood-options') {
      const now = !!(state.patient && state.patient.bloodOptionsOpen);
      store.setState({ patient: { bloodOptionsOpen: !now } }); return true;
    }
    if (action === 'blood-options-close') {
      store.setState({ patient: { bloodOptionsOpen: false } }); return true;
    }
    if (action === 'blood-order-up' || action === 'blood-order-down') {
      const key = target.getAttribute('data-analyte');
      if (!key) return false;
      const order = (function(){ try { const s = JSON.parse(localStorage.getItem('hah_blood_analyte_order') || 'null'); return Array.isArray(s) && s.length ? s : ['CRP','WCC','Hb','Na','K','Cr']; } catch(_) { return ['CRP','WCC','Hb','Na','K','Cr']; } })();
      const idx = order.indexOf(key);
      if (idx < 0) return false;
      if (action === 'blood-order-up' && idx > 0) { const t = order[idx - 1]; order[idx - 1] = order[idx]; order[idx] = t; }
      if (action === 'blood-order-down' && idx < order.length - 1) { const t = order[idx + 1]; order[idx + 1] = order[idx]; order[idx] = t; }
      try { localStorage.setItem('hah_blood_analyte_order', JSON.stringify(order)); } catch (_) {}
      store.setState({ patient: { bloodOptionsOpen: true } }); return true;
    }
    if (action === 'toggle-sort-menu') {
      const now = !!(state.patient && state.patient.sortMenuOpen);
      store.setState({ patient: { sortMenuOpen: !now } });
      return true;
    }
    if (action === 'toggle-list-filter') {
      const filter = target.getAttribute('data-filter');
      if (!filter) return false;
      const raw = (state.patient && state.patient.listFilter) || null;
      const current = Array.isArray(raw) ? raw.slice() : raw ? [raw] : [];
      const idx = current.indexOf(filter);
      if (idx >= 0) current.splice(idx, 1); else current.push(filter);
      store.setState({ patient: { listFilter: current.length ? current : null } });
      return true;
    }
    if (action === 'clear-list-filter') {
      store.setState({ patient: { listFilter: null } });
      return true;
    }
    if (action === 'set-list-sort') {
      const mode = target.getAttribute('data-sort');
      if (!mode) return false;
      store.setState({ patient: { listSort: mode, sortMenuOpen: false } });
      try { localStorage.setItem('hah_list_sort', mode); } catch (_) {}
      return true;
    }
    if (action === 'back-board') { router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView); return true; }
    if (action === 'next' && vm) { const n = vm.contextRows[vm.selectedIndex + 1]; if (n) { store.setState({ selectedPatientId: n.id }); router.goToPatient(n.id); } return true; }
    if (action === 'prev' && vm) { const p = vm.contextRows[vm.selectedIndex - 1]; if (p) { store.setState({ selectedPatientId: p.id }); router.goToPatient(p.id); } return true; }
    if (action === 'set-discussed' && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Discussed'); persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Discussed' } }); return true; }
    if (action === 'set-actioned'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Actioned');  persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Actioned' } }); return true; }
    if (action === 'set-deferred'  && vm && ops) { ops.setBoardStatus(vm.patient.id, 'Deferred');  persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: 'Deferred' } }); return true; }

    if (action === 'add-task' && vm) {
      store.setState({
        selectedPatientId: vm.patient.id,
        selectedTaskId: null,
        tasks: {
          savedView: 'patient-focus',
          filters: { patientId: vm.patient.id },
          taskComposer: {
            open: true,
            mode: 'create',
            patientId: vm.patient.id,
            seedTitle: '',
            seedNote: '',
            seedCategory: 'Clinical review',
            seedDueAt: vm.patient.reviewDueAt || ''
          }
        }
      });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'open-tasks' && vm) {
      store.setState({ selectedPatientId: vm.patient.id, selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId: vm.patient.id } } });
      router.goToTasks('patient-focus');
      return true;
    }
    if (action === 'set-composer-type') {
      const ct = target.getAttribute('data-composer-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }
    if (action === 'open-composer') {
      const ct = target.getAttribute('data-encounter-type'); if (!ct) return false;
      patchScopedComposerState(vm ? vm.patient.id : (state.route && state.route.entityId), { locked: false, editId: null });
      store.setState({ patient: { composerType: ct } }); return true;
    }

    if (action === 'composer-done' && vm && ops) {
      const composerType  = (state.patient && state.patient.composerType) || 'board_round';
      const scopedComposer = getScopedComposerState(state, vm.patient.id);
      const isLocked      = !!scopedComposer.locked;
      const composerEditId = scopedComposer.editId || null;

      if (isLocked) {
        patchScopedComposerState(vm.patient.id, { locked: false });
        return true;
      }

      const fields = collectComposerFields(composerType);
      const hasContent = Object.values(fields).some((v) => v !== null && v !== false && String(v || '').trim().length > 0);
      if (hasContent) {
        let savedId = null;
        let savedEncounter = null;
        let verb = 'saved';
        if (composerEditId) {
          const updated = ops.updateEncounter(composerEditId, fields);
          savedEncounter = updated || null;
          savedId = updated ? composerEditId : null;
          verb = 'updated';
        }
        if (!savedId) {
          const created = ops.createEncounter({ patientId: vm.patient.id, type: composerType, fields });
          savedEncounter = created || null;
          savedId = created ? created.id : null;
        }
        // Serialize JSON writes so the discharge-readiness patch loads
        // patient data AFTER the timeline upsert has saved. Previously both
        // writes ran concurrently and used last-write-wins on the same
        // patient JSON file, so a discharge patch loaded before the timeline
        // upsert finished would clobber the new timeline entry on save.
        // Resulting symptom: board round entry created on desktop, JSON
        // version bumps twice, but timeline ends up empty — entry never
        // visible to the mobile companion or other clients.
        const timelinePromise = savedEncounter
          ? persistEncounterToJson(vm.patient, savedEncounter)
          : Promise.resolve();
        if (composerType === 'board_round') {
          const dr = deriveDischargeReadiness(fields.dischargeDate, fields.dischargeReady);
          // Compare the composer's discharge summary against the patient's
          // currently-persisted value. Only include in the patch if the
          // user actually changed it. fields.forDischargeSummary now comes
          // from collectComposerFields (same path as every other field —
          // the special-case direct-to-JSON autosave is gone).
          const dcCurrent = String((fields.forDischargeSummary != null ? fields.forDischargeSummary : '')).trim();
          const dcPersisted = String(vm.patient.forDischargeSummary || '').trim();
          const dcChanged = dcCurrent !== dcPersisted;
          const roundActive = (typeof ops.getActiveRound === 'function' && ops.getActiveRound());
          const operationalPatch = {};
          // Note: we no longer write dischargeReadiness here. As of v0.8.130
          // readiness is derived at read-time from the timeline; the entry we
          // just committed via persistEncounterToJson contains the discharge
          // fields, so the next read will compute the right value. Writing
          // operational.dischargeReadiness independently would re-introduce
          // the staleness class of bug.
          if (dcChanged) operationalPatch.forDischargeSummary = dcCurrent;
          // boardStatus belongs in this patch only when a round is active.
          // The JSON store used to set this autonomously on every board_round
          // entry, but that incorrectly marked patients Discussed even when
          // no round had started — confusing in the patient list. Now the
          // caller decides based on round state.
          if (roundActive) operationalPatch.boardStatus = 'Discussed';
          // Update local ops state with the readiness for any local-state
          // consumers (sortPatientRows, etc.). dr is null when no discharge
          // fields are set in this entry.
          if (dr) ops.setDischargeReadiness(vm.patient.id, dr);
          if (Object.keys(operationalPatch).length) {
            // Wait for timeline write to land before patching operational,
            // so the patch sees the timeline entry in its loaded snapshot.
            timelinePromise
              .catch(function () {})
              .then(function () {
                persistPatientPatchToJson(vm.patient.id, { operational: operationalPatch });
              });
          }
          // If round active, mark this patient as Discussed in local state
          // (the JSON patch above handles the persistent record) and try to
          // auto-advance to the next undiscussed patient.
          if (roundActive) {
            ops.markPatientDiscussed(vm.patient.id);
            // Auto-advance: find the next "Not discussed" patient in the current sort order
            try {
              const nextVm = d.buildPatientWorkspaceModel(store.getState());
              const sortMode = (store.getState().patient && store.getState().patient.listSort) || 'name';
              const sortedRows = sortPatientRows((nextVm && nextVm.contextRows) || [], sortMode);
              const nextPatient = sortedRows.find((row) => {
                if (String(row.id) === String(vm.patient.id)) return false;
                const s = row.boardStatus || 'Not discussed';
                return s !== 'Discussed' && s !== 'Actioned' && s !== 'Deferred';
              });
              if (nextPatient) {
                setTimeout(() => {
                  ops.enterPatient(nextPatient.id);
                  store.setState({ selectedPatientId: nextPatient.id });
                  router.goToPatient(nextPatient.id);
                }, 600);
              }
            } catch (_) {}
          }
        }
        saveDraft(vm.patient.id, composerType, fields);
        const typeLabel = ENCOUNTER_TYPES.find((t) => t.key === composerType);
        const pane = document.querySelector('#hahRightPane');
        if (pane) {
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          showToast(pane, (typeLabel ? typeLabel.label : 'Entry') + ' ' + verb + ' — ' + time);
        }
        patchScopedComposerState(vm.patient.id, { locked: true, editId: savedId });
        store.setState({ patient: { composerType } });
      } else {
        patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
        store.setState({ patient: { composerType } });
      }
      return true;
    }

    if (action === 'composer-new' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      clearDraft(vm.patient.id, composerType);
      resetComposerDOM();
      refreshPreview(vm, composerType);
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
      return true;
    }

    if (action === 'composer-clear' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';

      // Snapshot the current composer state for Undo. Now that discharge
      // summary is part of collectComposerFields, this single snapshot
      // captures everything the composer holds.
      composerClearSnapshot = {
        patientId: vm.patient.id,
        composerType: composerType,
        fields: collectComposerFields(composerType)
      };
      composerClearDeadline = Date.now() + COMPOSER_UNDO_WINDOW_MS;

      // Apply the clear: write an empty draft and reset the DOM. Both
      // synchronous, no JSON writes. The patient JSON only changes when
      // the user presses Done.
      const emptyFields = composerType === 'board_round' ? {
        issues: '', progress: '', bloods: '', plan: '',
        forDischargeSummary: '',
        dischargeDate: '', dischargeReady: false, dnar: false, acp: false
      } : composerType === 'micro_mdm' ? {
        question: '', recommendation: '', followUp: ''
      } : composerType === 'resp_mdm' ? {
        summary: '', recommendation: '', action: ''
      } : { source: '', note: '' };
      saveDraft(vm.patient.id, composerType, emptyFields);
      resetComposerDOM();
      refreshPreview(vm, composerType);

      // Force a re-render so the button shows Undo state. The render-time
      // logic reads composerClearSnapshot + composerClearDeadline.
      patchScopedComposerState(vm.patient.id, { locked: false, editId: null });

      // Schedule the snapshot to expire at the deadline.
      if (composerClearTimer) clearTimeout(composerClearTimer);
      composerClearTimer = setTimeout(function () {
        composerClearSnapshot = null;
        composerClearDeadline = 0;
        composerClearTimer = null;
        store.setState({ ui: { revision: Date.now() } });
      }, COMPOSER_UNDO_WINDOW_MS);

      return true;
    }

    if (action === 'composer-undo' && vm) {
      // Restore the snapshot. Synchronous, no JSON writes — the cleared
      // state had never reached JSON in the first place.
      if (!composerClearSnapshot) return true;
      const snap = composerClearSnapshot;
      const composerType = snap.composerType;
      saveDraft(snap.patientId, composerType, snap.fields);
      try { restoreFields(snap.fields, composerType); } catch (_) {}
      refreshPreview(vm, composerType);
      if (composerClearTimer) {
        clearTimeout(composerClearTimer);
        composerClearTimer = null;
      }
      composerClearSnapshot = null;
      composerClearDeadline = 0;
      store.setState({ ui: { revision: Date.now() } });
      return true;
    }

    if (action === 'insert-plan-preset' && vm) {
      const composerType = (state.patient && state.patient.composerType) || 'board_round';
      const presetKey = target.getAttribute('data-plan-preset-key');
      const inserted = insertPlanPresetIntoComposer(presetKey, vm.patient.id, composerType);
      if (inserted) refreshPreview(vm, composerType);
      return inserted;
    }

    if (action === 'toggle-mdm-earlier') {
      const mdmType = target.getAttribute('data-mdm-type');
      if (!mdmType) return false;
      const current = (state.patient && state.patient.mdmEarlier) || {};
      store.setState({ patient: { mdmEarlier: { ...current, [mdmType]: !current[mdmType] } } });
      return true;
    }

    if (action === 'toggle-log-older') {
      const current = !!(state.patient && state.patient.logShowOlder);
      store.setState({ patient: { logShowOlder: !current } });
      return true;
    }

    if (action === 'delete-encounter' && ops) {
      const encId = target.getAttribute('data-encounter-id');
      if (!encId) return false;
      if (window.confirm('Delete this entry?')) {
        // If the composer was locked on (or editing) the entry being
        // deleted, unlock it — otherwise the composer keeps showing
        // "New note" / "Edit" buttons referencing an entry that no
        // longer exists, and editId becomes a dangling reference.
        // Render-time fallback below also handles the cross-device case
        // (entry deleted on another desktop session or via mobile).
        if (vm && vm.patient) {
          const scopedComposer = getScopedComposerState(state, vm.patient.id);
          if (scopedComposer && String(scopedComposer.editId || '') === String(encId)) {
            patchScopedComposerState(vm.patient.id, { locked: false, editId: null });
          }
        }
        // Encounters can live in two places: local ops state (state.encounters
        // — desktop-created) and the patient's JSON timeline (mobile clinical
        // reviews, persisted board rounds). Try both — local first because
        // it's synchronous, then JSON for entries that live there. Without
        // the JSON delete, mobile entries would re-appear on next dataset
        // reload because they're never removed from the source of truth.
        ops.deleteEncounter(encId);
        // Mark JSON deletion as pending so the entry disappears from the
        // merged encounter list immediately, before the network round trip.
        // Without this, mobile-sourced entries linger visually for ~600ms
        // until removePatientTimelineEntry's loadPatient + savePatient +
        // cache patch completes. The optimistic hide makes delete feel
        // as instant as create.
        pendingDeleteIds.add(String(encId));
        // Force a re-render right now so the suppression takes effect
        // before the user gets bored.
        store.setState({ ui: { revision: Date.now() } });
        if (vm && vm.patient) {
          const api = window.HAHBoard.sharedJsonStore;
          if (api && typeof api.removePatientTimelineEntry === 'function') {
            api.removePatientTimelineEntry(vm.patient.id, encId)
              .then(function () {
                // JSON delete succeeded — the cache has been patched, the
                // entry is genuinely gone. Drop it from pending and let the
                // normal merge logic do its thing on the next render.
                pendingDeleteIds.delete(String(encId));
              })
              .catch(function (err) {
                // Network or store failure — revert the optimistic hide
                // so the user sees the entry come back. They'll know the
                // delete didn't take.
                pendingDeleteIds.delete(String(encId));
                store.setState({ ui: { revision: Date.now() } });
                console.warn('[H@H JSON store] Could not remove timeline entry', err);
                const pane = document.querySelector('#hahRightPane');
                if (pane && typeof showToast === 'function') {
                  const reason = describeJsonStoreError(err);
                  showToast(pane, 'Could not delete · ' + reason + ' · entry restored');
                }
              });
          } else {
            // No JSON store available (local-only patient). Nothing to
            // suppress beyond the local delete that already happened.
            pendingDeleteIds.delete(String(encId));
          }
        }
      }
      return true;
    }

    if (action === 'edit-encounter' && vm && ops) {
      const encId = target.getAttribute('data-encounter-id');
      if (!encId) return false;
      const encounters = getPatientEncounterRows(vm.patient) || [];
      const enc = encounters.find((e) => e.id === encId);
      if (!enc) return false;
      // Switch composer to this encounter's type and load it into the composer
      saveDraft(vm.patient.id, enc.type, enc.fields || {});
      // locked: false means the composer is immediately editable
      patchScopedComposerState(vm.patient.id, { locked: false, editId: encId });
      store.setState({ patient: { composerType: enc.type } });
      // Scroll right pane to composer
      const rightPane = document.getElementById('hahRightPane');
      if (rightPane) rightPane.scrollTo({ top: 0, behavior: 'smooth' });
      return true;
    }

    if (action === 'open-edit-patient-record' && vm) {
      if (!isJsonPatient(vm.patient)) return true;
      store.setState({ patient: { editPatientModalOpen: true } });
      return true;
    }
    if (action === 'close-edit-patient-record') {
      store.setState({ patient: { editPatientModalOpen: false } });
      return true;
    }
    if (action === 'patient-record-backdrop') {
      if (event.target.classList && event.target.classList.contains('hah-board-modal-overlay')) {
        store.setState({ patient: { editPatientModalOpen: false } });
      }
      return true;
    }
    if (action === 'commit-edit-patient-record' && vm) {
      if (!isJsonPatient(vm.patient)) return true;
      const fields = collectPatientRecordFields();
      if (!fields.name) { window.alert('Please enter a patient name.'); return true; }
      updatePatientCoreJson(vm.patient.id, fields)
        .then(function () {
          store.setState({ patient: { editPatientModalOpen: false } });
        })
        .catch(function (err) {
          console.error('[H@H JSON store] Could not update patient details', err);
          window.alert(err && err.message ? err.message : 'Could not update patient details.');
        });
      return true;
    }

    if (action === 'discharge-patient' && vm && ops) {
      const patient = vm.patient;
      const msg = (isJsonPatient(patient) ? 'Archive / discharge ' : 'Discharge ') + patient.name + ' from the service?\n\nThe patient will be removed from the active board. The patient record and timeline will be kept.';
      if (!window.confirm(msg)) return true;
      if (isJsonPatient(patient)) {
        archivePatientJson(patient.id)
          .then(function () {
            store.setState({ selectedPatientId: null, patient: { editPatientModalOpen: false } });
            router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView);
          })
          .catch(function (err) {
            console.error('[H@H JSON store] Could not archive patient', err);
            window.alert(err && err.message ? err.message : 'Could not archive patient.');
          });
        return true;
      }
      ops.dischargePatient(patient.id, {
        name: patient.name,
        pathway: patient.pathway,
        age: patient.age,
        location: patient.location
      });
      router.goToBoard(state.board.savedView === 'all-active' ? null : state.board.savedView);
      return true;
    }

    return false;
  }

  function handleChange(event, state) {
    const target = event.target.closest('[data-patient-action]');
    if (!target) return false;
    const vm = d.buildPatientWorkspaceModel(state);
    const action = target.getAttribute('data-patient-action');
    if (action === 'set-board-status' && vm && ops) { ops.setBoardStatus(vm.patient.id, target.value); persistPatientPatchToJson(vm.patient.id, { operational: { boardStatus: target.value } }); return true; }
    if (action === 'set-discharge'    && vm && ops) { ops.setDischargeReadiness(vm.patient.id, target.value); persistPatientPatchToJson(vm.patient.id, { operational: { dischargeReadiness: target.value } }); return true; }
    return false;
  }

  function renderEmpty() {
    return `<div class="hah-surface-placeholder"><section class="hah-card hah-surface-hero">
      <h1 class="hah-surface-title">Patient workspace</h1>
      <p class="hah-surface-subtitle">No patient selected from the current board context.</p>
    </section></div>`;
  }

  function priorityBadge(p) {
    return c.badge(p, p === 'Critical' ? 'danger' : p === 'High' ? 'warn' : p === 'Low' ? 'good' : 'neutral');
  }
  function splitLines(text) {
    return String(text || '').split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean);
  }
  function formatEntryDate(iso) {
    if (!iso) return '—';
    const dt = new Date(iso); if (isNaN(dt.getTime())) return String(iso);
    const now = new Date(); const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    const time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (dt.toDateString() === now.toDateString()) return 'Today ' + time;
    if (dt.toDateString() === yesterday.toDateString()) return 'Yesterday ' + time;
    return dt.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' + time;
  }
  function isObsWarn(label, value)   { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 96) || (label === 'NEWS2' && v >= 3); }
  function isObsDanger(label, value) { const v = parseFloat(String(value)); return (label === 'SpO₂' && v < 92) || (label === 'NEWS2' && v >= 7); }

  // Close sort menu on any click outside the menu or trigger button
  if (typeof document !== 'undefined') {
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.patient && s.patient.sortMenuOpen)) return;
      if (event.target.closest('[data-patient-action="toggle-sort-menu"]')) return;
      if (event.target.closest('.hah-sort-menu')) return;
      store.setState({ patient: { sortMenuOpen: false } });
    }, true);
    // Close status menu on any click outside it
    document.addEventListener('click', (event) => {
      const s = store.getState();
      if (!(s.patient && s.patient.statusMenuFor)) return;
      if (event.target.closest('[data-patient-action="toggle-status-menu"]')) return;
