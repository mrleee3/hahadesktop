  function initBloodTooltip() {
    if (window.HAHBoard.__bloodTooltipBound) return;
    window.HAHBoard.__bloodTooltipBound = true;

    const tip = document.createElement('div');
    tip.className = 'dbl-analyte-tip';
    tip.style.display = 'none';
    document.body.appendChild(tip);

    const dbMap = Object.fromEntries(BLOOD_DB.map((a) => [a.key, a]));

    document.addEventListener('mouseover', (e) => {
      const th = e.target.closest('.dbl-analyte[data-key]');
      if (!th) { tip.style.display = 'none'; return; }
      const key = th.getAttribute('data-key');
      const info = dbMap[key];
      if (!info) {
        // Unknown analyte — show basic tooltip
        tip.innerHTML = `<div class="dbl-tip-name">${key}</div><div class="dbl-tip-notes">No reference data available for this analyte.</div>`;
      } else {
        tip.innerHTML = `
          <div class="dbl-tip-name">${info.fullName || info.label}</div>
          <div class="dbl-tip-range"><span class="dbl-tip-label">Range</span> ${info.range} ${info.unit}</div>
          <div class="dbl-tip-notes">${info.notes}</div>
          <div class="dbl-tip-source">GSTT / Viapath</div>`;
      }
      tip.style.display = 'block';
      const rect = th.getBoundingClientRect();
      const tipW = 240;
      let left = rect.left - tipW - 10;
      if (left < 6) left = rect.right + 10; // flip right if no space
      const top = Math.max(6, Math.min(rect.top - 4, window.innerHeight - tip.offsetHeight - 6));
      tip.style.left  = left + 'px';
      tip.style.top   = top  + 'px';
    });

    document.addEventListener('mouseout', (e) => {
      if (!e.relatedTarget || !e.relatedTarget.closest('.dbl-analyte[data-key]')) {
        tip.style.display = 'none';
      }
    });
  }

  function initWsDragDrop() {
    const mainPane = document.getElementById('hahMainPane');
    if (!mainPane) return;

    let draggingKey = null;

    mainPane.querySelectorAll('.hah-ws-section').forEach((section) => {
      section.addEventListener('dragstart', (e) => {
        draggingKey = section.getAttribute('data-section');
        e.dataTransfer.effectAllowed = 'move';
        // Only allow drag from header bar (first child)
        requestAnimationFrame(() => section.classList.add('is-dragging'));
      });

      section.addEventListener('dragend', () => {
        section.classList.remove('is-dragging');
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        draggingKey = null;
      });

      section.addEventListener('dragover', (e) => {
        if (!draggingKey || draggingKey === section.getAttribute('data-section')) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        const rect = section.getBoundingClientRect();
        const mid  = rect.top + rect.height / 2;
        mainPane.querySelectorAll('.hah-ws-drop-above, .hah-ws-drop-below')
          .forEach((el) => el.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below'));
        section.classList.add(e.clientY < mid ? 'hah-ws-drop-above' : 'hah-ws-drop-below');
      });

      section.addEventListener('dragleave', (e) => {
        if (!section.contains(e.relatedTarget)) {
          section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        }
      });

      section.addEventListener('drop', (e) => {
        e.preventDefault();
        if (!draggingKey) return;
        const targetKey  = section.getAttribute('data-section');
        if (draggingKey === targetKey) return;
        const rect = section.getBoundingClientRect();
        const before = e.clientY < rect.top + rect.height / 2;

        const layout = getWsLayout();
        const flatLeft  = layout.left.slice();
        const flatRight = layout.right.slice();

        // Remove dragged key from wherever it is
        const fromLeft  = flatLeft.indexOf(draggingKey);
        const fromRight = flatRight.indexOf(draggingKey);
        if (fromLeft >= 0)  flatLeft.splice(fromLeft, 1);
        if (fromRight >= 0) flatRight.splice(fromRight, 1);

        // Find target position
        const inLeft  = flatLeft.indexOf(targetKey);
        const inRight = flatRight.indexOf(targetKey);

        if (inLeft >= 0) {
          flatLeft.splice(before ? inLeft : inLeft + 1, 0, draggingKey);
        } else {
          flatRight.splice(before ? inRight : inRight + 1, 0, draggingKey);
        }

        const newLayout = { left: flatLeft, right: flatRight };
        saveWsLayout(newLayout);
        section.classList.remove('hah-ws-drop-above', 'hah-ws-drop-below');
        // Trigger re-render by nudging state
        store.setState({ patient: { _wsLayoutBump: Date.now() } });
      });
    });

    // Allow dropping into empty column
    mainPane.querySelectorAll('.hah-ws-col').forEach((col) => {
      col.addEventListener('dragover', (e) => { e.preventDefault(); });
      col.addEventListener('drop', (e) => {
        if (e.target === col && draggingKey) {
          e.preventDefault();
          const colName = col.getAttribute('data-col');
          const layout  = getWsLayout();
          const flatLeft  = layout.left.slice();
          const flatRight = layout.right.slice();
          const fi = flatLeft.indexOf(draggingKey);
          const fr = flatRight.indexOf(draggingKey);
          if (fi >= 0) flatLeft.splice(fi, 1);
          if (fr >= 0) flatRight.splice(fr, 1);
          if (colName === 'left')  flatLeft.push(draggingKey);
          else                     flatRight.push(draggingKey);
          saveWsLayout({ left: flatLeft, right: flatRight });
          store.setState({ patient: { _wsLayoutBump: Date.now() } });
        }
      });
    });
  }

  window.HAHBoard.patientScreen = { renderLeftPane, renderMainPane, renderRightPane, handleClick, handleChange, afterRender, computeCaseloadMetrics, renderCaseloadCard, sortPatientRows };
})();

</script>

        <div class="hah-action-section-head">
          <div>
            <div class="hah-action-section-title">${c.escapeHtml(title)} <span>${rows.length}</span></div>
            <div class="hah-action-section-sub">${c.escapeHtml(subtitle)}</div>
          </div>
          ${options.manual ? primaryAction('Add team task', 'add-task') : ''}
        </div>
        <div class="hah-action-list">
          ${rows.map((task) => renderTaskItem(task, String(task.id) === String(selectedId), options)).join('')}
        </div>
      </section>
    `;
  }

  function renderTaskItem(task, selected, options) {
    const opts = options || {};
    const manual = isManualTask(task);
    const blocker = task.blocker ? `<div class="hah-action-blocker">Blocker: ${c.escapeHtml(task.blocker)}</div>` : '';
    const board = task.boardLink ? `<span class="hah-action-muted">${c.escapeHtml(task.boardLink)}</span>` : '';
    return `
      <button type="button" class="hah-action-item${selected ? ' is-selected' : ''}${manual ? ' is-manual' : ' is-suggested'}${opts.suggested ? ' is-soft' : ''}" data-task-action="select-task" data-task-id="${c.escapeHtml(task.id)}">
        <div class="hah-action-main">
          <div class="hah-action-title-row">
            <span class="hah-action-title">${c.escapeHtml(task.title)}</span>
          </div>
          <div class="hah-action-sub">${c.escapeHtml(task.patient.name)} · ${c.escapeHtml([task.patient.pathway, task.patient.referralSource ? 'from ' + task.patient.referralSource : ''].filter(Boolean).join(' · '))}</div>
          ${task.note || task.sourceLine ? `<div class="hah-action-note">${c.escapeHtml(task.note || task.sourceLine)}</div>` : ''}
          ${blocker}
        </div>
        <div class="hah-action-meta">
          ${manual ? sourceBadge(task) : ''}
          ${statusBadge(task.status)}
          ${dueBadge(task.dueState)}
          ${priorityBadge(task.priority)}
          ${c.badge(task.owner || 'Unassigned', 'neutral')}
          ${board}
        </div>
      </button>
    `;
  }

  function renderRelatedTasks(tasks) {
    if (!tasks.length) return '<div class="hah-task-note">No related action in the current filtered view.</div>';
    return `<div class="hah-task-mini-list">${tasks.map((task) => `
      <div class="hah-task-mini-item">
        <div class="hah-task-mini-title">${c.escapeHtml(task.title)}</div>
        <div class="hah-task-mini-sub">${c.escapeHtml([isManualTask(task) ? 'Team task' : 'Suggested', task.category, task.dueState, task.owner].filter(Boolean).join(' · '))}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderPatientFlags(patient) {
    const labels = [];
    const add = (label, tone) => {
      if (!label || labels.some((row) => row.label === label)) return;
      labels.push({ label, tone });
    };
    if (patient.dnar) add('DNAR', 'danger');
    if (patient.acp) add('ACP', 'neutral');
    if (Array.isArray(patient.treatmentFlags)) {
      patient.treatmentFlags.slice(0, 3).forEach((flag) => add(flag, 'neutral'));
    }
    return labels.map((row) => c.badge(row.label, row.tone)).join('');
  }

  function buildWhyItMatters(task) {
    const parts = [];
    if (isManualTask(task)) parts.push('This is a team-owned task and should be managed through the task controls.');
    else parts.push('This is a suggested action derived from patient state, plan text or boardround context.');
    if (task.dueState === 'Overdue') parts.push('It is overdue and likely needs chasing now.');
    else if (task.dueState === 'Due today') parts.push('It is due today and should be resolved within the current service day.');
    if (task.blocker) parts.push(`Current blocker: ${task.blocker}.`);
    if (task.patient.dischargeReadiness === 'Possible today' || task.patient.dischargeReadiness === 'Ready') {
      parts.push('It may influence discharge flow for the patient.');
    }
    return parts.join(' ') || 'Operational action linked to the selected patient and current board state.';
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-task-action]');
    if (!target) return false;
    const action = target.getAttribute('data-task-action');
    const vm = d.buildTasksViewModel(state);

    if (action === 'set-view') {
      const viewKey = target.getAttribute('data-view-key') || 'all-open';
      store.setState({
        selectedTaskId: null,
        tasks: {
          savedView: viewKey,
          taskComposer: { open: false },
          filters: viewKey === 'patient-focus' ? state.tasks.filters || {} : { patientId: null }
        }
      });
      if (router && typeof router.goToTasks === 'function') router.goToTasks(viewKey);
      return true;
    }

    if (action === 'set-sort') {
      const sortKey = target.getAttribute('data-sort-key') || 'due';
      store.setState({ tasks: { sort: sortKey } });
      return true;
    }

    if (action === 'select-task') {
      const taskId = target.getAttribute('data-task-id');
      if (!taskId) return false;
      store.setState({ selectedTaskId: taskId, tasks: { taskComposer: { open: false } } });
      return true;
    }

    if (action === 'clear-patient-filter') {
      store.setState({ selectedTaskId: null, tasks: { savedView: 'all-open', filters: { patientId: null } } });
      return true;
    }

    if ((action === 'open-patient' || action === 'focus-patient') && vm.selectedTask) {
      const patientId = vm.selectedTask.patientId;
      if (action === 'focus-patient') {
        store.setState({ selectedTaskId: null, tasks: { savedView: 'patient-focus', filters: { patientId } } });
        return true;
      }
      store.setState({ selectedPatientId: patientId });
      router.goToPatient(patientId);
      return true;
    }

    if (action === 'add-task') {
      const patient = (vm.selectedTask && vm.selectedTask.patient) || vm.selectedPatient || getDefaultPatient(vm, state, null);
      store.setState({ tasks: { taskComposer: { open: true, mode: 'create', patientId: patient ? patient.id : '', seedTitle: '', seedNote: '', seedCategory: 'Clinical review', seedDueAt: patient ? patient.reviewDueAt || '' : '' } } });
      return true;
    }

    if (action === 'accept-suggestion' && vm.selectedTask && ops) {
      const task = vm.selectedTask;
      const created = ops.createTask({
        patientId: task.patientId,
        title: task.title,
        note: task.note || task.sourceLine || '',
        category: task.category,
        owner: task.owner || 'Unassigned',
        dueAt: task.dueAt || '',
        priority: task.priority || 'Medium',
        status: 'Open',
        blocker: task.blocker || '',
        createdFrom: 'Accepted suggestion',
        boardLink: task.boardLink || ''
      });
      ops.updateTask(task.id, { status: 'Cancelled' });
      if (created) store.setState({ selectedTaskId: created.id, tasks: { savedView: 'patient-focus', filters: { patientId: task.patientId } } });
      return true;
    }

    if (action === 'dismiss-suggestion' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Cancelled' });
      store.setState({ selectedTaskId: null });
      return true;
    }

    if (action === 'add-follow-on' && vm.selectedTask) {
      const task = vm.selectedTask;
      store.setState({ tasks: { taskComposer: { open: true, mode: 'create', patientId: task.patientId, seedTitle: '', seedNote: `Follow-on from: ${task.title}`, seedCategory: task.category, seedDueAt: '' } } });
      return true;
    }

    if (action === 'edit-task' && vm.selectedTask) {
      store.setState({ tasks: { taskComposer: { open: true, mode: 'edit', taskId: vm.selectedTask.id, patientId: vm.selectedTask.patientId } } });
      return true;
    }

    if (action === 'close-task-composer') {
      store.setState({ tasks: { taskComposer: { open: false } } });
      return true;
    }

    if (action === 'composer-due-preset') {
      const preset = target.getAttribute('data-due-preset') || '';
      const el = document.getElementById('hahTaskDue');
      if (el) el.value = preset === 'none' ? '' : toDateTimeLocal(duePresetToIso(preset));
      return true;
    }

    if (action === 'save-task-composer' && ops) {
      const composer = getComposerState(state);
      const input = collectTaskComposerInput();
      if (!input.patientId || !input.title) {
        window.alert('Add a patient and task title first.');
        return true;
      }

      if (composer.mode === 'edit' && composer.taskId) {
        ops.updateTask(composer.taskId, input);
        store.setState({ selectedTaskId: composer.taskId, tasks: { taskComposer: { open: false } } });
        return true;
      }

      const created = ops.createTask(Object.assign({}, input, { createdFrom: 'Tasks' }));
      if (created) {
        store.setState({ selectedTaskId: created.id, tasks: { savedView: 'patient-focus', filters: { patientId: created.patientId }, taskComposer: { open: false } } });
      }
      return true;
    }

    if (action === 'task-status-set' && vm.selectedTask && ops) {
      const status = target.getAttribute('data-status') || 'Open';
      ops.updateTask(vm.selectedTask.id, { status });
      if (status === 'Done' || status === 'Cancelled') store.setState({ selectedTaskId: null });
      return true;
    }

    if (action === 'task-owner-set' && vm.selectedTask && ops) {
      const owner = target.getAttribute('data-owner') || 'Unassigned';
      ops.updateTask(vm.selectedTask.id, { owner });
      return true;
    }

    if (action === 'task-due-preset' && vm.selectedTask && ops) {
      const preset = target.getAttribute('data-due-preset') || '';
      ops.updateTask(vm.selectedTask.id, { dueAt: duePresetToIso(preset), status: preset === 'none' ? vm.selectedTask.status : 'Open' });
      return true;
    }

    if (action === 'cancel-task' && vm.selectedTask && ops) {
      ops.updateTask(vm.selectedTask.id, { status: 'Cancelled' });
      store.setState({ selectedTaskId: null });
      return true;
    }

    return false;
  }

  function getComposerState(state) {
    return (state.tasks && state.tasks.taskComposer) || {};
  }

  function collectTaskComposerInput() {
    return {
      patientId: getElValue('hahTaskPatient'),
      title: getElValue('hahTaskTitle'),
      note: getElValue('hahTaskNote'),
      category: getElValue('hahTaskCategory') || 'Clinical review',
      owner: getElValue('hahTaskOwner') || 'Unassigned',
      priority: getElValue('hahTaskPriority') || 'Medium',
      status: getElValue('hahTaskStatus') || 'Open',
      dueAt: fromDateTimeLocal(getElValue('hahTaskDue')),
      blocker: getElValue('hahTaskBlocker'),
      boardLink: ''
    };
  }

  function getElValue(id) {
    const el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }

  function taskPill(label, action, attrs, active) {
    return `<button type="button" class="hah-inline-pill${active ? ' is-active' : ''}" data-task-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  function primaryAction(label, action, attrs) {
    return `<button type="button" class="hah-task-primary-btn" data-task-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  function statusControl(task, status) {
    return taskPill(status, 'task-status-set', `data-status="${c.escapeHtml(status)}"`, String(task.status || 'Open') === status);
  }

  function ownerControls(task) {
    const owners = unique([task.owner || 'Unassigned'].concat(TASK_OWNERS)).slice(0, 10);
    return owners.map((owner) => taskPill(owner, 'task-owner-set', `data-owner="${c.escapeHtml(owner)}"`, String(task.owner || 'Unassigned') === owner));
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority || 'Medium', tone);
  }

  function statusBadge(status) {
    const lower = String(status || '').toLowerCase();
    let tone = 'neutral';
    if (lower.includes('waiting') || lower.includes('deferred')) tone = 'warn';
    else if (lower.includes('done')) tone = 'good';
    else if (lower.includes('cancel')) tone = 'muted';
    return c.badge(status || 'Open', tone);
  }

  function dueBadge(dueState) {
    let tone = 'neutral';
    if (dueState === 'Overdue') tone = 'danger';
    else if (dueState === 'Due today') tone = 'warn';
    else if (dueState === 'Future' || dueState === 'No due date') tone = 'good';
    return c.badge(dueState || 'No due date', tone);
  }

  function sourceBadge(task) {
    return c.badge(isManualTask(task) ? 'Team task' : 'Suggested', isManualTask(task) ? 'neutral' : 'good');
  }

  function isManualTask(task) {
    const id = String(task && task.id || '');
    const from = String(task && task.createdFrom || '').toLowerCase();
    return id.startsWith('manual:') || /manual|tasks|patient|accepted|board/.test(from);
  }

  function manualCount(rows) {
    return (rows || []).filter(isManualTask).length;
  }

  function derivedCount(rows) {
    return (rows || []).length - manualCount(rows);
  }

  function formatDue(value, dueState) {
    if (!value) return dueState || 'No due date';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value);
    return dt.toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
  }

  function optionList(options, selected) {
    return options.map((opt) => `<option value="${c.escapeHtml(opt)}" ${String(opt) === String(selected) ? 'selected' : ''}>${c.escapeHtml(opt)}</option>`).join('');
  }

  function toDateTimeLocal(value) {
    if (!value) return '';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return '';
    const pad = (v) => String(v).padStart(2, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  }

  function fromDateTimeLocal(value) {
    if (!value) return '';
    const dt = new Date(value);
    if (Number.isNaN(dt.getTime())) return String(value || '');
    return dt.toISOString();
  }

  function duePresetToIso(preset) {
    if (preset === 'none') return '';
    const dt = new Date();
    if (preset === 'tomorrow-am') dt.setDate(dt.getDate() + 1);
    if (preset === 'today-pm') dt.setHours(14, 0, 0, 0);
    else dt.setHours(10, 0, 0, 0);
    return dt.toISOString();
  }

  function unique(values) {
    return Array.from(new Set((values || []).map((x) => String(x || '').trim()).filter(Boolean)));
  }

  function findTaskById(vm, id) {
    return (vm.rows || []).find((task) => String(task.id) === String(id)) || null;
  }

  function getDefaultPatient(vm, state, baseTask) {
    if (baseTask && baseTask.patient) return baseTask.patient;
    if (baseTask && baseTask.patientId) return vm.boardRows.find((row) => String(row.id) === String(baseTask.patientId));
    const focusId = state.tasks && state.tasks.filters && state.tasks.filters.patientId;
    if (focusId) return vm.boardRows.find((row) => String(row.id) === String(focusId));
    if (vm.selectedTask && vm.selectedTask.patient) return vm.selectedTask.patient;
    return vm.boardRows[0] || null;
  }

  function getFollowOnSeed(vm, composer) {
    if (composer && (composer.seedTitle || composer.seedNote)) return {
      title: composer.seedTitle || '',
      note: composer.seedNote || '',
      category: composer.seedCategory || 'Clinical review',
      patientId: composer.patientId || '',
      patient: vm.boardRows.find((row) => String(row.id) === String(composer.patientId))
    };
    return null;
  }

  function viewLabel(key) {
    switch (key) {
      case 'due-today': return 'Due today';
      case 'overdue': return 'Overdue';
      case 'waiting-external': return 'Waiting external';
      case 'discharge-blockers': return 'Discharge blockers';
      case 'review-due': return 'Review tasks';
      case 'boardround-actions': return 'Boardround actions';
      case 'high-priority': return 'High priority';
      case 'unassigned': return 'Unassigned';
      case 'patient-focus': return 'Patient focus';
      case 'completed': return 'Completed';
      default: return 'All open';
    }
  }

  window.HAHBoard.tasksScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>
  <script>
/* inlined: js/28-desktop-insights.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};

  const store = window.HAHBoard.store;
  const router = window.HAHBoard.router;
  const c = window.HAHBoard.components;
  const d = window.HAHBoard.derived;

  function renderLeftPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const presets = [
      ['service-overview', 'Service overview', 'Whole-service pressure, flow, and workload'],
      ['board-prep', 'Board prep', 'High-priority, overdue, and discharge focus'],
      ['clinical-risk', 'Clinical risk', 'Trajectory, oxygen, and unresolved review burden'],
      ['capacity-flow', 'Capacity and flow', 'Admissions, discharges, and blockers']
    ].map(([key, title, sub]) => renderPresetCard(key, title, sub, vm.preset === key));

    const ranges = [
      ['today', 'Today'], ['48h', '48h'], ['7d', 'Last 7 days'], ['30d', 'Last 30 days']
    ].map(([key, label]) => insightPill(label, 'set-range', `data-range-key="${c.escapeHtml(key)}"`, vm.range === key)).join('');

    return c.stack([
      c.card('Insight presets', `
        <div class="hah-pane-section-label">Choose a lens</div>
        <div class="hah-task-pane-intro">Pick the service lens you want, then drill into the specific cohort or pressure point on the right.</div>
        <div class="hah-insight-preset-list">${presets.join('')}</div>
      `),
      c.card('Time range', `
        <div class="hah-pane-section-label">Set the frame</div>
        <div class="hah-insight-chip-wrap">${ranges}</div>
        <div class="hah-task-note" style="margin-top:12px;">Current build uses live service state intelligently, with lighter historical inference where a true trend store is not yet present.</div>
      `),
      c.card('Current lens', `
        <div class="hah-pane-section-label">At a glance</div>
        ${c.keyValueGrid([
          { label: 'Preset', value: vm.presetLabel },
          { label: 'Range', value: vm.rangeLabel },
          { label: 'Source', value: vm.sourceLabel },
          { label: 'Caseload', value: String(vm.boardRows.length) }
        ])}
      `)
    ]);
  }

  function renderMainPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const metrics = vm.metrics.map((metric) => renderMetricCard(vm, metric)).join('');
    const mainPanels = vm.mainPanels.map(renderInsightPanel).join('');
    const cohortPanels = vm.cohortPanels.map(renderInsightPanel).join('');
    const opsPanels = vm.operationalPanels.map(renderInsightPanel).join('');

    return `
      <div class="hah-insights-surface">
        <section class="hah-insight-metrics">${metrics}</section>

        <section class="hah-card">
          <div class="hah-card-inner">
            <div class="hah-insight-toolbar">
              <div>
                <div class="hah-insight-title">Insights</div>
                <div class="hah-task-sub">${c.escapeHtml(vm.headerSubtitle)}</div>
              </div>
              <div class="hah-insight-toolbar-group">
                ${insightPill('Overview', 'set-preset', 'data-preset-key="service-overview"', vm.preset === 'service-overview')}
                ${insightPill('Board prep', 'set-preset', 'data-preset-key="board-prep"', vm.preset === 'board-prep')}
                ${insightPill('Clinical risk', 'set-preset', 'data-preset-key="clinical-risk"', vm.preset === 'clinical-risk')}
                ${insightPill('Capacity', 'set-preset', 'data-preset-key="capacity-flow"', vm.preset === 'capacity-flow')}
              </div>
            </div>
          </div>
        </section>

        ${renderSectionHead('Service overview', 'Top-line pressure, flow, acuity, and review burden for the current service state.', vm.sourceLabel)}
        <div class="hah-soft-divider"></div>
        <section class="hah-insight-grid">${mainPanels}</section>

        ${renderSectionHead('Cohort watch', 'Focused groups worth reviewing next, especially before or during boardround.', `${vm.selectedDetail ? vm.selectedDetail.label : vm.presetLabel}`)}
        <div class="hah-soft-divider"></div>
        <section class="hah-insight-row-3">${cohortPanels}</section>

        ${renderSectionHead('Operational balance', 'Who carries the work and which pathway mix is shaping today’s service.', vm.rangeLabel)}
        <section class="hah-insight-row-2">${opsPanels}</section>

        ${renderSectionHead('Board rounds', 'Timing and completion metrics from recent rounds.', '')}
        <div class="hah-soft-divider"></div>
        <section class="hah-card">
          <div class="hah-card-inner">
            ${renderRoundHistoryTable()}
          </div>
        </section>
      </div>
    `;
  }

  function renderRoundHistoryTable() {
    const ops = window.HAHBoard.ops;
    const history = ops && typeof ops.getState === 'function' && ops.getState().roundHistory
      ? ops.getState().roundHistory
      : [];
    if (!history.length) {
      return '<div class="hah-round-history-empty">No board rounds recorded yet. Start a round from a patient page to begin tracking.</div>';
    }
    // Aggregate stats
    const totalRounds = history.length;
    const totalMin = Math.round(history.reduce((a, r) => a + (r.durationMs || 0), 0) / 60000);
    const totalDiscussed = history.reduce((a, r) => a + (r.discussedCount || 0), 0);
    const avgRoundMin = totalRounds ? (totalMin / totalRounds).toFixed(1) : '0';
    const avgPerPtMin = totalDiscussed ? (totalMin / totalDiscussed).toFixed(1) : '0';

    const stats = `
      <div class="hah-round-history-stats">
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${totalRounds}</div><div class="hah-round-history-label">Rounds</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${avgRoundMin}<span class="hah-round-history-unit">min</span></div><div class="hah-round-history-label">Avg round</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${avgPerPtMin}<span class="hah-round-history-unit">min</span></div><div class="hah-round-history-label">Avg / patient</div></div>
        <div class="hah-round-history-stat"><div class="hah-round-history-val">${totalDiscussed}</div><div class="hah-round-history-label">Total discussed</div></div>
      </div>`;

    const rows = history.slice(0, 30).map((r) => {
      const start = new Date(r.startedAt);
      const dateLabel = start.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
      const timeLabel = start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const durationMin = r.durationMs ? Math.round(r.durationMs / 60000) : 0;
      const avgPt = r.avgMsPerPatient ? (r.avgMsPerPatient / 60000).toFixed(1) : '—';
      const discussedPct = r.patientCount ? Math.round((r.discussedCount / r.patientCount) * 100) : 0;
      return `<tr class="hah-round-history-row">
        <td class="hah-round-history-cell">
          <div class="hah-round-history-date">${c.escapeHtml(dateLabel)}</div>
          <div class="hah-round-history-time">${c.escapeHtml(timeLabel)}</div>
        </td>
        <td class="hah-round-history-cell hah-round-history-duration">${durationMin} min</td>
        <td class="hah-round-history-cell">${r.discussedCount} / ${r.patientCount || 0}</td>
        <td class="hah-round-history-cell hah-round-history-muted">${r.deferredCount || 0}</td>
        <td class="hah-round-history-cell">${avgPt} min</td>
        <td class="hah-round-history-cell">
          <div class="hah-round-history-bar-track">
            <div class="hah-round-history-bar-fill" style="width:${discussedPct}%"></div>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `
      ${stats}
      <div class="hah-round-history-table-wrap">
        <table class="hah-round-history-table">
          <thead>
            <tr>
              <th class="hah-round-history-th">When</th>
              <th class="hah-round-history-th">Duration</th>
              <th class="hah-round-history-th">Discussed</th>
              <th class="hah-round-history-th">Deferred</th>
              <th class="hah-round-history-th">Avg / pt</th>
              <th class="hah-round-history-th">Completion</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function renderRightPane(state) {
    const vm = d.buildInsightsViewModel(state);
    const detail = vm.selectedDetail;
    if (!detail) {
      return c.stack([
        c.card('Selected cohort drill-in', c.emptyState('No cohort selected', 'Pick a metric or panel to see the linked patients and next actions.'))
      ]);
    }

    return c.stack([
      c.card(detail.label, `
        <div class="hah-task-briefing">${c.escapeHtml(detail.summary)}</div>
        <div class="hah-insight-right-kv">
          ${c.keyValueGrid([
            { label: 'Linked patients', value: String(detail.count) },
            { label: 'Lens', value: detail.subtitle || vm.presetLabel },
            { label: 'Board jump', value: detail.boardPreset || 'all-active' },
            { label: 'Tasks jump', value: detail.tasksPreset || 'all-open' }
          ])}
        </div>
        <div class="hah-insight-detail-block">
          <div class="hah-insight-detail-label">At a glance</div>
          <div class="hah-insight-chip-wrap">
            ${c.badge(`${detail.count} patients`, detail.count ? 'neutral' : 'good')}
            ${detail.tag ? c.badge(detail.tag, 'neutral') : ''}
            ${c.badge(vm.rangeLabel, 'neutral')}
          </div>
        </div>
      `, { subtitle: detail.subtitle || vm.presetLabel }),
      c.card('What it means', `
        <div class="hah-task-note">${c.escapeHtml(detail.explanation)}</div>
      `),
      c.card('Patient preview', renderPatientPreview(detail.patients), {
        subtitle: detail.patients.length ? `${detail.patients.length} linked patient${detail.patients.length === 1 ? '' : 's'}` : 'No linked patients'
      }),
      c.card('Suggested actions', `
        <div class="hah-insight-actions">
          ${insightPill('Open on Board', 'open-board-for-detail')}
          ${insightPill('Open in Tasks', 'open-tasks-for-detail')}
          ${detail.patients[0] ? insightPill('Open first patient', 'open-detail-patient', `data-patient-id="${c.escapeHtml(detail.patients[0].id)}"`) : ''}
        </div>
      `)
    ]);
  }

  function renderMetricCard(vm, metric) {
    return `
      <button type="button" class="hah-insight-metric${vm.selectedKey === metric.key ? ' is-active' : ''}" data-insight-action="select-detail" data-detail-key="${c.escapeHtml(metric.key)}">
        <div class="hah-insight-kicker">${c.escapeHtml(metric.label)}</div>
        <div class="hah-insight-value">${c.escapeHtml(metric.value)}</div>
        <div class="hah-insight-sub">${c.escapeHtml(metric.subtext || '')}</div>
      </button>
    `;
  }

  function renderPresetCard(key, title, subtext, active) {
    return `
      <button type="button" class="hah-insight-preset-card${active ? ' is-active' : ''}" data-insight-action="set-preset" data-preset-key="${c.escapeHtml(key)}">
        <div class="hah-insight-preset-title">${c.escapeHtml(title)}</div>
        <div class="hah-insight-preset-sub">${c.escapeHtml(subtext)}</div>
      </button>
    `;
  }

  function renderInsightPanel(panel) {
    const body = panel.type === 'stats'
      ? renderStatStrip(panel.items)
      : panel.type === 'bars'
        ? renderBars(panel.items)
        : renderMiniList(panel.items);

    return `
      <button type="button" class="hah-insight-card${panel.active ? ' is-active' : ''}" data-insight-action="select-detail" data-detail-key="${c.escapeHtml(panel.key)}">
        <div class="hah-insight-panel-head">
          <div>
            <div class="hah-insight-panel-title">${c.escapeHtml(panel.title)}</div>
            <div class="hah-insight-panel-sub">${c.escapeHtml(panel.subtitle || '')}</div>
          </div>
          ${panel.badge ? c.badge(panel.badge, 'neutral') : ''}
        </div>
        ${body}
        <div class="hah-insight-panel-foot">Click to drill into this cohort</div>
      </button>
    `;
  }

  function renderStatStrip(items) {
    return `<div class="hah-insight-stat-strip">${items.map((item) => `
      <div class="hah-insight-stat">
        <div class="hah-insight-stat-label">${c.escapeHtml(item.label)}</div>
        <div class="hah-insight-stat-value">${c.escapeHtml(item.value)}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderBars(items) {
    const max = Math.max(1, ...items.map((item) => Number(item.value) || 0));
    return `<div class="hah-insight-bars">${items.map((item) => `
      <div class="hah-insight-bar">
        <div class="hah-insight-bar-main">
          <div class="hah-insight-bar-label">${c.escapeHtml(item.label)}</div>
          <div class="hah-insight-bar-track"><div class="hah-insight-bar-fill" style="width:${Math.max(8, Math.round(((Number(item.value) || 0) / max) * 100))}%"></div></div>
          <div class="hah-insight-bar-sub">${c.escapeHtml(item.subtext || '')}</div>
        </div>
        <div class="hah-insight-bar-value">${c.escapeHtml(item.value)}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderMiniList(items) {
    return `<div class="hah-insight-mini-list">${items.map((item) => `
      <div class="hah-insight-mini-item">
        <div class="hah-insight-mini-title">${c.escapeHtml(item.title)}</div>
        <div class="hah-insight-mini-sub">${c.escapeHtml(item.subtext || '')}</div>
      </div>
    `).join('')}</div>`;
  }

  function renderPatientPreview(patients) {
    if (!patients.length) return '<div class="hah-task-note">No patients linked to this insight.</div>';
    return `<div class="hah-insight-preview-list">${patients.map((patient, index) => `
      <button type="button" class="hah-insight-preview-item${index === 0 ? ' is-leading' : ''}" data-insight-action="open-detail-patient" data-patient-id="${c.escapeHtml(patient.id)}">
        <div class="hah-insight-preview-head">
          <div class="hah-insight-preview-meta">
            <div class="hah-insight-preview-title">${c.escapeHtml(patient.name)}</div>
            <div class="hah-insight-preview-sub">${c.escapeHtml([patient.currentStatus, patient.location, patient.bloodTrendSummary].filter(Boolean).join(' · '))}</div>
          </div>
          ${priorityBadge(patient.priority)}
        </div>
        <div class="hah-insight-preview-chips">
          ${c.badge(patient.currentStatus, 'neutral')}
          ${patient.dischargeReadiness ? c.badge(patient.dischargeReadiness, 'neutral') : ''}
          ${patient.oxygenLpm > 0 ? c.badge(`O2 ${patient.oxygenLpm}L`, 'neutral') : ''}
          ${patient.iv ? c.badge('IV', 'neutral') : ''}
          ${patient.dnar ? c.badge('DNAR', 'danger') : ''}
        </div>
      </button>
    `).join('')}</div>`;
  }

  function renderSectionHead(title, subtitle, note) {
    return `
      <div class="hah-insight-section-head">
        <div>
          <div class="hah-insight-section-title">${c.escapeHtml(title)}</div>
          <div class="hah-insight-section-sub">${c.escapeHtml(subtitle)}</div>
        </div>
        <div class="hah-insight-surface-note">${c.escapeHtml(note)}</div>
      </div>
    `;
  }

  function priorityBadge(priority) {
    let tone = 'neutral';
    if (priority === 'Critical') tone = 'danger';
    else if (priority === 'High') tone = 'warn';
    else if (priority === 'Low') tone = 'good';
    return c.badge(priority || 'Priority', tone);
  }

  function handleClick(event, state) {
    const target = event.target.closest('[data-insight-action]');
    if (!target) return false;
    const action = target.getAttribute('data-insight-action');
    const vm = d.buildInsightsViewModel(state);

    if (action === 'set-preset') {
      const presetKey = target.getAttribute('data-preset-key') || 'service-overview';
      store.setState({ insights: { preset: presetKey }, selectedInsightKey: null });
      return true;
    }

    if (action === 'set-range') {
      const rangeKey = target.getAttribute('data-range-key') || '7d';
      store.setState({ insights: { range: rangeKey }, selectedInsightKey: null });
      return true;
    }

    if (action === 'select-detail') {
      const detailKey = target.getAttribute('data-detail-key');
      if (!detailKey) return false;
      store.setState({ selectedInsightKey: detailKey });
      return true;
    }

    if (action === 'open-board-for-detail' && vm.selectedDetail) {
      router.goToBoard(vm.selectedDetail.boardPreset || 'all-active');
      return true;
    }

    if (action === 'open-tasks-for-detail' && vm.selectedDetail) {
      router.goToTasks(vm.selectedDetail.tasksPreset || 'all-open');
      return true;
    }

    if (action === 'open-detail-patient') {
      const patientId = target.getAttribute('data-patient-id');
      if (!patientId) return false;
      store.setState({ selectedPatientId: patientId });
      router.goToPatient(patientId);
      return true;
    }

    return false;
  }

  function insightPill(label, action, attrs, active) {
    return `<button type="button" class="hah-inline-pill${active ? ' is-active' : ''}" data-insight-action="${c.escapeHtml(action)}" ${attrs || ''}>${c.escapeHtml(label)}</button>`;
  }

  window.HAHBoard.insightsScreen = {
    renderLeftPane,
    renderMainPane,
    renderRightPane,
    handleClick
  };
})();

</script>
  <script>
/* inlined: js/22-desktop-shell.js */
(function () {
  window.HAHBoard = window.HAHBoard || {};

  const store = window.HAHBoard.store;
  const router = window.HAHBoard.router;

  let rootEl = null;
  let unsub = null;
  let jsonUpdatePollTimer = null;

  function initDesktopShell() {
    rootEl = document.getElementById('desktop-root');
    if (!rootEl) return;
    renderShell();
    bindShellEvents();
    bindResizeHandles();
    unsub = store.subscribe(renderFromState);

    // Start update checker after first render
    if (window.HAHBoard.update && typeof window.HAHBoard.update.init === 'function') {

  function renderShell() {

            <svg class="hah-nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 20V10"/>

          </button>

            <svg class="hah-nav-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="2.6"/>

        <aside class="hah-left-pane" id="hahLeftPane"></aside>

        <aside class="hah-right-pane" id="hahRightPane"></aside>
      </div>

  }

  function bindShellEvents() {
    rootEl.addEventListener('click', function (event) {
      const state = store.getState();
      const screenHandled = delegateScreenClick(event, state);
      if (screenHandled) return;

      const navTarget = event.target.closest('[data-nav]');
      if (navTarget) {
        const view = navTarget.getAttribute('data-nav');
        router.navigate({ view });
        return;
      }

      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) return;
      const action = actionTarget.getAttribute('data-action');
      if (action === 'open-board') {
        router.goToBoard();
        return;
      }
      if (action === 'open-settings') {
        router.navigate({ view: 'settings' });
        return;
      }
      if (action === 'sync-json') {
        performSharedJsonSync(state);
        return;
      }
      if (action === 'toggle-boardround') {
        const current = store.getState().boardroundMode;
        store.setState({ boardroundMode: !current });
        return;
      }
      if (action && action.indexOf('settings-json-') === 0) {
        handleSharedJsonStoreAction(action);
        return;
      }
      if (action === 'settings-actor' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptActorName();
        return;
      }
      if (action === 'settings-export' && window.HAHBoard.ops) {
        window.HAHBoard.ops.downloadOpsBundle();
        return;
      }
      if (action === 'settings-import' && window.HAHBoard.ops) {
        window.HAHBoard.ops.promptImportOpsBundle();
        return;
      }
      if (action === 'settings-check-update') {
        if (window.HAHBoard.update && typeof window.HAHBoard.update.checkForUpdate === 'function') {
          window.HAHBoard.update.checkForUpdate(true);
        }
      }
      if (action === 'settings-clear' && window.HAHBoard.ops) {
        window.HAHBoard.ops.clearAllOpsState();
      }
      if (action === 'settings-clear-discharged' && window.HAHBoard.ops) {
        const list = window.HAHBoard.ops.getDischargedPatients() || [];
        if (!list.length) return;
        if (window.confirm('Clear all ' + list.length + ' discharged patient record(s)? This cannot be undone.')) {
          window.HAHBoard.ops.clearDischargedPatients();
        }
      }
      if (action === 'settings-restore-patient' && window.HAHBoard.ops) {
        const id = actionTarget.getAttribute('data-discharge-id');
        if (id) window.HAHBoard.ops.restorePatient(id);
      }
      if (action === 'settings-restore-json-patient') {
        const id = actionTarget.getAttribute('data-patient-id');
        const shared = window.HAHBoard.sharedJsonStore;
        if (id && shared && typeof shared.restoreArchivedPatientRecord === 'function') {
          shared.restoreArchivedPatientRecord(id).catch(function (err) {
            console.error('[H@H JSON store]', err);
            window.alert(err && err.message ? err.message : 'Could not restore JSON patient.');
          });
        }
      }
    });

    rootEl.addEventListener('change', function (event) {
      const state = store.getState();
      const screen = getActiveScreenModule(state);
      if (screen && typeof screen.handleChange === 'function') {
        screen.handleChange(event, state);
      }
    });

    const search = rootEl.querySelector('#hahGlobalSearch');
    if (search) {
      search.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') console.log('Global search:', search.value);
      });
    }

    document.addEventListener('keydown', function (event) {
      if (event.key === '/' && !isTextInput(event.target)) {
        event.preventDefault();
        const input = rootEl.querySelector('#hahGlobalSearch');
        if (input) input.focus();
      }
    });
  }

  async function performSharedJsonSync(stateSnapshot) {
    const shared = window.HAHBoard.sharedJsonStore;
    if (!shared || typeof shared.loadPatientDataset !== 'function') {
      window.alert('Shared JSON store module is not loaded.');
      return;
    }
    const startedAt = new Date();
    try {
      store.setState({ ui: { syncState: 'syncing' } });
      await shared.loadPatientDataset();
      if (shared && typeof shared.loadTaskDataset === 'function') {
        try { await shared.loadTaskDataset(); } catch (_) {}
      }
      const time = startedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      store.setState({ ui: { syncState: 'JSON synced ' + time } });
    } catch (err) {
      console.error('[H@H JSON store]', err);
      store.setState({ ui: { syncState: 'error' } });
      window.alert(err && err.message ? err.message : 'Shared JSON sync failed.');
    }
  }

  function startJsonUpdatePoller() {
    if (jsonUpdatePollTimer) return;
    jsonUpdatePollTimer = window.setInterval(async function () {
      try {
        const shared = window.HAHBoard.sharedJsonStore;
        if (!shared || typeof shared.checkForRemoteUpdates !== 'function') return;
        const snap = store.getState ? store.getState() : {};
        const route = snap.route || {};
        if (route.view !== 'board' && route.view !== 'patient') return;
        const patientId = route.view === 'patient' ? (route.entityId || snap.selectedPatientId || '') : '';
        await shared.checkForRemoteUpdates(patientId || null);
      } catch (_) {}
    }, 60000);
  }

  async function handleSharedJsonStoreAction(action) {
    const shared = window.HAHBoard.sharedJsonStore;
    if (!shared) {
      window.alert('Shared JSON store module is not loaded.');
      return;
    }
    try {
      if (action === 'settings-json-client') shared.promptClientId();
      else if (action === 'settings-json-folder') shared.promptFolderPath();
      else if (action === 'settings-json-signin') await shared.signIn();
      else if (action === 'settings-json-init') await shared.initialiseStore();
      else if (action === 'settings-json-test') await shared.testReadWrite();
      else if (action === 'settings-json-create-test-patient') await shared.createTestPatient();
      else if (action === 'settings-json-load-patients') await shared.loadPatientDataset();
      else if (action === 'settings-json-load-tasks') await shared.loadTaskDataset();
      else if (action === 'settings-json-clear-patient-cache') shared.clearPatientCache();
      else if (action === 'settings-json-download-schema') shared.downloadStarterSchemas();
      else if (action === 'settings-json-refresh') {
        if (window.HAHBoard.store) window.HAHBoard.store.setState({ ui: { syncState: 'JSON store' } });
      }
    } catch (err) {
      console.error('[H@H JSON store]', err);
      window.alert(err && err.message ? err.message : 'Shared JSON store action failed.');
    }
    if (window.HAHBoard.store) {
      const snap = window.HAHBoard.store.getState();
      window.HAHBoard.store.setState({ ui: { syncState: snap.ui && snap.ui.syncState ? snap.ui.syncState : 'JSON store' } });
    }
  }

  function delegateScreenClick(event, state) {
    const screen = getActiveScreenModule(state);
    if (!screen || typeof screen.handleClick !== 'function') return false;
    return !!screen.handleClick(event, state);
  }

  function getActiveScreenModule(state) {
    switch (state.route.view) {
      case 'board': return window.HAHBoard.boardScreen || null;
      case 'patient': return window.HAHBoard.patientScreen || null;
      case 'tasks': return window.HAHBoard.tasksScreen || null;
      case 'insights': return window.HAHBoard.insightsScreen || null;
      default: return null;
    }
  }

  function renderFromState(state) {
    updateHeader(state);
    updateNav(state);
    updatePanes(state);
  }

  function updateHeader(state) {
    const syncPill = rootEl.querySelector('#hahSyncPill');
    if (syncPill) {
      const rawState = state.ui && state.ui.syncState;
      syncPill.textContent = normaliseSyncLabel(rawState);
      syncPill.classList.toggle('is-update', rawState === 'update-available');
      syncPill.classList.toggle('is-syncing', rawState === 'syncing');
      syncPill.classList.toggle('is-error', rawState === 'error');
      syncPill.title = rawState === 'update-available' ? 'JSON update available — press to reload' : 'Sync with shared JSON';
    }
    const boardroundBtn = rootEl.querySelector('#hahBoardroundBtn');
    if (boardroundBtn) boardroundBtn.classList.toggle('is-active', !!state.boardroundMode);
    const env = rootEl.querySelector('#hahEnvironmentLabel');
    if (env) env.textContent = getSurfaceKicker(state);
  }

  function getSurfaceKicker(state) {
    const map = {
      board: 'MDM / boardround workspace',
      patient: 'Single-patient desktop briefing',
      tasks: 'Action, ownership, and blockers',
      insights: 'Service intelligence and drill-in',

  function updatePanes(state) {
    const leftPane  = rootEl.querySelector('#hahLeftPane');
    const mainPane  = rootEl.querySelector('#hahMainPane');
    const rightPane = rootEl.querySelector('#hahRightPane');
    if (!leftPane || !mainPane || !rightPane) return;

    // If the nav was previously re-parented into the left pane (compact
    // mode), move it back onto the app before we wipe innerHTML so it
    // survives the render. The layout code will re-parent it if needed.
    const nav = rootEl.querySelector('#hahNav');
    const app = rootEl.querySelector('#hahDesktopApp');
    if (nav && leftPane.contains(nav) && app) {
      app.insertBefore(nav, leftPane);
    }

    // Capture scroll positions BEFORE wiping innerHTML so the user doesn't
    // jump back to the top whenever something triggers a re-render (e.g.
    // tapping Clear or Undo in the right-pane composer, or any state
    // change that bubbles a render). Restore right after re-render.
    const scrollState = {
      left: leftPane.scrollTop,
      main: mainPane.scrollTop,
      right: rightPane.scrollTop
    };

    leftPane.innerHTML  = renderLeftPane(state);
    mainPane.innerHTML  = renderMainPane(state);
    rightPane.innerHTML = renderRightPane(state);
    const screen = getActiveScreenModule(state);
    if (screen && typeof screen.afterRender === 'function') {
      screen.afterRender(state, rightPane);
    }
    // Re-apply responsive layout (including compact-mode nav re-parenting)
    // after innerHTML has wiped the left pane. Run synchronously to avoid
    // a frame flash of missing nav.
    if (typeof window.HAHBoard.applyPatientLayout === 'function') {
      window.HAHBoard.applyPatientLayout();
    } else {
      window.dispatchEvent(new CustomEvent('hah:panes-resized'));
    }
    // Restore scroll. Browsers reset scrollTop to 0 when innerHTML is
    // replaced; this puts it back. We do this AFTER applyPatientLayout
    // because layout reparenting could affect available scroll height.
    leftPane.scrollTop = scrollState.left;
    mainPane.scrollTop = scrollState.main;
    rightPane.scrollTop = scrollState.right;
  }

  function bindResizeHandles() {
    const PANE_L_KEY = 'hah_pane_left_w';
    const PANE_R_KEY = 'hah_pane_right_w';

    const savedLeft  = parseInt(localStorage.getItem(PANE_L_KEY)  || '292', 10);
    const savedRight = parseInt(localStorage.getItem(PANE_R_KEY) || '680', 10);
    document.documentElement.style.setProperty('--desk-left-w',  savedLeft  + 'px');
    document.documentElement.style.setProperty('--desk-right-w', savedRight + 'px');

    function startDrag(e, side) {
      e.preventDefault();
      const handle   = e.currentTarget;
      const startX   = e.clientX;
      const startVal = parseInt(
        getComputedStyle(document.documentElement)
          .getPropertyValue(side === 'left' ? '--desk-left-w' : '--desk-right-w'), 10
      );
      handle.classList.add('is-dragging');
      window.HAHBoard.__resizingPanes = true;
      rootEl.classList.add('is-resizing-panes');

      function onMove(e) {
        const dx = e.clientX - startX;
        const min = side === 'left' ? 180 : 280;
        const max = side === 'left' ? 520 : 900;
        const next = Math.max(min, Math.min(max, side === 'left' ? startVal + dx : startVal - dx));
        document.documentElement.style.setProperty(
          side === 'left' ? '--desk-left-w' : '--desk-right-w',
          next + 'px'
        );
      }

      function onUp() {
        handle.classList.remove('is-dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        const lw = getComputedStyle(document.documentElement).getPropertyValue('--desk-left-w').trim();
        const rw = getComputedStyle(document.documentElement).getPropertyValue('--desk-right-w').trim();
        try {
          localStorage.setItem(PANE_L_KEY, parseInt(lw, 10));
          localStorage.setItem(PANE_R_KEY, parseInt(rw, 10));
        } catch (_) {}
        window.HAHBoard.__resizingPanes = false;
        rootEl.classList.remove('is-resizing-panes');
        window.dispatchEvent(new CustomEvent('hah:panes-resized'));
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    }

    const lh = rootEl.querySelector('#hahResizeLeft');
    const rh = rootEl.querySelector('#hahResizeRight');
    if (lh) lh.addEventListener('mousedown', (e) => startDrag(e, 'left'));
    if (rh) rh.addEventListener('mousedown', (e) => startDrag(e, 'right'));
  }

      if (msg.type === 'error') { console.warn('[WSSync] server error:', msg.message); return; }

  instrument();

      'font-size:11px',
      'line-height:1.3',
      'background:rgba(17,24,39,0.92)',
      'color:#f3f4f6',
      'border-radius:8px',
      'box-shadow:0 4px 14px rgba(0,0,0,0.4)',
      'backdrop-filter:saturate(140%) blur(8px)',

      'border:1px solid rgba(255,255,255,0.08)',
      'overflow:hidden',

      return origLog.apply(console, arguments);
    };
    console.warn = function () {
      try {
        const first = arguments[0];
        if (typeof first === 'string' && first.indexOf('[WSSync]') === 0) {
          addLog('warn', first.replace('[WSSync] ', ''));
        }
      } catch (_) {}
      return origWarn.apply(console, arguments);
    };

    // Re-render summary periodically to keep "connected · 12s" fresh
    setInterval(() => { if (isVisible) renderSummary(); }, 1000);
  }

  // ─── Public API ────────────────────────────────────────────────────────────
  window.WSSyncDebug = {
    show: () => { try { localStorage.setItem(SHOW_KEY, '1'); } catch (_) {} show(); },
    hide: () => { try { localStorage.removeItem(SHOW_KEY); } catch (_) {} hide(); },
    toggle: () => { isVisible ? window.WSSyncDebug.hide() : window.WSSyncDebug.show(); },
    log: (label) => addLog('info', label),
    isVisible: () => isVisible
  };

  // Auto-show if flag is set
  function init() {
    attach();
    if (isShowEnabled()) show();
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

</script>
</body>
</html>
