    // Case 2: any patient boardStatus was set on a previous day — reset
    let needsReset = false;
    Object.keys(state.patientStates).forEach((pid) => {
      const ps = state.patientStates[pid];
      if (!ps || !ps.boardStatus || ps.boardStatus === 'Not discussed') return;
      // If there's an updatedAt, use it; otherwise treat as stale (safer)
      const stampDay = ps.updatedAt ? new Date(ps.updatedAt).toDateString() : null;
      if (!stampDay || stampDay !== todayDay) needsReset = true;
    });
    // Case 2b: state.patientStates may be empty on a fresh browser session
    // even though the JSON has stale Discussed markers from yesterday. Check
    // the JSON cache directly so a fresh-load-on-new-day still triggers the
    // reset and propagates to JSON.
    if (!needsReset) {
      try {
        const shared = window.HAHBoard && window.HAHBoard.sharedJsonStore;
        if (shared && typeof shared.getCachedPatientBundle === 'function') {
          const bundle = shared.getCachedPatientBundle();
          if (bundle && Array.isArray(bundle.rows)) {
            for (const row of bundle.rows) {
              const status = row && row.boardStatus;
              if (!status || status === 'Not discussed') continue;
              // JSON has no per-patient day-stamp on boardStatus, but if the
              // patient document's meta.updatedAt is from a previous day AND
              // status is non-default, treat as stale.
              const meta = row.sourcePatient && row.sourcePatient.meta;
              const stampDay = meta && meta.updatedAt ? new Date(meta.updatedAt).toDateString() : null;
              if (!stampDay || stampDay !== todayDay) { needsReset = true; break; }
            }
          }
        }
      } catch (_) {}
    }

    if (needsReset) {
      // Propagate to JSON too — anyone loading the desktop fresh on a new
      // day should see Not discussed on every patient, not yesterday's
      // residue. Without this, the cross-device list is permanently stale.
      resetBoardStatusAcrossStore('auto-reset-new-day');
    }

    // Always clear nextAllocation on new day (regardless of board status state)
    const todayForAlloc = new Date().toDateString();
    let allocReset = false;
    Object.keys(state.patientStates).forEach((pid) => {
      const ps = state.patientStates[pid];
      if (ps && ps.nextAllocation) {
        const stampDay = ps.nextAllocationAt ? new Date(ps.nextAllocationAt).toDateString() : null;
        if (!stampDay || stampDay !== todayForAlloc) {
          state.patientStates[pid] = { ...ps, nextAllocation: '', nextAllocationAt: null };
          allocReset = true;
        }
      }
      // Also clear bloodsStatus on new day
      const ps2 = state.patientStates[pid];
      if (ps2 && ps2.bloodsStatus) {
        const stampDay2 = ps2.bloodsStatusAt ? new Date(ps2.bloodsStatusAt).toDateString() : null;
        if (!stampDay2 || stampDay2 !== todayForAlloc) {
          state.patientStates[pid] = { ...ps2, bloodsStatus: '', bloodsStatusAt: null };
          allocReset = true;
        }
      }
    });
    if (allocReset) needsReset = true;

    // Also dismiss any lingering round summary from a prior day
    if (state.roundHistory && state.roundHistory.length) {
      const last = state.roundHistory[0];
      if (last.endedAt) {
        const endedDay = new Date(last.endedAt).toDateString();
        if (endedDay !== todayDay && !last.dismissed) {
          last.dismissed = true;
          needsReset = true;
        }
      }
    }

    if (needsReset) {
      appendAudit({ type: 'round-auto-reset', summary: 'Board statuses auto-reset for new day' });
      saveState('round-auto-reset-new-day', {});
    }
  }

  function isManualTaskId(taskId) {
    return String(taskId || '').startsWith('manual:');
  }

  function persistTeamTaskToJson(task) {
    try {
      const shared = window.HAHBoard && window.HAHBoard.sharedJsonStore;
      if (!shared || typeof shared.upsertTaskRecord !== 'function') return;
      if (!task || !isManualTaskId(task.id)) return;
      shared.upsertTaskRecord(task).catch(function (err) {
        console.warn('[H@H JSON store] Could not persist team task', err);
      });
    } catch (_) {}
  }

  function getTaskPatch(taskId) {
    return clone(state.taskPatches[String(taskId)] || {});
  }

  function updateTask(taskId, patch) {
    const key = String(taskId);
    const existingIndex = state.customTasks.findIndex((task) => String(task.id) === key);
    if (existingIndex >= 0) {
      state.customTasks[existingIndex] = {
        ...state.customTasks[existingIndex],
        ...cleanObject(patch),
        updatedAt: nowIso(),
        updatedBy: getActorName()
      };
      appendAudit({
        type: 'task-updated',
        entityType: 'task',
        entityId: key,
        summary: summariseTaskPatch(state.customTasks[existingIndex], patch)
      });
      saveState('task-updated', { taskId: key });
      persistTeamTaskToJson(state.customTasks[existingIndex]);
      return clone(state.customTasks[existingIndex]);
    }

    const current = state.taskPatches[key] || {};
    state.taskPatches[key] = {
      ...current,
      ...cleanObject(patch),
      updatedAt: nowIso(),
      updatedBy: getActorName()
    };
    appendAudit({
      type: 'task-updated',
      entityType: 'task',
      entityId: key,
      summary: summariseTaskPatch({ id: key }, patch)
    });
    saveState('task-patch-updated', { taskId: key });
    return getTaskPatch(taskId);
  }

  function createTask(taskInput) {
    const task = {
      id: buildManualTaskId(taskInput.patientId),
      patientId: String(taskInput.patientId || ''),
      title: String(taskInput.title || '').trim(),
      note: String(taskInput.note || '').trim(),
      category: String(taskInput.category || 'Clinical review').trim(),
      owner: String(taskInput.owner || 'Unassigned').trim(),
      dueAt: String(taskInput.dueAt || '').trim(),
      priority: String(taskInput.priority || 'Medium').trim(),
      status: String(taskInput.status || 'Open').trim(),
      blocker: String(taskInput.blocker || '').trim(),
      createdFrom: String(taskInput.createdFrom || 'Board').trim(),
      createdBy: getActorName(),
      createdAt: String(taskInput.createdAt || nowIso()).trim(),
      boardLink: String(taskInput.boardLink || '').trim(),
      updatedAt: nowIso(),
      updatedBy: getActorName()
    };
    if (!task.patientId || !task.title) return null;
    state.customTasks.unshift(task);
    appendAudit({
      type: 'task-created',
      entityType: 'task',
      entityId: task.id,
      summary: `Created task: ${task.title}`
    });
    saveState('task-created', { taskId: task.id });
    persistTeamTaskToJson(task);
    return clone(task);
  }

  function buildManualTaskId(patientId) {
    return `manual:${String(patientId)}:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`;
  }

  function cleanObject(obj) {
    const out = {};
    Object.keys(obj || {}).forEach((key) => {
      const value = obj[key];
      if (value === undefined) return;
      out[key] = value;
    });
    return out;
  }

  function summarisePatientPatch(patch) {
    if (!patch || typeof patch !== 'object') return 'Updated patient state';
    if (patch.boardStatus) return `Set board status to ${patch.boardStatus}`;
    if (patch.dischargeReadiness) return `Set discharge readiness to ${patch.dischargeReadiness}`;
    if (Object.prototype.hasOwnProperty.call(patch, 'boardNote')) return patch.boardNote ? 'Updated board note' : 'Cleared board note';
    return 'Updated patient state';
  }

  function summariseTaskPatch(task, patch) {
    if (patch.status) return `Set task “${task.title || task.id}” to ${patch.status}`;
    if (patch.owner) return `Assigned task “${task.title || task.id}” to ${patch.owner}`;
    if (patch.dueAt) return `Changed due time for “${task.title || task.id}”`;
    return `Updated task “${task.title || task.id}”`;
  }

  function promptForBoardNote(patient) {
    const current = getPatientState(patient.id).boardNote || '';
    const next = window.prompt(`Board note for ${patient.name}`, current);
    if (next === null) return null;
    return setBoardNote(patient.id, next);
  }

  function promptCreateTask(patient, seed) {
    const defaults = seed || {};
    const title = window.prompt(`New task for ${patient.name}`, defaults.title || '');
    if (title == null) return null;
    if (!String(title).trim()) return null;

    const note = window.prompt('Task note (optional)', defaults.note || patient.summaryLine || '') || '';
    const category = window.prompt('Category', defaults.category || 'Clinical review') || defaults.category || 'Clinical review';
    const owner = window.prompt('Owner', defaults.owner || patient.clinician || 'Unassigned') || defaults.owner || patient.clinician || 'Unassigned';
    const dueDefault = defaults.dueAt || patient.reviewDueAt || toLocalPromptValue(new Date(Date.now() + 4 * 60 * 60 * 1000));
    const dueInput = window.prompt('Due (YYYY-MM-DD HH:MM or leave blank)', dueDefault) || '';
    const dueAt = normaliseDueInput(dueInput);
    const priority = window.prompt('Priority', defaults.priority || patient.priority || 'Medium') || defaults.priority || patient.priority || 'Medium';

    return createTask({
      patientId: patient.id,
      title,
      note,
      category,
      owner,
      dueAt,
      priority,
      status: defaults.status || 'Open',
      blocker: defaults.blocker || '',
      createdFrom: defaults.createdFrom || 'Manual',
      boardLink: defaults.boardLink || patient.boardStatus || ''
    });
  }

  function promptReassignTask(task) {
    const next = window.prompt(`Owner for ${task.title}`, task.owner || 'Unassigned');
    if (next === null) return null;
    return updateTask(task.id, { owner: String(next || 'Unassigned').trim() || 'Unassigned' });
  }

  function buildBoardroundSummary(patients, tasks, options) {
    const rows = Array.isArray(patients) ? patients.slice() : [];
    const taskRows = Array.isArray(tasks) ? tasks.slice() : [];
    const opts = options || {};
    const title = opts.title || 'H@H Boardround Summary';
    const stamp = new Date().toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });

    const counts = {
      notDiscussed: rows.filter((p) => p.boardStatus === 'Not discussed').length,
      inDiscussion: rows.filter((p) => p.boardStatus === 'In discussion').length,
      discussed: rows.filter((p) => p.boardStatus === 'Discussed').length,
      actioned: rows.filter((p) => p.boardStatus === 'Actioned').length,
      deferred: rows.filter((p) => p.boardStatus === 'Deferred').length
    };

    const lines = [];
    lines.push(title);
    lines.push(`Generated ${stamp}`);
    lines.push(`Author ${getActorName()}`);
    lines.push('');
    lines.push(`Patients in round: ${rows.length}`);
    lines.push(`Not discussed: ${counts.notDiscussed}`);
    lines.push(`In discussion: ${counts.inDiscussion}`);
    lines.push(`Discussed: ${counts.discussed}`);
    lines.push(`Actioned: ${counts.actioned}`);
    lines.push(`Deferred: ${counts.deferred}`);
    lines.push('');

    rows.forEach((patient) => {
      const patientTasks = taskRows.filter((task) => String(task.patientId) === String(patient.id) && !['Done', 'Cancelled'].includes(String(task.status || '')));
      lines.push(`${patient.name} — ${patient.boardStatus}`);
      lines.push(`  Status: ${patient.currentStatus}`);
      lines.push(`  Discharge: ${patient.dischargeReadiness}`);
      if (patient.boardNote) lines.push(`  Note: ${patient.boardNote}`);
      if (patient.blockers && patient.blockers.length) lines.push(`  Blockers: ${patient.blockers.slice(0, 3).join(' | ')}`);
      if (patientTasks.length) {
        lines.push('  Actions:');
        patientTasks.slice(0, 5).forEach((task) => {
          const due = task.dueAt ? ` · ${new Date(task.dueAt).toLocaleString([], { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}` : '';
          lines.push(`    - ${task.title} [${task.status}] · ${task.owner || 'Unassigned'}${due}`);
        });
      }
      lines.push('');
    });

    return lines.join('\n').trim();
  }

  function exportBoardroundSummary(summaryText, title) {
    const text = String(summaryText || '').trim();
    if (!text) return false;
    persistRoundSummary(text, title || 'H@H Boardround Summary');
    try {
      if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
        navigator.clipboard.writeText(text).catch(() => {});
      }
    } catch (_err) {}

    try {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
      a.href = url;
      a.download = `hah-boardround-summary-${stamp}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return true;
    } catch (_err) {
      window.alert(text);
      return false;
    }
  }

  function normaliseDueInput(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    const direct = Date.parse(raw);
    if (!Number.isNaN(direct)) return new Date(direct).toISOString();
    const patched = raw.replace(' ', 'T');
    const parsed = Date.parse(patched);
    if (!Number.isNaN(parsed)) return new Date(parsed).toISOString();
    return raw;
  }

  function toLocalPromptValue(date) {
    const dt = date instanceof Date ? date : new Date(date);
    if (Number.isNaN(dt.getTime())) return '';
    const pad = (v) => String(v).padStart(2, '0');
    return `${dt.getFullYear()}-${pad(dt.getMonth() + 1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  }

  function exportOpsBundle() {
    return JSON.stringify({
      schemaVersion: 1,
      exportedAt: nowIso(),
      exportedBy: getActorName(),
      state: clone(state)
    }, null, 2);
  }

  function downloadOpsBundle() {
    const text = exportOpsBundle();
    try {
      const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
      a.href = url;
      a.download = `hah-board-ops-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      return true;
    } catch (_err) {
      window.alert(text);
      return false;
    }
  }

  function importOpsBundle(text, mode) {
    const raw = String(text || '').trim();
    if (!raw) return false;
    let parsed;
    try {
      parsed = JSON.parse(raw);
    } catch (_err) {
      return false;
    }
    const incoming = normaliseState(parsed && parsed.state ? parsed.state : parsed);
    if ((mode || 'merge') === 'replace') {
      state = incoming;
    } else {
      state = mergeStates(state, incoming);
    }
    appendAudit({
      type: 'ops-import',
      entityType: 'ops',
      entityId: 'ops-bundle',
      summary: `Imported ops snapshot (${mode || 'merge'})`
    });
    saveState('ops-imported', { imported: true, mode: mode || 'merge' });
    return true;
  }

  function mergeStates(current, incoming) {
    const next = normaliseState(current);
    next.patientStates = { ...next.patientStates, ...incoming.patientStates };
    next.taskPatches = { ...next.taskPatches, ...incoming.taskPatches };

    const taskMap = new Map();
    next.customTasks.concat(incoming.customTasks || []).forEach((task) => {
      taskMap.set(String(task.id), { ...taskMap.get(String(task.id)), ...task });
    });
    next.customTasks = Array.from(taskMap.values()).sort((a, b) => Date.parse(b.updatedAt || 0) - Date.parse(a.updatedAt || 0));

    const allEncounters = [...(incoming.encounters || []), ...(next.encounters || [])]
      .sort((a, b) => Date.parse(b.timestamp || 0) - Date.parse(a.timestamp || 0));
    next.encounters = dedupeBy(allEncounters, (e) => e.id).slice(0, MAX_ENCOUNTER_ROWS);

    const audit = [...(incoming.auditTrail || []), ...(next.auditTrail || [])]
      .sort((a, b) => Date.parse(b.at || 0) - Date.parse(a.at || 0));
    next.auditTrail = dedupeBy(audit, (row) => row.id).slice(0, MAX_AUDIT_ROWS);

    const summaries = [...(incoming.roundSummaries || []), ...(next.roundSummaries || [])]
      .sort((a, b) => Date.parse(b.createdAt || 0) - Date.parse(a.createdAt || 0));
    next.roundSummaries = dedupeBy(summaries, (row) => row.id).slice(0, MAX_SUMMARY_ROWS);

    const nextUpdated = Math.max(Date.parse(current.updatedAt || 0) || 0, Date.parse(incoming.updatedAt || 0) || 0, Date.now());
    next.updatedAt = new Date(nextUpdated).toISOString();
    next.lastMutationId = buildMutationId();
    next.lastWriter = getActorName();
    return next;
  }

  function dedupeBy(rows, pick) {
    const seen = new Set();
    const out = [];
    (rows || []).forEach((row) => {
      const key = pick(row);
      if (!key || seen.has(key)) return;
      seen.add(key);
      out.push(row);
    });
    return out;
  }

  function promptImportOpsBundle() {
    const text = window.prompt('Paste exported ops JSON');
    if (text === null) return null;
    const mode = window.confirm('Use OK to merge into current state. Use Cancel to replace current state entirely.') ? 'merge' : 'replace';
    const ok = importOpsBundle(text, mode);
    if (!ok) window.alert('Could not import ops snapshot.');
    return ok;
  }

  function setActorName(name) {
    actorProfile.name = String(name || '').trim() || 'Board user';
    saveProfile();
    appendAudit({
      type: 'actor-updated',
      entityType: 'profile',
      entityId: 'actor',
      summary: `Updated actor name to ${getActorName()}`
    });
    saveState('actor-updated', { actor: getActorName() });
    return getActorName();
  }

  function promptActorName() {
    const next = window.prompt('Name to show on board actions and exports', getActorName());
    if (next === null) return null;
    return setActorName(next);
  }

  function clearAllOpsState() {
    if (!window.confirm('Clear all desktop operational state, tasks, summaries, and audit history?')) return false;
    state = clone(DEFAULT_STATE);
    appendAudit({
      type: 'ops-cleared',
      entityType: 'ops',
      entityId: 'all',
      summary: 'Cleared all desktop operational state'
    });
    saveState('ops-cleared', { destructive: true });
    return true;
  }

  function getSyncInfo(flags) {
    const info = flags || {};
    const mode = channelReady ? 'broadcast+storage' : 'storage';
    return {
      mode,
      label: info.imported ? 'Imported sync' : (channelReady ? 'Shared sync' : 'Local sync'),
      actor: getActorName(),
      updatedAt: state.updatedAt || '',
      lastWriter: state.lastWriter || '',
      auditCount: state.auditTrail.length,
      taskCount: state.customTasks.length,
      summaryCount: state.roundSummaries.length,
      encounterCount: state.encounters.length,
      remote: !!info.remote
    };
  }

  function getRecentAudit(limit) {
    const max = Math.max(1, Number(limit) || 10);
    return clone(state.auditTrail.slice(0, max));
  }

  function getRecentSummaries(limit) {
    const max = Math.max(1, Number(limit) || 10);
    return clone(state.roundSummaries.slice(0, max));
  }

  function updateEncounter(encounterId, newFields) {
    const idx = state.encounters.findIndex((e) => e.id === String(encounterId));
    if (idx < 0) return null;
    const enc = state.encounters[idx];
    const fields = cleanObject(newFields || {});
    if (enc.type === 'board_round') {
      const rawIssues = String(fields.issues || '').trim();
      fields.issueRaw  = rawIssues;
      fields.issueLines = rawIssues
        ? rawIssues.split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean)
        : [];
      fields.issues = fields.issueLines.join('\n');
    }
    state.encounters[idx] = {
      ...enc,
      fields,
      editedAt: nowIso(),
      editedBy: getActorName()
    };
    appendAudit({
      type: 'encounter-updated',
      entityType: 'encounter',
      entityId: encounterId,
      summary: `${enc.type} encounter updated for patient ${enc.patientId}`
    });
    saveState('encounter-updated', { encounterId });
    return clone(state.encounters[idx]);
  }

  function dischargePatient(patientId, snapshot) {
    const pid = String(patientId || '');
    if (!pid) return null;
    const row = {
      id: buildMutationId(),
      patientId: pid,
      dischargedAt: nowIso(),
      dischargedBy: getActorName(),
      snapshot: snapshot || null
    };
    state.dischargedPatients.unshift(row);
    state.dischargedPatients = state.dischargedPatients.slice(0, 200);
    appendAudit({
      type: 'patient-discharged',
      entityType: 'patient',
      entityId: pid,
      summary: `Discharged patient ${(snapshot && snapshot.name) || pid}`
    });
    saveState('patient-discharged', { patientId: pid });
    return clone(row);
  }

  function restorePatient(dischargeId) {
    const idx = state.dischargedPatients.findIndex((d) => d.id === String(dischargeId));
    if (idx < 0) return false;
    const row = state.dischargedPatients.splice(idx, 1)[0];
    appendAudit({
      type: 'patient-restored',
      entityType: 'patient',
      entityId: row.patientId,
      summary: `Restored patient ${(row.snapshot && row.snapshot.name) || row.patientId}`
    });
    saveState('patient-restored', { patientId: row.patientId });
    return true;
  }

  function clearDischargedPatients() {
    if (!state.dischargedPatients.length) return false;
    const count = state.dischargedPatients.length;
    state.dischargedPatients = [];
    appendAudit({
      type: 'discharged-cleared',
      entityType: 'discharge-list',
      entityId: 'all',
      summary: `Cleared ${count} discharged patient record${count === 1 ? '' : 's'}`
    });
    saveState('discharged-cleared', { count });
    return true;
  }

  function getDischargedPatients() {
    return clone(state.dischargedPatients);
  }

  function isPatientDischarged(patientId) {
    const pid = String(patientId || '');
    return state.dischargedPatients.some((d) => d.patientId === pid);
  }

  function buildEncounterId(patientId) {
    return `enc:${String(patientId)}:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`;
  }

  function createEncounter(input) {
    const patientId = String(input.patientId || '').trim();
    const type = String(input.type || 'other').trim();
    if (!patientId) return null;

    const fields = cleanObject(input.fields || {});

    if (type === 'board_round') {
      const rawIssues = String(fields.issues || '').trim();
      fields.issueRaw  = rawIssues;
      fields.issueLines = rawIssues
        ? rawIssues.split('\n').map((l) => l.replace(/^\s*\d+[\.\)]\s*/, '').trim()).filter(Boolean)
        : [];
      fields.issues = fields.issueLines.join('\n');
    }

    const encounter = {
      id: buildEncounterId(patientId),
      patientId,
      type,
      timestamp: nowIso(),
      author: getActorName(),
      fields
    };

    state.encounters.unshift(encounter);
    state.encounters = state.encounters.slice(0, MAX_ENCOUNTER_ROWS);

    appendAudit({
      type: 'encounter-created',
      entityType: 'encounter',
      entityId: encounter.id,
      summary: `${type} encounter created for patient ${patientId}`
    });
    saveState('encounter-created', { encounterId: encounter.id, patientId });
    return clone(encounter);
  }

  function deleteEncounter(encounterId) {
    const idx = state.encounters.findIndex((e) => e.id === String(encounterId));
    if (idx < 0) return false;
    const removed = state.encounters.splice(idx, 1)[0];
    appendAudit({
      type: 'encounter-deleted',
      entityType: 'encounter',
      entityId: removed.id,
      summary: `${removed.type} encounter deleted for patient ${removed.patientId}`
    });
    saveState('encounter-deleted', { encounterId: removed.id });
    return true;
  }

  function getEncountersForPatient(patientId, type) {
    const pid = String(patientId || '');
    return clone(
      state.encounters.filter((e) => {
        if (e.patientId !== pid) return false;
        if (type && e.type !== type) return false;
        return true;
      })
    );
  }

  function getLastBoardRound(patientId) {
    const pid = String(patientId || '');
    const found = state.encounters.find((e) => e.patientId === pid && e.type === 'board_round');
    return found ? clone(found) : null;

    let patient = await loadPatient(id);
    if (!patient || !patient.id) patient = makePatientSchema(id, { name: id });
    patient = mergeDeep(patient, patientCorePatch(fields));
    await savePatient(patient);
    // Patch the in-memory cache synchronously rather than reloading the
    // whole dataset — see patchPatientCacheRow.
    patchPatientCacheRow(patient);
    appendAudit({
      type: 'patient-core-updated',
      entityType: 'patient',
      entityId: id,
      summary: `Updated patient details for ${patient.identity && patient.identity.name ? patient.identity.name : id}`
    }).catch(function () {});
    state.lastOperation = `Updated JSON patient details`;
    state.lastError = '';
    saveState();
    return patient;
  }

  async function archivePatientRecord(patientId) {
    if (!patientId) throw new Error('Cannot archive patient without an id.');
    const id = String(patientId);
    let serviceDoc = await loadService();
    const active = getActivePatientIds(serviceDoc).filter(function (x) { return String(x) !== id; });
    const archived = Array.from(new Set(getArchivedPatientIds(serviceDoc).concat([id])));
    serviceDoc = setActivePatientIds(serviceDoc, active);
    serviceDoc = setArchivedPatientIds(serviceDoc, archived);
    await saveService(serviceDoc);

    try {
      let patient = await loadPatient(id);
      if (patient && patient.id) {
        patient.operational = Object.assign({}, patient.operational || {}, {
          archivedAt: nowIso(),
          archivedBy: getActorName(),
          boardStatus: 'Archived'
        });
        await savePatient(patient);
      }
    } catch (_) {}

    try {
      await appendAudit({
        type: 'patient-archived',
        entityType: 'patient',
        entityId: id,
        summary: `Archived patient ${id}`
      });
    } catch (_) {}
    await loadPatientDataset();
    state.lastOperation = `Archived JSON patient record and removed it from the active board`;
    state.lastError = '';
    saveState();
    return true;
  }

  async function patchPatientRecord(patientId, patch) {

  function normaliseTaskRecord(task) {
    const t = task || {};
    const id = String(t.id || `manual:${String(t.patientId || 'patient')}:${Date.now().toString(36)}:${Math.random().toString(36).slice(2, 6)}`);
    return {
      id,

      note: String(t.note || '').trim(),

      blocker: String(t.blocker || '').trim(),
      createdFrom: String(t.createdFrom || 'Tasks').trim(),
      createdBy: String(t.createdBy || t.updatedBy || getActorName()).trim(),
      createdAt: String(t.createdAt || t.updatedAt || nowIso()).trim(),
      updatedAt: String(t.updatedAt || nowIso()).trim(),
      updatedBy: String(t.updatedBy || getActorName()).trim(),
      boardLink: String(t.boardLink || '').trim()
    };
  }

  function normaliseTasksDoc(doc) {
    const base = doc && typeof doc === 'object' ? doc : makeTasksSchema();
    const tasks = Array.isArray(base.tasks) ? base.tasks.map(normaliseTaskRecord).filter(function (task) {
      return task.patientId && task.title;
    }) : [];
    return Object.assign(makeTasksSchema(), base, {
      tasks,
      updatedAt: base.updatedAt || nowIso(),

    });

  async function loadTasks() {

  async function saveTasks(tasksDoc) {
    const next = normaliseTasksDoc(Object.assign({}, tasksDoc || {}, { updatedAt: nowIso() }));
    await putJson(childPath(settings.folderPath, 'tasks.json'), next);
    taskCache = {
      loadedAt: nowIso(),
      source: 'json',
      tasks: clone(next.tasks || []),

    };

  async function loadTaskDataset() {

    } catch (err) {

  function getCachedTasks() {

  function clearTaskCache() {

    saveTaskCache();

  async function upsertTaskRecord(taskInput) {
    const task = normaliseTaskRecord(taskInput || {});
    if (!task.patientId || !task.title) return null;
    let doc;
    try {
      doc = normaliseTasksDoc(await getJson(childPath(settings.folderPath, 'tasks.json')));
    } catch (_) {
      doc = makeTasksSchema();
    }
    const rows = Array.isArray(doc.tasks) ? doc.tasks.slice() : [];
    const idx = rows.findIndex(function (row) { return String(row.id) === String(task.id); });
    if (idx >= 0) rows[idx] = Object.assign({}, rows[idx], task, { updatedAt: nowIso(), updatedBy: getActorName() });
    else rows.unshift(Object.assign({}, task, { createdAt: task.createdAt || nowIso(), updatedAt: nowIso(), updatedBy: getActorName() }));
    doc.tasks = rows;
    doc.meta = Object.assign({}, doc.meta || {}, { lastWriter: getActorName() });
    const saved = await saveTasks(doc);
    try {
      await appendAudit({
        type: idx >= 0 ? 'task-json-updated' : 'task-json-created',
        entityType: 'task',
        entityId: task.id,
        summary: `${idx >= 0 ? 'Updated' : 'Created'} team task: ${task.title}`
      });
    } catch (_) {}
    return (saved.tasks || []).find(function (row) { return String(row.id) === String(task.id); }) || task;
  }

  async function patchTaskRecord(taskId, patch) {
    const id = String(taskId || '');
    if (!id) return null;
    let doc;
    try { doc = normaliseTasksDoc(await getJson(childPath(settings.folderPath, 'tasks.json'))); }

    const idx = rows.findIndex(function (row) { return String(row.id) === id; });
    if (idx < 0) return null;
    rows[idx] = Object.assign({}, rows[idx], patch || {}, { updatedAt: nowIso(), updatedBy: getActorName() });
    doc.tasks = rows;
    doc.meta = Object.assign({}, doc.meta || {}, { lastWriter: getActorName() });

    try {
      await appendAudit({
        type: 'task-json-patched',

  async function loadRound(date) {
    return getJson(childPath(settings.folderPath, `rounds/${date || todayKey()}.json`));
  }

  async function saveRound(date, roundDoc) {
    const next = Object.assign({}, roundDoc || {}, { date: date || todayKey(), updatedAt: nowIso() });
    return putJson(childPath(settings.folderPath, `rounds/${date || todayKey()}.json`), next);
  }

  async function appendAudit(event) {
    const root = normalisePath(settings.folderPath);
    const path = childPath(root, `audit/${todayKey()}.json`);
    let doc;
    try { doc = await getJson(path); } catch (_) { doc = makeAuditSchema(); }
    doc.events = Array.isArray(doc.events) ? doc.events : [];
    doc.events.unshift(Object.assign({ id: `audit:${Date.now().toString(36)}`, at: nowIso(), actor: getActorName() }, event || {}));
    doc.updatedAt = nowIso();
    return putJson(path, doc);
  }

  function normaliseEncounterType(type) {
    const raw = String(type || '').trim().toLowerCase().replace(/[-\s]+/g, '_');
    if (raw === 'boardround' || raw === 'board_round') return 'board_round';
    if (raw === 'mobile_clinical_review' || raw === 'mobileclinicalreview' || raw === 'mobile_clinical_update' || raw === 'mobileclinicalupdate') return 'mobile_clinical_review';
    if (raw === 'micro_mdm' || raw === 'micromdm' || raw === 'micro') return 'micro_mdm';
    if (raw === 'resp_mdm' || raw === 'respiratory_mdm' || raw === 'respmdm' || raw === 'resp') return 'resp_mdm';
    return 'other';
  }

  function timelineNoteFromEncounter(encounter) {
    const fields = encounter && encounter.fields ? encounter.fields : {};
    const note = encounter && encounter.note ? encounter.note : {};
    return {
      issues: String(fields.issueRaw || fields.issues || note.issues || '').trim(),
      progress: String(fields.progress || fields.currently || note.progress || '').trim(),
      examination: String(fields.examination || note.examination || '').trim(),
      bloodsIx: String(fields.bloodsIx || fields.bloods || note.bloodsIx || note.bloods || '').trim(),
      plan: String(fields.plan || note.plan || '').trim()
    };
  }

  function timelineEntryFromEncounter(encounter) {
    const enc = encounter || {};
    const fields = enc.fields || {};
    const type = normaliseEncounterType(enc.type);
    const timestamp = enc.timestamp || enc.completedAt || enc.editedAt || nowIso();
    const note = timelineNoteFromEncounter(enc);
    const entry = {
      id: String(enc.id || `entry:${Date.now().toString(36)}`),
      type,
      status: enc.status || 'completed',
      timestamp,
      author: enc.author || enc.editedBy || enc.updatedBy || getActorName(),
      present: Array.isArray(fields.present) ? fields.present.slice() : (Array.isArray(enc.present) ? enc.present.slice() : []),
      note,
      fields: clone(fields || {})
    };
    if (enc.editedAt) entry.editedAt = enc.editedAt;
    if (enc.editedBy) entry.editedBy = enc.editedBy;
    return entry;
  }

  function deriveJsonDischargeReadiness(fields) {
    const f = fields || {};
    if (f.dischargeReady === true || f.dischargeReady === 'true') return 'Ready';
    const date = String(f.dischargeDate || '').trim();
    if (!date) return '';
    if (date === todayKey()) return 'Possible today';
    const d = new Date(date + 'T12:00:00');
    const t = new Date(todayKey() + 'T12:00:00');
    if (!Number.isNaN(d.getTime()) && !Number.isNaN(t.getTime())) {
      const diff = Math.round((d.getTime() - t.getTime()) / 86400000);
      if (diff === 1) return 'Likely tomorrow';
    }
    return 'Not ready';
  }

  async function upsertPatientTimelineEntry(patientId, encounter) {
    if (!patientId) throw new Error('Cannot save timeline entry without a patient id.');
    const id = String(patientId);
    const entry = timelineEntryFromEncounter(encounter || {});
    let patient = await loadPatient(id);
    if (!patient || !patient.id) {
      patient = makePatientSchema(id, { name: id });
    }

    patient.timeline = Array.isArray(patient.timeline) ? patient.timeline.slice() : [];
    const existingIndex = patient.timeline.findIndex(function (row) { return String(row && row.id) === String(entry.id); });
    if (existingIndex >= 0) {
      patient.timeline[existingIndex] = Object.assign({}, patient.timeline[existingIndex], entry, { updatedAt: nowIso() });
    } else {
      patient.timeline.unshift(entry);
    }
    patient.timeline.sort(function (a, b) {
      return Date.parse(b.timestamp || b.updatedAt || 0) - Date.parse(a.timestamp || a.updatedAt || 0);
    });

    patient.clinical = Object.assign({}, patient.clinical || {});
    const note = entry.note || {};
    if (note.issues) patient.clinical.summary = note.issues;
    if (note.bloodsIx) patient.clinical.bloodsSummary = note.bloodsIx;

    patient.operational = Object.assign({}, patient.operational || {});
    // Migrate any legacy free-text dischargeReadiness to forDischargeSummary before
    // applying this entry's derived enum value. Without this, a patient with
    // mobile-written free text in dischargeReadiness stays stuck there until
    // a board round actively overwrites it with the enum.
    const splitDischarge = splitDischargeFields(patient.operational);
    if (splitDischarge.notes && !patient.operational.forDischargeSummary) {
      patient.operational.forDischargeSummary = splitDischarge.notes;
    }
    // Note: we no longer write operational.dischargeReadiness here. As of
    // v0.8.130 readiness is derived at read-time from the timeline (see
    // deriveDischargeReadinessFromTimeline). Storing it independently led
    // to stale values when entries were deleted or dates passed without a
    // re-commit — same lesson as boardStatus in v0.8.113.
    // Note: we do NOT touch boardStatus here. boardStatus is round-state, not
    // entry-state — a board_round entry committed outside an active round
    // (e.g. retrospective documentation, or a fresh note before round-start)
    // should not change Discussed/Not-discussed. The caller in composer-done
    // is responsible for patching boardStatus separately, gated on whether
    // a round is actually active.

    await savePatient(patient);
    // Patch the in-memory cache synchronously so the next render reflects
    // the new timeline entry without waiting on a dataset reload.
    patchPatientCacheRow(patient);
    appendAudit({
      type: 'patient-timeline-updated',
      entityType: 'patient',
      entityId: id,
      summary: `Saved ${entry.type.replace(/_/g, ' ')} entry for ${id}`
    }).catch(function () {});
    return entry;
  }

  // Remove a timeline entry by id from a patient's JSON record. Returns true
  // if an entry was found and removed, false otherwise. Used by both apps to
  // delete encounters that live on the JSON timeline (e.g. mobile clinical
  // reviews, board rounds). Without this, a delete-encounter action on
  // desktop would only mutate local state and the entry would re-appear on
  // next dataset reload.
  async function removePatientTimelineEntry(patientId, entryId) {
    if (!patientId) throw new Error('Cannot remove timeline entry without a patient id.');
    if (!entryId) return false;
    const id = String(patientId);
    const ent = String(entryId);
    let patient = await loadPatient(id);
    if (!patient || !patient.id) return false;
    const before = Array.isArray(patient.timeline) ? patient.timeline : [];
    const after = before.filter(function (row) { return String(row && row.id) !== ent; });
    if (after.length === before.length) return false;
    patient.timeline = after;
    await savePatient(patient);
    // Patch the in-memory cache synchronously so the deleted entry
    // disappears from the UI immediately, without waiting on a dataset
    // reload (which was previously adding ~1s of network round-trips).
    patchPatientCacheRowAfterMutation(patient);
    appendAudit({
      type: 'patient-timeline-removed',
      entityType: 'patient',
      entityId: id,
      summary: `Removed timeline entry ${ent} for ${id}`
    }).catch(function () {});
    return true;
  }

  function getActivePatientIds(serviceDoc) {
    const serviceBlock = serviceDoc && serviceDoc.service ? serviceDoc.service : {};
    const patientsBlock = serviceDoc && serviceDoc.patients ? serviceDoc.patients : {};
    const ids = serviceBlock.activePatientIds || patientsBlock.activeIds || [];
    return Array.isArray(ids) ? ids.map(String).filter(Boolean) : [];
  }

  function setActivePatientIds(serviceDoc, ids) {
    const next = Object.assign({}, serviceDoc || makeServiceSchema());
    next.service = Object.assign({}, next.service || {});
    next.service.activePatientIds = ids.slice();
    next.service.patientOrder = ids.slice();
    next.patients = Object.assign({}, next.patients || {});
    next.patients.activeIds = ids.slice();
    next.patients.sortOrder = ids.slice();
    next.updatedAt = nowIso();
    next.meta = Object.assign({}, next.meta || {}, { lastWriter: getActorName() });
    return next;
  }

  function latestTimelineEntry(patient, predicate) {
    const entries = Array.isArray(patient && patient.timeline) ? patient.timeline.slice() : [];
    entries.sort(function (a, b) {
      return Date.parse(b.timestamp || b.completedAt || b.updatedAt || 0) - Date.parse(a.timestamp || a.completedAt || a.updatedAt || 0);
    });
    return entries.find(function (entry) { return !predicate || predicate(entry); }) || null;
  }

  function isBoardStyleTimelineEntry(entry) {
    const type = normaliseEncounterType(entry && entry.type);
    return type === 'board_round' || type === 'mobile_clinical_review';
  }

  // Canonical discharge readiness enum (matches deriveDischargeReadiness in
  // 24-desktop-derived.js and 26-desktop-patient.js). Values outside this set
  // are treated as legacy free-text notes and migrated on next read+write.
  const DISCHARGE_READINESS_ENUM = ['Ready', 'Possible today', 'Likely tomorrow', 'Not ready'];
  function isDischargeReadinessEnum(value) {
    return DISCHARGE_READINESS_ENUM.indexOf(String(value || '').trim()) >= 0;
  }
  // Returns {readiness, notes} for an operational block, splitting any legacy
  // free-text value out of dischargeReadiness into forDischargeSummary. Pure: does
  // not mutate. Used at read-time and as part of write-time migration.
  function splitDischargeFields(operational) {
    const op = operational && typeof operational === 'object' ? operational : {};
    const rawReadiness = String(op.dischargeReadiness || '').trim();
    // Free text lives at operational.forDischargeSummary (canonical name).
    // Brief v0.8.105 build used operational.dischargeNotes — fall through to
    // it so any patient saved during that window migrates on next read+write.
    const rawNotes = String(op.forDischargeSummary || op.dischargeNotes || '').trim();
    if (isDischargeReadinessEnum(rawReadiness)) {
      return { readiness: rawReadiness, notes: rawNotes };
    }
    // Legacy: free text was being stored in dischargeReadiness by mobile.
    // Treat as notes. If a separate notes field already exists, keep that and
    // discard the ambiguous readiness value.
    return { readiness: '', notes: rawNotes || rawReadiness };
  }

  // Derive the patient's current discharge readiness from the most recent
  // board-style timeline entry. Returns one of the canonical enum values
  // ('Ready' | 'Possible today' | 'Likely tomorrow' | 'Not ready') or
  // empty string if no entry has discharge fields set.
  //
  // Why this is a derivation, not stored state: operational.dischargeReadiness
  // used to be written independently when the user committed a round.
  // It went stale on three paths: the date passed without a re-commit, the
  // committing entry was deleted, or a more recent entry was added without
  // discharge fields. Treating it as derived means the timeline is the
  // source of truth — same lesson we learned with boardStatus in v0.8.113.
  function deriveDischargeReadinessFromTimeline(patient) {
    const timeline = patient && Array.isArray(patient.timeline) ? patient.timeline : [];
    if (!timeline.length) return '';
    // Find the latest board-style entry that has discharge fields. Sort
    // newest first by timestamp; first match wins.
    const sorted = timeline.slice().sort(function (a, b) {
      return Date.parse(b && b.timestamp || 0) - Date.parse(a && a.timestamp || 0);
    });
    for (let i = 0; i < sorted.length; i++) {
      const e = sorted[i];
      if (!isBoardStyleTimelineEntry(e)) continue;
      const f = e && e.fields ? e.fields : {};
      const isReady = f.dischargeReady === true || f.dischargeReady === 'true';
      const dateStr = String(f.dischargeDate || '').trim();
      if (!isReady && !dateStr) continue;
      // Same logic as desktop's deriveDischargeReadiness (in 26-desktop-patient.js)
      if (isReady) return 'Ready';
      const todayIso = new Date().toISOString().split('T')[0];
      const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrowIso = tomorrowDate.toISOString().split('T')[0];
      if (dateStr === todayIso) return 'Possible today';
      if (dateStr === tomorrowIso) return 'Likely tomorrow';
      return 'Not ready';
    }
    return '';
  }

  function mapJsonPatientToLegacyRaw(patient) {
    const identity = patient.identity || {};
    const serviceBlock = patient.service || {};
    const alerts = patient.alerts || {};
    const clinical = patient.clinical || {};
    const operational = patient.operational || {};
    const dischargeFields = splitDischargeFields(operational);
    const latest = latestTimelineEntry(patient, isBoardStyleTimelineEntry) || latestTimelineEntry(patient);
    const note = latest && latest.note ? latest.note : {};
    const issueLines = Array.isArray(clinical.persistentIssues)
      ? clinical.persistentIssues.map(function (x) { return typeof x === 'string' ? x : (x && (x.title || x.text || x.label)) || ''; }).filter(Boolean).join('\n')
      : '';
    const summary = clinical.summary || note.issues || issueLines || serviceBlock.pathway || '';
    const obs = clinical.obs && typeof clinical.obs === 'object' ? clinical.obs : {};
    const acp = clinical.acp && typeof clinical.acp === 'object' ? clinical.acp : {};
    const flatObs = {
      temp: obs.temp || obs.temperature || '',
      bp: obs.bp || obs.bloodPressure || '',
      hr: obs.hr || obs.heartRate || '',
      spo2: obs.spo2 || obs.spO2 || obs.sats || '',
      rr: obs.rr || obs.respRate || obs.respiratoryRate || '',
      bm: obs.bm || obs.bloodGlucose || obs.glucose || '',
      weight: obs.weight || obs.wt || '',
      oxygen: obs.oxygen || '',
      oxygenFlow: obs.oxygenFlow || obs.o2 || obs.o2Flow || '',
      scoreMode: obs.scoreMode || obs.score || ''
    };
    return {
      id: patient.id,
      name: identity.name || patient.name || patient.id,
      age: identity.age || '',
      sex: identity.sex || '',
      location: serviceBlock.location || '',
      pathway: serviceBlock.pathway || '',
      referralSource: serviceBlock.referredFrom || '',
      doa: serviceBlock.admittedDate || '',
      priority: operational.priority || '',
      boardStatus: operational.boardStatus || 'Not discussed',
      // dischargeReadiness is now derived from the timeline (most recent
      // board-style entry's discharge fields). Empty if no entry has
      // discharge fields set. The legacy operational.dischargeReadiness
      // is ignored — see deriveDischargeReadinessFromTimeline above.
      dischargeReadiness: deriveDischargeReadinessFromTimeline(patient),
      forDischargeSummary: dischargeFields.notes,
      dnar: !!alerts.dnar || String(acp.dnacprStatus || '').toLowerCase() === 'yes',
      acp: !!alerts.acp || !!(acp.dnacprStatus || acp.tepStatus || acp.ceilingOfCare || acp.tep || acp.notes || acp.acpNotes),
      escalation: alerts.escalation || '',
      summary,
      listDetails: [summary, alerts.dnar ? 'DNAR' : '', alerts.acp ? 'ACP' : '', alerts.escalation || ''].filter(Boolean).join('\n'),
      form: {
        issues: note.issues || issueLines || '',
        currently: note.progress || '',
        examination: note.examination || '',
        plan: note.plan || '',
        bloods: note.bloodsIx || clinical.bloodsSummary || '',
        forDischargeSummary: dischargeFields.notes,
        temp: flatObs.temp,
        bp: flatObs.bp,
        hr: flatObs.hr,
        spo2: flatObs.spo2,
        rr: flatObs.rr,
        bm: flatObs.bm,
        weight: flatObs.weight,
        oxygen: flatObs.oxygen,
        oxygenFlow: flatObs.oxygenFlow,
        scoreMode: flatObs.scoreMode,
        obs,
        acp,
        medEntries: Array.isArray(clinical.medications) ? clinical.medications : [],

    try {
      const loadedAt = Date.parse(patientCache && patientCache.loadedAt || 0) || 0;
      if (!loadedAt) {
        // Quiet path — record the check timestamp but don't refresh the
        // shell for a state we already had (no cache yet). Direct localStorage
        // write avoids saveState's refreshShell side effect.
        const prevAvailable = state.updateAvailable;
        state.updateAvailable = false;

      let changed = 0;
      let latestRemote = 0;
      const paths = ids.slice(0, 80).map(function (id) { return childPath(settings.folderPath, `patients/${id}.json`); });
      paths.push(childPath(settings.folderPath, 'tasks.json'));
      for (const path of paths) {
        try {
          const meta = await getItemMeta(path);
          const stamp = getRemoteStampFromMeta(meta);
          latestRemote = Math.max(latestRemote, stamp);
          if (stamp && stamp > loadedAt + 5000) changed += 1;
        } catch (_) {}
      }
      // Decide whether the UI needs to re-render. Only the change in
      // updateAvailable, or a meaningfully newer remote stamp, are
      // user-visible. The lastUpdateCheckAt timestamp moves on every poll
      // and isn't displayed anywhere — no need to refresh the shell for it.
      const prevAvailable = state.updateAvailable;
      const prevRemoteAt = state.lastRemoteUpdateAt;
      state.updateAvailable = changed > 0;
      state.lastUpdateCheckAt = nowIso();
      state.lastRemoteUpdateAt = latestRemote ? new Date(latestRemote).toISOString() : '';
      state.lastOperation = changed > 0
        ? `JSON update available (${changed} changed file${changed === 1 ? '' : 's'})`
        : 'No JSON updates found';
      state.lastError = '';
      // Persist state quietly (direct write, no refreshShell side effect).
      try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (_) {}
      // Only refresh the shell if something user-visible actually changed.
      // Without this gate the 60s poll triggered a full re-render every
      // minute, visibly resetting the composer mid-typing and bumping
      // anything else not explicitly preserved across renders.
      const userVisibleChange = (prevAvailable !== state.updateAvailable)
        || (prevRemoteAt !== state.lastRemoteUpdateAt && state.updateAvailable);
      if (userVisibleChange) refreshShell('JSON store');
      return { available: changed > 0, count: changed, latestRemoteAt: state.lastRemoteUpdateAt };
    } catch (err) {
      recordError(err);
      throw err;
    }
  }

  function getCachedPatientBundle() {
    if (!patientCache || !Array.isArray(patientCache.rows) || !patientCache.rows.length) return null;

    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    state.lastOperation = `Downloaded starter schema bundle for ${root}`;
    state.lastError = '';
    saveState();
  }

  function recordError(err) {
    state.lastError = err && err.message ? err.message : String(err || 'Unknown error');
    state.lastOperation = 'Shared JSON store error';
    saveState();
  }

  function getActorName() {
    if (window.HAHBoard.ops && typeof window.HAHBoard.ops.getActorName === 'function') {
      return window.HAHBoard.ops.getActorName();
    }
    return 'Board user';
  }

  window.HAHBoard.sharedJsonStore = {
    getInfo,
    setClientId,
    setFolderPath,
    promptClientId,
    promptFolderPath,
    signIn,
    initialiseStore,
    testReadWrite,
    createTestPatient,
    loadPatientDataset,
    checkForRemoteUpdates,
    getCachedPatientBundle,
    clearPatientCache,
    downloadStarterSchemas,
    loadService,
    saveService,
    loadPatient,
    savePatient,
    patchPatientRecord,
    createPatientRecord,
    updatePatientCore,
    archivePatientRecord,
    restoreArchivedPatientRecord,
    loadTasks,
    saveTasks,
    loadTaskDataset,
    getCachedTasks,
    clearTaskCache,
    upsertTaskRecord,
    patchTaskRecord,
    loadRound,
    saveRound,
    appendAudit,
    upsertPatientTimelineEntry,
    removePatientTimelineEntry,
    makePatientSchema,
    getFilePlan
  };
})();
